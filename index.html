// ══════════════════════════════════════════════════════════
// REUSABLE PAGINATION COMPONENT — يعمل مع أي جدول في النظام
// ══════════════════════════════════════════════════════════
//
// الاستخدام:
//   buildPagination('containerId', totalItems, pageSize, currentPage, onPageChange)
//
//   مثال:
//
//   function changeMyPage(p){ currentPage=p; renderMyTable(); }
// ══════════════════════════════════════════════════════════

// ── Global pagination callbacks registry ──
const _pgnCallbacks = {};

function buildPagination(containerId, totalItems, pageSize, currentPage, onPageChange) {
  const container = document.getElementById(containerId);
  if (!container) return;

  const totalPages = Math.max(1, Math.ceil(totalItems / pageSize));
  if (totalPages <= 1 && totalItems === 0) { container.innerHTML = ''; return; }

  const start = Math.min((currentPage - 1) * pageSize + 1, totalItems);
  const end   = Math.min(currentPage * pageSize, totalItems);

  // سجّل الـ callback
  _pgnCallbacks[containerId] = onPageChange;

  // بناء أرقام الصفحات مع ...
  const pages = [];
  if (totalPages <= 7) {
    for (let i = 1; i <= totalPages; i++) pages.push(i);
  } else {
    pages.push(1);
    if (currentPage > 3) pages.push('...');
    const lo = Math.max(2, currentPage - 1);
    const hi = Math.min(totalPages - 1, currentPage + 1);
    for (let i = lo; i <= hi; i++) pages.push(i);
    if (currentPage < totalPages - 2) pages.push('...');
    pages.push(totalPages);
  }

  const btnClass = (p) => 'fs-page-btn' + (p === currentPage ? ' active' : '');
  const call     = (p) => '_pgnGo("' + containerId + '",' + p + ')';

  let btnsHtml = '';
  pages.forEach(function(p) {
    if (p === '...') {
      btnsHtml += '<span class="fs-page-dots">···</span>';
    } else {
      btnsHtml += '<button class="' + btnClass(p) + '" onclick="' + call(p) + '" aria-label="صفحة ' + p + '">' + p + '</button>';
    }
  });

  const prevDisabled = currentPage <= 1       ? ' disabled' : '';
  const nextDisabled = currentPage >= totalPages ? ' disabled' : '';

  container.className = '';
  container.innerHTML =
    '<div class="fs-pagination">' +
      '<div class="fs-pagination-info">عرض <strong>' + start + '–' + end + '</strong> من <strong>' + totalItems + '</strong></div>' +
      '<div class="fs-pagination-btns">' +
        '<button class="fs-page-btn fs-next"' + nextDisabled + ' onclick="' + call(currentPage + 1) + '" aria-label="الصفحة التالية">' +
          '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>' +
        '</button>' +
        btnsHtml +
        '<button class="fs-page-btn fs-prev"' + prevDisabled + ' onclick="' + call(currentPage - 1) + '" aria-label="الصفحة السابقة">' +
          '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>' +
        '</button>' +
      '</div>' +
    '</div>';
}

function _pgnGo(containerId, page) {
  const cb = _pgnCallbacks[containerId];
  if (typeof cb === 'function') cb(page);
}

// ── helper: قص البيانات حسب الصفحة ──
function paginateData(arr, page, size) {
  const p = Math.max(1, page);
  return arr.slice((p - 1) * size, p * size);
}

// ── Page state manager لكل جدول ──
const _pageState = {};
function getPage(key)       { return _pageState[key] || 1; }
function setPage(key, val)  { _pageState[key] = Math.max(1, val); }



// ── Table Pagination Helper (Reusable) ──
// يُستدعى بعد أي render function
// data: مصفوفة البيانات الكاملة
// bodyId: id الـ tbody
// renderFn: function تأخذ array وتعمل innerHTML
// pageKey: unique key لهذا الجدول
// pageSize: عدد الصفوف

function renderWithPagination(data, bodyId, renderFn, pageKey, pageSize, paginContainerId) {
  const page  = getPage(pageKey);
  const paged = paginateData(data, page, pageSize);
  const tbody = document.getElementById(bodyId);
  if (tbody) tbody.innerHTML = renderFn(paged);
  if (paginContainerId) {
    function _onPageChange(p) {
      setPage(pageKey, p);
      const tb = document.getElementById(bodyId);
      if (tb) tb.innerHTML = renderFn(paginateData(data, p, pageSize));
}
}
}



// ══ Pagination Init Helper ══
function _initPagination(paginId, allData, pageSize, pageKey, renderFn) {
  renderFn();
}

async function saveAvatar() {
  const b64 = window._avatarB64Ref ? window._avatarB64Ref() : null;
  if(!b64) return;
  const btn = document.getElementById('avatarSaveBtn');
  btn.disabled = true; btn.textContent = '⏳ جاري الرفع...';
  try {
    const res = await apiCall('/user/avatar','POST',{ image: b64 });
    if(res.ok && res.avatar_url) {
      currentUser.avatar_url = res.avatar_url;
      // تحديث الأيقونة في الـ sidebar فوراً
      const avatarEl = document.getElementById('userAvatar');
      const existingImg = avatarEl.querySelector('img');
      if(existingImg) existingImg.remove();
      const initialSpan = document.getElementById('userAvatarInitial');
      if(initialSpan) initialSpan.style.display = 'none';
      const img = document.createElement('img');
      img.src = res.avatar_url + '?t=' + Date.now();
      img.alt = currentUser.username;
      img.onerror = () => { img.remove(); if(initialSpan) initialSpan.style.display=''; };
      avatarEl.prepend(img);
      document.getElementById('avatarModal')?.remove();
      showNotification('✅ تم رفع الصورة بنجاح','success');
    }
  } catch(e) {
    showNotification('فشل رفع الصورة: ' + (e.message||e),'error');
    btn.disabled = false; btn.textContent = '💾 حفظ الصورة';
  }
}

async function deleteAvatar() {
  if(!confirm('هل تريد حذف صورتك الشخصية؟')) return;
  try {
    await apiCall('/user/avatar','DELETE',{});
    currentUser.avatar_url = '';
    const avatarEl = document.getElementById('userAvatar');
    const existingImg = avatarEl.querySelector('img');
    if(existingImg) existingImg.remove();
    const initialSpan = document.getElementById('userAvatarInitial');
    if(initialSpan) initialSpan.style.display = '';
    document.getElementById('avatarModal')?.remove();
    showNotification('تم حذف الصورة','success');
  } catch(e) {
    showNotification('فشل الحذف','error');
  }
}

async function exportFraudCSV() {

  const csv  = '\uFEFF' + [headers,...rows].map(r=>r.map(v=>'"'+String(v||'').replace(/"/g,'""')+'"').join(',')).join('\r\n');

  el.href    = URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  el.download= `fraud_report_${document.getElementById('fraudFrom')?.value||'export'}.csv`;
  el.click();
  URL.revokeObjectURL(el.href);
  showNotification('✅ تم تصدير التقرير', 'success');

      <div style="display:flex;gap:.6rem;justify-content:center;flex-wrap:wrap">
        ${idx + 1 < total ? `<button onclick="_showVoiceNotePopup(window._vnPopupNotes, ${idx+1})"
          style="background:#3b82f6;border:none;color:white;padding:.55rem 1.2rem;border-radius:10px;
                 cursor:pointer;font-size:.85rem;font-weight:700">التالية ›</button>` : ''}

      </div>
    </div>`;
  document.body.appendChild(popup);
  window._vnPopupNotes = notes;
  // تشغيل تلقائي
  const audio = document.getElementById(uid);
  if (audio) {

    audio.play().catch(() => {});
  }
}

async function _markVoiceNotePlayed(noteId) {
  try { await apiCall('/voice-notes/' + noteId + '/play', 'POST'); } catch(e) {}
}

function setMrView(view) {
  window._mrView = view;
  window._mrPage = 1;
  const btnD = document.getElementById('mrViewDrivers');
  const btnC = document.getElementById('mrViewCars');
  if (btnD && btnC) {
    if (view === 'drivers') {
      btnD.style.background = '#1e3a5f'; btnD.style.color = '#fff';
      btnC.style.background = '#f8fafc'; btnC.style.color = '#475569';
    } else {
      btnC.style.background = '#1e3a5f'; btnC.style.color = '#fff';
      btnD.style.background = '#f8fafc'; btnD.style.color = '#475569';
    }
  }
  if (window._mrData) renderMrTable(window._mrData);
}

function filterMrTable() {
  window._mrPage = 1;
  if (window._mrData) renderMrTable(window._mrData);
}

window._mrPage     = 1;
window._mrPageSize = 10;

function _sortMrRows(rows, sortVal, view) {
  const sorted = [...rows];
  switch(sortVal) {
    case 'km_desc':    return sorted.sort((a,b) => (b.km||0)        - (a.km||0));
    case 'km_asc':     return sorted.sort((a,b) => (a.km||0)        - (b.km||0));
    case 'trips_desc': return sorted.sort((a,b) => (b.trips||0)     - (a.trips||0));
    case 'trips_asc':  return sorted.sort((a,b) => (a.trips||0)     - (b.trips||0));
    case 'cost_desc':  return sorted.sort((a,b) => (b.total_cost||b.fuel_cost||0) - (a.total_cost||a.fuel_cost||0));
    default: return sorted;
  }
}

function renderMrTable(data) {
  const view    = window._mrView || 'drivers';
  const sortVal = document.getElementById('mrSort')?.value || 'km_desc';

  const thead   = document.getElementById('mrThead');
  const tbody   = document.getElementById('mrTbody');
  const countEl = document.getElementById('mrCount');
  const hlEl    = document.getElementById('mrHighlights');

  if (!tbody || !thead) return;

  if (view === 'drivers') {

    if (query) rows = rows.filter(d => (d.name||'').toLowerCase().includes(query) || (d.branch||'').toLowerCase().includes(query));

        { icon:'⚠️', label:'الأقل مسافة',   d:byKm[byKm.length-1],  color:'#ef4444', val: Math.round(byKm[byKm.length-1].km||0).toLocaleString('ar-EG')+' كم' },
      ].map(x => `
        <div class="card" style="padding:1rem;display:flex;align-items:center;gap:1rem;border-right:4px solid ${x.color}">
          <div style="font-size:1.6rem">${x.icon}</div>
          <div>
            <div style="font-size:.72rem;color:var(--muted)">${x.label}</div>

      <th style="text-align:center;cursor:pointer" onclick="cycleMrSort('km')">الكم ↕</th>
      <th style="text-align:center">وقود (ل)</th>
      <th style="text-align:center">تكلفة وقود</th>
      <th style="text-align:center">تكلفة صيانة</th>
      <th style="text-align:center;cursor:pointer" onclick="cycleMrSort('cost')">الإجمالي ↕</th>

      tbody.innerHTML = pageRows.map((car,i) => {

        const barColor = pctKm>=80?'#10b981':pctKm>=50?'#3b82f6':pctKm>=25?'#f97316':'#ef4444';

          <td>
            <div style="display:flex;align-items:center;gap:.5rem">
              <span style="font-weight:700;min-width:60px;text-align:left">${Math.round(car.km||0).toLocaleString('ar-EG')} كم</span>
              <div style="flex:1;background:#e2e8f0;border-radius:4px;height:6px;min-width:40px">

        { icon:'🏆', label:'الأعلى مسافة', d:byKm[0],              color:'#10b981', val: Math.round(byKm[0].km||0).toLocaleString('ar-EG')+' كم', sub: byKm[0].plate },

// Pagination helper for monthly report
function _mrPaginationRow(page, totalPages, totalRows, colspan) {
  if (totalPages <= 1) return '';
  const ps = window._mrPageSize || 10;
  const from = (page-1)*ps + 1;
  const to   = Math.min(page*ps, totalRows);
  const prevBtn = page > 1
    ? `<button onclick="window._mrPage=${page-1};if(window._mrData)renderMrTable(window._mrData)"
        style="padding:.3rem .75rem;border:1.5px solid #e2e8f0;border-radius:8px;background:#fff;cursor:pointer;font-family:inherit;font-size:.8rem;color:#475569;font-weight:600">← السابق</button>`
    : `<button disabled style="padding:.3rem .75rem;border:1.5px solid #f1f5f9;border-radius:8px;background:#f8fafc;cursor:not-allowed;font-family:inherit;font-size:.8rem;color:#cbd5e1">← السابق</button>`;
  const nextBtn = page < totalPages
    ? `<button onclick="window._mrPage=${page+1};if(window._mrData)renderMrTable(window._mrData)"
        style="padding:.3rem .75rem;border:1.5px solid #e2e8f0;border-radius:8px;background:#fff;cursor:pointer;font-family:inherit;font-size:.8rem;color:#475569;font-weight:600">التالي →</button>`
    : `<button disabled style="padding:.3rem .75rem;border:1.5px solid #f1f5f9;border-radius:8px;background:#f8fafc;cursor:not-allowed;font-family:inherit;font-size:.8rem;color:#cbd5e1">التالي →</button>`;
  return `<tr style="background:#f8fafc"><td colspan="${colspan}" style="padding:.65rem 1rem">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem">
      <span style="font-size:.8rem;color:#64748b">${from}–${to} من ${totalRows}</span>
      <div style="display:flex;align-items:center;gap:.4rem">
        ${prevBtn}
        <span style="font-size:.8rem;color:#475569;font-weight:700;padding:0 .4rem">صفحة ${page} / ${totalPages}</span>
        ${nextBtn}
      </div>
    </div>
  </td></tr>`;
}

// تبديل الترتيب بالضغط على العمود
const _mrSortCycle = { km:['km_desc','km_asc'], trips:['trips_desc','trips_asc'], cost:['cost_desc'] };
async function cycleMrSort(field) {
  const sel = document.getElementById('mrSort');
  if (!sel) return;
  const cycle = _mrSortCycle[field] || ['km_desc'];
  const cur   = sel.value;
  const idx   = cycle.indexOf(cur);
  sel.value   = cycle[(idx+1) % cycle.length];
  window._mrPage = 1;
  if (window._mrData) renderMrTable(window._mrData);
}

let _mrData = null;

async function loadMonthlyReport() {
  const month  = document.getElementById('mrMonth')?.value  || '';
  const branch = document.getElementById('mrBranch')?.value?.trim() || '';
  const tbody  = document.getElementById('mrTbody');
  const sumEl  = document.getElementById('mrSummary');

  if (tbody) tbody.innerHTML = `<tr><td colspan="10" style="text-align:center;padding:2rem">⏳ جاري التحميل...</td></tr>`;

  try {
    let url = '/reports/monthly?month=' + month;
    if (branch) url += '&branch=' + encodeURIComponent(branch);
    const data = await apiCall(url);
    _mrData = data;

function exportMonthlyCSV() {
  if (!_mrData) return showNotification('لا توجد بيانات', 'error');
  const month   = document.getElementById('mrMonth')?.value || 'report';
  const view    = window._mrView || 'drivers';
  const sortVal = document.getElementById('mrSort')?.value || 'km_desc';

  let csv = '\uFEFF';
  if (view === 'drivers') {
    const rows = _sortMrRows(_mrData.drivers||[], sortVal, 'drivers');
    const h = ['#','السائق','الرقم الثابت','الفرع','الرحلات','مكتملة','الكم (كم)','وقود (ل)','تكلفة وقود'];
    const r = rows.map((d,i) => [i+1, d.name, d.fixed_number||'', d.branch||'', d.trips, d.completed, Math.round(d.km||0), Math.round(d.fuel_liters||0), Math.round(d.fuel_cost||0)]);
    csv += 'السائقون\r\n' + [h,...r].map(row=>row.map(v=>'"'+String(v||'').replace(/"/g,'""')+'"').join(',')).join('\r\n');
  } else {
    const rows = _sortMrRows(_mrData.cars||[], sortVal, 'cars');
    const h = ['#','اللوحة','المركبة','الفرع','الرحلات','الكم (كم)','وقود (ل)','تكلفة وقود','تكلفة صيانة','الإجمالي'];
    const r = rows.map((c,i) => [i+1, c.plate, c.model||'', c.branch||'', c.trips||0, Math.round(c.km||0), Math.round(c.fuel_liters||0), Math.round(c.fuel_cost||0), Math.round(c.maint_cost||0), Math.round(c.total_cost||0)]);
    csv += 'المركبات\r\n' + [h,...r].map(row=>row.map(v=>'"'+String(v||'').replace(/"/g,'""')+'"').join(',')).join('\r\n');
  }

  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv;charset=utf-8'}));
  a.download = `monthly_${view}_${month}.csv`;
  a.click();
  URL.revokeObjectURL(a.href);
  showNotification('✅ تم تصدير التقرير', 'success');
}

async function loadVoiceNotes() {
  const tbody = document.getElementById('vnTableBody');
  if (!tbody) return;
  try {
    const endpoint = '/voice-notes/sent';
    _voiceNotes = await apiCall(endpoint);
    if (!_voiceNotes.length) {
      tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--muted)">لا توجد رسائل مرسلة حتى الآن</td></tr>`;
      return;
    }
    const targetLabel = { admins: '👑 المشرفون', drivers: '🚗 السائقون' };
    tbody.innerHTML = _voiceNotes.map((n, i) => {
      const deleted = n.is_deleted;
      const status  = deleted
        ? '<span style="color:#ef4444;font-size:.78rem">محذوف</span>'
        : `<span style="font-weight:700">${n.play_count}/${n.max_plays}</span>`;
      const dur    = n.duration_sec ? Math.round(n.duration_sec) + 'ث' : '—';
      const sent   = (n.created_at||'').slice(0,16).replace('T',' ');
      const expiry = (n.expires_at||'').slice(0,16).replace('T',' ');
      return `<tr style="${deleted?'opacity:.5':''}">
        <td style="text-align:center;color:var(--muted)">${i+1}</td>
        <td>${n.target_user_id ? `👤 ${n.target_name || 'شخص محدد'}` : (targetLabel[n.target_group] || n.target_group)}</td>
        <td style="text-align:center">${dur}</td>
        <td style="text-align:center">${status}</td>
        <td style="font-size:.82rem;color:var(--muted)">${sent}</td>
        <td style="font-size:.82rem;color:var(--muted)">${expiry}</td>
        <td style="text-align:center">
          ${!deleted ? `<button class="btn btn-ghost btn-sm" style="color:#ef4444" onclick="deleteVoiceNote(${n.id})" title="حذف">🗑️</button>` : ''}
        </td>
      </tr>`;
    }).join('');
  } catch(e) {
    tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;color:#ef4444;padding:2rem">❌ ${e.message}</td></tr>`;
  }
}

async function deleteVoiceNote(id) {
  if (!confirm('حذف هذه الرسالة؟')) return;
  try {
    await apiCall('/voice-notes/' + id, 'DELETE');
    showNotification('✅ تم حذف الرسالة', 'success');
    await loadVoiceNotes();
  } catch(e) {
    showNotification(e.message, 'error');
  }
}

async function toggleVoiceRecording() {
  const btn     = document.getElementById('vnRecordBtn');
  const status  = document.getElementById('vnRecordStatus');
  const sendBtn = document.getElementById('vnSendBtn');
  const preview = document.getElementById('vnPreviewAudio');

  if (_mediaRecorder && _mediaRecorder.state === 'recording') {
    _mediaRecorder.stop();
    clearInterval(_recordingTimer);
    btn.textContent = '🔴 ابدأ التسجيل';
    btn.style.background = '';
    status.textContent = 'تم إيقاف التسجيل';
    return;
  }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    _audioChunks = [];
    _mediaRecorder = new MediaRecorder(stream);
    _mediaRecorder.ondataavailable = e => { if (e.data.size > 0) _audioChunks.push(e.data); };
    _mediaRecorder.onstop = () => {
      const blob = new Blob(_audioChunks, { type: 'audio/webm' });
      const url  = URL.createObjectURL(blob);
      preview.src = url;
      preview.style.display = 'block';
      sendBtn.style.display  = 'inline-flex';
      const reader = new FileReader();
      reader.onload = () => { window._vnAudioB64 = reader.result; };
      reader.readAsDataURL(blob);
      stream.getTracks().forEach(t => t.stop());
    };
    _mediaRecorder.start();
    let secs = 0;
    status.textContent = '⏯️ جاري التسجيل... 0ث';
    btn.textContent = '⏹️ إيقاف التسجيل';
    btn.style.background = '#ef4444';
    preview.style.display = 'none';
    sendBtn.style.display  = 'none';
    _recordingTimer = setInterval(() => {
      secs++;
      status.textContent = '⏯️ جاري التسجيل... ' + secs + 'ث';
      if (secs >= 120) { _mediaRecorder.stop(); clearInterval(_recordingTimer); }
    }, 1000);
  } catch(e) {
    showNotification('تعذر الوصول للميكروفون: ' + e.message, 'error');
  }
}


async function loadInboxNotes() {
  try {

    const lines = notes.map((n,i)=>{

      return `<div style="padding:.75rem;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;gap:1rem">
        <span style="color:#64748b;font-size:.8rem">${i+1}</span>

        </div>

async function sendVoiceNote() {
  const b64      = window._vnAudioB64;
  const target   = document.getElementById('vnTarget')?.value    || 'admins';
  const maxPlays = parseInt(document.getElementById('vnMaxPlays')?.value || '3');
  const hours    = parseInt(document.getElementById('vnHours')?.value    || '24');
  if (!b64) return showNotification('سجّل رسالة أولاً', 'error');
  if (target === 'specific' && !window._vnSelectedUserId) {
    return showNotification('يرجى اختيار الشخص المراد إرسال الرسالة إليه', 'error');
  }
  const payload = { audio_data: b64, duration_sec: 0, max_plays: maxPlays, hours_ttl: hours };
  if (target === 'specific') {
    payload.target_group   = '';
    payload.target_user_id = window._vnSelectedUserId;
  } else {
    payload.target_group   = target;
    payload.target_user_id = null;
  }
  try {
    await apiCall('/voice-notes', 'POST', payload);
    window._vnAudioB64 = null;
    document.getElementById('vnPreviewAudio').style.display = 'none';
    document.getElementById('vnSendBtn').style.display      = 'none';
    document.getElementById('vnRecordStatus').textContent   = '';
    showNotification('✅ تم إرسال الرسالة بنجاح', 'success');
    await loadVoiceNotes();
  } catch(e) {
    showNotification('فشل الإرسال: ' + e.message, 'error');
  }
}

async function searchVoiceUsers(q) {
  clearTimeout(_vnSearchTimer);
  const dd = document.getElementById('vnUserDropdown');
  if (!q || q.length < 1) { if(dd) dd.style.display='none'; return; }
  _vnSearchTimer = setTimeout(async () => {
    try {
      const data = await apiCall('/voice-notes/users-search?q=' + encodeURIComponent(q));
      const users = data.users || [];
      if (!dd) return;
      if (!users.length) {
        dd.innerHTML = '<div style="padding:.75rem 1rem;color:#94a3b8;font-size:.85rem;text-align:center">لا توجد نتائج</div>';
        dd.style.display = 'block';
        return;
      }
      dd.innerHTML = users.map((u, idx) => {
        const initials = (u.name||'?').slice(0,2).toUpperCase();
        const avatarHtml = u.avatar
          ? `<img src="${u.avatar}" width="32" height="32" style="border-radius:50%;object-fit:cover;flex-shrink:0">`
          : `<div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#06B6D4,#22C55E);display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;color:#fff;flex-shrink:0">${initials}</div>`;
        const badge = u.type === 'driver'
          ? '<span style="background:#f0fdf4;color:#16a34a;font-size:.7rem;padding:.15rem .5rem;border-radius:20px;font-weight:600">سائق</span>'
          : '<span style="background:#eff6ff;color:#2563eb;font-size:.7rem;padding:.15rem .5rem;border-radius:20px;font-weight:600">مشرف</span>';
        const branch = u.branch ? `<span style="color:#94a3b8;font-size:.72rem"> · ${u.branch}</span>` : '';
        // نحفظ البيانات في global array ونستخدم index بدل JSON.stringify
        window._vnSearchResults = window._vnSearchResults || [];
        window._vnSearchResults[idx] = u;
        return `<div data-vn-idx="${idx}"
          style="padding:.6rem 1rem;cursor:pointer;border-bottom:.5px solid #f1f5f9;display:flex;align-items:center;gap:.65rem;transition:background .12s"
          onmouseover="this.style.background='#f8fafc'" onmouseout="this.style.background=''">
          ${avatarHtml}
          <div style="flex:1;min-width:0;pointer-events:none">
            <div style="font-weight:600;font-size:.85rem;color:#0f172a">${u.name}</div>
            <div style="display:flex;align-items:center;gap:.35rem;margin-top:.1rem">${badge}${branch}</div>
          </div>
        </div>`;
      }).join('');
      // إضافة click listener بعد الـ render
      dd.querySelectorAll('[data-vn-idx]').forEach(el => {
        el.addEventListener('click', function() {
          const i = +this.getAttribute('data-vn-idx');
          const u = window._vnSearchResults[i];
          if (u) selectVnUser(u.id, u.name, u.avatar||'', u.role||'');
        });
      });
      dd.style.display = 'block';
    } catch(e) {
      console.error('voice user search error:', e);
    }
  }, 280);
}

function selectVnUser(id, name, avatar, role) {
  window._vnSelectedUserId = id;
  const dd   = document.getElementById('vnUserDropdown');
  const sel  = document.getElementById('vnSelectedUser');
  const sname= document.getElementById('vnSelectedName');
  const srole= document.getElementById('vnSelectedRole');
  const avEl = document.getElementById('vnSelAvatar');
  const inp  = document.getElementById('vnUserSearch');

  if (dd)  dd.style.display = 'none';
  if (inp) inp.value = '';
  if (sname) sname.textContent = name;
  if (srole) srole.textContent = role || '';

  if (avEl) {
    if (avatar) {
      avEl.innerHTML = `<img src="${avatar}" style="width:100%;height:100%;border-radius:50%;object-fit:cover">`;
    } else {
      avEl.innerHTML = (name||'?').slice(0,2).toUpperCase();
      avEl.style.background = 'linear-gradient(135deg,#06B6D4,#22C55E)';
    }
  }
  if (sel) sel.style.display = 'flex';
}

function clearVnUser() {
  window._vnSelectedUserId = null;
  const sel = document.getElementById('vnSelectedUser');
  const inp = document.getElementById('vnUserSearch');
  const dd  = document.getElementById('vnUserDropdown');
  if (sel) sel.style.display = 'none';
  if (inp) inp.value = '';
  if (dd)  dd.style.display = 'none';
}

  try {
    const [cars, drivers] = await Promise.all([loadCars(), loadDrivers()]);

        cars.map(c => `<option value="${c.id}">${c.plate} · ${c.car_name||c.model}</option>`).join('');

}

async function doReassign() {
  const carId = document.getElementById('rnCar')?.value;
  const drvId = document.getElementById('rnDriver')?.value;
  const status = document.getElementById('rnStatus');
  if (!carId || !drvId) { if(status) status.innerHTML='<span style="color:#ef4444">اختر المركبة والسائق</span>'; return; }
  try {
    if(status) status.innerHTML = '<span style="color:#64748b">⏳ جاري التخصيص...</span>';
    // حذف الصلاحيات القديمة للمركبة ثم إضافة جديدة
    const perms = await apiCall('/permissions');
    const old   = perms.filter(p => String(p.car_id) === String(carId));
    for (const p of old) {
      await apiCall('/permissions/' + p.id, 'DELETE').catch(()=>{});
    }
    await apiCall('/permissions', 'POST', {car_id: +carId, driver_id: +drvId});
    if(status) status.innerHTML = '<span style="color:#16a34a">✅ تم إعادة التخصيص بنجاح</span>';
    showNotification('✅ تم إعادة تخصيص المركبة', 'success');
    setTimeout(() => { if(status) status.innerHTML=''; }, 3000);
  } catch(e) {
    if(status) status.innerHTML = `<span style="color:#ef4444">❌ ${e.message}</span>`;
  }
}

let _permOpId = null;
let _permOpName = '';
let _permCurrentEqId   = '';
let _permCurrentEqName = '';
let _allEquipmentList = [];

async function openPermissionsModal(opId, opName, currentEqId, currentEqName) {
  _permOpId = opId;
  _permOpName = opName;
  _permCurrentEqId   = currentEqId   || '';
  _permCurrentEqName = currentEqName || '';
  const modal = document.getElementById('opPermModal');
  if (!modal) return;
  document.getElementById('opPermTitle').textContent = '🔐 صلاحيات المعدات — ' + opName;
  document.getElementById('opPermBody').innerHTML = '<div style="text-align:center;padding:2rem;color:#94a3b8">جاري التحميل...</div>';
  modal.style.display = 'flex';
  try {
    if (!_allEquipmentList.length) {
      const eqData = await apiCall('/equipment?status=active&limit=500').catch(() => ({ equipment: [] }));
      _allEquipmentList = eqData.equipment || eqData.items || [];
    }
    const data = await apiCall('/operators/' + opId + '/permissions');
    _renderPermissionsBody(data.permissions || []);
  } catch(e) {
    document.getElementById('opPermBody').innerHTML = '<div style="color:#ef4444;padding:1rem">&#x274C; ' + e.message + '</div>';
  }
}

function closePermissionsModal() {
  const modal = document.getElementById('opPermModal');
  if (modal) modal.style.display = 'none';
  _permOpId = null;
  _permCurrentEqId   = '';
  _permCurrentEqName = '';
}

function _renderPermissionsBody(perms) {
  const body = document.getElementById('opPermBody');
  if (!body) return;

  // اجمع الـ permissions + المعدة الحالية لو مش موجودة فيها
  let allPerms = [...perms];
  const currentId   = _permCurrentEqId   || '';
  const currentName = _permCurrentEqName || '';
  if (currentId && !allPerms.some(p => p.equipment_id === currentId)) {
    allPerms = [{
      id: '__current__',
      equipment_id:   currentId,
      equipment_name: currentName || currentId,
      granted_by:     'تعيين مباشر',
      granted_at:     '',
      _isCurrent:     true,
    }, ...allPerms];
  }

  const granted = new Set(allPerms.map(p => p.equipment_id));
  const available = _allEquipmentList.filter(e => !granted.has(e.car_code) && !granted.has(e.equipment_id));
  const eqOptions = available.map(e =>
    '<option value="' + (e.car_code || '') + '" data-name="' + (e.equipment_name || '') + '">' +
    (e.equipment_name || '') + (e.car_code ? ' (' + e.car_code + ')' : '') + '</option>'
  ).join('');
  const noPermsMsg = '<div style="text-align:center;padding:2rem;color:#94a3b8;font-size:.9rem">لا توجد صلاحيات محددة — المشغل يمكنه تشغيل كل المعدات</div>';
  body.innerHTML =
    '<div class="eq-add-row">' +
      '<div style="flex:1"><div style="font-size:.75rem;font-weight:700;color:#475569;margin-bottom:.35rem">إضافة صلاحية معدة</div>' +
      '<select id="newEqSelect"><option value="">اختر معدة...</option>' + eqOptions + '</select></div>' +
      '<button class="btn btn-primary" onclick="addEquipmentPermission()" style="padding:.55rem 1.1rem;font-weight:700;display:flex;align-items:center;gap:.4rem;white-space:nowrap">' +
      '<span>+</span> منح صلاحية</button>' +
    '</div>' +
    '<div style="font-size:.8rem;font-weight:700;color:#475569;margin-bottom:.6rem">المعدات المصرح بها (' + allPerms.length + ')</div>' +
    '<div id="permsList">' +
      (allPerms.length === 0 ? noPermsMsg :
        allPerms.map(p =>
          '<div class="perm-eq-item" id="perm-item-' + p.id + '" style="' + (p._isCurrent ? 'border-color:#f59e0b;background:#fffbeb' : '') + '">' +
            '<div class="perm-eq-info">' +
              '<div class="perm-eq-name">🏗️ ' + (p.equipment_name || p.equipment_id) +
                (p._isCurrent ? ' <span style="font-size:.68rem;background:#fef3c7;color:#92400e;border-radius:8px;padding:.1rem .45rem;font-weight:700;margin-right:.3rem">معدة حالية</span>' : '') +
              '</div>' +
              '<div class="perm-eq-meta">كود: ' + (p.equipment_id || '—') + ' &nbsp;|&nbsp; ممنوحة بواسطة: ' + (p.granted_by || '—') + (p.granted_at ? ' &nbsp;|&nbsp; ' + (p.granted_at || '').slice(0,10) : '') + '</div>' +
            '</div>' +
            (!p._isCurrent ? '<button class="perm-eq-revoke" title="سحب الصلاحية" onclick="revokePermission(' + p.id + ')">🗑️</button>' : '') +
          '</div>'
        ).join('')) +
    '</div>';
}

async function addEquipmentPermission() {
  if (!_permOpId) return;
  const sel = document.getElementById('newEqSelect');
  if (!sel || !sel.value) { showNotification('\u0627\u062E\u062A\u0631 \u0645\u0639\u062F\u0629 \u0623\u0648\u0644\u0627\u064B', 'error'); return; }
  const equipment_id   = sel.value;
  const opt = sel.options[sel.selectedIndex];
  const equipment_name = opt ? (opt.dataset.name || opt.textContent.split(' (')[0]) : '';
  try {
    await apiCall('/operators/' + _permOpId + '/permissions', 'POST', { equipment_id, equipment_name });
    showNotification('\u2705 \u062A\u0645\u062A \u0625\u0636\u0627\u0641\u0629 \u0627\u0644\u0635\u0644\u0627\u062D\u064A\u0629', 'success');
    const data = await apiCall('/operators/' + _permOpId + '/permissions');
    _renderPermissionsBody(data.permissions || []);
  } catch(e) { showNotification(e.message, 'error'); }
}

async function revokePermission(permId) {
  if (!confirm('\u0647\u0644 \u062A\u0631\u064A\u062F \u0633\u062D\u0628 \u0647\u0630\u0647 \u0627\u0644\u0635\u0644\u0627\u062D\u064A\u0629\u061F')) return;
  try {
    await apiCall('/operators/' + _permOpId + '/permissions/' + permId, 'DELETE');
    showNotification('\u2705 \u062A\u0645 \u0633\u062D\u0628 \u0627\u0644\u0635\u0644\u0627\u062D\u064A\u0629', 'success');
    const item = document.getElementById('perm-item-' + permId);
    if (item) { item.style.opacity = '0'; item.style.transition = 'opacity .2s'; setTimeout(() => { item.remove(); }, 220); }
    const data = await apiCall('/operators/' + _permOpId + '/permissions');
    _renderPermissionsBody(data.permissions || []);
  } catch(e) { showNotification(e.message, 'error'); }
}

async function loadShiftsData(){
  const isSuperOrAdmin = ['superuser','admin'].includes(currentUser?.role);
  const tbody=document.getElementById('sfTableBody');
  if(tbody)tbody.innerHTML='<tr><td colspan="15" style="text-align:center;padding:3rem;color:#94a3b8">\u23F3 \u062C\u0627\u0631\u064A \u0627\u0644\u062A\u062D\u0645\u064A\u0644...</td></tr>';
  const search=document.getElementById('sfSearch')?.value||'';
  const status=document.getElementById('sfStatus')?.value||'';
  const from=document.getElementById('sfFrom')?.value||'';
  const to=document.getElementById('sfTo')?.value||'';
  const offset=(_shiftsPage-1)*_shiftsPageSize;
  let url='/shifts?limit='+_shiftsPageSize+'&offset='+offset;
  if(search)url+='&search='+encodeURIComponent(search);
  if(status)url+='&status='+encodeURIComponent(status);
  if(from)url+='&date_from='+from;
  if(to)url+='&date_to='+to;
  try{
    const data=await apiCall(url);
    _shiftsData=data.shifts||[];
    _shiftsTotal=data.total||_shiftsData.length;
    /* ── تحديث الكروت الإحصائية ── */
    const ac=_shiftsData.filter(s=>s.status==='active').length;
    const ec=_shiftsData.filter(s=>s.status==='ended').length;
    const th=_shiftsData.reduce((s,r)=>r.working_hours>0?s+r.working_hours:s,0);
    const elTotal  = document.getElementById('sfStatTotal');
    const elActive = document.getElementById('sfStatActive');
    const elEnded  = document.getElementById('sfStatEnded');
    const elHours  = document.getElementById('sfStatHours');
    if(elTotal)  elTotal.textContent  = _shiftsTotal;
    if(elActive) elActive.textContent = ac;
    if(elEnded)  elEnded.textContent  = ec;
    if(elHours)  elHours.textContent  = th.toFixed(1);
    /* ── counter ── */
    const countEl=document.getElementById('sfCount');
    if(countEl)countEl.textContent=_shiftsTotal+' وردية';
    if(!_shiftsData.length){
      if(tbody)tbody.innerHTML='<tr><td colspan="15" style="text-align:center;padding:3rem;color:#94a3b8">\u0644\u0627 \u062A\u0648\u062C\u062F \u0628\u064A\u0627\u0646\u0627\u062A</td></tr>';
      if(document.getElementById('sfPagination'))document.getElementById('sfPagination').innerHTML='';
      return;
    }
    const tl={day:'☀️ نهارية',night:'🌙 ليلية',extended:'⏱️ ممتدة'};
    const fl={'fuel_solar':'سولار','fuel_92':'92','fuel_95':'95','fuel_80':'80','fuel_cng':'غاز'};
    if(tbody)tbody.innerHTML=_shiftsData.map((s,i)=>{
      const wh=s.working_hours>0?s.working_hours.toFixed(1):'—';
      const st=s.status==='active'
        ?'<span style="display:inline-flex;align-items:center;gap:.4rem;color:#16a34a;font-size:.8rem;font-weight:600"><span style="width:6px;height:6px;border-radius:50%;background:#16a34a"></span>نشطة</span>'
        :'<span style="display:inline-flex;align-items:center;gap:.4rem;color:#94a3b8;font-size:.8rem;font-weight:600"><span style="width:6px;height:6px;border-radius:50%;background:#cbd5e1"></span>منتهية</span>';
      const sT=s.start_time?s.start_time.slice(0,16).replace('T',' '):'—';
      const eT=s.end_time?s.end_time.slice(0,16).replace('T',' '):'—';
      const eqType = s.equipment_type_label || '—';
      const own = s.ownership_type || 'مملوكة';
      const fuelLabel = fl[s.fuel_type] || (s.fuel_type ? s.fuel_type : '');
      const fuelCell = s.fuel_liters > 0
        ? '<span style="color:#334155;font-size:.83rem">'+s.fuel_liters+' ل'+(fuelLabel?' <span style="color:#94a3b8">('+fuelLabel+')</span>':'')+'</span>'
        : '<span style="color:#cbd5e1">—</span>';
      return '<tr>'+
        '<td style="padding:.65rem 1rem;color:#94a3b8;font-size:.78rem">'+(offset+i+1)+'</td>'+
        '<td style="padding:.65rem 1rem"><div style="font-weight:600;color:#0f172a">'+(s.operator_name||'—')+'</div>'+(s.operator_fixed?'<div style="font-size:.74rem;color:#94a3b8">'+s.operator_fixed+'</div>':'')+
        '</td><td style="padding:.65rem 1rem"><div style="font-weight:500;color:#334155">'+(s.equipment_name||'—')+'</div>'+(s.equipment_id?'<div style="font-size:.74rem;color:#94a3b8">'+s.equipment_id+'</div>':'')+
        '</td><td style="padding:.65rem 1rem;font-size:.82rem;color:#64748b">'+eqType+
        '</td><td style="padding:.65rem 1rem;font-size:.82rem;color:#64748b">'+own+
        '</td><td style="padding:.65rem 1rem;white-space:nowrap;font-size:.82rem;color:#475569">'+sT+
        '</td><td style="padding:.65rem 1rem;white-space:nowrap;font-size:.82rem;color:#475569">'+eT+
        '</td><td style="padding:.65rem 1rem;text-align:center;font-weight:600;color:#475569">'+(s.start_hours>0?s.start_hours.toFixed(1):'—')+
        '</td><td style="padding:.65rem 1rem;text-align:center;font-weight:600;color:#475569">'+(s.end_hours>0?s.end_hours.toFixed(1):'—')+
        '</td><td style="padding:.65rem 1rem;text-align:center;font-weight:700;color:'+(wh!=='—'?'#0f172a':'#cbd5e1')+'">'+wh+
        '</td><td style="padding:.65rem 1rem;text-align:center">'+fuelCell+
        '</td><td style="padding:.65rem 1rem;font-size:.82rem;color:#64748b">'+(s.branch||s.operator_branch||'—')+
        '</td><td style="padding:.65rem 1rem;font-size:.78rem">'+(s.start_location?'<a href="https://maps.google.com/?q='+s.start_location+'" target="_blank" style="color:#64748b;text-decoration:none">📍 '+s.start_location+'</a>':'<span style="color:#cbd5e1">—</span>')+
        '</td><td style="padding:.65rem 1rem;font-size:.78rem">'+(s.end_location?'<a href="https://maps.google.com/?q='+s.end_location+'" target="_blank" style="color:#64748b;text-decoration:none">📍 '+s.end_location+'</a>':'<span style="color:#cbd5e1">—</span>')+
        '</td><td style="padding:.65rem 1rem;text-align:center">'+st+'</td>'+
        (isSuperOrAdmin ? '<td style="padding:.65rem 1rem;text-align:center"><button onclick="openShiftHoursEdit('+s.id+','+s.start_hours+','+(s.end_hours||0)+')" title="تعديل" style="width:32px;height:32px;border:1px solid #e5e7eb;border-radius:8px;background:#fff;cursor:pointer;color:#64748b;font-size:.85rem" onmouseover="this.style.background=\'#f8fafc\'" onmouseout="this.style.background=\'#fff\'">✏️</button></td>' : '')+
        '</tr>';
    }).join('');
    _renderShiftPagination();
  }catch(e){
    if(tbody)tbody.innerHTML='<tr><td colspan="15" style="text-align:center;color:#ef4444;padding:3rem">&#x274C; '+e.message+'</td></tr>';
  }
}

function _sfStat(label,value,sub,icon,bg='#f8fafc',color='#0f172a'){

function _renderShiftPagination(){
  const el=document.getElementById('sfPagination');
  if(!el)return;
  const tp=Math.ceil(_shiftsTotal/_shiftsPageSize);
  if(tp<=1){el.innerHTML='<span style="color:#64748b;font-size:.82rem">'+_shiftsTotal+' \u0648\u0631\u062F\u064A\u0629</span>';return;}
  const s=(_shiftsPage-1)*_shiftsPageSize+1,e=Math.min(_shiftsPage*_shiftsPageSize,_shiftsTotal);
  el.innerHTML='<span style="font-size:.82rem;color:#475569">'+s+'\u2013'+e+' \u0645\u0646 '+_shiftsTotal+' \u0648\u0631\u062F\u064A\u0629</span>'+
    '<div style="display:flex;gap:.4rem">'+
    '<button onclick="_sfChangePage('+(_shiftsPage-1)+')" '+(_shiftsPage===1?'disabled':'')+' style="padding:.35rem .75rem;border:1.5px solid #e2e8f0;border-radius:8px;background:#fff;cursor:pointer;font-family:inherit;font-size:.83rem;color:#475569">\u25C4 \u0627\u0644\u0633\u0627\u0628\u0642</button>'+
    '<span style="padding:.35rem .75rem;background:#6366f1;color:#fff;border-radius:8px;font-size:.83rem;font-weight:700">'+_shiftsPage+'</span>'+
    '<button onclick="_sfChangePage('+(_shiftsPage+1)+')" '+(_shiftsPage>=tp?'disabled':'')+' style="padding:.35rem .75rem;border:1.5px solid #e2e8f0;border-radius:8px;background:#fff;cursor:pointer;font-family:inherit;font-size:.83rem;color:#475569">\u0627\u0644\u062A\u0627\u0644\u064A \u25BA</button>'+
    '</div>';
}

function _sfChangePage(p){
  const tp=Math.ceil(_shiftsTotal/_shiftsPageSize);
  if(p<1||p>tp)return;
  _shiftsPage=p; loadShiftsData();
}

// تعديل ساعات الوردية (سوبر يوزر / أدمن فقط)
async function openShiftHoursEdit(shiftId, startHours, endHours) {
  openModal(
    '<div class="modal-header"><div class="modal-title">⏱️ تعديل ساعات الوردية</div><button class="modal-close" onclick="closeModal()">✕</button></div>' +
    '<div style="background:#f0f9ff;border:1.5px solid #7dd3fc;border-radius:10px;padding:.85rem 1rem;margin-bottom:1rem;font-size:.85rem;color:#0369a1">وردية #' + shiftId + ' — أدخل ساعات العداد المراد تعديلها</div>' +
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:.8rem">' +
    '<div class="form-group"><label>ساعات عداد البداية <span class="req">*</span></label><input type="number" id="shEditStart" value="' + (startHours||0) + '" min="0" step="0.1" placeholder="مثال: 1250.5"></div>' +
    '<div class="form-group"><label>ساعات عداد النهاية</label><input type="number" id="shEditEnd" value="' + (endHours||0) + '" min="0" step="0.1" placeholder="مثال: 1300.0"></div>' +
    '</div>' +
    '<div style="font-size:.78rem;color:#64748b;margin-bottom:.5rem">⚠️ هذه العملية ستسجل في سجل التدقيق</div>' +
    '<div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal()">إلغاء</button><button class="btn btn-primary" id="shEditSaveBtn">حفظ التعديل</button></div>'
  );
  document.getElementById('shEditSaveBtn').onclick = async () => {
    const newStart = parseFloat(document.getElementById('shEditStart').value);
    const newEnd   = parseFloat(document.getElementById('shEditEnd').value)||null;
    if(isNaN(newStart)||newStart<0) return showNotification('أدخل ساعات صحيحة','error');
    if(newEnd!==null && newEnd<=newStart) return showNotification('عداد النهاية يجب أن يكون أكبر من البداية','error');
    const btn = document.getElementById('shEditSaveBtn');
    btn.disabled=true; btn.textContent='جاري...';
    try{
      await apiCall('/shifts/'+shiftId+'/hours','PUT',{start_hours:newStart,end_hours:newEnd});
      showNotification('✅ تم تعديل ساعات الوردية','success');
      closeModal(); loadShiftsData();
    }catch(e){
      showNotification(e.message,'error');
      btn.disabled=false; btn.textContent='حفظ التعديل';
    }
  };
}

async function exportShiftsCSV(){
  const from=document.getElementById('sfFrom')?.value||'';
  const to=document.getElementById('sfTo')?.value||'';
  let url='/shifts/export?';
  if(from)url+='date_from='+from+'&';
  if(to)url+='date_to='+to+'&';
  const token=localStorage.getItem('access_token');
  try{
    const resp=await fetch(url,{headers:{Authorization:'Bearer '+token}});
    if(!resp.ok)throw new Error('\u0641\u0634\u0644 \u0627\u0644\u062A\u0635\u062F\u064A\u0631');
    const blob=await resp.blob();
    const objUrl=URL.createObjectURL(blob);
    const link=document.createElement('a');
    link.href=objUrl; link.download='shifts_export.csv';
    document.body.appendChild(link); link.click(); link.remove();
    URL.revokeObjectURL(objUrl);
    showNotification('\u2705 \u062A\u0645 \u062A\u0635\u062F\u064A\u0631 \u0627\u0644\u0648\u0631\u062F\u064A\u0627\u062A', 'success');
  }catch(e){showNotification('\u274C \u0641\u0634\u0644 \u0627\u0644\u062A\u0635\u062F\u064A\u0631: '+e.message,'error');}
}


// ── معاينة الموقع الحالي قبل بدء الوردية ──
async function _previewLocation() {
  const btn = event.target;
  const orig = btn.textContent;
  btn.textContent = '⏳ جاري...'; btn.disabled = true;
  try {
    const loc = await silentGetLocation(8000);
    if (loc) {
      const [lat, lng] = loc.split(',');
      btn.textContent = '📍 ' + parseFloat(lat).toFixed(4) + ', ' + parseFloat(lng).toFixed(4);
      btn.style.color = '#16a34a'; btn.style.borderColor = '#86efac';
    } else {
      btn.textContent = '❌ الموقع غير متاح';
      btn.style.color = '#dc2626';
    }
  } catch(e) {
    btn.textContent = '❌ خطأ';
  }
  btn.disabled = false;
}

/* ─── Universal Debounce ─── */
window.dsDebounce = function(fn, delay) {
  delay = delay || 280;
  var timer;
  return function() {
    var args = arguments;
    clearTimeout(timer);
    timer = setTimeout(function() { fn.apply(this, args); }, delay);
  };
};

/* ─── KPI: debounced oninput ─── */
document.addEventListener('input', function(e) {

      if (typeof loadKpiData === 'function') loadKpiData();
    }, 320);
  }
  if (e.target.id === 'rentalBranch' || e.target.id === 'rentalSource') {
    clearTimeout(window._rentalDebounce);
    window._rentalDebounce = setTimeout(function() {
      if (typeof loadRentalData === 'function') loadRentalData();

});

document.addEventListener('change', function(e) {

  if (e.target.id === 'mrMonth' || e.target.id === 'mrBranch' || e.target.id === 'mrSort') {

/* ─── Page content flex gap ─── */

/* ─── Safe switchSection wrapper — runs AFTER all scripts loaded ─── */
window.addEventListener('load', function() {
  var _orig = window.switchSection;
  if (typeof _orig !== 'function') return;
  window.switchSection = function(id) {
    window.scrollTo({ top: 0, behavior: 'smooth' });
    var result = _orig.call(this, id);
    // result may be a Promise (original is async)
    if (result && typeof result.then === 'function') {
      result.then(function() {
        _ensurePageGap();
        setTimeout(_removeShowBtns, 350);

    return result;
  };
});

<script>
/* ══════════════════════════════════════════════════════
   📷 OCR Odometer Scanner — TrOCR Vision AI (محلي، مجاني)
   نموذج Vision Transformer حقيقي يعمل في المتصفح بدون أي
   API أو حساب أو كارت (via transformers.js / Hugging Face)
   نظام معالجة: Grayscale → Denoise → Contrast → Sharpen →
   Crop manual → AI Vision Model → استخراج وتحقق من الرقم
   مع Logs تفصيلية في Console
   ══════════════════════════════════════════════════════ */

// تبديل بين الطريقة اليدوية والكاميرا
window.switchOdoMethod = function(prefix, method) {
  const manualArea = document.getElementById(prefix + 'OdoManualArea');
  const camArea    = document.getElementById(prefix + 'OdoCamArea');
  const manualBtn  = document.getElementById(prefix + 'OdoManualBtn');
  const camBtn     = document.getElementById(prefix + 'OdoCamBtn');
  if (!manualArea || !camArea) return;
  if (method === 'manual') {
    manualArea.style.display = '';
    camArea.style.display    = 'none';
    manualBtn && (manualBtn.className = 'active');
    camBtn    && (camBtn.className    = '');
  } else {
    manualArea.style.display = 'none';
    camArea.style.display    = '';
    manualBtn && (manualBtn.className = '');
    camBtn    && (camBtn.className    = 'active');
  }
};

// ══════════════════════════════════════════════════════
//  أداة Debug بصرية — تعرض الصورة قبل/بعد المعالجة فعلياً
//  في الـ Console عشان تقدر تشوفها كصورة مش بس Base64
// ══════════════════════════════════════════════════════
function logImageToConsole(label, canvasOrBlob) {
  try {
    const styleBig = 'font-size:1px; padding:60px 150px; background-size:contain; background-repeat:no-repeat; background-position:center;';
    if (canvasOrBlob instanceof HTMLCanvasElement) {
      const url = canvasOrBlob.toDataURL('image/png');
      console.log('%c ', `${styleBig} background-image:url(${url});`);
      console.log(`[OCR-DEBUG] ${label} →`, canvasOrBlob.width + 'x' + canvasOrBlob.height);
    }
  } catch (e) { /* صامت لو الكونسول ما يدعمش الصورة */ }
}

// ══════════════════════════════════════════════════════
//  معالجة الصورة الكاملة قبل OCR
//  المراحل: Grayscale → Median Denoise → Contrast Stretch
//           → Sharpen (Unsharp Mask) → Adaptive Threshold
// ══════════════════════════════════════════════════════
window.preprocessOdoImage = async function(file, cropRect, opts) {
  opts = opts || {};
  const img = await new Promise((res, rej) => {
    const i = new Image();
    i.onload = () => res(i);
    i.onerror = rej;
    i.src = URL.createObjectURL(file);
  });

  console.log(`[OCR-DEBUG] الصورة الأصلية: ${img.width}x${img.height}`);

  // ── 1) قص منطقة العداد لو محددة، أو استخدام الصورة كاملة ──
  let sx = 0, sy = 0, sw = img.width, sh = img.height;
  if (cropRect) {
    sx = Math.round(cropRect.x * img.width);
    sy = Math.round(cropRect.y * img.height);
    sw = Math.round(cropRect.w * img.width);
    sh = Math.round(cropRect.h * img.height);
    console.log('[OCR-DEBUG] منطقة القص:', { sx, sy, sw, sh });
  }

  // ── 2) تكبير لدقة أعلى (مهم جداً لدقة النموذج مع الأرقام الصغيرة) ──
  const targetMinSide = 700;
  const scale = Math.max(1, Math.min(4, targetMinSide / Math.min(sw, sh)));
  const w = Math.round(sw * scale);
  const h = Math.round(sh * scale);

  const srcCanvas = document.createElement('canvas');
  srcCanvas.width = w; srcCanvas.height = h;
  const sctx = srcCanvas.getContext('2d');
  sctx.imageSmoothingEnabled = true;
  sctx.imageSmoothingQuality = 'high';
  sctx.drawImage(img, sx, sy, sw, sh, 0, 0, w, h);

  logImageToConsole('بعد القص + التكبير', srcCanvas);

  const imgData = sctx.getImageData(0, 0, w, h);
  const d = imgData.data;
  const n = w * h;

  // ── 3) Grayscale ──
  const gray = new Float32Array(n);
  for (let i = 0, p = 0; i < d.length; i += 4, p++) {
    gray[p] = 0.299 * d[i] + 0.587 * d[i + 1] + 0.114 * d[i + 2];
  }

  // ── 4) Median Filter (إزالة تشويش/نويز بدون فقدان حواف الأرقام) ──
  const denoised = new Float32Array(n);
  const win = [];
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      win.length = 0;
      for (let dy = -1; dy <= 1; dy++) {
        const yy = y + dy;
        if (yy < 0 || yy >= h) continue;
        for (let dx = -1; dx <= 1; dx++) {
          const xx = x + dx;
          if (xx < 0 || xx >= w) continue;
          win.push(gray[yy * w + xx]);
        }
      }
      win.sort((a, b) => a - b);
      denoised[y * w + x] = win[Math.floor(win.length / 2)];
    }
  }

  // ── 5) Contrast Stretch (تمدد الهيستوجرام لأقصى تباين فعلي) ──
  let minV = 255, maxV = 0;
  for (let p = 0; p < n; p++) {
    if (denoised[p] < minV) minV = denoised[p];
    if (denoised[p] > maxV) maxV = denoised[p];
  }
  const range = Math.max(1, maxV - minV);
  const stretched = new Float32Array(n);
  for (let p = 0; p < n; p++) {
    stretched[p] = ((denoised[p] - minV) / range) * 255;
  }

  // ── 6) Sharpen (Unsharp mask مبسّط: original + (original - blur)*amount) ──
  const sharpened = new Float32Array(n);
  const amount = 1.0;
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const idx = y * w + x;
      // تقريب blur بمتوسط الجيران
      let sum = 0, cnt = 0;
      for (let dy = -1; dy <= 1; dy++) {
        const yy = y + dy;
        if (yy < 0 || yy >= h) continue;
        for (let dx = -1; dx <= 1; dx++) {
          const xx = x + dx;
          if (xx < 0 || xx >= w) continue;
          sum += stretched[yy * w + xx]; cnt++;
        }
      }
      const blur = sum / cnt;
      const val = stretched[idx] + (stretched[idx] - blur) * amount;
      sharpened[idx] = Math.min(255, Math.max(0, val));
    }
  }

  // ── 7) Adaptive Threshold (Otsu's method) — اختياري ──
  // ملاحظة: نماذج Vision (TrOCR) مدرّبة على صور طبيعية/رمادية،
  // فالـ threshold القاسي (أبيض/أسود صريح) ممكن يفيد OCR التقليدي
  // لكن يضر نماذج AI الحديثة لأنه بيشيل تفاصيل بصرية مهمة لفهم الشكل.
  // فبنسيبه افتراضياً متاح كخيار، لكن المسار الأساسي بيستخدم تباين فقط.
  let outCanvas;
  if (opts.skipThreshold) {
    outCanvas = document.createElement('canvas');
    outCanvas.width = w; outCanvas.height = h;
    const octx = outCanvas.getContext('2d');
    const outData = octx.createImageData(w, h);
    for (let p = 0; p < n; p++) {
      const v = Math.min(255, Math.max(0, sharpened[p]));
      const o = p * 4;
      outData.data[o] = outData.data[o + 1] = outData.data[o + 2] = v;
      outData.data[o + 3] = 255;
    }
    octx.putImageData(outData, 0, 0);
    logImageToConsole('بعد المعالجة (بدون Threshold — تباين فقط)', outCanvas);
  } else {
    const histogram = new Array(256).fill(0);
    for (let p = 0; p < n; p++) histogram[Math.round(sharpened[p])]++;
    let sum = 0;
    for (let i = 0; i < 256; i++) sum += i * histogram[i];
    let sumB = 0, wB = 0, wF = 0, maxVar = 0, threshold = 127;
    for (let t = 0; t < 256; t++) {
      wB += histogram[t];
      if (wB === 0) continue;
      wF = n - wB;
      if (wF === 0) break;
      sumB += t * histogram[t];
      const mB = sumB / wB;
      const mF = (sum - sumB) / wF;
      const varBetween = wB * wF * (mB - mF) * (mB - mF);
      if (varBetween > maxVar) { maxVar = varBetween; threshold = t; }
    }
    console.log('[OCR-DEBUG] Otsu threshold المحسوب:', threshold);

    outCanvas = document.createElement('canvas');
    outCanvas.width = w; outCanvas.height = h;
    const octx = outCanvas.getContext('2d');
    const outData = octx.createImageData(w, h);
    for (let p = 0; p < n; p++) {
      const v = sharpened[p] > threshold ? 255 : 0;
      const o = p * 4;
      outData.data[o] = outData.data[o + 1] = outData.data[o + 2] = v;
      outData.data[o + 3] = 255;
    }
    octx.putImageData(outData, 0, 0);
    logImageToConsole('بعد المعالجة الكاملة (Threshold)', outCanvas);
  }

  return { canvas: outCanvas, debugSrcCanvas: srcCanvas };
};

// ══════════════════════════════════════════════════════
//  محرك القراءة: TrOCR (Vision Transformer) عبر transformers.js
//  نموذج AI حقيقي مدرّب على فهم الصور وقراءة النص منها —
//  أدق بكثير من OCR التقليدي (Tesseract) في الخطوط غير
//  المنتظمة (عدادات ميكانيكية/ديجيتال) لأنه يفهم الشكل
//  ككل بدل تحليل بكسلات منفصلة. مجاني 100%، يعمل بالكامل
//  في المتصفح بدون أي API أو حساب أو كارت.
// ══════════════════════════════════════════════════════
let __trocrPipeline = null;

async function loadTrOCR(onProgress) {
  if (__trocrPipeline) return __trocrPipeline;

  if (!window.__transformersLib) {
    const mod = await import('https://cdn.jsdelivr.net/npm/@huggingface/transformers@3/dist/transformers.min.js');
    window.__transformersLib = mod;
  }
  const { pipeline } = window.__transformersLib;

  console.log('[AI-OCR] تحميل نموذج TrOCR (أول مرة فقط، قد يأخذ بعض الوقت)...');
  __trocrPipeline = await pipeline('image-to-text', 'Xenova/trocr-small-printed', {
    progress_callback: (p) => {
      if (p.status === 'progress' && onProgress) {
        onProgress(Math.round(p.progress || 0));
      }
    }
  });
  console.log('[AI-OCR] النموذج جاهز ✅');
  return __trocrPipeline;
}

// تشغيل النموذج على الصورة المعالجة، وإرجاع النص الخام المستخرج
async function runAiOcrPass(canvas, onProgress) {
  const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
  const imgURL = URL.createObjectURL(blob);
  try {
    const ocr = await loadTrOCR(onProgress);
    const output = await ocr(imgURL);
    const text = Array.isArray(output) ? (output[0]?.generated_text || '') : (output?.generated_text || '');
    console.log('[AI-OCR] النص الخام من النموذج:', JSON.stringify(text));
    return text;
  } finally {
    URL.revokeObjectURL(imgURL);
  }
}

// ══════════════════════════════════════════════════════
//  الدالة الرئيسية: تنسّق كل المراحل + تحقق من جودة النتيجة
// ══════════════════════════════════════════════════════
// ══════════════════════════════════════════════════════
//  Cropper تفاعلي: يعرض الصورة + مربع قابل للسحب/التكبير
//  المستخدم يحدد منطقة العداد بالضبط قبل تشغيل OCR — ده
//  أكبر سبب لتحسين الدقة لأنه بيشيل كل العناصر المشتتة
//  (الوقت، الحرارة، الوقود...) من مجال رؤية OCR.
// ══════════════════════════════════════════════════════
window.__odoCropState = {};

window.__openOdoCropper = function(fileInput, targetInputId, msgId) {
  const file = fileInput.files[0];
  if (!file) return;

  const prefix = targetInputId; // 'endOdoCam' أو 'dpEndOdoCam'
  const wrap   = document.getElementById(prefix + 'CropperWrap');
  const imgEl  = document.getElementById(prefix + 'CropperImg');
  const boxEl  = document.getElementById(prefix + 'CropperBox');
  const hintEl = document.getElementById(prefix + 'CropperHint');
  const confirmBtn = document.getElementById(prefix + 'CropperConfirm');

  if (!wrap || !imgEl || !boxEl) {
    // fallback: لو الـ cropper UI غير موجود لأي سبب، شغّل OCR مباشرة على الصورة كاملة
    return ocrOdoFromFile(fileInput, targetInputId, msgId, null);
  }

  const imgURL = URL.createObjectURL(file);
  imgEl.src = imgURL;
  imgEl.onload = function() {
    wrap.style.display = 'block';
    hintEl.style.display = 'block';
    confirmBtn.style.display = 'block';

    // مربع افتراضي بنسبة 70% عرض × 30% ارتفاع في المنتصف (عادة مكان عداد الكيلومتر)
    const defaultRect = { x: 0.15, y: 0.40, w: 0.70, h: 0.22 };
    positionBox(defaultRect);

    window.__odoCropState[prefix] = { file, rect: defaultRect };
    setupDragResize(prefix, wrap, boxEl);
  };

  function positionBox(rect) {
    boxEl.style.left   = (rect.x * 100) + '%';
    boxEl.style.top    = (rect.y * 100) + '%';
    boxEl.style.width  = (rect.w * 100) + '%';
    boxEl.style.height = (rect.h * 100) + '%';
  }
};

function setupDragResize(prefix, wrap, boxEl) {
  let mode = null; // 'move' | 'resize'
  let startX, startY, startRect;

  function getRect() {
    const wrapRect = wrap.getBoundingClientRect();
    const boxRect  = boxEl.getBoundingClientRect();
    return {
      x: (boxRect.left - wrapRect.left) / wrapRect.width,
      y: (boxRect.top  - wrapRect.top)  / wrapRect.height,
      w: boxRect.width  / wrapRect.width,
      h: boxRect.height / wrapRect.height,
    };
  }

  function applyRect(r) {
    r.x = Math.max(0, Math.min(1 - r.w, r.x));
    r.y = Math.max(0, Math.min(1 - r.h, r.y));
    r.w = Math.max(0.1, Math.min(1, r.w));
    r.h = Math.max(0.08, Math.min(1, r.h));
    boxEl.style.left   = (r.x * 100) + '%';
    boxEl.style.top    = (r.y * 100) + '%';
    boxEl.style.width  = (r.w * 100) + '%';
    boxEl.style.height = (r.h * 100) + '%';
    window.__odoCropState[prefix].rect = r;
  }

  function onDown(e, m) {
    mode = m;
    const pt = e.touches ? e.touches[0] : e;
    startX = pt.clientX; startY = pt.clientY;
    startRect = getRect();
    e.preventDefault();
  }

  function onMove(e) {
    if (!mode) return;
    const pt = e.touches ? e.touches[0] : e;
    const wrapRect = wrap.getBoundingClientRect();
    const dx = (pt.clientX - startX) / wrapRect.width;
    const dy = (pt.clientY - startY) / wrapRect.height;

    if (mode === 'move') {
      applyRect({ ...startRect, x: startRect.x + dx, y: startRect.y + dy });
    } else if (mode === 'resize') {
      applyRect({ ...startRect, w: startRect.w + dx, h: startRect.h + dy });
    }
  }

  function onUp() { mode = null; }

  boxEl.onmousedown  = (e) => onDown(e, 'move');
  boxEl.ontouchstart = (e) => onDown(e, 'move');

  // مقبض تكبير في الزاوية اليمنى السفلى (نضيفه ديناميكياً مرة واحدة)
  if (!boxEl.querySelector('.resize-handle')) {
    const handle = document.createElement('div');
    handle.className = 'resize-handle';
    handle.style.cssText = 'position:absolute;right:-8px;bottom:-8px;width:18px;height:18px;background:#a855f7;border:2px solid white;border-radius:50%;cursor:nwse-resize';
    handle.onmousedown  = (e) => { e.stopPropagation(); onDown(e, 'resize'); };
    handle.ontouchstart = (e) => { e.stopPropagation(); onDown(e, 'resize'); };
    boxEl.appendChild(handle);
  }

  document.onmousemove  = onMove;
  document.ontouchmove  = onMove;
  document.onmouseup    = onUp;
  document.ontouchend   = onUp;
}

window.__confirmOdoCrop = function(targetInputId, msgId) {
  const prefix = targetInputId;
  const state  = window.__odoCropState[prefix];
  const wrap   = document.getElementById(prefix + 'CropperWrap');
  const hintEl = document.getElementById(prefix + 'CropperHint');
  const confirmBtn = document.getElementById(prefix + 'CropperConfirm');
  if (!state) return;

  // إخفاء واجهة القص بعد التأكيد
  wrap.style.display = 'none';
  hintEl.style.display = 'none';
  confirmBtn.style.display = 'none';

  // بناء fileInput وهمي بالملف المحفوظ لإعادة استخدام نفس مسار المعالجة
  const fakeInput = { files: [state.file] };
  ocrOdoFromFile(fakeInput, targetInputId, msgId, state.rect);
};

// ══════════════════════════════════════════════════════
//  الدالة الرئيسية: تنسّق كل المراحل + تحقق من جودة النتيجة
// ══════════════════════════════════════════════════════
window.ocrOdoFromFile = async function(fileInput, targetInputId, msgId, cropRect) {
  const file = fileInput.files[0];
  if (!file) return;

  const isEnd      = targetInputId === 'endOdoCam';
  const isDp       = targetInputId === 'dpEndOdoCam';
  const previewEl  = document.getElementById(isEnd ? 'endOdoPreview' : 'dpOdoPreview');
  const msgEl      = document.getElementById(msgId);
  // البحث عن زرار "التقط صورة" بالـ id الثابت (أوثق من nextElementSibling
  // اللي ممكن يفشل لما الاستدعاء يجي من الـ cropper بـ object وهمي)
  const triggerBtnId = isEnd ? 'endOdoCamTrigger' : (isDp ? 'dpOdoCamTrigger' : null);
  const triggerBtn = triggerBtnId
    ? document.getElementById(triggerBtnId)
    : (fileInput.nextElementSibling || null);

  console.log('═══════════════════════════════════════');
  console.log('[OCR-DEBUG] بدء عملية قراءة العداد —', file.name, file.size + ' bytes');

  const imgURL = URL.createObjectURL(file);
  if (previewEl) { previewEl.src = imgURL; previewEl.style.display = 'block'; }
  if (msgEl)     { msgEl.textContent = '⏳ جاري قراءة العداد...'; msgEl.style.color = '#d97706'; }
  if (triggerBtn){ triggerBtn.disabled = true; triggerBtn.textContent = '⏳ جاري المعالجة...'; triggerBtn.className = 'odo-scan-btn scanning'; }

  try {
    if (msgEl) msgEl.textContent = '⏳ جاري تحسين الصورة...';
    const { canvas } = await preprocessOdoImage(file, cropRect, { skipThreshold: true });

    if (msgEl) msgEl.textContent = '⏳ جاري تحميل نموذج الذكاء الاصطناعي...';
    const rawText = await runAiOcrPass(canvas, (pct) => {
      if (msgEl) msgEl.textContent = `⏳ جاري تحميل النموذج... ${pct}%`;
    });

    if (msgEl) msgEl.textContent = '⏳ جاري استخراج الرقم...';

    // استخراج الأرقام من نص النموذج وتنظيفها
    const digitsOnly = rawText.replace(/\D/g, '');
    console.log('[AI-OCR] الأرقام المستخرجة (خام):', digitsOnly);

    // محاولة ثانية على الصورة كاملة (بدون threshold) لو الأولى غير واضحة —
    // بعض الصور بتستفيد من نسخة أقل معالجة مع النموذج لأنه مدرّب على صور طبيعية
    let candidates = [digitsOnly].filter(t => t.length >= 4 && t.length <= 7);

    if (!candidates.length) {
      // إعادة محاولة بـ Threshold قاسي (أبيض/أسود صريح) كاستراتيجية بديلة
      const { canvas: threshCanvas } = await preprocessOdoImage(file, cropRect, { skipThreshold: false });
      const rawText2 = await runAiOcrPass(threshCanvas);
      const digits2 = rawText2.replace(/\D/g, '');
      console.log('[AI-OCR] محاولة ثانية (مع Threshold):', digits2);
      candidates = [digits2].filter(t => t.length >= 4 && t.length <= 7);
    }

    console.log('[AI-OCR] المرشحون النهائيون:', candidates);
    console.log('═══════════════════════════════════════');

    const targetInput = document.getElementById(targetInputId);
    const best = candidates.length ? candidates[0] : '';
    const isPlausible = best && /^\d{4,7}$/.test(best);

    if (isPlausible) {
      targetInput.value = best;
      const mainId = isEnd ? 'endOdo' : (isDp ? 'dpEndOdo' : null);
      if (mainId) { const m = document.getElementById(mainId); if (m) m.value = best; }
      targetInput.dispatchEvent(new Event('input'));
      if (msgEl)     {
        msgEl.textContent = `✅ تم قراءة العداد بالذكاء الاصطناعي: ${best} كم — تحقق من الرقم وعدّله إذا لزم`;
        msgEl.style.color = '#059669';
      }
      if (triggerBtn){ triggerBtn.textContent = '📷 إعادة المسح'; triggerBtn.className = 'odo-scan-btn done'; triggerBtn.disabled = false; }
    } else {
      if (msgEl)     { msgEl.textContent = '❌ لم يتم التعرف على رقم واضح — يرجى إعادة التصوير بإضاءة أفضل وتركيز على العداد، أو الإدخال اليدوي'; msgEl.style.color = '#dc2626'; }
      if (triggerBtn){ triggerBtn.textContent = '📷 إعادة المسح'; triggerBtn.className = 'odo-scan-btn'; triggerBtn.disabled = false; }
    }
  } catch (err) {
    console.error('[OCR-DEBUG] خطأ غير متوقع:', err);
    if (msgEl)     { msgEl.textContent = '❌ خطأ في قراءة الصورة — أدخل الرقم يدوياً'; msgEl.style.color = '#dc2626'; }
    if (triggerBtn){ triggerBtn.textContent = '📷 إعادة المسح'; triggerBtn.className = 'odo-scan-btn'; triggerBtn.disabled = false; }
  } finally {
    try { fileInput.value = ''; } catch (e) { /* fileInput وهمي من الـ cropper — تجاهل */ }
    URL.revokeObjectURL(imgURL);
  }
};

function openInvCrudModal(row) {
  const cfg = window._invCrudCfg;
  openModal(`
    <div class="modal-header"><div class="modal-title">${row?'✏️ تعديل':'➕ إضافة'} — ${cfg.title}</div><button class="modal-close" onclick="closeModal()">✕</button></div>
    ${cfg.fields.map(f => `
      <div class="form-group">
        <label>${f.label} ${f.required?'<span class="req">*</span>':''}</label>
        ${f.type==='textarea'
          ? `<textarea id="invF_${f.key}">${row?.[f.key]||''}</textarea>`
          : `<input type="text" id="invF_${f.key}" value="${row?.[f.key]||''}">`}
      </div>`).join('')}
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">إلغاء</button>
      <button class="btn btn-primary" id="invCrudSaveBtn">💾 حفظ</button>
    </div>`);
  document.getElementById('invCrudSaveBtn').onclick = async () => {
    const body = {};
    for (const f of cfg.fields) body[f.key] = document.getElementById(`invF_${f.key}`)?.value?.trim() || '';
    if (cfg.fields.some(f=>f.required) && !body[cfg.fields.find(f=>f.required).key]) {
      return showNotification('املأ الحقول المطلوبة', 'error');
    }
    try {
      if (row) await apiCall(`${cfg.apiPath}/${row.id}`, 'PUT', body);
      else await apiCall(cfg.apiPath, 'POST', body);
      showNotification('✅ تم الحفظ', 'success');
      closeModal();
      switchSection(cfg.section);
    } catch (e) { showNotification(e.message, 'error'); }
  };
}

async function deleteInvCrudRow(id) {
  if (!confirm('تأكيد الحذف؟')) return;
  try {
    await apiCall(`${window._invCrudCfg.apiPath}/${id}`, 'DELETE');
    showNotification('✅ تم الحذف', 'success');
    switchSection(window._invCrudCfg.section);
  } catch (e) { showNotification(e.message, 'error'); }
}

// 📝 مراجعة العمليات — Workshop Operations Review (تفويل + صيانة)
// ══════════════════════════════════════════════════════════════════
async function renderOpsReview() {
  const c = document.getElementById('pageContent');
  c.innerHTML = `<div class="empty-state"><div class="empty-icon">⏳</div><p>جاري التحميل...</p></div>`;
  const rows = await apiCall('/workshops/pending-review').catch(()=>[]);
  window._opsReviewRows = rows;

  const today = new Date().toISOString().slice(0,10);
  const totalOps = rows.length;
  const pendingOps = rows.filter(r=>(r.approval_status||'pending')==='pending').length;
  const todayOps = rows.filter(r=>(r.created_at||'').slice(0,10)===today).length;
  const approvedOps = rows.filter(r=>r.approval_status==='approved').length;

  c.innerHTML = `
    <div class="page-header"><div class="page-title">📝 مراجعة العمليات</div></div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:.9rem;margin-bottom:1.1rem">
      <div class="card" style="padding:1rem;text-align:center"><div style="font-size:1.3rem">📋</div><div style="font-size:.74rem;color:var(--muted);font-weight:600;margin:.3rem 0">إجمالي العمليات</div><div style="font-size:1.25rem;font-weight:900">${totalOps}</div></div>
      <div class="card" style="padding:1rem;text-align:center"><div style="font-size:1.3rem">⏳</div><div style="font-size:.74rem;color:var(--muted);font-weight:600;margin:.3rem 0">العمليات المعلقة</div><div style="font-size:1.25rem;font-weight:900;color:#f59e0b">${pendingOps}</div></div>
      <div class="card" style="padding:1rem;text-align:center"><div style="font-size:1.3rem">📅</div><div style="font-size:.74rem;color:var(--muted);font-weight:600;margin:.3rem 0">عمليات اليوم</div><div style="font-size:1.25rem;font-weight:900">${todayOps}</div></div>
      <div class="card" style="padding:1rem;text-align:center"><div style="font-size:1.3rem">✅</div><div style="font-size:.74rem;color:var(--muted);font-weight:600;margin:.3rem 0">العمليات المعتمدة</div><div style="font-size:1.25rem;font-weight:900;color:#16a34a">${approvedOps}</div></div>
    </div>
    <div class="card">
      <div class="card-header">
        <div class="card-title">سجل العمليات</div>
        <div style="display:flex;gap:.5rem;flex-wrap:wrap">
          <select id="orKindFilter" onchange="renderOpsReviewRows()" style="padding:.4rem .7rem;border:1.5px solid var(--border);border-radius:9px;font-family:inherit;font-size:.82rem">
            <option value="">الكل</option><option value="fuel">⛽ تفويل</option><option value="maintenance">🔧 صيانة</option>
          </select>
          <select id="orStatusFilter" onchange="renderOpsReviewRows()" style="padding:.4rem .7rem;border:1.5px solid var(--border);border-radius:9px;font-family:inherit;font-size:.82rem">
            <option value="">كل الحالات</option><option value="pending">⏳ معلق</option><option value="approved">✅ معتمد</option><option value="rejected">❌ مرفوض</option>
          </select>
        </div>
      </div>
      <div style="padding:0 1.2rem 1.2rem;overflow-x:auto">
        <table style="width:100%"><thead><tr>
          <th>النوع</th><th>المركبة/المعدة</th><th>السائق/المشغل</th><th>التاريخ</th><th>قراءة العداد</th><th>الصور</th><th>الحالة</th><th></th>
        </tr></thead><tbody id="orTbody"></tbody></table>
      </div>
    </div>`;
  renderOpsReviewRows();
}

function renderOpsReviewRows() {
  let rows = window._opsReviewRows || [];
  const kind = document.getElementById('orKindFilter')?.value;
  const status = document.getElementById('orStatusFilter')?.value;
  if (kind==='fuel') rows = rows.filter(r=>r.type.startsWith('fuel_'));
  else if (kind==='maintenance') rows = rows.filter(r=>!r.type.startsWith('fuel_'));
  if (status) rows = rows.filter(r=>(r.approval_status||'pending')===status);

  const statusBadge = {pending:'⏳ معلق', approved:'✅ معتمد', rejected:'❌ مرفوض'};
  const statusColor  = {pending:'#f59e0b', approved:'#16a34a', rejected:'#dc2626'};

  document.getElementById('orTbody').innerHTML = rows.length ? rows.map(r => {
    const wt = WT[r.type] || {icon:'🔧', label:r.type};
    const st = r.approval_status || 'pending';
    const photos = [r.odometer_photo, r.invoice_photo].filter(Boolean);
    return `<tr>
      <td>${wt.icon} ${wt.label}</td>
      <td>${r.vehicle_plate || r.vehicle_model || '—'}</td>
      <td>${r.driver_name || '—'}</td>
      <td style="font-size:.78rem;color:var(--muted)">${fmtDate(r.created_at)}</td>
      <td>${r.odometer_reading ?? '—'}</td>
      <td>${photos.length ? photos.map(p=>`<img src="${p}" style="width:32px;height:32px;object-fit:cover;border-radius:6px;border:1px solid var(--border);margin-left:2px">`).join('') : '—'}</td>
      <td><span style="color:${statusColor[st]};font-weight:700;font-size:.8rem">${statusBadge[st]}</span></td>
      <td><button class="btn btn-primary btn-sm" onclick='openOpsReviewDetail(${r.id})'>🔍 التفاصيل</button></td>
    </tr>`;
  }).join('') : `<tr><td colspan="8"><div class="empty-state"><div class="empty-icon">📭</div><p>لا توجد عمليات مطابقة</p></div></td></tr>`;
}

function openOpsReviewDetail(id) {
  const r = (window._opsReviewRows||[]).find(x=>x.id===id);
  if (!r) return;
  const isFuel = r.type.startsWith('fuel_');
  const wt = WT[r.type] || {icon:'🔧', label:r.type};
  const st = r.approval_status || 'pending';
  const FUEL_SRC_LABELS = {CompanyStation:'⛽ محطة الشركة', ExternalStation:'🏪 محطة خارجية'};
  const PARTS_SRC_LABELS = {Inventory:'📦 من مخزون الشركة', DirectPurchase:'🛒 شراء مباشر من الخارج', InventoryPurchase:'📥 شراء وإضافة للمخزن'};

  const rowsHtml = isFuel ? `
    <div style="background:var(--surface-2);border-radius:10px;padding:.6rem .8rem">🚗 <strong>المركبة:</strong> ${r.vehicle_plate||'—'}</div>
    <div style="background:var(--surface-2);border-radius:10px;padding:.6rem .8rem">👨 <strong>السائق:</strong> ${r.driver_name||'—'}</div>
    <div style="background:var(--surface-2);border-radius:10px;padding:.6rem .8rem">⛽ <strong>مصدر الوقود:</strong> ${FUEL_SRC_LABELS[r.fuel_source]||'—'} ${r.station_name?'('+r.station_name+')':''}</div>
    <div style="background:var(--surface-2);border-radius:10px;padding:.6rem .8rem">🔢 <strong>قراءة العداد:</strong> ${r.odometer_reading??'—'}</div>
    <div style="background:var(--surface-2);border-radius:10px;padding:.6rem .8rem">🧪 <strong>عدد اللترات:</strong> ${r.quantity??'—'}</div>
    <div style="background:var(--surface-2);border-radius:10px;padding:.6rem .8rem">💰 <strong>قيمة التفويلة:</strong> ${(r.price||0).toFixed(2)} جنيه</div>
  ` : `
    <div style="background:var(--surface-2);border-radius:10px;padding:.6rem .8rem">🚗 <strong>المركبة/المعدة:</strong> ${r.vehicle_plate||r.vehicle_model||'—'}</div>
    <div style="background:var(--surface-2);border-radius:10px;padding:.6rem .8rem">🔧 <strong>نوع الصيانة:</strong> ${wt.icon} ${wt.label}</div>
    <div style="background:var(--surface-2);border-radius:10px;padding:.6rem .8rem">📦 <strong>مصدر القطعة:</strong> ${PARTS_SRC_LABELS[r.parts_source]||'—'}</div>
    ${r.parts_source==='DirectPurchase' ? `<div style="background:var(--surface-2);border-radius:10px;padding:.6rem .8rem">🏪 <strong>المورد/المحل:</strong> ${r.direct_purchase_supplier||'—'}</div>` : ''}
    <div style="background:var(--surface-2);border-radius:10px;padding:.6rem .8rem">🔢 <strong>قراءة العداد:</strong> ${r.odometer_reading??'—'}</div>
    <div style="background:var(--surface-2);border-radius:10px;padding:.6rem .8rem">💰 <strong>التكلفة:</strong> ${(r.price||0).toFixed(2)} جنيه</div>
  `;

  const photosHtml = [
    r.odometer_photo ? `<div><div style="font-size:.72rem;color:var(--muted);margin-bottom:.3rem">صورة العداد</div><img src="${r.odometer_photo}" style="width:100%;max-height:200px;object-fit:cover;border-radius:10px;border:1px solid var(--border)"></div>` : '',
    r.invoice_photo ? `<div><div style="font-size:.72rem;color:var(--muted);margin-bottom:.3rem">صورة الفاتورة</div><img src="${r.invoice_photo}" style="width:100%;max-height:200px;object-fit:cover;border-radius:10px;border:1px solid var(--border)"></div>` : '',
  ].filter(Boolean).join('');

  openModal(`
    <div class="modal-header"><div class="modal-title">${wt.icon} ${wt.label} — مراجعة العملية</div><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.6rem;font-size:.85rem;margin-bottom:1rem">${rowsHtml}</div>
    ${photosHtml ? `<div style="display:grid;grid-template-columns:1fr 1fr;gap:.7rem;margin-bottom:1rem">${photosHtml}</div>` : ''}
    ${r.notes ? `<div style="background:var(--surface-2);border-radius:10px;padding:.6rem .8rem;margin-bottom:1rem"><strong>💬 ملاحظات:</strong> ${r.notes}</div>` : ''}
    <div class="modal-footer">
      ${st==='pending' ? `
        <button class="btn btn-ghost" style="color:#dc2626" onclick="reviewOpsRecord(${r.id},'reject')">❌ رفض</button>
        <button class="btn btn-primary" onclick="reviewOpsRecord(${r.id},'approve')">✅ اعتماد</button>
      ` : `<span style="font-weight:700">الحالة الحالية: ${st==='approved'?'✅ معتمد':'❌ مرفوض'}</span>`}
      <button class="btn btn-ghost" onclick="closeModal()">إغلاق</button>
    </div>`);
}

async function reviewOpsRecord(id, action) {
  try {
    await apiCall(`/workshops/${id}/review`, 'POST', {action});
    showNotification(action==='approve' ? '✅ تم اعتماد العملية' : '❌ تم رفض العملية', 'success');
    closeModal();
    renderOpsReview();
  } catch(e) { showNotification(e.message, 'error'); }
}
</script>
