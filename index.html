*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',system-ui,sans-serif}
html{font-size:16px}
@media(max-width:900px){html{font-size:15px}}

  0%,100% { box-shadow:0 3px 12px rgba(16,185,129,.35),0 0 0 0 rgba(16,185,129,.4); }
  50%      { box-shadow:0 3px 12px rgba(16,185,129,.35),0 0 0 8px rgba(16,185,129,0); }
}
:root{
  /* ══ FleetSync Design System ══ */
  /* Brand Colors from logo */
  --brand-green:#22C55E;
  --brand-teal:#06B6D4;
  --brand-blue:#2563EB;
  --brand-dark:#1e3a5f;
  --brand-darker:#0f1a2e;

  /* Primary = Dark Navy (sidebar) */
  --primary:#1a2942;
  --primary-light:#243656;
  --primary-dark:#0f1a2e;
  --primary-glow:rgba(26,41,66,0.12);

  /* Accent = Teal/Green gradient */
  --gold:#06B6D4;
  --gold-light:#22C55E;
  --gold-pale:rgba(6,182,212,0.08);
  --gold-glow:rgba(6,182,212,0.2);

  --danger:#ef4444;
  --success:#22C55E;
  --success-light:#4ade80;
  --warning:#f59e0b;

  --sidebar-bg:#f8fafc;
  --sidebar-width:256px;
  --header-h:64px;
  --card-radius:16px;

  /* Backgrounds */
  --bg:#F1F5F9;
  --surface:#FFFFFF;
  --surface-2:#F8FAFC;

  /* Text */
  --text:#0f172a;
  --text-2:#334155;
  --muted:#64748b;

  /* Borders */
  --border:#E2E8F0;
  --border-2:#cbd5e1;

  --emergency:#ef4444;--accident:#f97316;
  --sidebar-accent:var(--brand-teal);

  --shadow-sm:0 1px 3px rgba(15,23,42,.05),0 1px 2px rgba(15,23,42,.03);
  --shadow-md:0 4px 16px rgba(15,23,42,.07),0 2px 6px rgba(15,23,42,.04);
  --shadow-lg:0 12px 40px rgba(15,23,42,.10),0 4px 12px rgba(15,23,42,.05);
  --shadow-gold:0 4px 20px rgba(14,165,233,.15);
}
body{background:var(--bg);min-height:100vh;overflow-x:hidden;color:var(--text)}

/* ══════════════════════════════════════════════
   CUSTOM SELECT — نظام القوائم المنسدلة الموحد
   ══════════════════════════════════════════════ */
.cs-wrapper {
  position: relative;
  width: 100%;
  font-family: inherit;
}
.cs-trigger {
  width: 100%;
  min-height: 38px;
  padding: .5rem 2.4rem .5rem .85rem;
  border: 1.5px solid var(--border-2, #d1d9e6);
  border-radius: 10px;
  background: var(--surface-2, #f8f9fb);
  color: var(--text, #0f1d2e);
  font-family: inherit;
  font-size: .88rem;
  cursor: pointer;
  text-align: right;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: .5rem;
  transition: border-color .2s, box-shadow .2s;
  user-select: none;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.cs-trigger:hover { border-color: var(--primary, #1e3a5f); }
.cs-trigger.cs-open {
  border-color: var(--primary, #1e3a5f);
  box-shadow: 0 0 0 3px rgba(30,58,95,.12);
}
.cs-trigger .cs-arrow {
  flex-shrink: 0;
  color: var(--muted, #6b7280);
  font-size: .7rem;
  transition: transform .22s;
  pointer-events: none;
}
.cs-trigger.cs-open .cs-arrow { transform: rotate(180deg); }
.cs-trigger .cs-label {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.cs-trigger .cs-label.cs-placeholder { color: var(--muted, #6b7280); }

.cs-dropdown {
  display: none;
  position: absolute;
  top: calc(100% + 5px);
  right: 0; left: 0;
  z-index: 99999;
  background: var(--surface, #fff);
  border: 1.5px solid var(--border-2, #d1d9e6);
  border-radius: 12px;
  box-shadow: 0 12px 36px rgba(15,29,46,.14), 0 2px 8px rgba(15,29,46,.06);
  overflow: hidden;
  animation: csFadeIn .18s ease;
}
.cs-dropdown.cs-open { display: flex; flex-direction: column; }

@keyframes csFadeIn {
  from { opacity:0; transform:translateY(-6px); }
  to   { opacity:1; transform:translateY(0); }
}

.cs-search-wrap {
  padding: .55rem .65rem .45rem;
  border-bottom: 1px solid var(--border, #e5e9f0);
  background: var(--surface-2, #f8f9fb);
  flex-shrink: 0;
}
.cs-search {
  width: 100%;
  padding: .42rem .75rem .42rem 2rem;
  border: 1.5px solid var(--border-2, #d1d9e6);
  border-radius: 8px;
  background: var(--surface, #fff);
  color: var(--text, #0f1d2e);
  font-family: inherit;
  font-size: .84rem;
  outline: none;
  transition: border-color .2s;
  direction: rtl;
}
.cs-search:focus { border-color: var(--primary, #1e3a5f); }
.cs-search-icon {
  position: absolute;
  left: 1.05rem;
  top: 50%;
  transform: translateY(-50%);
  color: var(--muted, #6b7280);
  font-size: .85rem;
  pointer-events: none;
}

.cs-list {
  overflow-y: auto;
  max-height: 220px;
  padding: .3rem 0;
}
.cs-list::-webkit-scrollbar { width: 5px; }
.cs-list::-webkit-scrollbar-track { background: transparent; }
.cs-list::-webkit-scrollbar-thumb { background: var(--border-2,#d1d9e6); border-radius:3px; }

.cs-option {
  padding: .55rem 1rem;
  font-size: .88rem;
  cursor: pointer;
  color: var(--text, #0f1d2e);
  transition: background .13s;
  border-radius: 0;
  display: flex;
  align-items: center;
  gap: .45rem;
}
.cs-option:hover, .cs-option.cs-focused { background: var(--primary-glow, rgba(30,58,95,.07)); }
.cs-option.cs-selected {
  background: var(--primary-glow, rgba(30,58,95,.1));
  font-weight: 700;
  color: var(--primary, #1e3a5f);
}
.cs-option.cs-selected::after {
  content: '✓';
  margin-right: auto;
  font-size: .8rem;
  color: var(--primary, #1e3a5f);
}
.cs-option mark {
  background: #fde68a;
  border-radius: 2px;
  padding: 0 1px;
  font-style: normal;
}
.cs-empty {
  padding: .9rem 1rem;
  text-align: center;
  color: var(--muted, #6b7280);
  font-size: .84rem;
}

/* داخل modal */
.modal-body .cs-dropdown,
.modal-content .cs-dropdown { z-index: 99999; }

/* ══ GLOBAL FIX: منع قص الـ dropdown في أي مكان ══
   أي card أو grid أو filter container بيحتوي cs-wrapper
   يجب أن يكون overflow:visible عشان الـ dropdown يطلع */
.card:has(.cs-wrapper),
.card-header:has(.cs-wrapper),
[class*="filter"]:has(.cs-wrapper),
[class*="form"]:has(.cs-wrapper) {
  overflow: visible !important;
}
/* Fallback للمتصفحات اللي ما تدعمش :has() */
.cs-wrapper { overflow: visible; }
.cs-dropdown.cs-open {
  display: flex;
  flex-direction: column;
  overflow: visible;
  /* تأكيد خروج من أي stacking context */
  transform: translateZ(0);
}


/* ══════════════════════════════════════════════════════
   السركي — تقرير حضور السائقين
   ══════════════════════════════════════════════════════ */
.login-overlay{
  position:fixed;inset:0;z-index:2000;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;min-width:100vw;
  background:
    radial-gradient(ellipse 900px 600px at 15% 50%, rgba(6,182,212,0.12) 0%, transparent 70%),
    radial-gradient(ellipse 700px 500px at 85% 20%, rgba(34,197,94,0.08) 0%, transparent 65%),
    radial-gradient(ellipse 500px 400px at 70% 85%, rgba(37,99,235,0.07) 0%, transparent 60%),
    linear-gradient(145deg, #f0fdfa 0%, #e8f4f8 30%, #f1f5f9 60%, #eef9f4 100%);
}

/* Fleet Background Image - الصورة الحقيقية */
.login-overlay::before{
  display:none;
}


/* Overlay to darken slightly for text readability */
.login-overlay::after{
  display:none;
}

.login-bg-pattern{
  display:none;
}


.login-panel{
  position:relative;z-index:10;
  background:#ffffff;
  border-radius:20px;
  padding:0;overflow:hidden;
  width:390px;max-width:calc(100vw - 2.5rem);
  box-shadow:0 16px 48px rgba(0,0,0,.16), 0 0 0 1px rgba(6,182,212,.06);
  animation:loginSlideIn .5s cubic-bezier(.34,1.56,.64,1) forwards;
}
@keyframes loginSlideIn{
  from{opacity:0;transform:translateY(24px) scale(.97)}
  to{opacity:1;transform:translateY(0) scale(1)}
}


.login-panel-header{
  background:linear-gradient(180deg, #f0fdfa 0%, #ffffff 100%);
  padding:1.75rem 2rem 1.25rem;
  text-align:center;
  border-bottom:1px solid #e2e8f0;
}

.login-panel h2{font-size:1.5rem;color:#0f172a;font-weight:800;margin-bottom:.28rem}
.login-panel p{color:#64748b;font-size:.83rem;line-height:1.5}

.login-form{
  padding:1.1rem 1.75rem 1.75rem;
}

.login-input-wrap{
  position:relative;
  background:#f8fafc;
  border:1.5px solid #e2e8f0;
  border-radius:12px;
  transition:.2s;
}
.login-input-wrap:focus-within{
  border-color:rgba(6,182,212,.7);
  background:#fff;
  box-shadow:0 0 0 3px rgba(6,182,212,.12);
}

.login-field input{
  width:100%;padding:.76rem 2.5rem .76rem .9rem;
  border:1.5px solid #E2E8F0;border-radius:11px;
  font-size:.88rem;background:#F8FAFC;color:#0f172a;
  transition:.2s;font-family:inherit;direction:rtl;
}
.login-field input::placeholder{color:#94a3b8}
.login-field input:focus{
  outline:none;border-color:#1e3a5f;background:#fff;
  box-shadow:0 0 0 3px rgba(30,58,95,.1);
}
.login-btn{
  width:100%;padding:.85rem;
  background:linear-gradient(90deg, #06B6D4, #22C55E);
  color:#fff;border:none;border-radius:10px;font-size:.95rem;font-weight:700;
  cursor:pointer;transition:.2s;margin-top:.5rem;
  font-family:inherit;
  box-shadow:0 4px 16px rgba(6,182,212,.3);
}
.login-btn:hover{opacity:.9;box-shadow:0 6px 24px rgba(6,182,212,.4);}
.login-btn:disabled{opacity:.6;cursor:wait}

.login-btn:hover:not(:disabled){background:#2d5486;transform:translateY(-1px);box-shadow:0 6px 18px rgba(30,58,95,.35)}
.login-btn:disabled{opacity:.55;cursor:not-allowed;transform:none}
.login-roles{
  background:#EFF6FF;border:1px solid #BFDBFE;border-radius:11px;
  padding:.75rem .9rem;display:flex;align-items:center;gap:.7rem;
}
.login-roles-icon{font-size:1.35rem;flex-shrink:0}
.login-roles-text{font-size:.73rem;color:#1e40af;line-height:1.55}
.login-roles-text strong{display:block;font-size:.75rem;margin-bottom:.1rem;color:#1e3a5f}
.login-panel-footer{
  padding-top:1.1rem;margin-top:1rem;
  text-align:center;color:#94a3b8;font-size:.7rem;
  border-top:1px solid #F1F5F9;
}

/* ═══ عناصر الـ hero مخفية (مش محتاجينها دلوقتي) ═══ */
.login-hero{display:none}
.login-brand{display:none}

/* ═══ RESPONSIVE ═══ */
@media(max-width:480px){
  .login-panel{
    padding:2rem 1.5rem;
    border-radius:16px;
    margin:.75rem;
  }
  .login-panel h2{font-size:1.35rem}
}

/* ── SHELL ── */
#appShell{display:flex;min-height:100vh}
.sidebar{
  width:var(--sidebar-width);
  background:var(--sidebar-bg);
  min-height:100vh;display:flex;flex-direction:column;
  position:fixed;right:0;top:0;bottom:0;z-index:2000;
  transition:.28s cubic-bezier(.4,0,.2,1);
  border-left:1px solid #e2e8f0;
  box-shadow:-2px 0 24px rgba(15,23,42,.08);
  transform:translateX(100%);
}
.sidebar.open{ transform:translateX(0); }
.main-content{
  flex:1;
  min-height:100vh;display:flex;flex-direction:column;
  background:var(--bg);
  width:100%;
  margin-right:0 !important;
}
.sidebar-toggle{display:flex !important}
.sidebar-header{
  padding:1.4rem 1.25rem 1rem;
  border-bottom:1px solid #e2e8f0;
  position:relative;
  background:linear-gradient(180deg, rgba(37,99,235,.05) 0%, transparent 100%);
}
.sidebar-logo{
  font-size:.95rem;color:#1e3a5f;font-weight:800;
  display:flex;align-items:center;gap:.6rem;
}
.sidebar-subtitle{
  color:#94a3b8;font-size:.58rem;
  margin-top:.2rem;letter-spacing:1px;text-transform:uppercase;font-weight:600;
}
.sidebar-user{
  padding:.8rem 1.1rem;
  border-bottom:1px solid #e2e8f0;
  display:flex;align-items:center;gap:.8rem;
  background:#f1f5f9;
}
.user-avatar{
  width:54px;height:54px;border-radius:13px;
  background:linear-gradient(135deg,#1e3a5f,#2563eb);
  display:flex;align-items:center;justify-content:center;
  font-size:1.25rem;color:white;font-weight:800;flex-shrink:0;
  cursor:pointer;overflow:hidden;position:relative;
  transition:box-shadow .2s, transform .15s;
  border:2.5px solid #e2e8f0;
  box-shadow:0 2px 8px rgba(30,58,95,.12);
}
.user-avatar:hover{box-shadow:0 0 0 3px rgba(37,99,235,.18);transform:scale(1.04);}
.user-avatar img{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;border-radius:10px;z-index:1;
}
.user-avatar #userAvatarInitial{z-index:0;}
.user-avatar .avatar-edit-overlay{
  display:none;position:absolute;inset:0;background:rgba(0,0,0,.45);
  align-items:center;justify-content:center;font-size:.9rem;border-radius:10px;z-index:2;
}
.user-avatar:hover .avatar-edit-overlay{display:flex;}
.user-name{font-size:.8rem;color:#1e293b;font-weight:700}
.user-role{font-size:.62rem;color:#64748b;margin-top:2px;font-weight:500}
.sidebar-nav{flex:1;padding:.6rem .55rem;overflow-y:auto;scrollbar-width:none}
.sidebar-nav::-webkit-scrollbar{display:none}
.nav-section-label{
  font-size:.57rem;font-weight:700;color:#94a3b8;
  text-transform:uppercase;letter-spacing:1.2px;
  padding:.5rem .5rem .25rem;margin-top:.3rem;
}
.nav-item{
  display:flex;align-items:center;gap:.7rem;
  padding:.52rem .8rem;border-radius:10px;cursor:pointer;
  color:#475569;font-size:.82rem;font-weight:500;
  transition:.13s cubic-bezier(.4,0,.2,1);
  margin-bottom:1px;border:none;background:none;
  width:100%;text-align:right;position:relative;font-family:inherit;
}
.nav-item:hover{
  background:#e0e7ef;color:#1e3a5f;
}
.nav-item.active{
  background:#dbeafe;color:#1d4ed8;font-weight:700;
}
.nav-item.active::before{
  content:'';position:absolute;right:0;top:50%;transform:translateY(-50%);
  width:3px;height:52%;background:#2563eb;border-radius:2px 0 0 2px;
}
.nav-icon{font-size:.88rem;width:20px;text-align:center;flex-shrink:0}
.nav-badge{
  background:#ef4444;color:white;border-radius:50px;
  font-size:.58rem;font-weight:700;padding:.1rem .38rem;
  min-width:17px;text-align:center;animation:pulse 1.5s infinite;margin-right:auto;
}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}

/* ── Accordion Nav Modules ── */
.nav-module{margin-bottom:4px;border-radius:10px;overflow:hidden;}
.nav-module-header{
  display:flex;align-items:center;justify-content:space-between;gap:.5rem;
  width:100%;text-align:right;border:none;cursor:pointer;
  padding:.62rem .8rem;border-radius:10px;font-family:inherit;
  font-size:.8rem;font-weight:800;color:#1e293b;
  background:#eef1f6;border:1px solid #e2e8f0;
  transition:.13s cubic-bezier(.4,0,.2,1);
}
.nav-module-header:hover{background:#e2e8f3;}
.nav-module-header.open{
  background:#1e3a5f;color:#fff;border-color:#1e3a5f;
  border-radius:10px 10px 0 0;
}
.nav-module-title{display:flex;align-items:center;gap:.65rem;}
.nav-module-arrow{font-size:.62rem;color:#94a3b8;transition:transform .15s ease;flex-shrink:0;}
.nav-module-header.open .nav-module-arrow{color:#bfdbfe;}
.nav-module-body{
  padding:.35rem .4rem .4rem 1rem;overflow:hidden;
  background:#f8fafc;border:1px solid #e2e8f0;border-top:none;
  border-radius:0 0 10px 10px;position:relative;
}
.nav-module-body::before{
  content:'';position:absolute;top:0;bottom:.4rem;right:1.05rem;
  width:1.5px;background:#dbe2ec;
}
.nav-module-body .nav-item{
  font-size:.77rem;padding:.46rem .7rem;color:#5b6678;font-weight:500;
  margin-right:.15rem;border-radius:8px;
}
.nav-module-body .nav-item:hover{background:#e7edf6;color:#1e3a5f;}
.nav-module-body .nav-item.active{background:#dbeafe;color:#1d4ed8;font-weight:700;}
.nav-module-badge{
  background:#ef4444;color:#fff;border-radius:50px;font-size:.56rem;font-weight:700;
  padding:.08rem .36rem;min-width:15px;text-align:center;margin-right:.3rem;
}
.sidebar-footer{padding:.7rem .55rem;border-top:1px solid #e2e8f0;}
.logout-btn-sidebar{
  display:flex;align-items:center;gap:.7rem;
  padding:.52rem .8rem;border-radius:10px;cursor:pointer;
  color:#ef4444;font-size:.8rem;font-weight:600;
  transition:.13s;background:none;border:none;width:100%;text-align:right;font-family:inherit;
}
.logout-btn-sidebar:hover{background:#FEF2F2;}
.main-content{
  flex:1;
  min-height:100vh;display:flex;flex-direction:column;
  background:var(--bg);
}
.topbar{
  height:var(--header-h);
  background:#ffffff;
  border-bottom:1px solid #E2E8F0;
  display:flex;align-items:center;padding:0 1.6rem;gap:1rem;
  position:sticky;top:0;z-index:50;
}
.topbar-title{
  font-size:.95rem;font-weight:700;color:var(--text);flex:1;
  letter-spacing:-.1px;
}
.topbar-logout-btn{
  display:none; /* مخفي على الديسكتوب */
  background:none;border:none;cursor:pointer;
  font-size:1.2rem;padding:.3rem .5rem;border-radius:8px;
  color:var(--muted);transition:.15s;
}
.topbar-logout-btn:hover{background:#FEF2F2;color:#ef4444}
@media(max-width:900px){
  .topbar-logout-btn{display:flex;align-items:center;justify-content:center}
}
.page-content{padding:1.4rem;flex:1;min-width:0;overflow-x:hidden}

/* ── CARDS & STATS ── */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:.85rem;margin-bottom:1.4rem}
.stat-card{
  background:#ffffff;border-radius:var(--card-radius);
  padding:1.2rem 1.3rem;
  border:1px solid #E2E8F0;
  position:relative;overflow:hidden;transition:.18s;
}
.stat-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--primary),var(--gold));
  opacity:0;transition:.18s;
}
.stat-card::after{
  content:'';position:absolute;top:-12px;right:-12px;width:56px;height:56px;
  background:var(--gold-pale);border-radius:50%;pointer-events:none;
}
.stat-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.stat-card:hover::before{opacity:1}
.stat-icon{font-size:1.25rem;margin-bottom:.5rem;display:block}
.stat-value{font-size:1.65rem;font-weight:900;color:var(--primary);line-height:1;letter-spacing:-.5px;word-break:break-all}
.stat-label{font-size:.7rem;color:var(--muted);margin-top:.28rem;font-weight:500}
.card{
  background:#ffffff;border-radius:var(--card-radius);
  border:1px solid #E2E8F0;
  padding:1.3rem 1.5rem;margin-bottom:1.1rem;transition:.15s;
}
.card:last-child{margin-bottom:0}
.card:hover{box-shadow:0 4px 16px rgba(15,23,42,.07)}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.1rem}
.card-title{font-size:.9rem;font-weight:700;color:var(--text);display:flex;align-items:center;gap:.5rem}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:1.1rem;margin-bottom:1.1rem}
@media(max-width:900px){.two-col{grid-template-columns:1fr}}

/* ── FORMS ── */
.form-group{margin-bottom:.9rem}
label{display:block;font-weight:700;margin-bottom:.38rem;font-size:.71rem;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
label .req{color:var(--danger);margin-right:.2rem}
input,select,textarea{
  width:100%;padding:.68rem 1rem;
  border:1.5px solid var(--border);
  border-radius:10px;font-size:.88rem;
  background:var(--surface-2);color:var(--text);
  transition:.2s;font-family:inherit;
}
input:focus,select:focus,textarea:focus{
  outline:none;border-color:var(--primary);
  background:white;
  box-shadow:0 0 0 3px var(--primary-glow);
}
input[disabled]{background:#f1f5f9;color:var(--muted);cursor:not-allowed;opacity:.7}
textarea{resize:vertical;min-height:70px}

/* ── BUTTONS ── */
.btn{
  display:inline-flex;align-items:center;gap:.4rem;
  padding:.58rem 1.1rem;border-radius:10px;
  font-weight:600;font-size:.82rem;cursor:pointer;
  border:none;transition:.16s cubic-bezier(.4,0,.2,1);
  font-family:inherit;letter-spacing:.1px;
}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}
.btn-primary{
  background:var(--primary);color:white;
  box-shadow:0 1px 4px rgba(79,70,229,.3);
}
.btn-primary:hover:not(:disabled){
  background:var(--primary-light);transform:translateY(-1px);
  box-shadow:0 4px 12px rgba(79,70,229,.35);
}
.btn-accent{
  background:linear-gradient(135deg,var(--gold),var(--gold-light));
  color:white;box-shadow:var(--shadow-gold);
}
.btn-accent:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 16px rgba(14,165,233,.35)}
.btn-outline{
  background:transparent;border:1.5px solid var(--primary);color:var(--primary);
}
.btn-outline:hover{background:var(--primary);color:white}
.btn-danger{background:#ef4444;color:white;box-shadow:0 1px 4px rgba(239,68,68,.25);}
.btn-danger:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(239,68,68,.3)}
.btn-ghost{background:var(--surface-2);color:var(--text-2);border:1px solid var(--border);}
.btn-ghost:hover{background:var(--border);color:var(--primary)}
.btn-success{background:#059669;color:white;box-shadow:0 1px 4px rgba(5,150,105,.25);}
.btn-success:hover:not(:disabled){background:#047857;transform:translateY(-1px)}
.btn-success{
  background:#0d6e3c;
  color:white;box-shadow:0 2px 8px rgba(13,110,60,.2);
}
.btn-success:hover{transform:translateY(-1px)}
.btn-warning{
  background:#d97706;
  color:white;
}
.btn-sm{padding:.32rem .75rem;font-size:.74rem;border-radius:7px}

/* ── EMERGENCY BUTTONS ── */
.emergency-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.4rem;margin-bottom:1.4rem}
.emergency-btn-card{
  border-radius:22px;padding:2.2rem 1.8rem;
  text-align:center;cursor:pointer;
  transition:.2s cubic-bezier(.4,0,.2,1);
  border:2px solid transparent;
  position:relative;overflow:hidden;
}
.emergency-btn-card::before{
  content:'';position:absolute;inset:0;
  background:rgba(255,255,255,.08);
  opacity:0;transition:.2s;
}
.emergency-btn-card:hover{transform:translateY(-4px);box-shadow:0 16px 40px rgba(0,0,0,.18)}
.emergency-btn-card:hover::before{opacity:1}
.emergency-btn-card.emg{
  background:linear-gradient(145deg,#9B1C1C,#C84B31);
  color:white;box-shadow:0 6px 24px rgba(200,75,49,.35);
}
.emergency-btn-card.acc{
  background:linear-gradient(145deg,#92400e,#C87941);
  color:white;box-shadow:0 6px 24px rgba(200,121,65,.35);
}
.emg-icon{font-size:2.8rem;margin-bottom:.8rem;display:block}
.emg-title{font-size:1.25rem;font-weight:900;margin-bottom:.4rem;letter-spacing:-.2px}
.emg-sub{font-size:.82rem;opacity:.8}

/* ── RECORDING UI ── */
.recording-indicator{
  display:flex;align-items:center;gap:.8rem;
  background:#FEF2F2;border:2px solid #FCA5A5;
  border-radius:14px;padding:1rem 1.4rem;margin-bottom:1rem;
}
.rec-dot{width:12px;height:12px;border-radius:50%;background:#C84B31;animation:blink .8s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
.rec-text{font-weight:800;color:#C84B31;font-size:.92rem}
.rec-timer{margin-right:auto;font-weight:800;color:#C84B31;font-family:'Cairo',monospace;font-size:.95rem}

/* ── TABLES ── */
.table-wrap{
  overflow-x:auto;border-radius:14px;
  border:1px solid var(--border);background:var(--surface);
}
table{width:100%;border-collapse:collapse;font-size:.82rem;direction:rtl}
th{
  background:var(--surface-2);color:var(--muted);
  font-size:.67rem;font-weight:600;
  text-transform:uppercase;letter-spacing:.7px;
  padding:.7rem .95rem;text-align:right;
  border-bottom:1px solid var(--border);
}
td{padding:.68rem .95rem;border-bottom:1px solid var(--border);text-align:right;color:var(--text)}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:#F8FAFC;transition:.1s}

/* ── Trips responsive ── */
.trips-mobile { display:none }
.trips-desktop { display:block }
@media(max-width:700px){
  .trips-mobile  { display:block }
  .trips-desktop { display:none  }
}

/* ── BADGES ── */
.badge{
  display:inline-flex;align-items:center;gap:.25rem;
  padding:.18rem .6rem;border-radius:50px;
  font-size:.67rem;font-weight:600;letter-spacing:.2px;
}
.badge-green{background:#d1fae5;color:#065F46}
.badge-red{background:#fee2e2;color:#991B1B}
.badge-blue{background:#ede9fe;color:#4338ca}
.badge-yellow{background:#fef9c3;color:#713f12}
.badge-purple{background:#ede9fe;color:#5B21B6}
.badge-orange{background:#ffedd5;color:#9A3412}
.badge-pink{background:#fce7f3;color:#9D174D}
.badge-gold{background:rgba(14,165,233,.1);color:var(--gold);border:1px solid rgba(14,165,233,.2)}
.badge-navy{background:rgba(79,70,229,.08);color:var(--primary);border:1px solid rgba(79,70,229,.15)}
.badge-emg{background:#fee2e2;color:#991B1B;animation:pulse 2s infinite}
.badge-acc{background:#fef9c3;color:#713f12;animation:pulse 2s infinite}

/* ── NOTIFICATION TOAST ── */
.notification{
  position:fixed;bottom:24px;left:24px;
  padding:.75rem 1.3rem;border-radius:12px;z-index:4000;
  font-size:.83rem;font-weight:600;
  box-shadow:0 8px 28px rgba(0,0,0,.15);
  animation:slideUp .3s cubic-bezier(.4,0,.2,1);
  max-width:340px;border:1px solid rgba(255,255,255,.1);
}
@media print { .notification { display:none!important; } }
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.notification.success{background:#4f46e5;color:white}
.notification.error{background:#7F1D1D;color:white}
.notification.info{background:#1e1b4b;color:white}
.notification.warning{background:#92400e;color:white}
.notification.emergency{background:#7F1D1D;color:white;font-size:.88rem;border:1.5px solid #FCA5A5}

/* ── MODAL ── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(15,23,42,.4);
  backdrop-filter:blur(6px);
  z-index:600;display:flex;align-items:center;justify-content:center;
  animation:fadeIn .18s;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{
  background:var(--surface);border-radius:18px;
  padding:1.8rem;width:90%;max-width:560px;
  max-height:92vh;overflow-y:auto;
  box-shadow:0 24px 60px rgba(15,23,42,.18);
  animation:slideUp .22s cubic-bezier(.34,1.56,.64,1);
  border:1px solid var(--border);
}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.3rem}
.modal-title{font-size:.95rem;font-weight:700;color:var(--text)}
.modal-close{
  background:var(--surface-2);border:none;font-size:1rem;cursor:pointer;
  color:var(--muted);padding:.3rem;border-radius:8px;
  width:30px;height:30px;display:flex;align-items:center;justify-content:center;
  transition:.13s;
}
.modal-close:hover{background:var(--border);color:var(--text)}
.modal-footer{
  display:flex;gap:.7rem;justify-content:flex-end;
  margin-top:1.3rem;padding-top:.9rem;
  border-top:1px solid var(--border);
}

/* ── WORKSHOP ── */
.workshop-items{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;margin-bottom:1.2rem}
.workshop-item{background:var(--surface-2);border:1.5px solid var(--border);border-radius:12px;padding:.85rem;text-align:center;cursor:pointer;transition:.18s}
.workshop-item:hover{border-color:var(--gold);transform:translateY(-2px);background:rgba(14,165,233,.04)}
.workshop-item.selected{border-color:var(--primary);background:rgba(79,70,229,.05)}
.workshop-item-icon{font-size:1.6rem;margin-bottom:.32rem}
.workshop-item-label{font-size:.8rem;font-weight:600;color:var(--text-2)}

/* ── DRIVER HERO ── */
.driver-hero{background:linear-gradient(135deg,#3730a3,#4f46e5);border-radius:var(--card-radius);color:white;padding:1.2rem 1.5rem;margin-bottom:1.2rem;display:flex;align-items:center;gap:1rem;border:1px solid rgba(99,102,241,.2)}
.driver-hero-icon{font-size:1.9rem}
.driver-hero h2{font-size:1.1rem;font-weight:700}
.driver-hero p{font-size:.78rem;opacity:.7;margin-top:.18rem}

/* ── MAP ── */
#fleetMap{height:480px;border-radius:12px;border:1px solid var(--border)}
#routeMap{height:480px;border-radius:12px;border:1px solid var(--border)}
.map-legend{display:flex;gap:1.1rem;flex-wrap:wrap;margin-top:.7rem;font-size:.76rem;color:var(--muted)}
.map-legend span{display:flex;align-items:center;gap:.32rem}
.legend-dot{width:10px;height:10px;border-radius:50%;display:inline-block}

/* Map Tabs */
.map-tabs{display:flex;gap:.5rem;margin-bottom:1.1rem;border-bottom:1px solid var(--border);padding-bottom:.5rem}
.map-tab{
  padding:.42rem 1rem;border-radius:8px 8px 0 0;
  font-size:.8rem;font-weight:600;cursor:pointer;
  border:none;background:none;font-family:inherit;
  color:var(--muted);transition:.14s;
}
.map-tab.active{background:var(--primary);color:white}
.map-tab:hover:not(.active){background:var(--surface-2);color:var(--text)}
.map-panel{display:none}
.map-panel.active{display:block}

/* Route selector */
.route-selector{
  display:flex;gap:.75rem;align-items:flex-end;
  flex-wrap:wrap;margin-bottom:1rem;
  padding:1rem;background:var(--surface-2);
  display:flex;gap:.75rem;align-items:flex-end;
  flex-wrap:wrap;margin-bottom:1rem;
  padding:1rem;background:var(--surface-2);
  border-radius:10px;border:1px solid var(--border);
}
.route-selector .form-group{flex:1;min-width:180px;margin-bottom:0}
.route-info-bar{
  display:flex;gap:1rem;flex-wrap:wrap;
  margin-bottom:1rem;
}
.route-info-chip{
  display:flex;align-items:center;gap:.4rem;
  padding:.4rem .85rem;
  background:var(--surface-2);border:1px solid var(--border);
  border-radius:8px;font-size:.78rem;font-weight:600;color:var(--text-2);
}
.route-info-chip.highlight{background:var(--gold-pale);border-color:rgba(184,134,11,.3);color:var(--gold)}
.route-line-animated{
  stroke-dasharray:12 6;
  animation:dashMove 1.2s linear infinite;
}
@keyframes dashMove{to{stroke-dashoffset:-18}}

/* ── EMPTY ── */
.empty-state{text-align:center;padding:3rem 1rem;color:var(--muted)}
.empty-state .empty-icon{font-size:2.5rem;margin-bottom:.8rem}

.location-hint{font-size:.72rem;color:var(--muted);margin-top:.3rem}
.location-hint.maps-only{color:#d97706;font-weight:600}
/* ── GPS PICKER ── */
.gps-picker{border:2px dashed var(--border);border-radius:12px;padding:.9rem 1rem;background:#f8fafc;transition:.25s}
.gps-picker.gps-ok{border:2px solid #10b981;background:#f0fdf9}
.gps-picker.gps-err{border:2px solid #dc2626;background:#fff5f5}
.odo-scan-btn{display:inline-flex;align-items:center;justify-content:center;gap:.45rem;padding:.55rem 1rem;border:none;border-radius:10px;font-family:inherit;font-size:.88rem;font-weight:700;cursor:pointer;transition:.2s;color:white;background:linear-gradient(135deg,#7c3aed,#a855f7);white-space:nowrap}
.odo-scan-btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 14px rgba(168,85,247,.4)}
.odo-scan-btn:disabled{opacity:.55;cursor:not-allowed;transform:none}
.odo-scan-btn.scanning{background:linear-gradient(135deg,#92400e,#d97706)}
.odo-scan-btn.done{background:linear-gradient(135deg,#065f46,#10b981)}
.odo-method-toggle{display:flex;gap:.5rem;margin-bottom:.6rem}
.odo-method-toggle button{flex:1;padding:.5rem;border:2px solid #e2e8f0;border-radius:8px;background:#f8fafc;font-size:.82rem;font-weight:700;cursor:pointer;transition:.2s;font-family:inherit}
.odo-method-toggle button.active{background:#1e3a5f;color:white;border-color:#1e3a5f}
.odo-camera-preview{width:100%;max-height:200px;border-radius:12px;object-fit:cover;display:none;margin-top:.5rem}
.odo-ocr-result{font-size:.78rem;color:#7c3aed;margin-top:.35rem;min-height:1.2rem;font-weight:600}

/* ══════════════════════════════════════════════════
   RESPONSIVE — Tablet (≤900px)
══════════════════════════════════════════════════ */
@media(max-width:900px){
  /* ── Layout ── */
  .main-content{width:100vw;max-width:100vw;overflow-x:hidden}
  #appShell{overflow-x:hidden;width:100vw}
  .page-content{padding:.7rem;overflow-x:hidden}

  /* ── Tables ── */
  .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;max-width:calc(100vw - 1.4rem)}
  table{min-width:480px;font-size:.74rem}
  th,td{padding:.4rem .45rem;white-space:nowrap}

  /* ── Cards ── */
  .card{padding:.9rem}
  .card-header{flex-wrap:wrap;gap:.4rem}
  .card-header .btn{font-size:.72rem;padding:.3rem .6rem}

  /* ── Grids ── */
  .two-col{grid-template-columns:1fr}
  .stats-row{grid-template-columns:repeat(2,1fr) !important}
  .emergency-grid{grid-template-columns:1fr}

  /* ── Stat cards (الكروت في الأعلى) ── */
  .stat-card{padding:.8rem .7rem}
  .stat-value{font-size:1.25rem}
  .stat-icon{font-size:1.2rem}
  .stat-label{font-size:.68rem}

  /* ── Topbar ── */
  .topbar{padding:0 .8rem}
  .topbar-title{font-size:.9rem}

  /* ── Filters & Search ── */
  .filters-bar{flex-wrap:wrap}
  .filters-bar select,.filters-bar input{min-width:120px;flex:1}
  .srch-bar{flex-wrap:wrap;gap:.4rem}
  .srch-bar input{min-width:150px}
  .srch-bar select{min-width:110px}

  /* ── Workshop ── */
  .workshop-items{grid-template-columns:repeat(2,1fr)}

  /* layout grids: handled per-section */

  /* ── Misc ── */
  .badge{font-size:.65rem}
  .modal-body{max-height:70vh;overflow-y:auto}

  /* ── Workshop stat cards (الـ flex row) ── */
  .ws-summary-grid .stat-card{
    flex-direction:column;align-items:flex-start;gap:.4rem;
    padding:.75rem .85rem;
  }
  .ws-summary-grid .stat-icon{
    width:38px;height:38px;font-size:1rem;border-radius:10px;
  }
}

/* ══════════════════════════════════════════════════
   RESPONSIVE — Mobile (≤600px)
══════════════════════════════════════════════════ */
@media(max-width:600px){
  .page-content{padding:.45rem}
  .card{padding:.7rem}
  .card-header{gap:.3rem}

  /* Stats: 2 columns on mobile */
  .stats-row{grid-template-columns:repeat(2,1fr) !important;gap:.5rem}
  .stat-card{padding:.65rem .5rem;border-radius:10px}
  .stat-value{font-size:1.1rem}
  .stat-icon{font-size:1.1rem}
  .stat-label{font-size:.63rem}

  /* Force stat card with grid-column:span 2 to stay full width */
  .stat-card[style*="grid-column:span 2"],
  .stat-card[style*="grid-column: span 2"]{
    grid-column:span 2 !important;
  }

  /* Tables */
  table{min-width:420px;font-size:.7rem}
  th,td{padding:.32rem .38rem}

  /* Workshop items: 2 per row on mobile */
  .workshop-items{grid-template-columns:repeat(2,1fr);gap:.55rem}
  .workshop-item-icon{font-size:1.8rem}
  .workshop-item-label{font-size:.72rem}

  /* Buttons */
  .btn{font-size:.76rem;padding:.35rem .65rem}
  .btn-sm{font-size:.7rem;padding:.28rem .5rem}

  /* Topbar */
  .topbar-title{font-size:.82rem}

  /* two-col always 1 column */
  .two-col{grid-template-columns:1fr !important}

  /* Search bars */
  .srch-bar{gap:.35rem;padding:.5rem .7rem}
  .srch-bar input{font-size:.82rem;padding:.38rem .6rem}
  .srch-bar select{font-size:.82rem;padding:.38rem .5rem}
  .srch-count{font-size:.72rem}

  /* Prevent text overflow everywhere */
  .card-title{font-size:.82rem}
  label{font-size:.65rem}
  input,select,textarea{font-size:.84rem;padding:.55rem .75rem}

  /* Notification toast */
  .notification{left:8px;right:8px;max-width:none;font-size:.79rem}

}

/* ══════════════════════════════════════════════════
   RESPONSIVE — Small Mobile (≤400px)
══════════════════════════════════════════════════ */
@media(max-width:400px){
  .stats-row{grid-template-columns:1fr 1fr !important;gap:.4rem}
  .stat-value{font-size:.95rem}
  .stat-card{padding:.5rem .4rem}
  table{min-width:360px;font-size:.67rem}
  th,td{padding:.28rem .32rem}
  .workshop-items{grid-template-columns:1fr 1fr}
  .page-content{padding:.35rem}
  .card{padding:.55rem}
  input,select{font-size:.8rem;padding:.45rem .6rem}
}

}

/* ─── DESIGN TOKENS ─── */
:root {
  /* Spacing scale */
  --ds-space-1: 4px;
  --ds-space-2: 8px;
  --ds-space-3: 12px;
  --ds-space-4: 16px;
  --ds-space-5: 20px;
  --ds-space-6: 24px;

  /* Typography scale */
  --ds-text-xs:  .68rem;
  --ds-text-sm:  .78rem;
  --ds-text-md:  .88rem;
  --ds-text-lg:  1rem;
  --ds-text-xl:  1.15rem;

  /* Radius scale */
  --ds-r-sm:  8px;
  --ds-r-md:  12px;
  --ds-r-lg:  16px;
  --ds-r-xl:  20px;

  /* Filter/Input shared dimensions */
  --filter-h: 38px;
  --filter-radius: 10px;
  --filter-border: 1.5px solid #d1d9e6;
  --filter-bg: #F8FAFC;
  --filter-focus-border: var(--primary);
  --filter-focus-shadow: 0 0 0 3px rgba(26,41,66,0.10);

  /* Stat Card tokens */
  --stat-pad-y: 1.25rem;
  --stat-pad-x: 1.3rem;
  --stat-radius: 16px;
  --stat-border: 1px solid #E2E8F0;
  --stat-shadow-hover: 0 8px 28px rgba(15,23,42,0.10), 0 2px 8px rgba(15,23,42,0.05);

  /* Table tokens */
  --tbl-th-bg: #F1F5F9;
  --tbl-th-color: #475569;
  --tbl-th-size: .70rem;
  --tbl-td-size: .84rem;
  --tbl-row-hover: #F8FAFC;
  --tbl-border: #E9EEF5;
  --tbl-pad-y: .72rem;
  --tbl-pad-x: 1rem;
}

/* ═══════════════════════════════════════════════
   SECTION LAYOUT — Page Title → Stats → Filters → Table
   ═══════════════════════════════════════════════ */
.ds-page {
  display: flex;
  flex-direction: column;
  gap: 1.1rem;
}

/* ─── Page Header ─── */
.ds-page-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: .75rem;
  padding: 0 0 .25rem;
}
.ds-page-title {
  font-size: 1.05rem;
  font-weight: 800;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: .5rem;
  line-height: 1;
}
.ds-page-title .ds-title-icon {
  width: 34px; height: 34px;
  border-radius: 9px;
  background: var(--gold-pale, rgba(6,182,212,.08));
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem;
  flex-shrink: 0;
}
.ds-page-actions {
  display: flex;
  align-items: center;
  gap: .5rem;
  flex-wrap: wrap;
}

/* ═══════════════════════════════════════════════
   STAT CARDS — Unified System
   ═══════════════════════════════════════════════ */
.ds-stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: .85rem;
}
@media(max-width:900px) { .ds-stats { grid-template-columns: repeat(2,1fr); } }
@media(max-width:480px) { .ds-stats { grid-template-columns: 1fr 1fr; gap: .5rem; } }

.ds-stat {
  background: #ffffff;
  border-radius: var(--stat-radius);
  border: var(--stat-border);
  padding: var(--stat-pad-y) var(--stat-pad-x);
  position: relative;
  overflow: hidden;
  transition: box-shadow .2s, transform .2s;
  cursor: default;
}
.ds-stat::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--ds-stat-color, var(--primary)), var(--ds-stat-color2, var(--gold)));
  opacity: 0;
  transition: opacity .2s;
}
.ds-stat:hover {
  box-shadow: var(--stat-shadow-hover);
  transform: translateY(-2px);
}
.ds-stat:hover::before { opacity: 1; }

.ds-stat-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: .5rem;
  margin-bottom: .75rem;
}
.ds-stat-icon {
  width: 42px; height: 42px;
  border-radius: 11px;
  background: var(--ds-stat-icon-bg, rgba(6,182,212,.10));
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem;
  flex-shrink: 0;
}
.ds-stat-label {
  font-size: var(--ds-text-xs);
  color: var(--muted);
  font-weight: 600;
  line-height: 1.4;
  flex: 1;
  min-width: 0;
}
.ds-stat-value {
  font-size: 1.65rem;
  font-weight: 900;
  color: var(--ds-stat-color, var(--primary));
  line-height: 1;
  letter-spacing: -.5px;
  word-break: break-all;
}
.ds-stat-sub {
  font-size: var(--ds-text-xs);
  color: var(--muted);
  margin-top: .25rem;
}

/* Color presets for stat cards */
.ds-stat-blue   { --ds-stat-color:#1d4ed8; --ds-stat-color2:#3b82f6; --ds-stat-icon-bg:rgba(59,130,246,.10); }
.ds-stat-green  { --ds-stat-color:#059669; --ds-stat-color2:#10b981; --ds-stat-icon-bg:rgba(16,185,129,.10); }
.ds-stat-red    { --ds-stat-color:#dc2626; --ds-stat-color2:#ef4444; --ds-stat-icon-bg:rgba(239,68,68,.10); }
.ds-stat-amber  { --ds-stat-color:#d97706; --ds-stat-color2:#f59e0b; --ds-stat-icon-bg:rgba(245,158,11,.10); }
.ds-stat-purple { --ds-stat-color:#7c3aed; --ds-stat-color2:#a78bfa; --ds-stat-icon-bg:rgba(124,58,237,.10); }
.ds-stat-teal   { --ds-stat-color:#0891b2; --ds-stat-color2:#06b6d4; --ds-stat-icon-bg:rgba(6,182,212,.10); }
.ds-stat-navy   { --ds-stat-color:#1a2942; --ds-stat-color2:#2563eb; --ds-stat-icon-bg:rgba(26,41,66,.08); }

/* ═══════════════════════════════════════════════
   FILTERS BAR — Unified System
   ═══════════════════════════════════════════════ */
.ds-filters {
  background: var(--surface-2, #F8FAFC);
  border: 1px solid var(--border, #E2E8F0);
  border-radius: var(--ds-r-md);
  padding: .85rem 1.1rem;
  display: flex;
  gap: .65rem;
  flex-wrap: wrap;
  align-items: center;
}
.ds-filters-label {
  font-size: var(--ds-text-xs);
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .5px;
  white-space: nowrap;
  flex-shrink: 0;
}

/* Unified input/select/date in filters */
.ds-filters input,
.ds-filters select,
.ds-filters input[type="date"],
.ds-filters input[type="month"] {
  height: var(--filter-h);
  padding: 0 .9rem;
  border: var(--filter-border);
  border-radius: var(--filter-radius);
  background: var(--surface, #fff);
  color: var(--text);
  font-family: inherit;
  font-size: var(--ds-text-md);
  transition: border-color .18s, box-shadow .18s;
  outline: none;
  flex: 1;
  min-width: 140px;
}
.ds-filters input[type="text"],
.ds-filters input:not([type]) {
  min-width: 180px;
}
.ds-filters input:focus,
.ds-filters select:focus {
  border-color: var(--filter-focus-border);
  box-shadow: var(--filter-focus-shadow);
  background: #fff;
}
.ds-filters input:hover:not(:focus),
.ds-filters select:hover:not(:focus) {
  border-color: #b3bfd6;
}
.ds-filters select { cursor: pointer; }

.ds-filters-count {
  font-size: var(--ds-text-sm);
  color: var(--muted);
  white-space: nowrap;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: .22rem .65rem;
  font-weight: 600;
}
.ds-filters-reset {
  height: var(--filter-h);
  padding: 0 .85rem;
  border: var(--filter-border);
  border-radius: var(--filter-radius);
  background: #fff;
  color: var(--muted);
  font-family: inherit;
  font-size: var(--ds-text-sm);
  font-weight: 600;
  cursor: pointer;
  transition: border-color .15s, color .15s;
  white-space: nowrap;
  flex-shrink: 0;
}
.ds-filters-reset:hover {
  border-color: var(--primary);
  color: var(--primary);
}

/* Search input with icon */
.ds-search-wrap {
  position: relative;
  flex: 1;
  min-width: 200px;
}
.ds-search-wrap input {
  width: 100%;
  padding-right: 2.2rem !important;
}
.ds-search-icon {
  position: absolute;
  right: .75rem;
  top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  font-size: .85rem;
  pointer-events: none;
}

/* ═══════════════════════════════════════════════
   TABLES — Unified System
   ═══════════════════════════════════════════════ */
.ds-table-wrap {
  overflow-x: auto;
  border-radius: var(--ds-r-md);
  border: 1px solid var(--tbl-border);
  background: #fff;
  -webkit-overflow-scrolling: touch;
}
.ds-table-wrap table,
.ds-table-wrap > table {
  width: 100%;
  border-collapse: collapse;
  font-size: var(--tbl-td-size);
  direction: rtl;
}
.ds-table-wrap thead th,
.ds-table-wrap table thead th {
  background: var(--tbl-th-bg);
  color: var(--tbl-th-color);
  font-size: var(--tbl-th-size);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .6px;
  padding: var(--tbl-pad-y) var(--tbl-pad-x);
  text-align: right;
  border-bottom: 2px solid var(--tbl-border);
  white-space: nowrap;
}
.ds-table-wrap thead tr:first-child th:first-child { border-radius: 0 var(--ds-r-md) 0 0; }
.ds-table-wrap thead tr:first-child th:last-child  { border-radius: var(--ds-r-md) 0 0 0; }
.ds-table-wrap tbody td,
.ds-table-wrap table tbody td {
  padding: var(--tbl-pad-y) var(--tbl-pad-x);
  border-bottom: 1px solid var(--tbl-border);
  text-align: right;
  color: var(--text);
  vertical-align: middle;
}
.ds-table-wrap tbody tr:last-child td { border-bottom: none; }
.ds-table-wrap tbody tr:hover td { background: var(--tbl-row-hover); }
.ds-table-wrap tbody tr { transition: background .12s; }

/* ─── CARD wrapping table sections ─── */
.ds-card {
  background: #fff;
  border-radius: var(--ds-r-lg);
  border: 1px solid #E2E8F0;
  overflow: hidden;
  box-shadow: 0 1px 3px rgba(15,23,42,.04);
}
.ds-card-header {
  padding: 1.1rem 1.4rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid #E9EEF5;
  gap: .75rem;
  flex-wrap: wrap;
}
.ds-card-title {
  font-size: .92rem;
  font-weight: 800;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: .45rem;
}
.ds-card-body {
  padding: 0;
}
.ds-card-filters {
  padding: .85rem 1.1rem;
  border-bottom: 1px solid #E9EEF5;
  background: #FAFBFD;
}

/* ─── Empty State ─── */
.ds-empty {
  text-align: center;
  padding: 3.5rem 1rem;
  color: var(--muted);
}
.ds-empty-icon {
  font-size: 2.6rem;
  margin-bottom: .85rem;
  display: block;
  opacity: .7;
}
.ds-empty p {
  font-size: .88rem;
  font-weight: 500;
}

/* ═══════════════════════════════════════════════
   OVERRIDE OLD .stat-card TO USE NEW DESIGN
   ═══════════════════════════════════════════════ */
.stat-card {
  background: #ffffff;
  border-radius: var(--stat-radius) !important;
  padding: var(--stat-pad-y) var(--stat-pad-x) !important;
  border: var(--stat-border) !important;
  box-shadow: 0 1px 3px rgba(15,23,42,.04);
  position: relative;
  overflow: hidden;
  transition: box-shadow .2s, transform .2s;
  cursor: default;
}
.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--gold));
  opacity: 0;
  transition: opacity .2s;
}
.stat-card::after { display: none !important; }
.stat-card:hover {
  box-shadow: var(--stat-shadow-hover) !important;
  transform: translateY(-2px);
}
.stat-card:hover::before { opacity: 1; }
.stat-icon {
  width: 40px; height: 40px;
  border-radius: 10px;
  background: var(--gold-pale, rgba(6,182,212,.08));
  display: flex; align-items: center; justify-content: center;
  font-size: 1.15rem;
  margin-bottom: .7rem;
}
.stat-value {
  font-size: 1.65rem;
  font-weight: 900;
  color: var(--primary);
  line-height: 1;
  letter-spacing: -.5px;
  word-break: break-all;
}
.stat-label {
  font-size: var(--ds-text-xs);
  color: var(--muted);
  margin-top: .28rem;
  font-weight: 600;
}
.stats-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: .85rem;
  margin-bottom: 1.25rem;
}

/* ═══════════════════════════════════════════════
   OVERRIDE OLD .srch-bar TO MATCH DESIGN SYSTEM
   ═══════════════════════════════════════════════ */
.srch-bar {
  display: flex;
  gap: .65rem;
  align-items: center;
  flex-wrap: wrap;
  padding: .85rem 1.1rem;
  border-bottom: 1px solid #E9EEF5;
  background: #FAFBFD;
}
.srch-bar input,
.srch-bar select {
  height: var(--filter-h) !important;
  padding: 0 .9rem !important;
  border: var(--filter-border) !important;
  border-radius: var(--filter-radius) !important;
  background: #fff !important;
  color: var(--text) !important;
  font-family: inherit !important;
  font-size: var(--ds-text-md) !important;
  transition: border-color .18s, box-shadow .18s !important;
  outline: none !important;
}
.srch-bar input { flex: 1; min-width: 180px; }
.srch-bar select { min-width: 130px; cursor: pointer; }
.srch-bar input:focus,
.srch-bar select:focus {
  border-color: var(--primary) !important;
  box-shadow: var(--filter-focus-shadow) !important;
  background: #fff !important;
}
.srch-bar input:hover:not(:focus),
.srch-bar select:hover:not(:focus) {
  border-color: #b3bfd6 !important;
}
.srch-count {
  font-size: var(--ds-text-sm);
  color: var(--muted);
  white-space: nowrap;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: .22rem .65rem;
  font-weight: 600;
}
.srch-reset {
  height: var(--filter-h);
  padding: 0 .85rem !important;
  border: var(--filter-border) !important;
  border-radius: var(--filter-radius) !important;
  background: #fff !important;
  color: var(--muted) !important;
  font-family: inherit !important;
  font-size: var(--ds-text-sm) !important;
  font-weight: 600 !important;
  cursor: pointer !important;
  transition: border-color .15s, color .15s !important;
  white-space: nowrap;
  flex-shrink: 0;
}
.srch-reset:hover {
  border-color: var(--primary) !important;
  color: var(--primary) !important;
}

/* ═══════════════════════════════════════════════
   OVERRIDE OLD .table-wrap TO MATCH DESIGN SYSTEM
   ═══════════════════════════════════════════════ */
.table-wrap {
  overflow-x: auto;
  border-radius: 0 0 var(--ds-r-md) var(--ds-r-md);
  border: none !important;
  background: var(--surface);
  -webkit-overflow-scrolling: touch;
}
/* When table-wrap is inside .card, remove inner card border */
.card > .table-wrap { border-radius: 0 !important; }
.table-wrap table {
  width: 100%;
  border-collapse: collapse;
  font-size: var(--tbl-td-size);
  direction: rtl;
}
.table-wrap thead th,
table thead th {
  background: var(--tbl-th-bg) !important;
  color: var(--tbl-th-color) !important;
  font-size: var(--tbl-th-size) !important;
  font-weight: 700 !important;
  text-transform: uppercase;
  letter-spacing: .6px;
  padding: var(--tbl-pad-y) var(--tbl-pad-x) !important;
  text-align: right;
  border-bottom: 2px solid var(--tbl-border) !important;
  white-space: nowrap;
}
.table-wrap tbody td,
table tbody td {
  padding: var(--tbl-pad-y) var(--tbl-pad-x) !important;
  border-bottom: 1px solid var(--tbl-border) !important;
  color: var(--text);
  vertical-align: middle;
}
.table-wrap tbody tr:last-child td { border-bottom: none !important; }
.table-wrap tbody tr:hover { background: var(--tbl-row-hover) !important; transition: background .12s; }

/* ═══════════════════════════════════════════════
   CARD HEADER IMPROVEMENT
   ═══════════════════════════════════════════════ */
.card {
  background: #ffffff;
  border-radius: var(--ds-r-lg) !important;
  border: 1px solid #E2E8F0 !important;
  overflow: hidden;
  box-shadow: 0 1px 4px rgba(15,23,42,.04);
  margin-bottom: 1.1rem;
}
.card:last-child { margin-bottom: 0; }
.card:hover { box-shadow: 0 4px 16px rgba(15,23,42,.07); }
.card-header {
  padding: 1.1rem 1.4rem !important;
  border-bottom: 1px solid #E9EEF5;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: .75rem;
  flex-wrap: wrap;
}
.card-title {
  font-size: .92rem;
  font-weight: 800;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: .45rem;
}

/* ─── Workshop specific stat cards (wsg/wtc) override ─── */
.wtc {
  background: #fff;
  border-radius: var(--stat-radius) !important;
  border: var(--stat-border) !important;
  box-shadow: 0 1px 3px rgba(15,23,42,.04);
  padding: 1.25rem !important;
  min-width: 0;
  overflow: hidden;
  position: relative;
  transition: box-shadow .2s, transform .2s;
}
.wtc:hover {
  box-shadow: var(--stat-shadow-hover);
  transform: translateY(-2px);
}
.wti {
  width: 42px !important; height: 42px !important;
  border-radius: 11px !important;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem;
  flex-shrink: 0;
}
.wtv {
  font-size: 1.5rem !important;
  font-weight: 900 !important;
  color: var(--primary) !important;
  line-height: 1;
  word-break: break-all;
}
.wtl { font-size: .8rem !important; color: var(--muted) !important; font-weight: 600; }
.wts { font-size: .7rem !important; color: #94a3b8; margin-top: .2rem; }

/* ═══════════════════════════════════════════════
   TOPBAR / PAGE CONTENT PADDING
   ═══════════════════════════════════════════════ */
.page-content {
  padding: 1.25rem;
  display: flex;
  flex-direction: column;
  gap: 1.1rem;
}
@media(max-width:900px) { .page-content { padding: .85rem; gap: .85rem; } }
@media(max-width:600px) { .page-content { padding: .55rem; gap: .65rem; } }

/* Topbar polish */
.topbar {
  background: #fff;
  border-bottom: 1px solid #E9EEF5;
  height: var(--header-h);
  display: flex;
  align-items: center;
  padding: 0 1.25rem;
  gap: 1rem;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 1px 3px rgba(15,23,42,.05);
}
.topbar-title {
  font-size: .95rem;
  font-weight: 800;
  color: var(--text);
  flex: 1;
}

/* ═══════════════════════════════════════════════
   BADGE REFINEMENT
   ═══════════════════════════════════════════════ */
.badge {
  display: inline-flex;
  align-items: center;
  gap: .22rem;
  padding: .2rem .65rem;
  border-radius: 50px;
  font-size: .68rem;
  font-weight: 700;
  letter-spacing: .15px;
  white-space: nowrap;
}

/* ═══════════════════════════════════════════════
   FILTERS-BAR OVERRIDE (old class)
   ═══════════════════════════════════════════════ */
.filters-bar {
  display: flex;
  gap: .65rem;
  flex-wrap: wrap;
  align-items: center;
  background: #FAFBFD;
  border: 1px solid #E9EEF5;
  border-radius: var(--ds-r-md);
  padding: .85rem 1.1rem;
  margin-bottom: 1rem;
}
.filters-bar select,
.filters-bar input {
  flex: 1;
  min-width: 140px;
  height: var(--filter-h) !important;
  padding: 0 .9rem !important;
  border: var(--filter-border) !important;
  border-radius: var(--filter-radius) !important;
  background: #fff !important;
  font-size: var(--ds-text-md) !important;
  font-family: inherit;
  color: var(--text);
  transition: border-color .18s, box-shadow .18s;
  outline: none;
}
.filters-bar select:focus,
.filters-bar input:focus {
  border-color: var(--primary) !important;
  box-shadow: var(--filter-focus-shadow) !important;
}

/* ═══════════════════════════════════════════════
   TRIPS FILTER ROW - inline style override
   ═══════════════════════════════════════════════ */
/* Override trip filter inputs that use inline styles */
#ftSearch, #ftDriverSearch, #ftCarSearch, #ftDate, #ftStatus {
  height: var(--filter-h) !important;
  padding: 0 .9rem !important;
  border: var(--filter-border) !important;
  border-radius: var(--filter-radius) !important;
  background: #fff !important;
  font-size: var(--ds-text-md) !important;
  font-family: inherit;
  color: var(--text);
  transition: border-color .18s, box-shadow .18s;
  outline: none;
}
#ftSearch:focus, #ftDriverSearch:focus, #ftCarSearch:focus,
#ftDate:focus, #ftStatus:focus {
  border-color: var(--primary) !important;
  box-shadow: var(--filter-focus-shadow) !important;
}

/* Workshop filter inputs inline override */
#wsSearchText, #filterCar, #filterType, #filterDate, #filterMonth {
  height: var(--filter-h) !important;
  padding: 0 .9rem !important;
  border: var(--filter-border) !important;

  const el = document.createElement('div');

  document.body.appendChild(el);
  setTimeout(() => el.remove(), duration);
}

async function apiCall(endpoint, method='GET', body=null) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  const tok = getToken();
  if (tok) opts.headers['Authorization'] = `Bearer ${tok}`;
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(`${API}${endpoint}`, opts);
  if (res.status === 401) { clearAuth(); showNotification('انتهت الجلسة','error'); setTimeout(()=>location.reload(),1500); throw new Error('Unauthorized'); }
  if (!res.ok) {
    const e = await res.json().catch(()=>({}));
    let msg = e.detail;
    if (typeof msg === 'object' && msg !== null) {
      if (Array.isArray(msg)) msg = msg.map(m=>m.msg||JSON.stringify(m)).join(' | ');
      else if (msg.message) msg = msg.message;
      else msg = JSON.stringify(msg);
    }
    throw new Error(msg || `خطأ ${res.status}`);
  }
  if (method === 'DELETE') return {success:true};
  return res.json();
}

/* ── DATE/TIME FORMATTER — 24h format dd/mm/yyyy HH:MM (UTC→local) ── */
function fmtDate(isoStr) {
  if(!isoStr) return '—';
  let s = isoStr; if(s && !s.endsWith('Z') && !s.includes('+') && s.length>10) s+='Z';
  const d = new Date(s); if(isNaN(d.getTime())) return isoStr;
  const pad=n=>String(n).padStart(2,'0');
  return `${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()}`;
}
function fmtDT(isoStr) {
  if(!isoStr) return '—';
  // Add Z if missing so browser converts UTC→local timezone automatically
  let s = isoStr;
  if(s && !s.endsWith('Z') && !s.includes('+') && s.length > 10) s += 'Z';
  const d = new Date(s);
  if(isNaN(d.getTime())) return isoStr;
  const pad = n => String(n).padStart(2,'0');
  return `${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()}  ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

/** Format a number in Arabic locale (1 decimal place); returns '—' for null/undefined. */
function fmtNum(n) {
  return n != null ? (+n).toLocaleString('ar-EG', { maximumFractionDigits: 1 }) : '—';
}

/** Return a colored license-expiry badge. showGreen adds a green ✓ badge for valid dates. */
function licBadge(dt, showGreen = false) {
  if (!dt) return '—';
  const today = new Date().toISOString().split('T')[0];
  const soon  = new Date(Date.now() + 30 * 864e5).toISOString().split('T')[0];
  if (dt < today) return `<span class="badge badge-red">⚠️ منتهية ${dt}</span>`;
  if (dt <= soon)  return `<span class="badge badge-yellow">⏰ ${dt}</span>`;
  return showGreen ? `<span class="badge badge-green">✓ ${dt}</span>` : dt;
}

function navModuleBadgeCount(groupItems) {
  // إجمالي التنبيهات داخل القسم المغلق، تظهر بجانب اسم القسم
  let n = 0;
  groupItems.forEach(item=>{
    if(item.id==='emergencies') n += (lastUnreadCount||0);

    if(item.id==='super-decisions') n += (window._pendingSuperCount||0);

function renderNav(items) {
  const real = items.filter(item=>!item.hidden && !item.separator);
  // تجميع العناصر حسب القسم (Module) بدون أي تغيير في الـ id/icon/label/permissions
  const groups = {};
  real.forEach(item=>{
    const modKey = NAV_ITEM_MODULE[item.id] || 'admin';
    (groups[modKey] = groups[modKey] || []).push(item);
  });
  // أول تحميل فقط: افتح أول قسم فيه عناصر. بعد كذلك، اسمح للمستخدم بإغلاق كل الأقسام لو حب
  if (!window._navInitialized) {
    window._navInitialized = true;
    const firstCollapsible = NAV_MODULES.find(m=>m.collapsible && groups[m.key]);
    if (firstCollapsible) window._openNavModule = firstCollapsible.key;
  }

  let html = '';
  NAV_MODULES.forEach(mod => {
    const groupItems = groups[mod.key];
    if (!groupItems || !groupItems.length) return;
    if (!mod.collapsible) {
      html += groupItems.map(renderNavButton).join('');
      return;
    }
    const isOpen = window._openNavModule === mod.key;
    const badgeCount = navModuleBadgeCount(groupItems);
    html += `<div class="nav-module">
      <button class="nav-module-header ${isOpen?'open':''}" onclick="toggleNavModule('${mod.key}')">
        <span class="nav-module-title"><span class="nav-icon">${mod.icon}</span> ${mod.label}</span>

        ${groupItems.map(renderNavButton).join('')}
      </div>
    </div>`;
  });
  document.getElementById('sidebarNav').innerHTML = html;
}

// Universal table search/filter helper
// ══════════════════════════════════════════════
function tableSearch(tableId, countId, fields) {
  /**
   * tableId  : id of <table> or wrapping element containing <tr>
   * countId  : id of element showing count (optional)
   * fields   : array of column indices to search in (0-based)
   */
  const wrap   = document.getElementById(tableId);
  if(!wrap) return;
  const inputs = wrap.closest('.card')?.querySelectorAll('.srch-bar input, .srch-bar select') || [];
  const rows   = wrap.querySelectorAll('tbody tr');

  let visible = 0;
  rows.forEach(tr => {
    let show = true;
    inputs.forEach(inp => {
      const val = inp.value.trim().toLowerCase();
      if(!val) return;
      if(inp.dataset.col !== undefined) {
        // column-specific
        const col = tr.cells[+inp.dataset.col];
        if(col && !col.textContent.toLowerCase().includes(val)) show = false;
      } else {
        // global text search across all cells
        if(fields) {
          const haystack = fields.map(i => tr.cells[i]?.textContent||'').join(' ').toLowerCase();
          if(!haystack.includes(val)) show = false;
        } else {
          if(!tr.textContent.toLowerCase().includes(val)) show = false;
        }
      }
    });
    tr.classList.toggle('row-hidden', !show);
    if(show) visible++;
  });

  const countEl = countId ? document.getElementById(countId) : null;
  if(countEl) countEl.textContent = visible;

  // update srch-count span inside the bar
  const countSpan = wrap.closest('.card')?.querySelector('.srch-count');
  if(countSpan) countSpan.textContent = `${visible} / ${rows.length}`;
}

function buildSearchBar(placeholder='بحث...', extraSelects=[]) {
  /**
   * extraSelects: [{label, options:[{v,l}], col}]
   * Returns HTML string for .srch-bar div
   */
  const selHtml = extraSelects.map(s =>
    `<select data-col="${s.col}" onchange="this.closest('.card').querySelector('[data-tsearch]').dispatchEvent(new Event('input'))">
      <option value="">${s.label}</option>
      ${s.options.map(o=>`<option value="${o.v}">${o.l}</option>`).join('')}
    </select>`
  ).join('');
  return `<div class="srch-bar">
    <input data-tsearch placeholder="🔍 ${placeholder}" oninput="this.closest('.card').querySelector('[data-table-search]') && eval(this.closest('.card').querySelector('[data-table-search]').dataset.tableSearch)">
    ${selHtml}
    <span class="srch-count"></span>
    <button class="srch-reset" onclick="resetSearch(this)">✕ مسح</button>
  </div>`;
}

function resetSearch(btn) {
  const bar = btn.closest('.srch-bar');
  bar.querySelectorAll('input,select').forEach(el=>el.value='');
  // trigger re-filter
  bar.querySelectorAll('input').forEach(el=>el.dispatchEvent(new Event('input')));
}

/** Generic: search all <tr> in a table by text across given columns */
function liveSearch(inputEl, tableBodyId, colIndices) {
  const q = inputEl.value.trim().toLowerCase();
  const tbody = document.getElementById(tableBodyId);
  if(!tbody) return;
  let vis = 0;
  tbody.querySelectorAll('tr').forEach(tr=>{
    const hay = (colIndices ? colIndices.map(i=>tr.cells[i]?.textContent||'') : [...tr.cells].map(c=>c.textContent)).join(' ').toLowerCase();
    const show = !q || hay.includes(q);
    tr.classList.toggle('row-hidden', !show);
    if(show) vis++;
  });
  // update counter
  const bar = inputEl.closest('.srch-bar');
  if(bar){
    const cnt = bar.querySelector('.srch-count');
    if(cnt) cnt.textContent = `${vis} / ${tbody.querySelectorAll('tr').length}`;
  }
}

/** Generic: filter <tr> by select value in a specific column */
async function liveFilter(selectEl, tableBodyId, colIdx) {
  const val = selectEl.value.toLowerCase();
  const tbody = document.getElementById(tableBodyId);
  if(!tbody) return;
  let vis = 0;
  tbody.querySelectorAll('tr').forEach(tr=>{
    const cell = tr.cells[colIdx]?.textContent?.toLowerCase()||'';
    const show = !val || cell.includes(val);
    tr.classList.toggle('row-hidden', !show);
    if(show) vis++;
  });
  // sync with any text search already applied (re-run text search)
  const bar = selectEl.closest('.srch-bar');
  if(bar){
    const txt = bar.querySelector('input[data-tsearch]');
    if(txt && txt.value) liveSearch(txt, tableBodyId);
    const cnt = bar.querySelector('.srch-count');
    if(cnt){
      const tbody2 = document.getElementById(tableBodyId);
      const v2 = tbody2?.querySelectorAll('tr:not(.row-hidden)').length||0;
      const t2 = tbody2?.querySelectorAll('tr').length||0;
      cnt.textContent = `${v2} / ${t2}`;
    }
  }
}

  const todayStr = new Date().toISOString().split('T')[0];
  const todayTrips = trips.filter(t=>(t.start_time||'').startsWith(todayStr));
  const totalKmAll = trips.filter(t=>t.end_time&&parseFloat(t.end_odometer)>parseFloat(t.start_odometer)).reduce((s,t)=>s+(parseFloat(t.end_odometer)-parseFloat(t.start_odometer)),0);
  const avgKm = completed>0 ? (totalKmAll/completed) : 0;

  function getMonthKey(dateStr) {

  const currentMonth = months6[0];
  const recentFuel   = records.filter(r=>r.type?.startsWith('fuel_')&&getMonthKey(r.created_at)===currentMonth);
  const prevMonth    = months6[1];

  const maintCost30  = maintByMonth[currentMonth]||0;

  window._allCars  = cars;
  document.getElementById('pageContent').innerHTML = `
    <div class="card">
      <div class="card-header">
        <div class="card-title">👥 السائقون والمشغّلون (${drivers.length})</div>
        <div style="display:flex;gap:.6rem;flex-wrap:wrap">
          ${!isReporter() ? `<button class="btn btn-outline btn-sm" onclick="exportDriversCSV()">⬇️ تصدير CSV</button>` : ''}
          ${!isReporter() ? `<button class="btn btn-outline btn-sm" onclick="openAssignPermModal()">🔗 تعيين صلاحية</button>` : ''}
          ${!isReporter() ? `<button class="btn btn-primary btn-sm" onclick="openAddDriverModal()">➕ إضافة سائق</button>` : ''}
        </div>
      </div>
      <div class="srch-bar">
        <input data-tsearch placeholder="🔍 بحث بالاسم أو الهاتف أو الرقم الثابت..."
          oninput="liveSearch(this,'driversBody',[1,2,3])">
        <select onchange="liveFilter(this,'driversBody',5)">
          <option value="">كل الفروع</option>
          ${[...new Set(drivers.map(d=>d.branch).filter(Boolean))].sort().map(b=>`<option value="${b}">${b}</option>`).join('')}
        </select>
        <select onchange="liveFilter(this,'driversBody',7)">
          <option value="">كل الحالات</option>
          <option value="نشط">● نشط</option>
          <option value="غير نشط">● غير نشط</option>
        </select>
        <span class="srch-count"></span>
        <button class="srch-reset" onclick="resetSearch(this)">✕ مسح</button>
      </div>
      <div class="table-wrap" id="driversList">
        <table><thead><tr>
          <th>#</th><th>الاسم</th><th>الهاتف</th><th>الرقم الثابت</th>
          <th>السيارة المخصصة</th>
          <th>الفرع</th>
          <th>انتهاء رخصة السائق</th>
          <th>الحالة</th><th>إجراءات</th>
        </tr></thead><tbody id="driversBody">
        ${drivers.length ? drivers.map(d=>{
          // find assigned car from permissions
          const perm = window._allPerms ? window._allPerms.find(p=>p.driver_id===d.id) : null;
          const car  = perm && window._allCars ? window._allCars.find(c=>c.id===perm.car_id) : null;
          const carBadge = car
            ? `<span class="badge badge-navy" dir="ltr">🚗 ${car.plate}</span>`
            : '<span style="color:var(--muted);font-size:.78rem">—</span>';
          return `<tr>
            <td>${d.id}</td>
            <td><strong>${d.name}</strong></td>
            <td dir="ltr">${d.phone||'—'}</td>
            <td><code>${d.fixed_number||'—'}</code></td>
            <td>${carBadge}</td>
            <td>${d.branch ? `<span class="badge badge-blue" style="font-size:.72rem">${d.branch}</span>` : '<span style="color:var(--muted);font-size:.78rem">—</span>'}</td>
            <td>${licBadge(d.driver_license_expiry, true)}</td>
            <td><span class="badge ${d.status==='active'?'badge-green':'badge-red'}">${d.status==='active'?'● نشط':'● غير نشط'}</span></td>
            <td style="white-space:nowrap">
              ${!isReporter() ? `<button class="btn btn-ghost btn-sm edit-driver"
                data-id="${d.id}" data-name="${d.name}" data-phone="${d.phone||''}"
                data-status="${d.status}" data-nid="${d.national_id||''}"
                data-birth="${d.birth_date||''}" data-dlic="${d.driver_license_expiry||''}"
                data-clic="${d.vehicle_license_expiry||''}"
                data-username="${d.username||''}"
                data-fixed="${d.fixed_number||''}"
                data-branch="${d.branch||''}">✏️</button>
              <button class="btn btn-outline btn-sm renew-license" data-id="${d.id}" data-name="${d.name}"
                title="تجديد رخصة">📋</button>
              <button class="btn btn-danger btn-sm del-driver" data-id="${d.id}">🗑️</button>` : '—'}
            </td>
          </tr>`;

  window.__driversAll = drivers;
  // ── Pagination ──
}).join('') : '<tr><td colspan="8" style="text-align:center;padding:2rem;color:var(--muted)">لا يوجد سائقون</td></tr>'}
        </tbody></table>

      </div>
    </div>`;
  document.getElementById('driversList').addEventListener('click', async e=>{
    if(e.target.closest('.edit-driver')){ const b=e.target.closest('.edit-driver'); openEditDriverModal(b.dataset.id,b.dataset.name,b.dataset.phone,b.dataset.status,b.dataset.nid,b.dataset.birth,b.dataset.dlic,b.dataset.clic,b.dataset.username,b.dataset.fixed,b.dataset.branch); }
    if(e.target.closest('.renew-license')){ const b=e.target.closest('.renew-license'); openLicenseRenewalModal(+b.dataset.id, b.dataset.name); }
    if(e.target.closest('.del-driver')){ const id=+e.target.closest('.del-driver').dataset.id; if(!confirm('حذف هذا السائق؟')) return; try{ await apiCall(`/drivers/${id}`,'DELETE'); showNotification('تم الحذف','success'); await renderDriversSection(); }catch(e){showNotification(e.message,'error');} }
  });
}

function openAddDriverModal() {

      <div class="form-group"><label>تاريخ الميلاد</label><input type="date" id="mDrvBirth"></div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.8rem">

      <div class="form-group"><label>الرقم الثابت</label><input id="mDrvFixed" placeholder="مثال: 206338"></div>

    const username = document.getElementById('mDrvUser').value.trim();
