function cancelEmergencyModal() {
  if(mediaRecorder && mediaRecorder.state !== 'inactive'){
    try{ mediaRecorder.stream?.getTracks().forEach(t=>t.stop()); mediaRecorder.stop(); }catch(e){}
  }
  clearInterval(recInterval);
  mediaRecorder = null; audioChunks = []; recSeconds = 0;
  closeModal();
}

async function startEmergencyRecording(type) {
  if(mediaRecorder && mediaRecorder.state === 'recording') return;
  currentRecordingType = type;

  const errBox        = document.getElementById('emgErrBox');
  const errMsg        = document.getElementById('emgErrMsg');
  const sendBtn       = document.getElementById('emgSendBtn');
  const waitingState  = document.getElementById('emgWaitingState');
  const recordingState= document.getElementById('emgRecordingState');

  // دالة مساعدة لإظهار الخطأ
  function showMicError(msg, hint) {
    console.error('[EMG] Mic error:', msg, hint || '');
    if(waitingState)   waitingState.style.display   = 'none';
    if(recordingState) recordingState.style.display = 'none';
    if(errBox)         errBox.style.display         = 'block';
    if(errMsg)         errMsg.textContent            = msg;
    const hintEl = document.getElementById('emgErrHint');
    if(hintEl && hint) hintEl.innerHTML = hint;
    if(sendBtn) sendBtn.disabled = false;
    window._emgNoAudio = true;
  }

  // 1. التحقق من HTTPS أو localhost
  const isSecure = location.protocol === 'https:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1';
  if(!isSecure) {
    showMicError(
      'التسجيل الصوتي يتطلب اتصالاً آمناً (HTTPS)',
      'يرجى فتح الموقع عبر <b>https://</b> لتفعيل الميكروفون'
    );
    return;
  }

  // 2. التحقق من دعم المتصفح لـ mediaDevices
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    console.warn('[EMG] navigator.mediaDevices غير مدعوم في هذا المتصفح');
    showMicError(
      'المتصفح لا يدعم تسجيل الصوت',
      'جرّب Chrome أو Firefox أو Safari بإصدار حديث'
    );
    return;
  }

  console.log('[EMG] طلب إذن الميكروفون...');

  try {
    const stream = await navigator.mediaDevices.getUserMedia({audio:true, video:false});
    console.log('[EMG] تم الحصول على إذن الميكروفون بنجاح');

    // إخفاء حالة الانتظار وإظهار حالة التسجيل
    if(waitingState)   waitingState.style.display   = 'none';
    if(recordingState) recordingState.style.display = 'block';
    if(sendBtn)        sendBtn.disabled              = false;

    audioChunks = [];
    const mimeTypes = ['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/ogg','audio/mp4',''];
    let mimeType = '';
    for(const t of mimeTypes){ try{ if(!t || MediaRecorder.isTypeSupported(t)){ mimeType = t; break; } }catch(e){} }
    mediaRecorder = new MediaRecorder(stream, mimeType ? {mimeType} : {});

    mediaRecorder.ondataavailable = e => { if(e.data && e.data.size > 0) audioChunks.push(e.data); };

    mediaRecorder.onstop = async () => {
      const finalMime = mediaRecorder.mimeType || 'audio/webm';
      const blob = new Blob(audioChunks, {type: finalMime});
      stream.getTracks().forEach(t => t.stop());

      if(blob.size < 100) {
        showNotification('لم يُسجَّل أي صوت، حاول مرة أخرى','error');
        document.getElementById('emgStepSending').style.display = 'none';
        document.getElementById('emgStepRec').style.display     = 'block';
        document.getElementById('emgCloseBtn').style.display    = '';
        const btn = document.getElementById('emgSendBtn');
        if(btn){ btn.disabled = false; }
        return;
      }

      const notes  = window._emgPendingNotes || '';
      const reader = new FileReader();
      reader.onloadend = async () => {
        const emgLocation = await silentGetLocation(8000);
        try {
          await apiCall('/emergency/report','POST',{
            driver_id: currentUser.driver_id,
            car_id:    window._driverCar?.id || null,
            type:      currentRecordingType,
            audio_data: reader.result,
            notes,
            location:  emgLocation
          });
          audioChunks = []; mediaRecorder = null;
          clearInterval(recInterval);
          const sSending = document.getElementById('emgStepSending');
          const sDone    = document.getElementById('emgStepDone');
          if(sSending) sSending.style.display = 'none';
          if(sDone)    sDone.style.display    = 'block';
          else         closeModal();
          // تحديث الصفحة عشان كارد الحالة يظهر
          setTimeout(()=>{ closeModal(); renderDriverSinglePage(); }, 2000);
        } catch(err) {
          showNotification('فشل الإرسال: ' + err.message, 'error');
          document.getElementById('emgStepSending').style.display = 'none';
          document.getElementById('emgStepRec').style.display     = 'block';
          document.getElementById('emgCloseBtn').style.display    = '';
          const btn = document.getElementById('emgSendBtn');
          if(btn){ btn.disabled = false; }
        }
      };
      reader.readAsDataURL(blob);
    };

    mediaRecorder.start(300);
    recSeconds = 0;
    const timerEl = document.getElementById('emgRecTimer');
    if(timerEl) timerEl.textContent = '0:00';
    clearInterval(recInterval);
    recInterval = setInterval(() => {
      recSeconds++;
      const m = Math.floor(recSeconds / 60), s = recSeconds % 60;
      const el = document.getElementById('emgRecTimer');
      if(el) el.textContent = `${m}:${String(s).padStart(2,'0')}`;
    }, 1000);

  } catch(e) {
    console.error('[EMG] getUserMedia error — name:', e.name, '| message:', e.message);

    if(e.name === 'NotAllowedError' || e.name === 'PermissionDeniedError') {
      showMicError(
        'رفض المتصفح الوصول للميكروفون',
        'لتفعيله: اضغط على أيقونة 🔒 في شريط العنوان ← الميكروفون ← سماح، ثم أعد تحميل الصفحة'
      );
    } else if(e.name === 'NotFoundError' || e.name === 'DevicesNotFoundError') {
      showMicError(
        'لم يتم العثور على ميكروفون',
        'تأكد من توصيل الميكروفون أو تفعيله من إعدادات الجهاز'
      );
    } else if(e.name === 'NotReadableError' || e.name === 'TrackStartError') {
      showMicError(
        'الميكروفون مشغول بتطبيق آخر',
        'أغلق التطبيقات الأخرى التي قد تستخدم الميكروفون وحاول مجدداً'
      );
    } else {
      showMicError(
        'تعذر الوصول للميكروفون',
        'تأكد من إذن الميكروفون في إعدادات المتصفح وحاول مجدداً'
      );
    }
  }
}

function stopAndSendEmergency() {
  clearInterval(recInterval);

  // لو التسجيل فاشل من الأساس، ابعت بدون صوت مباشرة
  if(window._emgNoAudio || !mediaRecorder || mediaRecorder.state === 'inactive') {
    window._emgNoAudio = false;
    _sendEmergencyNoAudio();
    return;
  }

  try {
    mediaRecorder.requestData();
    mediaRecorder.stop();
  } catch(e) {
    showNotification('خطأ: ' + e.message, 'error');
    document.getElementById('emgStepSending').style.display = 'none';
    document.getElementById('emgStepRec').style.display     = 'block';
    document.getElementById('emgCloseBtn').style.display    = '';
    const btn = document.getElementById('emgSendBtn');
    if(btn){ btn.disabled = false; }
  }
}

    document.getElementById('emgStepRec').style.display     = 'block';

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.8rem;padding:.5rem 0">

          <button onclick="closeModal();dpWsModal('${f.key}')"
            style="padding:1rem;border:2px solid #f59e0b;border-radius:12px;background:#fff7ed;font-size:1rem;font-weight:700;cursor:pointer;color:#92400e;font-family:inherit">
            ⛽ ${f.label}
          </button>`).join('')}

  }

  selWsType=type;
  const car=window._driverCar, wt=WT[type]||{icon:'⛽',label:type};
  const carOpts=car?`<option value="${car.id}" selected>${car.plate} — ${car.model}</option>`
    :'<option value="">⚠️ لا توجد مركبة</option>';

  let specific='';
  const isFuelType = type.startsWith('fuel_');
  if(isFuelType || type==='oil') specific=`<div class="form-group"><label>الكمية (لتر) <span class="req">*</span></label><input type="number" id="wQty" placeholder="مثال: 40" min="0.1" step="0.1"></div>`;
  else if(type==='tire') specific=`
    <div class="form-group"><label>عدد الإطارات <span class="req">*</span></label><input type="number" id="wQty" placeholder="4" min="1"></div>
    <div class="form-group"><label>حالة الكوتش <span class="req">*</span></label>
      <select id="wTireAction"><option value="">-- اختر --</option>
        <option value="puncture">🔴 ثقب</option><option value="repair">🔧 تصليح</option><option value="replacement">🔄 استبدال</option>
      </select></div>`;
  else if(['filter','battery','belt'].includes(type)) specific=`<div class="form-group"><label>نوع العملية <span class="req">*</span></label>
    <select id="wOpType"><option value="">-- اختر --</option>
      <option value="maintenance">🔧 صيانة</option><option value="replacement">🔄 استبدال</option>
    </select></div>`;
  else if(type==='other') specific=`<div class="form-group"><label>وصف العملية <span class="req">*</span></label><textarea id="wDesc" placeholder="اشرح العملية..."></textarea></div>`;

  openModal(`
    <div class="modal-header"><div class="modal-title">${wt.icon} ${wt.label}</div><button class="modal-close" onclick="closeModal()">✕</button></div>
    ${specific}
    <div class="form-group"><label>المركبة</label><select id="wVehicle" disabled>${carOpts}</select></div>
    <div class="form-group"><label>قراءة العداد (كم) <span class="req">*</span></label><input type="number" id="wOdo" placeholder="مثال: 54000" min="0"></div>
    <div class="form-group"><label>ملاحظات</label><textarea id="wNotes" placeholder="تفاصيل إضافية..."></textarea></div>
    <div style="background:#f0fdf9;border:1.5px solid #86efac;border-radius:8px;padding:.55rem 1rem;font-size:.8rem;color:#166534;font-weight:700;margin-bottom:.8rem">💰 السعر محدد من قبل الإدارة</div>
    <input type="hidden" id="wPrice" value="${(window._typePrices&&window._typePrices[type])||0}">
    ${(window._typePrices&&window._typePrices[type]>0)?`
    <div style="padding:.4rem .8rem;background:var(--surface-2);border-radius:8px;margin-bottom:.5rem;font-size:.85rem">
      💰 سعر الوحدة: <strong style="color:var(--primary)">${(window._typePrices[type]||0).toFixed(2)} جنيه</strong>
      <span style="color:var(--muted)">— الإجمالي يُحسب تلقائياً</span>
    </div>`:''}
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">إلغاء</button>
      <button class="btn btn-primary" id="wsSubmitBtn">💾 حفظ</button>
    </div>`);

  document.getElementById('wsSubmitBtn').onclick=async()=>{
    const vid=car?.id||null, odo=parseFloat(document.getElementById('wOdo')?.value)||null;
    const price=parseFloat(document.getElementById('wPrice')?.value)||0;
    const notes=document.getElementById('wNotes')?.value?.trim()||'';
    const btn=document.getElementById('wsSubmitBtn');
    if(!vid)            return showNotification('لا توجد مركبة مخصصة','error');
    if(!odo||odo<=0)    return showNotification('أدخل قراءة العداد','error');
    const payload={driver_id:currentUser.driver_id,type:selWsType,price,notes,vehicle_id:vid,odometer_reading:odo,location:''};
    const _isFuel=selWsType.startsWith('fuel_')||selWsType==='fuel';
    if(_isFuel||['oil','tire'].includes(selWsType)){const q=parseFloat(document.getElementById('wQty')?.value);if(!q||q<=0)return showNotification('أدخل الكمية','error');payload.quantity=q;}
    if(selWsType==='tire'){const ta=document.getElementById('wTireAction')?.value;if(!ta)return showNotification('اختر حالة الكوتش','error');payload.tire_action=ta;}
    if(['filter','battery','belt'].includes(selWsType)){const op=document.getElementById('wOpType')?.value;if(!op)return showNotification('اختر نوع العملية','error');payload.operation_type=op;}
    if(selWsType==='other'){const d=document.getElementById('wDesc')?.value?.trim();if(!d)return showNotification('أدخل وصف العملية','error');payload.description=d;}
    btn.disabled=true; btn.textContent='جاري...';
    payload.location=await silentGetLocation();
    try{
      await apiCall('/workshops','POST',payload);
      showNotification(`✅ تم حفظ ${WT[selWsType]?.label}`,'success');
      closeModal();
    }catch(e){showNotification(e.message,'error');btn.disabled=false;btn.textContent='💾 حفظ';}
  };
}

async function renderSuperLicenses() {
  const c = document.getElementById('pageContent');
  c.innerHTML = '<div class="empty-state"><div class="empty-icon">⏳</div><p>جاري التحميل...</p></div>';
  const [drivers, cars] = await Promise.all([loadDrivers(), loadCars()]);

  const now  = new Date().toISOString().split('T')[0];
  const d30  = new Date(Date.now() +  30*864e5).toISOString().split('T')[0];
  const d60  = new Date(Date.now() +  60*864e5).toISOString().split('T')[0];
  const d90  = new Date(Date.now() +  90*864e5).toISOString().split('T')[0];

  // تصنيف السائقين حسب حالة الرخصة
  function classify(d) {
    const dl = d.driver_license_expiry || '';
    const vl = d.vehicle_license_expiry || '';
    const worst = [dl, vl].filter(Boolean).sort()[0];
    if (!worst) return null;
    if (worst < now)  return { level: 'expired',  label: '🔴 منتهية',   color: '#ef4444', bg: '#fef2f2', border: '#fca5a5', date: worst, field: dl <= vl || !vl ? 'رخصة السائق' : 'رخصة السيارة' };
    if (worst <= d30) return { level: 'critical',  label: '🟠 خلال 30 يوم', color: '#f97316', bg: '#fff7ed', border: '#fed7aa', date: worst, field: dl <= vl || !vl ? 'رخصة السائق' : 'رخصة السيارة' };
    if (worst <= d60) return { level: 'warning',   label: '🟡 خلال 60 يوم', color: '#f59e0b', bg: '#fffbeb', border: '#fde68a', date: worst, field: dl <= vl || !vl ? 'رخصة السائق' : 'رخصة السيارة' };
    if (worst <= d90) return { level: 'notice',    label: '🟢 خلال 90 يوم', color: '#10b981', bg: '#f0fdf9', border: '#6ee7b7', date: worst, field: dl <= vl || !vl ? 'رخصة السائق' : 'رخصة السيارة' };
    return null;
  }

  const tagged = drivers.map(d => ({ ...d, _lic: classify(d) }))
                        .filter(d => d._lic)
                        .sort((a,b) => a._lic.date.localeCompare(b._lic.date));

  const expired  = tagged.filter(d => d._lic.level === 'expired');
  const critical = tagged.filter(d => d._lic.level === 'critical');
  const warning  = tagged.filter(d => d._lic.level === 'warning');
  const notice   = tagged.filter(d => d._lic.level === 'notice');

  function buildGroup(title, list) {
    if (!list.length) return '';
    return `
      <div class="card" style="border:1.5px solid ${list[0]._lic.border};margin-bottom:1rem">
        <div class="card-header" style="background:${list[0]._lic.bg}">
          <div class="card-title" style="color:${list[0]._lic.color}">${title} (${list.length})</div>
        </div>
        <div class="table-wrap">
          <table><thead><tr>
            <th>السائق</th><th>الرقم الثابت</th><th>الفرع</th>
            <th>نوع الرخصة</th><th>تاريخ الانتهاء</th><th>رخصة السائق</th><th>رخصة السيارة</th>
          </tr></thead><tbody>
          ${list.map(d => `<tr>
            <td><strong>${d.name}</strong></td>
            <td><code>${d.fixed_number||'—'}</code></td>
            <td>${d.branch||'—'}</td>
            <td><span style="color:${d._lic.color};font-weight:700">${d._lic.field}</span></td>
            <td><span style="color:${d._lic.color};font-weight:700">${d._lic.date}</span></td>
            <td>${licBadge(d.driver_license_expiry)}</td>
            <td>${licBadge(d.vehicle_license_expiry)}</td>
          </tr>`).join('')}
          </tbody></table>
        </div>
      </div>`;
  }

  c.innerHTML = `
    <div class="stats-row" style="margin-bottom:1.2rem;grid-template-columns:repeat(auto-fit,minmax(120px,1fr))">
      <div class="stat-card"><div class="stat-icon" style="color:#ef4444">🔴</div><div class="stat-value" style="color:#ef4444">${expired.length}</div><div class="stat-label">رخصة منتهية</div></div>
      <div class="stat-card"><div class="stat-icon" style="color:#f97316">🟠</div><div class="stat-value" style="color:#f97316">${critical.length}</div><div class="stat-label">تنتهي خلال 30 يوم</div></div>
      <div class="stat-card"><div class="stat-icon" style="color:#f59e0b">🟡</div><div class="stat-value" style="color:#f59e0b">${warning.length}</div><div class="stat-label">تنتهي خلال 60 يوم</div></div>
      <div class="stat-card"><div class="stat-icon" style="color:#10b981">🟢</div><div class="stat-value" style="color:#10b981">${notice.length}</div><div class="stat-label">تنتهي خلال 90 يوم</div></div>
    </div>
    <div class="card" style="margin-bottom:1rem;background:#eff6ff;border:1.5px solid #93c5fd">
      <div style="padding:.8rem 1.2rem;font-size:.88rem;color:#1e40af">
        💡 <strong>ملاحظة:</strong> السائقون يرون إشعار ثابت في واجهتهم عند اقتراب انتهاء رخصهم.
      </div>
    </div>
    ${buildGroup('🔴 رخص منتهية', expired)}
    ${buildGroup('🟠 تنتهي خلال 30 يوم', critical)}
    ${buildGroup('🟡 تنتهي خلال 60 يوم', warning)}
    ${buildGroup('🟢 تنتهي خلال 90 يوم', notice)}
    ${tagged.length === 0 ? '<div class="empty-state"><div class="empty-icon">✅</div><p>جميع رخص السائقين سارية — لا توجد تنبيهات</p></div>' : ''}

    <!-- ══ رخص المركبات ══ -->
    <div style="margin:1.5rem 0 .75rem;font-size:.75rem;font-weight:600;color:var(--muted);letter-spacing:.06em;text-transform:uppercase">رخص المركبات</div>
    ${buildCarLicenses(cars, now, d30, d60, d90)}
  `;
}

function buildCarLicenses(cars, now, d30, d60, d90) {
  function classifyCar(car) {
    const cl = car.car_license_expiry || '';
    if (!cl) return null;
    if (cl < now)  return { level:'expired',  label:'🔴 منتهية',       color:'#ef4444', bg:'#fef2f2', border:'#fca5a5', date:cl };
    if (cl <= d30) return { level:'critical', label:'🟠 خلال 30 يوم',  color:'#f97316', bg:'#fff7ed', border:'#fed7aa', date:cl };
    if (cl <= d60) return { level:'warning',  label:'🟡 خلال 60 يوم',  color:'#f59e0b', bg:'#fffbeb', border:'#fde68a', date:cl };
    if (cl <= d90) return { level:'notice',   label:'🟢 خلال 90 يوم',  color:'#10b981', bg:'#f0fdf9', border:'#6ee7b7', date:cl };
    return null;
  }
  const tagged = cars.map(c=>({...c, _lic:classifyCar(c)})).filter(c=>c._lic)
                     .sort((a,b)=>a._lic.date.localeCompare(b._lic.date));
  if (!tagged.length)
    return '<div class="empty-state" style="padding:.8rem"><div class="empty-icon">✅</div><p style="font-size:.85rem">جميع رخص المركبات سارية</p></div>';

  const groups = [
    {level:'expired',  title:'🔴 رخص منتهية',         items:tagged.filter(c=>c._lic.level==='expired')},
    {level:'critical', title:'🟠 تنتهي خلال 30 يوم',  items:tagged.filter(c=>c._lic.level==='critical')},
    {level:'warning',  title:'🟡 تنتهي خلال 60 يوم',  items:tagged.filter(c=>c._lic.level==='warning')},
    {level:'notice',   title:'🟢 تنتهي خلال 90 يوم',  items:tagged.filter(c=>c._lic.level==='notice')},
  ].filter(g=>g.items.length);

  return groups.map(g => `
    <div class="card" style="border:1.5px solid ${g.items[0]._lic.border};margin-bottom:.75rem">
      <div class="card-header" style="background:${g.items[0]._lic.bg}">
        <div class="card-title" style="color:${g.items[0]._lic.color}">${g.title} (${g.items.length})</div>
      </div>
      <div class="table-wrap">
        <table><thead><tr><th>رقم اللوحة</th><th>الموديل</th><th>الفرع</th><th>تاريخ انتهاء الرخصة</th></tr></thead><tbody>
        ${g.items.map(car=>`<tr>
          <td dir="ltr"><strong>${car.plate}</strong></td>
          <td>${car.model}</td>
          <td>${car.branch||'—'}</td>
          <td><span style="color:${car._lic.color};font-weight:700">${car._lic.date}</span></td>
        </tr>`).join('')}
        </tbody></table>
      </div>
    </div>`).join('');
}

function sdFilter(f, btn) {
  document.querySelectorAll('.sd-filter').forEach(b=>b.classList.remove('active'));

}

async function doImportPreview() {
  const file = document.getElementById('importFileInput').files[0];
  const importType = document.getElementById('importTypeSelect').value;
  if(!file) return showNotification('يرجى اختيار ملف أولاً','error');

  const btn = document.getElementById('importPreviewBtn');
  btn.disabled=true; btn.textContent='⏳ جاري التحليل...';

  const fd = new FormData();
  fd.append('file', file);
  const token = getToken();
  const url = importType === 'permissions'
    ? `/import/permissions/preview`
    : `/import/preview?import_type=${importType}`;
  try {
    const res = await fetch(url, { method:'POST', headers:{ Authorization:`Bearer ${token}` }, body: fd });
    const data = await res.json();
    if(!res.ok) throw new Error(data.detail || 'خطأ في التحليل');
    _importPreviewData = { file, importType };
    renderImportPreview(data);
  } catch(e) {
    showNotification(e.message,'error');
  } finally {
    btn.disabled=false; btn.textContent='🔍 استعراض البيانات';
  }
}

async function doImportConfirm() {
  if(!_importPreviewData) return;
  const { file, importType } = _importPreviewData;
  const skipErrors = document.getElementById('importSkipErrors')?.checked || false;

  const btn = document.getElementById('importConfirmBtn');
  btn.disabled=true; btn.textContent='⏳ جاري الرفع...';

  const fd = new FormData();
  fd.append('file', file);
  const token = getToken();
  const url = importType === 'permissions'
    ? `/import/permissions/confirm?skip_errors=${skipErrors}`
    : `/import/confirm?import_type=${importType}&skip_errors=${skipErrors}`;
  try {
    const res = await fetch(url, { method:'POST', headers:{ Authorization:`Bearer ${token}` }, body: fd });
    const data = await res.json();
    if(!res.ok) {
      const detail = typeof data.detail === 'object' ? data.detail.message : data.detail;
      throw new Error(detail || 'فشل الرفع');
    }
    showNotification(`✅ تم الرفع بنجاح: ${data.inserted} سجل${data.skipped>0?' (تجاهل '+data.skipped+')':''}`, 'success');
    _importPreviewData = null;
    renderImportResult(data, importType);
  } catch(e) {
    showNotification(e.message,'error');
    btn.disabled=false; btn.textContent=`✅ تأكيد الرفع`;
  }
}

  const roleColors  = {superuser:'badge-purple',admin:'badge-blue',driver:'badge-green',reporter:'badge-yellow'};

  const byRole   = summary.by_role || {};

      <div class="stat-label">عمليات ${roleLabels[role]||role}</div>
    </div>`).join('');

  window._allLogs = data.items || [];

  const tableRows = (rows) => rows.length===0

          <td style="font-size:.8rem;color:var(--muted)">${r.details||'—'}</td>
          <td style="font-family:monospace;font-size:.72rem;color:var(--muted)">${r.ip_address||'—'}</td>

function filterLogs() {
  const role     = document.getElementById('logFilterRole')?.value || '';
  const user     = (document.getElementById('logFilterUser')?.value || '').toLowerCase();
  const logs     = window._allLogs || [];
  const filtered = logs.filter(r=>(!role||r.role===role)&&(!user||r.username.toLowerCase().includes(user)));
  const roleColors  = {superuser:'badge-purple',admin:'badge-blue',driver:'badge-green',reporter:'badge-yellow'};
  const roleLabels  = {superuser:'سوبر يوزر',admin:'أدمن',driver:'سائق',reporter:'مراقب'};
  const actionLabels= {login:'تسجيل دخول',create_admin:'إنشاء أدمن',update_admin:'تعديل أدمن',delete_admin:'حذف أدمن',create_reporter:'إنشاء مراقب',update_reporter:'تعديل مراقب',delete_reporter:'حذف مراقب',data_reset:'مسح بيانات'};
  const tbody = document.getElementById('logsTableBody');
  if(!tbody) return;
  tbody.innerHTML = filtered.length===0
    ? `<tr><td colspan="6" style="text-align:center;color:var(--muted)">لا توجد نتائج</td></tr>`
    : filtered.map(r=>`
        <tr>
          <td style="font-family:monospace;font-size:.75rem;color:var(--muted)">${fmtDT(r.created_at)}</td>
          <td><b>${r.username}</b></td>
          <td><span class="badge ${roleColors[r.role]||'badge-blue'}">${roleLabels[r.role]||r.role}</span></td>
          <td><span class="badge badge-green">${actionLabels[r.action]||r.action}</span></td>
          <td style="font-size:.8rem;color:var(--muted)">${r.details||'—'}</td>
          <td style="font-family:monospace;font-size:.72rem;color:var(--muted)">${r.ip_address||'—'}</td>
        </tr>`).join('');
}


/* ── LOGIN ── */
function showLogin() {
  const saved=loadUser(), token=getToken();
  if(saved&&token){ currentUser=saved; initUI(); return; }
  document.body.insertAdjacentHTML('afterbegin',`<div class="login-overlay" id="loginOverlay"><div class="login-card"><div class="login-logo">🚛</div><h2>نظام إدارة الأسطول</h2><p>Fleet Management v2</p><input type="text" id="luName" placeholder="اسم المستخدم"><input type="password" id="luPw" placeholder="كلمة المرور"><button class="login-btn" id="doLoginBtn">تسجيل الدخول</button></div></div>`);
  const doLogin=async()=>{
    const username=document.getElementById('luName').value, password=document.getElementById('luPw').value;
    const btn=document.getElementById('doLoginBtn'); btn.disabled=true; btn.textContent='جاري...';
    try{
      const data=await apiCall('/login','POST',{username,password});
      setToken(data.access_token);
      if(data.refresh_token) localStorage.setItem('refresh_token', data.refresh_token);
      const u={id:data.user.id,username:data.user.username,role:data.user.role,driver_id:data.user.driver_id,
               branch: data.user.branch || ''};
      saveUser(u); currentUser=u;
      document.getElementById('loginOverlay').remove();
      initUI();
      showNotification(`مرحباً ${currentUser.username} 👋`,'success');
    }catch(e){ showNotification(e.message||'بيانات خاطئة','error'); btn.disabled=false; btn.textContent='تسجيل الدخول'; }
  };
  document.getElementById('doLoginBtn').onclick=doLogin;
  document.getElementById('luPw').addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });
}

document.getElementById('logoutBtn').addEventListener('click',()=>{
  clearInterval(notifPollInterval); clearAuth(); currentUser=null;
  showNotification('تم تسجيل الخروج','info');
  setTimeout(()=>location.reload(),600);
});

showLogin();
</script>
</body>

<script>
// ═══════════════════════════════════════════════════════════════
// FEATURE 1: MAINTENANCE SCHEDULE — صيانة دورية
// ═══════════════════════════════════════════════════════════════
const MAINTENANCE_TYPES_FE = [
  "تغيير زيت","فلتر زيت","فلتر هواء","فلتر وقود",
  "فلتر مكيف","إطارات","بطارية","فرامل أمامية",
  "فرامل خلفية","سير توزيع","ترمس","ماء تبريد",
  "سائل فرامل","فحص دوري عام","أخرى"
];

const ALERT_COLORS = {
  overdue: {bg:'#fef2f2',border:'#fca5a5',badge:'#ef4444',label:'🔴 متأخرة'},
  warning: {bg:'#fff7ed',border:'#fed7aa',badge:'#f97316',label:'🟠 قريبة'},
  ok:      {bg:'#f0fdf4',border:'#6ee7b7',badge:'#10b981',label:'✅ سليمة'},
};

async function renderMaintenanceSection() {
  const c = document.getElementById('pageContent');
  c.innerHTML='<div class="empty-state"><div class="empty-icon">⏳</div><p>جاري التحميل...</p></div>';

  const [records, cars] = await Promise.all([
    apiCall('/maintenance/schedule').catch(()=>[]),
    loadCars()
  ]);
  // تحديث الكاش دايماً
  window._carsCache = cars;

  window._maintenanceAlertCount = records.filter(r=>r.alert_status!=='ok').length;

  const overdue = records.filter(r=>r.alert_status==='overdue');
  const warning = records.filter(r=>r.alert_status==='warning');
  const ok      = records.filter(r=>r.alert_status==='ok');

  function buildRow(r) {
    const ac = ALERT_COLORS[r.alert_status] || ALERT_COLORS.ok;
    const nextKmDisplay = r.next_due_km ? Math.round(r.next_due_km).toLocaleString('ar-EG')+' كم' : '—';
    const curKmDisplay  = r.current_km  ? Math.round(r.current_km).toLocaleString('ar-EG')+' كم'  : '—';
    const remKm = (r.next_due_km && r.current_km)
      ? Math.round(r.next_due_km - r.current_km) : null;
    const remDisplay = remKm !== null
      ? (remKm > 0 ? `${remKm.toLocaleString('ar-EG')} كم متبقي` : `${Math.abs(remKm).toLocaleString('ar-EG')} كم تأخير`)
      : '—';
    return `<tr>
      <td dir="ltr"><strong>${r.car_plate}</strong></td>
      <td style="font-size:.82rem">${r.car_model}</td>
      <td>${r.maintenance_type}</td>
      <td>${r.interval_km ? Math.round(r.interval_km).toLocaleString('ar-EG')+' كم' : '—'}${r.interval_days ? ' / '+r.interval_days+' يوم' : ''}</td>
      <td>${r.last_done_km ? Math.round(r.last_done_km).toLocaleString('ar-EG')+' كم' : '—'}</td>
      <td>${curKmDisplay}</td>
      <td><strong style="color:${ac.badge}">${remDisplay}</strong></td>
      <td>${r.next_due_date||'—'}</td>
      <td><span style="background:${ac.badge};color:white;border-radius:20px;font-size:.7rem;padding:.15rem .55rem;font-weight:700">${ac.label}</span></td>
      <td>
        ${!isReporter()?`
        <button class="btn btn-ghost btn-sm" onclick="openMaintenanceDoneModal(${r.id},'${r.car_plate}','${r.maintenance_type}')">✅ تم</button>
        <button class="btn btn-ghost btn-sm" onclick="openEditMaintenanceModal(${r.id})">✏️</button>
        <button class="btn btn-danger btn-sm" onclick="deleteMaintenanceRecord(${r.id})">🗑️</button>
        `:'—'}
      </td>
    </tr>`;
  }

  function buildGroup(title, list, color) {
    if(!list.length) return '';
    return `<div class="card" style="border:1.5px solid ${color};margin-bottom:1rem">
      <div class="card-header" style="background:${list[0]?ALERT_COLORS[list[0].alert_status]?.bg:''}">
        <div class="card-title" style="color:${color}">${title} (${list.length})</div>
      </div>
      <div class="table-wrap">
        <table><thead><tr>
          <th>اللوحة</th><th>الموديل</th><th>نوع الصيانة</th><th>الفاصل الزمني</th>
          <th>آخر صيانة (كم)</th><th>العداد الحالي</th><th>المتبقي</th>
          <th>الموعد القادم</th><th>الحالة</th><th>إجراء</th>
        </tr></thead><tbody>
        ${list.map(buildRow).join('')}
        </tbody></table>
      </div>
    </div>`;
  }

  c.innerHTML = `
    <div class="stats-row" style="margin-bottom:1rem">
      <div class="stat-card"><div class="stat-icon" style="color:#ef4444">🔴</div><div class="stat-value" style="color:#ef4444">${overdue.length}</div><div class="stat-label">متأخرة</div></div>
      <div class="stat-card"><div class="stat-icon" style="color:#f97316">🟠</div><div class="stat-value" style="color:#f97316">${warning.length}</div><div class="stat-label">قريبة</div></div>
      <div class="stat-card"><div class="stat-icon" style="color:#10b981">✅</div><div class="stat-value" style="color:#10b981">${ok.length}</div><div class="stat-label">سليمة</div></div>
      <div class="stat-card"><div class="stat-icon">🔧</div><div class="stat-value">${records.length}</div><div class="stat-label">إجمالي السجلات</div></div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
      <div style="font-size:.88rem;color:var(--muted)">تتبع مواعيد الصيانة الدورية لكل مركبة تلقائياً</div>
      ${!isReporter()?`<button class="btn btn-primary btn-sm" onclick="openAddMaintenanceModal()">➕ إضافة جدول صيانة</button>`:''}
    </div>
    ${buildGroup('🔴 صيانة متأخرة', overdue, '#ef4444')}
    ${buildGroup('🟠 تقترب مواعيد الصيانة', warning, '#f97316')}
    ${buildGroup('✅ صيانة سليمة', ok, '#10b981')}
    ${records.length===0?'<div class="empty-state"><div class="empty-icon">🔧</div><p>لا توجد جداول صيانة بعد — أضف أول جدول</p></div>':''}
  `;
}

async function openAddMaintenanceModal() {
  // جيب العربيات لو مش محملة
  if(!window._carsCache || !window._carsCache.length) {
    window._carsCache = await loadCars();
  }
  const carsOpts = (window._carsCache||[]).map(c=>`<option value="${c.id}">${c.plate} — ${c.model}${c.car_name?' ('+c.car_name+')':''}</option>`).join('');
  const typeOpts = MAINTENANCE_TYPES_FE.map(t=>`<option value="${t}">${t}</option>`).join('');
  openModal(`
    <div class="modal-header"><div class="modal-title">➕ إضافة جدول صيانة دورية</div><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="two-col">
      <div class="form-group"><label>المركبة <span class="req">*</span></label><select id="mMaintCar"><option value="">— اختر —</option>${carsOpts}</select></div>
      <div class="form-group"><label>نوع الصيانة <span class="req">*</span></label><select id="mMaintType"><option value="">— اختر —</option>${typeOpts}</select></div>
    </div>
    <div class="two-col">
      <div class="form-group"><label>كل كام كم</label><input type="number" id="mMaintKmInt" placeholder="مثال: 5000" min="0" step="100"></div>
      <div class="form-group"><label>أو كل كام يوم</label><input type="number" id="mMaintDayInt" placeholder="مثال: 90" min="0"></div>
    </div>
    <div class="two-col">
      <div class="form-group"><label>آخر قراءة عداد عند الصيانة (كم)</label><input type="number" id="mMaintLastKm" placeholder="مثال: 45000" min="0"></div>
      <div class="form-group"><label>تاريخ آخر صيانة</label><input type="date" id="mMaintLastDate"></div>
    </div>
    <div class="two-col">
      <div class="form-group"><label>إنذار قبل (كم)</label><input type="number" id="mMaintAlertKm" value="500" min="0"></div>
      <div class="form-group"><label>إنذار قبل (يوم)</label><input type="number" id="mMaintAlertDay" value="7" min="0"></div>
    </div>
    <div class="form-group"><label>ملاحظات</label><textarea id="mMaintNotes" rows="2" style="width:100%;resize:vertical;padding:.55rem;border:1.5px solid var(--border);border-radius:10px;font-family:inherit;font-size:.88rem"></textarea></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">إلغاء</button>
      <button class="btn btn-primary" id="mMaintSave">💾 حفظ</button>
    </div>`);

  document.getElementById('mMaintSave').onclick = async () => {
    const car_id = parseInt(document.getElementById('mMaintCar').value);
    const maintenance_type = document.getElementById('mMaintType').value;
    const interval_km  = parseFloat(document.getElementById('mMaintKmInt').value)||null;
    const interval_days= parseInt(document.getElementById('mMaintDayInt').value)||null;
    if(!car_id) return showNotification('اختر المركبة','error');
    if(!maintenance_type) return showNotification('اختر نوع الصيانة','error');
    if(!interval_km && !interval_days) return showNotification('حدد الفاصل الزمني (كم أو يوم)','error');
    const body = {
      car_id, maintenance_type, interval_km, interval_days,
      last_done_km:    parseFloat(document.getElementById('mMaintLastKm').value)||null,
      last_done_date:  document.getElementById('mMaintLastDate').value||null,
      alert_km_before: parseFloat(document.getElementById('mMaintAlertKm').value)||500,
      alert_days_before:parseInt(document.getElementById('mMaintAlertDay').value)||7,
      notes:           document.getElementById('mMaintNotes').value.trim(),
    };
    const btn = document.getElementById('mMaintSave');
    btn.disabled=true; btn.textContent='جاري...';
    try {
      await apiCall('/maintenance/schedule','POST',body);
      showNotification('✅ تم إضافة جدول الصيانة','success');
      closeModal(); await renderMaintenanceSection();
    } catch(e) { showNotification(e.message,'error'); btn.disabled=false; btn.textContent='💾 حفظ'; }
  };
}

function openMaintenanceDoneModal(id, plate, type) {
  openModal(`
    <div class="modal-header"><div class="modal-title">✅ تسجيل إتمام الصيانة</div><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div style="background:#f0fdf4;border:1px solid #6ee7b7;border-radius:10px;padding:.8rem;margin-bottom:1rem;font-size:.88rem">
      <strong>${plate}</strong> — ${type}
    </div>
    <div class="two-col">
      <div class="form-group"><label>قراءة العداد الآن (كم) <span class="req">*</span></label><input type="number" id="doneKm" placeholder="مثال: 50000" min="0"></div>
      <div class="form-group"><label>تاريخ الصيانة <span class="req">*</span></label><input type="date" id="doneDate" value="${new Date().toISOString().split('T')[0]}"></div>
    </div>
    <div class="form-group"><label>ملاحظات</label><textarea id="doneNotes" rows="2" style="width:100%;resize:vertical;padding:.55rem;border:1.5px solid var(--border);border-radius:10px;font-family:inherit;font-size:.88rem"></textarea></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">إلغاء</button>
      <button class="btn btn-primary" id="doneSave">✅ تأكيد الصيانة</button>
    </div>`);

  document.getElementById('doneSave').onclick = async () => {
    const last_done_km   = parseFloat(document.getElementById('doneKm').value)||null;
    const last_done_date = document.getElementById('doneDate').value||null;
    const notes          = document.getElementById('doneNotes').value.trim();
    if(!last_done_km) return showNotification('أدخل قراءة العداد','error');
    if(!last_done_date) return showNotification('أدخل تاريخ الصيانة','error');
    const btn = document.getElementById('doneSave');
    btn.disabled=true; btn.textContent='جاري...';
    try {
      await apiCall(`/maintenance/schedule/${id}`,'PUT',{last_done_km, last_done_date, notes});
      showNotification('✅ تم تسجيل الصيانة','success');
      closeModal(); await renderMaintenanceSection();
    } catch(e) { showNotification(e.message,'error'); btn.disabled=false; btn.textContent='✅ تأكيد'; }
  };
}

async function deleteMaintenanceRecord(id) {
  if(!confirm('هل تريد حذف هذا الجدول؟')) return;
  try {
    await apiCall(`/maintenance/schedule/${id}`,'DELETE');
    showNotification('تم الحذف','success');
    await renderMaintenanceSection();
  } catch(e) { showNotification(e.message,'error'); }
}

// ═══════════════════════════════════════════════════════════════
// FEATURE 2: ATTENDANCE REPORT — الحضور والانصراف
// ═══════════════════════════════════════════════════════════════
async function renderAttendanceReport() {
  const c = document.getElementById('pageContent');
  const now = new Date();
  const defaultMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;

  c.innerHTML = `
    <div class="card">
      <div class="card-header"><div class="card-title">📅 تقرير الحضور والانصراف</div></div>
      <div class="srch-bar" style="border-radius:0">
        <div style="display:flex;align-items:center;gap:.5rem">
          <label style="font-size:.82rem;color:var(--muted);white-space:nowrap">الشهر:</label>
          <input type="month" id="attMonth" value="${defaultMonth}" style="padding:.42rem .75rem;border:1.5px solid var(--border);border-radius:9px;font-family:inherit;font-size:.85rem">
        </div>
        <button class="btn btn-primary btn-sm" onclick="loadAttendanceReport()">🔍 عرض التقرير</button>
        <button class="btn btn-outline btn-sm" onclick="exportAttendanceCSV()">⬇️ تصدير CSV</button>
        <span class="srch-count" id="attCount"></span>
      </div>
      <div id="attContent" style="padding:1rem">
        <div class="empty-state"><div class="empty-icon">📅</div><p>اختر الشهر وانقر "عرض التقرير"</p></div>
      </div>
    </div>`;

  await loadAttendanceReport();
}

async function loadAttendanceReport() {
  const month = document.getElementById('attMonth')?.value;
  if(!month) return;
  const el = document.getElementById('attContent');
  el.innerHTML = '<div class="empty-state"><div class="empty-icon">⏳</div><p>جاري التحميل...</p></div>';

  try {
    const data = await apiCall(`/reports/attendance?month=${month}`);
    window._attData = data;
    const drivers = data.drivers || [];
    document.getElementById('attCount').textContent = `${drivers.length} سائق`;

    if(!drivers.length) {
      el.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>لا توجد رحلات في هذا الشهر</p></div>';
      return;
    }

    const totalDays   = drivers.reduce((s,d)=>s+d.work_days,0);
    const totalTrips  = drivers.reduce((s,d)=>s+d.total_trips,0);
    const totalKm     = drivers.reduce((s,d)=>s+d.total_km,0);

    el.innerHTML = `
      <div class="stats-row" style="margin-bottom:1rem">
        <div class="stat-card"><div class="stat-icon">👨‍✈️</div><div class="stat-value">${drivers.length}</div><div class="stat-label">سائق نشط</div></div>
        <div class="stat-card"><div class="stat-icon">📆</div><div class="stat-value">${totalDays}</div><div class="stat-label">إجمالي أيام العمل</div></div>
        <div class="stat-card"><div class="stat-icon">🗺️</div><div class="stat-value">${totalTrips}</div><div class="stat-label">إجمالي الرحلات</div></div>
        <div class="stat-card"><div class="stat-icon">📍</div><div class="stat-value">${Math.round(totalKm).toLocaleString('ar-EG')}</div><div class="stat-label">إجمالي كم</div></div>
      </div>
      <div class="table-wrap">
        <table><thead><tr>
          <th>السائق</th><th>الرقم الثابت</th><th>الفرع</th>
          <th>أيام العمل</th><th>عدد الرحلات</th><th>إجمالي كم</th>
          <th>متوسط كم/يوم</th><th>تفاصيل</th>
        </tr></thead><tbody>
        ${drivers.map(d=>`<tr>
          <td><strong>${d.driver_name}</strong></td>
          <td><code>${d.fixed_number||'—'}</code></td>
          <td style="font-size:.8rem">${d.branch||'—'}</td>
          <td><strong>${d.work_days}</strong> يوم</td>
          <td>${d.total_trips}</td>
          <td>${Math.round(d.total_km).toLocaleString('ar-EG')} كم</td>
          <td>${d.work_days>0?Math.round(d.total_km/d.work_days).toLocaleString('ar-EG'):0} كم</td>
          <td><button class="btn btn-ghost btn-sm" onclick="showAttDetails(${d.driver_id})">📋 التفاصيل</button></td>
        </tr>`).join('')}
        </tbody></table>
      </div>`;
  } catch(e) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">❌</div><p>${e.message}</p></div>`;
  }
}

function showAttDetails(driverId) {
  const data = window._attData;
  if(!data) return;
  const driver = data.drivers.find(d=>d.driver_id===driverId);
  if(!driver) return;
  openModal(`
    <div class="modal-header">
      <div class="modal-title">📋 تفاصيل حضور: ${driver.driver_name} — ${data.month}</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="table-wrap" style="max-height:60vh;overflow-y:auto">
      <table><thead><tr><th>التاريخ</th><th>وقت الحضور</th><th>وقت الانصراف</th><th>عدد الرحلات</th><th>المسافة (كم)</th></tr></thead><tbody>
      ${driver.days.map(d=>`<tr>
        <td><strong>${d.date}</strong></td>
        <td>${d.check_in?fmtDT(d.check_in):'—'}</td>
        <td>${d.check_out?fmtDT(d.check_out):'—'}</td>
        <td>${d.trips_count} (منتهية: ${d.completed})</td>
        <td>${d.km>0?Math.round(d.km).toLocaleString('ar-EG'):'—'}</td>
      </tr>`).join('')}
      </tbody></table>
    </div>
    <div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal()">إغلاق</button></div>`);
}

function exportAttendanceCSV() {
  const data = window._attData;
  if(!data?.drivers?.length) return showNotification('لا توجد بيانات للتصدير','error');
  const rows = [['السائق','الرقم الثابت','الفرع','أيام العمل','عدد الرحلات','إجمالي كم']];
  data.drivers.forEach(d=>{
    rows.push([d.driver_name, d.fixed_number||'', d.branch||'', d.work_days, d.total_trips, Math.round(d.total_km)]);
  });
  const csv = rows.map(r=>r.join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download = `attendance_${data.month}.csv`;
  a.click();
}

// ══════════════════════════════════════════════════════
// SUPER — كشف التلاعب
// ══════════════════════════════════════════════════════
async function renderSuperFraud() {
  const el = document.getElementById('pageContent');
  el.innerHTML = `<div class="card"><div style="text-align:center;padding:2rem;color:var(--muted)">⏳ جاري تحليل البيانات...</div></div>`;
  try {
    const data = await apiCall('/reports/fraud-detection');
    const { summary, odometer_reversed, high_distance, overlapping_driver,
            car_overlap, impossible_speed, excess_fuel, repeated_odometer } = data;

    const riskColor = summary.high_risk>0?'#ef4444': summary.total_alerts>0?'#f59e0b':'#10b981';

    const section = (title, icon, risk, items, renderRow, headers) => {
      if(!items||!items.length) return `
        <div class="card" style="border-right:4px solid #10b981">
          <div style="padding:.75rem 1.25rem;display:flex;align-items:center;gap:.5rem">
            <span>${icon}</span>
            <span style="font-weight:700">${title}</span>
            <span class="badge badge-green" style="margin-right:auto">✅ لا يوجد</span>
          </div>
        </div>`;
      const rColor = risk==='high'?'#ef4444':risk==='medium'?'#f59e0b':'#6366f1';
      return `
        <div class="card" style="border-right:4px solid ${rColor}">
          <div class="card-header">
            <div class="card-title">${icon} ${title}</div>
            <span style="background:${rColor};color:#fff;padding:.2rem .75rem;border-radius:99px;font-size:.82rem;font-weight:700">${items.length} حالة</span>
          </div>
          <div class="table-wrap" style="max-height:280px;overflow-y:auto">
            <table><thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
            <tbody>${items.map(renderRow).join('')}</tbody></table>
          </div>
        </div>`;
    };

    el.innerHTML = `
      <!-- Summary -->
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.5rem">
        <div class="stat-card" style="border-top:3px solid ${riskColor}">
          <div class="stat-icon">🔍</div>
          <div class="stat-value" style="color:${riskColor}">${summary.total_alerts}</div>
          <div class="stat-label">إجمالي التنبيهات</div>
        </div>
        <div class="stat-card" style="border-top:3px solid #ef4444">
          <div class="stat-icon">🚨</div>
          <div class="stat-value" style="color:#ef4444">${summary.high_risk}</div>
          <div class="stat-label">خطر عالٍ</div>
        </div>
        <div class="stat-card" style="border-top:3px solid #f59e0b">
          <div class="stat-icon">⚠️</div>
          <div class="stat-value" style="color:#f59e0b">${summary.medium_risk}</div>
          <div class="stat-label">خطر متوسط</div>
        </div>
        <div class="stat-card" style="border-top:3px solid #6366f1">
          <div class="stat-icon">📋</div>
          <div class="stat-value" style="color:#6366f1">${summary.low_risk}</div>
          <div class="stat-label">يستحق المتابعة</div>
        </div>
      </div>

      ${section('عداد معكوس (نهاية < بداية)','🚨','high', odometer_reversed,
        r=>`<tr style="background:rgba(239,68,68,.06)">
          <td>#${r.id}</td><td><strong>${r.driver_name}</strong></td><td dir="ltr">${r.plate}</td>
          <td style="color:#ef4444"><strong>${r.start_odometer} → ${r.end_odometer}</strong></td>
          <td style="font-size:.8rem">${(r.start_time||'').slice(0,16)}</td></tr>`,
        ['#رحلة','السائق','اللوحة','العداد (بداية → نهاية)','التاريخ'])}

      ${section('رحلات بسرعة مستحيلة (>10كم في أقل من 3 دقائق)','💥','high', impossible_speed,
        r=>`<tr style="background:rgba(239,68,68,.06)">
          <td>#${r.id}</td><td><strong>${r.driver_name}</strong></td><td dir="ltr">${r.plate}</td>
          <td style="color:#ef4444"><strong>${Math.round(r.distance)} كم</strong></td>
          <td><strong>${Math.round(r.minutes)} دقيقة</strong></td></tr>`,
        ['#رحلة','السائق','اللوحة','المسافة','الوقت'])}

      ${section('تداخل مركبة بين سائقين','🔴','high', car_overlap,
        r=>`<tr style="background:rgba(239,68,68,.06)">
          <td dir="ltr"><strong>${r.plate}</strong></td>
          <td>${r.driver1}</td><td>${r.driver2}</td>
          <td style="font-size:.8rem">${(r.start_time||'').slice(0,16)}</td>
          <td style="font-size:.8rem">${(r.start2||'').slice(0,16)}</td></tr>`,
        ['اللوحة','سائق 1','سائق 2','بداية 1','بداية 2'])}

      ${section('تداخل رحلات نفس السائق','⚠️','medium', overlapping_driver,
        r=>`<tr style="background:rgba(245,158,11,.06)">
          <td><strong>${r.driver_name}</strong></td>
          <td style="font-size:.8rem">${(r.start_time||'').slice(0,16)}</td>
          <td style="font-size:.8rem">${(r.end_time||'').slice(0,16)}</td>
          <td style="font-size:.8rem">${(r.start2||'').slice(0,16)}</td></tr>`,
        ['السائق','بداية 1','نهاية 1','بداية 2'])}

      ${section('وقود زائد (+200 لتر/يوم)','⛽','medium', excess_fuel,
        r=>`<tr style="background:rgba(245,158,11,.06)">
          <td dir="ltr"><strong>${r.plate}</strong></td>
          <td>${r.day}</td>
          <td style="color:#f59e0b"><strong>${Math.round(r.total_liters)} لتر</strong></td>
          <td>${r.refills} تعبئة</td></tr>`,
        ['اللوحة','اليوم','إجمالي الوقود','عدد التعبئات'])}

      ${section('طلبات تعديل عداد متكررة (+3 في أسبوع)','🔢','low', repeated_odometer,
        r=>`<tr style="background:rgba(99,102,241,.06)">
          <td><strong>${r.driver_name}</strong></td>
          <td><code>${r.fixed_number}</code></td>
          <td style="color:#6366f1"><strong>${r.requests} طلبات</strong></td>
          <td style="font-size:.8rem">${(r.first_req||'').slice(0,10)}</td></tr>`,
        ['السائق','الرقم الثابت','عدد الطلبات','أول طلب'])}

      ${section('رحلات مسافة عالية (+500 كم)','📍','low', high_distance,
        r=>`<tr>
          <td>#${r.id}</td><td><strong>${r.driver_name}</strong></td>
          <td dir="ltr">${r.plate}</td>
          <td style="color:#6366f1"><strong>${Math.round(r.distance)} كم</strong></td>
          <td style="font-size:.8rem">${(r.start_time||'').slice(0,10)}</td></tr>`,
        ['#رحلة','السائق','اللوحة','المسافة','التاريخ'])}

      <div style="padding:.5rem;text-align:center">
        <button class="btn btn-outline btn-sm" onclick="renderSuperFraud()">🔄 تحديث التحليل</button>
      </div>`;
  } catch(e) {
    el.innerHTML=`<div class="card"><div style="padding:2rem;text-align:center;color:var(--danger)">❌ ${e.message}</div></div>`;
  }
}

// ══════════════════════════════════════════════════════
// SUPER — الرسائل الصوتية
// ══════════════════════════════════════════════════════
async function renderSuperVoice() {
  const el = document.getElementById('pageContent');
  let myNotes = [];
  try { myNotes = await apiCall('/voice-notes'); } catch(e){}

  el.innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem">

      <!-- إرسال رسالة جديدة -->
      <div class="card">
        <div class="card-header"><div class="card-title">🎙️ رسالة صوتية جديدة</div></div>
        <div style="padding:1.25rem;display:flex;flex-direction:column;gap:1rem">

          <div class="form-group" style="margin:0">
            <label>إرسال إلى</label>
            <select id="voiceTarget" class="form-control">
              <option value="admins">👨‍💼 الأدمنز فقط</option>
              <option value="drivers">🚗 السائقين فقط</option>
            </select>
          </div>

          <div class="form-group" style="margin:0">
            <label>مدة الظهور</label>
            <select id="voiceTTL" class="form-control">
              <option value="24">24 ساعة (ثم تُمسح)</option>
              <option value="12">12 ساعة</option>
              <option value="48">48 ساعة</option>
            </select>
          </div>

          <div class="form-group" style="margin:0">
            <label>عدد مرات الاستماع</label>
            <select id="voiceMaxPlays" class="form-control">
              <option value="1">مرة واحدة فقط</option>
              <option value="2" selected>مرتان</option>
              <option value="3">3 مرات</option>
            </select>
          </div>

          <!-- مؤشر التسجيل -->
          <div id="voiceRecorderUI" style="border:2px dashed #e2e8f0;border-radius:14px;padding:1.5rem;text-align:center">
            <div id="voiceRecStatus" style="color:var(--muted);font-size:.9rem;margin-bottom:.75rem">اضغط للتسجيل</div>
            <div id="voiceTimer" style="font-size:2rem;font-weight:900;color:#1e3a5f;display:none">0:00</div>
            <div style="display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap;margin-top:.5rem">
              <button class="btn btn-danger" id="voiceStartBtn" onclick="startVoiceRec()">🔴 بدء التسجيل</button>
              <button class="btn btn-outline" id="voiceStopBtn" onclick="stopVoiceRec()" disabled>⏹ إيقاف</button>
            </div>
            <audio id="voicePreview" controls style="display:none;margin-top:1rem;width:100%;border-radius:8px"></audio>
          </div>

          <button class="btn btn-primary" id="voiceSendBtn" onclick="sendVoiceNote()" disabled style="width:100%">
            📤 إرسال الرسالة
          </button>
        </div>
      </div>

      <!-- رسائلي المرسلة -->
      <div class="card">
        <div class="card-header">
          <div class="card-title">📬 رسائلي المرسلة</div>
          <button class="btn btn-ghost btn-sm" onclick="renderSuperVoice()">🔄</button>
        </div>
        <div style="padding:1.25rem;display:flex;flex-direction:column;gap:.75rem;max-height:500px;overflow-y:auto">
          ${myNotes.length===0 ? '<div style="text-align:center;color:var(--muted);padding:2rem">لا توجد رسائل مرسلة</div>' :
            myNotes.map(n=>{
              const isExp = new Date(n.expires_at) < new Date();
              const toLabel = n.target_group==='admins'?'👨‍💼 أدمنز':'🚗 سائقين';
              const playsLeft = n.max_plays - n.play_count;
              return `<div style="border:1.5px solid ${isExp||n.is_deleted?'#fca5a5':'#e2e8f0'};border-radius:12px;padding:.9rem">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem">
                  <span style="font-weight:700;font-size:.88rem">${toLabel}</span>
                  <span style="font-size:.75rem;color:${isExp||n.is_deleted?'#ef4444':'#64748b'}">${isExp||n.is_deleted?'⛔ منتهية':playsLeft+' استماع متبقي'}</span>
                </div>
                <div style="font-size:.75rem;color:var(--muted)">${(n.created_at||'').slice(0,16)} — تنتهي ${(n.expires_at||'').slice(0,16)}</div>
                ${!isExp&&!n.is_deleted?`<button class="btn btn-danger btn-sm" style="margin-top:.5rem;width:100%" onclick="deleteVoiceNote(${n.id})">🗑️ مسح الآن</button>`:''}
              </div>`;
            }).join('')}
        </div>
      </div>
    </div>`;

  // ── recorder state ──
  let mediaRecorder = null, audioChunks = [], timerInterval = null, audioBlob = null;
  let seconds = 0;

  window.startVoiceRec = async function() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({audio:true});
      mediaRecorder = new MediaRecorder(stream);
      audioChunks = []; seconds = 0;
      mediaRecorder.ondataavailable = e => { if(e.data.size>0) audioChunks.push(e.data); };
      mediaRecorder.onstop = () => {
        audioBlob = new Blob(audioChunks, {type:'audio/webm'});
        const url = URL.createObjectURL(audioBlob);
        const prev = document.getElementById('voicePreview');
        prev.src = url; prev.style.display='block';
        document.getElementById('voiceSendBtn').disabled = false;
        document.getElementById('voiceRecStatus').textContent = '✅ جاهز للإرسال';
        clearInterval(timerInterval);
      };
      mediaRecorder.start();
      document.getElementById('voiceStartBtn').disabled=true;
      document.getElementById('voiceStopBtn').disabled=false;
      document.getElementById('voiceTimer').style.display='block';
      document.getElementById('voiceRecStatus').textContent='🔴 جاري التسجيل...';
      timerInterval = setInterval(()=>{
        seconds++;
        const m=Math.floor(seconds/60), s=seconds%60;
        document.getElementById('voiceTimer').textContent=`${m}:${String(s).padStart(2,'0')}`;
        if(seconds>=120){ stopVoiceRec(); showNotification('وصلت للحد الأقصى (دقيقتان)','error'); }
      },1000);
    } catch(e) { showNotification('تعذّر الوصول للمايك: '+e.message,'error'); }
  };

  window.stopVoiceRec = function() {
    if(mediaRecorder&&mediaRecorder.state==='recording') mediaRecorder.stop();
    document.getElementById('voiceStartBtn').disabled=false;
    document.getElementById('voiceStopBtn').disabled=true;
  };

  window.sendVoiceNote = async function() {
    if(!audioBlob) return showNotification('سجّل رسالة أولاً','error');
    const target   = document.getElementById('voiceTarget').value;
    const ttl      = parseInt(document.getElementById('voiceTTL').value);
    const maxPlays = parseInt(document.getElementById('voiceMaxPlays').value);
    const btn = document.getElementById('voiceSendBtn');
    btn.disabled=true; btn.textContent='⏳ جاري الإرسال...';
    const reader = new FileReader();
    reader.onload = async (e) => {
      const b64 = e.target.result.split(',')[1];
      try {
        await apiCall('/voice-notes','POST',{
          target_group:target, audio_data:b64,
          duration_sec:seconds, max_plays:maxPlays, hours_ttl:ttl
        });
        showNotification('✅ تم إرسال الرسالة الصوتية','success');
        await renderSuperVoice();
      } catch(err) { showNotification(err.message,'error'); btn.disabled=false; btn.textContent='📤 إرسال الرسالة'; }
    };
    reader.readAsDataURL(audioBlob);
  };

  window.deleteVoiceNote = async function(id) {
    if(!confirm('مسح الرسالة الصوتية؟')) return;
    try { await apiCall(`/voice-notes/${id}`,'DELETE'); await renderSuperVoice(); }
    catch(e) { showNotification(e.message,'error'); }
  };
}

// ── رسائل صوتية عند الأدمن والسائق ──
async function checkAndShowVoiceNotes() {
  if(!currentUser) return;
  const role = currentUser.role;
  if(!['admin','driver','reporter','supervisor_workshop','supervisor_field'].includes(role)) return;
  try {
    const notes = await apiCall('/voice-notes');
    if(!notes||!notes.length) return;
    // اعرض أول رسالة غير مسموعة
    const note = notes[0];
    showVoiceNotePopup(note);
  } catch(e) {}
}

function showVoiceNotePopup(note) {
  const existing = document.getElementById('voiceNotePopup');
  if(existing) existing.remove();
  const div = document.createElement('div');
  div.id = 'voiceNotePopup';
  div.style.cssText = `position:fixed;bottom:1.5rem;left:1.5rem;z-index:9999;
    background:#1e3a5f;color:#fff;border-radius:16px;padding:1.25rem 1.5rem;
    box-shadow:0 8px 32px rgba(0,0,0,.3);max-width:340px;animation:slideInLeft .3s ease`;
  div.innerHTML = `
    <div style="display:flex;align-items:center;gap:.75rem;margin-bottom:.75rem">
      <span style="font-size:1.5rem">🎙️</span>
      <div>
        <div style="font-weight:800;font-size:.95rem">رسالة من الإدارة</div>
        <div style="font-size:.72rem;opacity:.7">${(note.created_at||'').slice(0,16)}</div>
      </div>
      <button onclick="document.getElementById('voiceNotePopup').remove()"
              style="margin-right:auto;background:rgba(255,255,255,.15);border:none;
                     color:#fff;border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:1rem">✕</button>
    </div>
    <audio id="vn_audio_${note.id}" src="data:audio/webm;base64,${note.audio_data}"
           style="width:100%;border-radius:8px" controls></audio>
    <div style="font-size:.72rem;opacity:.7;margin-top:.5rem;text-align:center">
      متبقي ${note.max_plays-note.play_count} استماع — تنتهي ${(note.expires_at||'').slice(0,16)}
    </div>`;
  document.body.appendChild(div);
  // سجّل التشغيل عند الضغط play
  const audio = div.querySelector('audio');
  audio.addEventListener('play', async () => {
    try { await apiCall(`/voice-notes/${note.id}/play`,'POST'); } catch(e){}
  }, {once:true});
}

// ── Poll maintenance alerts ──
async function pollMaintenanceAlerts() {
  if(!isSuperuser() && !isAdminLike()) return;
  try {
    const alerts = await apiCall('/maintenance/alerts').catch(()=>[]);
    window._maintenanceAlertCount = alerts.length;
    renderNav(buildAdminNav());
  } catch(e) {}
}
</script>

<script>
// ═══════════════════════════════════════════════════════════════
// MONTHLY REPORT — التقرير الشهري الشامل
// ═══════════════════════════════════════════════════════════════
async function renderMonthlyReport() {
  const c = document.getElementById('pageContent');
  const now = new Date();
  const defaultMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;

  // جيب قائمة الفروع
  const branches = isSuperuser() ? await loadBranches() : [];

  const branchSelectHtml = isSuperuser() ? `
    <select id="mrBranch" style="padding:.42rem .75rem;border:1.5px solid var(--border);border-radius:9px;font-family:inherit;font-size:.85rem;min-width:200px">
      <option value="">🌐 كل الفروع</option>
      ${branches.map(b=>`<option value="${b}">${b}</option>`).join('')}
    </select>` : `<span style="font-size:.88rem;color:var(--muted);font-weight:600">${currentUser?.branch||'فرعك'}</span>`;

  c.innerHTML = `
    <div class="card">
      <div class="card-header">
        <div class="card-title">📄 التقرير الشهري الشامل</div>
        <div style="display:flex;gap:.5rem;flex-wrap:wrap">
          <button class="btn btn-outline btn-sm" onclick="printMonthlyReport()">🖨️ طباعة / PDF</button>
          <button class="btn btn-outline btn-sm" onclick="exportMonthlyCSV()">⬇️ CSV</button>
        </div>
      </div>
      <div class="srch-bar" style="border-radius:0;gap:.6rem;flex-wrap:wrap">
        <div style="display:flex;align-items:center;gap:.4rem">
          <label style="font-size:.82rem;color:var(--muted);white-space:nowrap">الشهر:</label>
          <input type="month" id="mrMonth" value="${defaultMonth}"
            style="padding:.42rem .75rem;border:1.5px solid var(--border);border-radius:9px;font-family:inherit;font-size:.85rem">
        </div>
        ${branchSelectHtml}
        <button class="btn btn-primary btn-sm" onclick="loadMonthlyReport()">📊 إنشاء التقرير</button>
        <span class="srch-count" id="mrStatus"></span>
      </div>
      <div id="mrContent" style="padding:1rem">
        <div class="empty-state"><div class="empty-icon">📄</div><p>اختر الشهر والفرع ثم انقر "إنشاء التقرير"</p></div>
      </div>
    </div>`;

  await loadMonthlyReport();
}

async function loadMonthlyReport() {
  const month  = document.getElementById('mrMonth')?.value;
  const branch = document.getElementById('mrBranch')?.value || '';
  if(!month) return;

  const el = document.getElementById('mrContent');
  document.getElementById('mrStatus').textContent = 'جاري التحميل...';
  el.innerHTML = '<div class="empty-state"><div class="empty-icon">⏳</div><p>جاري إعداد التقرير...</p></div>';

  try {
    const url = `/reports/monthly?month=${month}${branch?'&branch='+encodeURIComponent(branch):''}`;
    const data = await apiCall(url);
    window._mrData = data;
    const s = data.summary;
    document.getElementById('mrStatus').textContent =
      `${data.branch} — ${data.month}`;

    const [yr, mo] = month.split('-');
    const monthName = new Date(yr, mo-1, 1).toLocaleDateString('ar-EG',{month:'long',year:'numeric'});

    el.innerHTML = `
      <div id="mrPrintArea">
        <div style="text-align:center;padding:1rem 0;border-bottom:2px solid var(--border);margin-bottom:1.2rem">
          <div style="font-size:1.3rem;font-weight:700">إدارة الأسطول — تقرير شهري</div>
          <div style="font-size:.95rem;color:var(--muted);margin-top:.3rem">${monthName} | الفرع: ${data.branch}</div>
          <div style="font-size:.75rem;color:var(--muted);margin-top:.2rem">صدر بتاريخ: ${fmtDT(data.generated_at)}</div>
        </div>

        <!-- إجمالي الشهر -->
        <div style="margin-bottom:1.2rem">
          <div style="font-weight:700;font-size:.95rem;margin-bottom:.6rem;border-right:3px solid var(--primary);padding-right:.6rem">📊 ملخص الشهر</div>
          <div class="stats-row">
            <div class="stat-card"><div class="stat-icon">👨‍✈️</div><div class="stat-value">${s.total_drivers}</div><div class="stat-label">سائق</div></div>
            <div class="stat-card"><div class="stat-icon">🚙</div><div class="stat-value">${s.total_cars}</div><div class="stat-label">مركبة</div></div>
            <div class="stat-card"><div class="stat-icon">🗺️</div><div class="stat-value">${s.total_trips}</div><div class="stat-label">رحلة</div></div>
            <div class="stat-card"><div class="stat-icon">📍</div><div class="stat-value">${Math.round(s.total_km).toLocaleString('ar-EG')}</div><div class="stat-label">كم إجمالي</div></div>
            <div class="stat-card"><div class="stat-icon">⛽</div><div class="stat-value">${Math.round(s.total_fuel_cost).toLocaleString('ar-EG')}</div><div class="stat-label">تكلفة وقود (جنيه)</div></div>
            <div class="stat-card"><div class="stat-icon">🔧</div><div class="stat-value">${Math.round(s.total_maint_cost).toLocaleString('ar-EG')}</div><div class="stat-label">تكلفة صيانة (جنيه)</div></div>

function exportMonthlyCSV() {
  const d = window._mrData;
  if(!d) return showNotification('أنشئ التقرير أولاً','error');
  let csv = `التقرير الشهري - ${d.month} - ${d.branch}\n\n`;
  csv += 'إجمالي الرحلات,إجمالي كم,تكلفة وقود,تكلفة صيانة,الإجمالي\n';
  csv += `${d.summary.total_trips},${Math.round(d.summary.total_km)},${Math.round(d.summary.total_fuel_cost)},${Math.round(d.summary.total_maint_cost)},${Math.round(d.summary.total_cost)}\n\n`;
  csv += 'السائقون\nالاسم,الرقم الثابت,الفرع,الرحلات,مكتملة,الكيلومترات\n';
  d.drivers.forEach(dr=>{ csv+=`${dr.name},${dr.fixed_number||''},${dr.branch||''},${dr.trips},${dr.completed},${Math.round(dr.km)}\n`; });
  csv += '\nالمركبات\nاللوحة,الموديل,الفرع,وقود لتر,تكلفة وقود,تكلفة صيانة,الإجمالي\n';
  d.cars.forEach(c=>{ csv+=`${c.plate},${c.model},${c.branch||''},${c.fuel_liters},${Math.round(c.fuel_cost)},${Math.round(c.maint_cost)},${Math.round(c.total_cost)}\n`; });
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download = `monthly_report_${d.month}${d.branch&&d.branch!=='كل الفروع'?'_'+d.branch:''}.csv`;
  a.click();
}

// SUPERVISORS MANAGEMENT — إدارة المشرفين (سوبر يوزر فقط)
// ═══════════════════════════════════════════════════════════════
async function renderSuperSupervisors() {
  const c = document.getElementById('pageContent');
  c.innerHTML = '<div class="empty-state"><div class="empty-icon">⏳</div><p>جاري التحميل...</p></div>';

  // جيب كل المستخدمين ذوي صلاحيات مشرف
  const users = await apiCall('/users/list').catch(()=>[]);
  const branches = await loadBranches();
  const supervisors = users.filter(u=>u.role==='supervisor_workshop'||u.role==='supervisor_field');

  const ROLE_LABELS = {
    supervisor_workshop: {label:'🔧 مشرف ورشة', color:'#7c3aed', bg:'#ede9fe',
      desc:'يرى: الورش + المركبات + الصيانة'},
    supervisor_field:    {label:'🗺️ مشرف ميدان', color:'#0369a1', bg:'#e0f2fe',
      desc:'يرى: الرحلات + الخريطة + الطوارئ + السائقون'},
  };

  const branchOpts = branches.map(b=>`<option value="${b}">${b}</option>`).join('');

  c.innerHTML = `
    <div class="card">
      <div class="card-header">
        <div class="card-title">🎯 إدارة المشرفين (${supervisors.length})</div>
        <button class="btn btn-primary btn-sm" onclick="openAddSupervisorModal('${branchOpts.replace(/'/g,"\\'")}')">➕ إضافة مشرف</button>
      </div>

      <!-- شرح الصلاحيات -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;padding:1rem 1.2rem;border-bottom:1px solid var(--border)">
        ${Object.entries(ROLE_LABELS).map(([role,info])=>`
          <div style="background:${info.bg};border-radius:10px;padding:.8rem 1rem">
            <div style="font-weight:700;color:${info.color};margin-bottom:.3rem">${info.label}</div>
            <div style="font-size:.8rem;color:var(--muted)">${info.desc}</div>
          </div>`).join('')}
      </div>

      <!-- جدول المشرفين -->
      <div class="table-wrap">
        <table><thead><tr>
          <th>#</th><th>اسم المستخدم</th><th>النوع</th><th>الفرع</th><th>آخر دخول</th><th>إجراءات</th>
        </tr></thead><tbody>
        ${supervisors.map((u,i)=>{
          const info = ROLE_LABELS[u.role]||{};
          return `<tr>
            <td>${i+1}</td>
            <td><strong>${u.username}</strong></td>
            <td><span style="background:${info.bg||'#f1f5f9'};color:${info.color||'#475569'};border-radius:20px;font-size:.72rem;font-weight:700;padding:.15rem .55rem">${info.label||u.role}</span></td>
            <td>${u.branch||'—'}</td>
            <td style="font-size:.78rem;color:var(--muted)">${u.last_login?fmtDT(u.last_login):'لم يدخل'}</td>
            <td>
              <button class="btn btn-ghost btn-sm" onclick="openEditSupervisorModal(${u.id},'${u.username.replace(/'/g,"\\'")}','${u.role}','${(u.branch||'').replace(/'/g,"\\'")}','${branchOpts.replace(/'/g,"\\'")}')">✏️ تعديل</button>
              <button class="btn btn-danger btn-sm" onclick="deleteSupervisor(${u.id},'${u.username.replace(/'/g,"\\'")}')">🗑️</button>
            </td>
          </tr>`;
        }).join('')}
        ${!supervisors.length?'<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:1.5rem">لا يوجد مشرفون — انقر ➕ لإضافة أول مشرف</td></tr>':''}
        </tbody></table>
      </div>
    </div>`;
}

function openAddSupervisorModal(branchOpts) {
  openModal(`
    <div class="modal-header"><div class="modal-title">➕ إضافة مشرف جديد</div><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="form-group">
      <label>نوع الصلاحية <span class="req">*</span></label>
      <select id="svRole" style="width:100%;padding:.6rem;border:1.5px solid var(--border);border-radius:10px;font-family:inherit">
        <option value="">— اختر النوع —</option>
        <option value="supervisor_workshop">🔧 مشرف ورشة (الورش + المركبات + الصيانة)</option>
        <option value="supervisor_field">🗺️ مشرف ميدان (الرحلات + الخريطة + الطوارئ)</option>
      </select>
    </div>
    <div class="form-group">
      <label>الفرع / الإدارة <span class="req">*</span></label>
      <select id="svBranch" style="width:100%;padding:.6rem;border:1.5px solid var(--border);border-radius:10px;font-family:inherit">
        <option value="">— اختر الفرع —</option>
        ${branchOpts}
      </select>
    </div>
    <div class="two-col">
      <div class="form-group"><label>اسم المستخدم <span class="req">*</span></label><input id="svUser" placeholder="مثال: supervisor_cairo"></div>
      <div class="form-group"><label>كلمة المرور <span class="req">*</span></label><input id="svPass" type="password" placeholder="كلمة مرور قوية"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">إلغاء</button>
      <button class="btn btn-primary" id="svSave">✅ إنشاء المشرف</button>
    </div>`);

  document.getElementById('svSave').onclick = async () => {
    const role     = document.getElementById('svRole').value;
    const branch   = document.getElementById('svBranch').value;
    const username = document.getElementById('svUser').value.trim();
    const password = document.getElementById('svPass').value;
    if(!role)     return showNotification('اختر نوع الصلاحية','error');
    if(!branch)   return showNotification('اختر الفرع','error');
    if(!username) return showNotification('أدخل اسم المستخدم','error');
    if(password.length<6) return showNotification('كلمة المرور يجب أن تكون 6 أحرف على الأقل','error');
    const btn = document.getElementById('svSave');
    btn.disabled=true; btn.textContent='جاري...';
    try {
      await apiCall('/users','POST',{username, password, role, branch});
      showNotification('✅ تم إنشاء المشرف','success');
      closeModal(); await renderSuperSupervisors();
    } catch(e) { showNotification(e.message,'error'); btn.disabled=false; btn.textContent='✅ إنشاء المشرف'; }
  };
}

function openEditSupervisorModal(uid, oldUser, oldRole, oldBranch, branchOpts) {
  openModal(`
    <div class="modal-header"><div class="modal-title">✏️ تعديل المشرف: ${oldUser}</div><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="form-group">
      <label>نوع الصلاحية</label>
      <select id="svEditRole" style="width:100%;padding:.6rem;border:1.5px solid var(--border);border-radius:10px;font-family:inherit">
        <option value="supervisor_workshop" ${oldRole==='supervisor_workshop'?'selected':''}>🔧 مشرف ورشة</option>
        <option value="supervisor_field"    ${oldRole==='supervisor_field'?'selected':''}>🗺️ مشرف ميدان</option>
      </select>
    </div>
    <div class="form-group">
      <label>الفرع / الإدارة</label>
      <select id="svEditBranch" style="width:100%;padding:.6rem;border:1.5px solid var(--border);border-radius:10px;font-family:inherit">
        <option value="">— اختر الفرع —</option>
        ${branchOpts.replace(`value="${oldBranch}"`,`value="${oldBranch}" selected`)}
      </select>
    </div>
    <div class="two-col">
      <div class="form-group"><label>اسم المستخدم</label><input id="svEditUser" value="${oldUser}"></div>
      <div class="form-group"><label>كلمة مرور جديدة (اتركها فاضية للإبقاء)</label><input id="svEditPass" type="password" placeholder="(اختياري)"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">إلغاء</button>
      <button class="btn btn-primary" id="svEditSave">💾 حفظ التعديلات</button>
    </div>`);

  document.getElementById('svEditSave').onclick = async () => {
    const body = {
      role:     document.getElementById('svEditRole').value,
      branch:   document.getElementById('svEditBranch').value,
      username: document.getElementById('svEditUser').value.trim(),
    };
    const pw = document.getElementById('svEditPass').value;
    if(pw) body.password = pw;
    const btn = document.getElementById('svEditSave');
    btn.disabled=true; btn.textContent='جاري...';
    try {
      await apiCall(`/superuser/admins/${uid}`,'PUT',body);
      showNotification('✅ تم التحديث','success');
      closeModal(); await renderSuperSupervisors();
    } catch(e) { showNotification(e.message,'error'); btn.disabled=false; btn.textContent='💾 حفظ'; }
  };
}

async function deleteSupervisor(uid, name) {
  if(!confirm(`هل تريد حذف المشرف "${name}"؟`)) return;
  try {
    await apiCall(`/superuser/admins/${uid}`,'DELETE');
    showNotification('تم الحذف','success');
    await renderSuperSupervisors();
  } catch(e) { showNotification(e.message,'error'); }
}
