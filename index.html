<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>نظام إدارة الأسطول v2</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;font-family:'Tajawal',system-ui,sans-serif}
:root{
  --primary:#1a6b58;--primary-light:#2a9d8f;--primary-dark:#0f4a3c;
  --danger:#e63946;--sidebar-bg:#0f2027;--sidebar-width:255px;
  --header-h:64px;--card-radius:16px;--bg:#f0f4f8;
  --white:#fff;--text:#1e293b;--muted:#64748b;--border:#e2e8f0;
  --emergency:#dc2626;--accident:#d97706;
}
body{background:var(--bg);min-height:100vh;overflow-x:hidden;color:var(--text)}


/* ── LOGIN ── */
.login-overlay{position:fixed;inset:0;background:linear-gradient(135deg,#0f2027,#1a6b58 50%,#203a43);display:flex;align-items:center;justify-content:center;z-index:2000}
.login-card{background:rgba(255,255,255,.08);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.15);border-radius:24px;padding:2.8rem 2.4rem;width:90%;max-width:420px;text-align:center;box-shadow:0 40px 80px rgba(0,0,0,.4)}
.login-logo{font-size:2.8rem;margin-bottom:.5rem}
.login-card h2{font-size:1.6rem;color:white;font-weight:700;margin-bottom:.4rem}
.login-card p{color:rgba(255,255,255,.6);font-size:.9rem;margin-bottom:2rem}
.login-card input{width:100%;padding:.85rem 1.2rem;margin-bottom:1rem;border:1.5px solid rgba(255,255,255,.2);border-radius:12px;font-size:1rem;background:rgba(255,255,255,.1);color:white}
.login-card input::placeholder{color:rgba(255,255,255,.4)}
.login-card input:focus{outline:none;border-color:var(--primary-light);background:rgba(255,255,255,.15)}
.login-btn{width:100%;background:var(--primary-light);border:none;padding:.9rem;border-radius:12px;font-weight:700;font-size:1rem;color:white;cursor:pointer;transition:.2s}
.login-btn:hover{background:var(--primary);transform:translateY(-1px)}

/* ── SHELL ── */
#appShell{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar-width);background:var(--sidebar-bg);min-height:100vh;display:flex;flex-direction:column;position:fixed;right:0;top:0;bottom:0;z-index:100;transition:.3s}
.sidebar-header{padding:1.4rem 1.2rem 1rem;border-bottom:1px solid rgba(255,255,255,.07)}
.sidebar-logo{font-size:1.3rem;color:white;font-weight:800;display:flex;align-items:center;gap:.5rem}
.sidebar-subtitle{color:rgba(255,255,255,.35);font-size:.68rem;margin-top:.2rem}
.sidebar-user{padding:1rem 1.2rem;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:.8rem}
.user-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--primary-light),var(--primary));display:flex;align-items:center;justify-content:center;font-size:1rem;color:white;font-weight:700}
.user-name{font-size:.8rem;color:white;font-weight:600}
.user-role{font-size:.68rem;color:rgba(255,255,255,.4);margin-top:1px}
.sidebar-nav{flex:1;padding:.8rem .7rem;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:.75rem;padding:.6rem .9rem;border-radius:10px;cursor:pointer;color:rgba(255,255,255,.55);font-size:.86rem;font-weight:500;transition:.15s;margin-bottom:2px;border:none;background:none;width:100%;text-align:right;position:relative}
.nav-item:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.9)}
.nav-item.active{background:var(--primary);color:white;font-weight:700}
.nav-icon{font-size:1rem;width:20px;text-align:center}
.nav-badge{background:#dc2626;color:white;border-radius:50px;font-size:.65rem;font-weight:700;padding:.1rem .45rem;min-width:18px;text-align:center;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
.sidebar-footer{padding:1rem .7rem;border-top:1px solid rgba(255,255,255,.07)}
.logout-btn-sidebar{display:flex;align-items:center;gap:.75rem;padding:.6rem .9rem;border-radius:10px;cursor:pointer;color:#ef4444;font-size:.86rem;font-weight:600;transition:.15s;background:none;border:none;width:100%;text-align:right}
.logout-btn-sidebar:hover{background:rgba(239,68,68,.1)}
.main-content{margin-right:var(--sidebar-width);flex:1;min-height:100vh;display:flex;flex-direction:column}
.topbar{height:var(--header-h);background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 1.8rem;gap:1rem;position:sticky;top:0;z-index:50;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.topbar-title{font-size:1.15rem;font-weight:700;color:var(--text);flex:1}
.page-content{padding:1.8rem;flex:1}

/* ── CARDS & STATS ── */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:1.2rem;margin-bottom:1.8rem}
.stat-card{background:var(--white);border-radius:var(--card-radius);padding:1.2rem 1.4rem;border:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.04)}
.stat-icon{font-size:1.6rem;margin-bottom:.6rem}
.stat-value{font-size:1.8rem;font-weight:800;color:var(--primary);line-height:1}
.stat-label{font-size:.78rem;color:var(--muted);margin-top:.3rem}
.card{background:var(--white);border-radius:var(--card-radius);border:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.04);padding:1.4rem 1.6rem;margin-bottom:1.4rem}
.card:last-child{margin-bottom:0}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem}
.card-title{font-size:1rem;font-weight:700;color:var(--text);display:flex;align-items:center;gap:.5rem}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:1.4rem;margin-bottom:1.4rem}
@media(max-width:900px){.two-col{grid-template-columns:1fr}}

/* ── FORMS ── */
.form-group{margin-bottom:.9rem}
label{display:block;font-weight:600;margin-bottom:.35rem;font-size:.76rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
label .req{color:#e63946;margin-right:.2rem}
input,select,textarea{width:100%;padding:.65rem 1rem;border:1.5px solid var(--border);border-radius:10px;font-size:.9rem;background:#fafafa;color:var(--text);transition:.15s;font-family:inherit}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--primary-light);background:white;box-shadow:0 0 0 3px rgba(42,157,143,.1)}
input[disabled]{background:#f1f5f9;color:var(--muted);cursor:not-allowed}
textarea{resize:vertical;min-height:70px}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:.4rem;padding:.6rem 1.2rem;border-radius:10px;font-weight:600;font-size:.85rem;cursor:pointer;border:none;transition:.15s;font-family:inherit}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:var(--primary);color:white}
.btn-primary:hover:not(:disabled){background:var(--primary-dark);transform:translateY(-1px)}
.btn-outline{background:transparent;border:1.5px solid var(--primary);color:var(--primary)}
.btn-outline:hover{background:var(--primary);color:white}
.btn-danger{background:var(--danger);color:white}
.btn-danger:hover{background:#c0392b}
.btn-ghost{background:#f1f5f9;color:var(--text);border:none}
.btn-ghost:hover{background:#e2e8f0}
.btn-success{background:#059669;color:white}
.btn-success:hover{background:#047857}
.btn-warning{background:#d97706;color:white}
.btn-sm{padding:.35rem .8rem;font-size:.76rem;border-radius:8px}

/* ── EMERGENCY BUTTONS ── */
.emergency-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.4rem;margin-bottom:1.4rem}
.emergency-btn-card{border-radius:20px;padding:2rem;text-align:center;cursor:pointer;transition:.2s;border:3px solid transparent;position:relative;overflow:hidden}
.emergency-btn-card:hover{transform:translateY(-3px);box-shadow:0 12px 32px rgba(0,0,0,.15)}
.emergency-btn-card.emg{background:linear-gradient(135deg,#dc2626,#b91c1c);color:white}
.emergency-btn-card.acc{background:linear-gradient(135deg,#d97706,#b45309);color:white}
.emg-icon{font-size:3rem;margin-bottom:.8rem;display:block}
.emg-title{font-size:1.3rem;font-weight:800;margin-bottom:.4rem}
.emg-sub{font-size:.85rem;opacity:.85}

/* ── RECORDING UI ── */
.recording-indicator{display:flex;align-items:center;gap:.8rem;background:#fee2e2;border:2px solid #dc2626;border-radius:12px;padding:1rem 1.4rem;margin-bottom:1rem}
.rec-dot{width:14px;height:14px;border-radius:50%;background:#dc2626;animation:blink .8s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.rec-text{font-weight:700;color:#dc2626;font-size:.95rem}
.rec-timer{margin-right:auto;font-weight:700;color:#dc2626;font-family:monospace;font-size:1rem}

/* ── TABLES ── */
.table-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:.85rem;direction:rtl}
th{background:#f8fafc;color:var(--muted);font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:.75rem 1rem;text-align:right;border-bottom:2px solid var(--border)}
td{padding:.75rem 1rem;border-bottom:1px solid var(--border);text-align:right;color:var(--text)}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:#f8fafc}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;gap:.3rem;padding:.25rem .7rem;border-radius:50px;font-size:.72rem;font-weight:700}
.badge-green{background:#d1fae5;color:#065f46}
.badge-red{background:#fee2e2;color:#991b1b}
.badge-blue{background:#dbeafe;color:#1e40af}
.badge-yellow{background:#fef3c7;color:#92400e}
.badge-purple{background:#ede9fe;color:#5b21b6}
.badge-orange{background:#ffedd5;color:#9a3412}
.badge-pink{background:#fce7f3;color:#9d174d}
.badge-emg{background:#fee2e2;color:#991b1b;animation:pulse 2s infinite}
.badge-acc{background:#fef3c7;color:#92400e;animation:pulse 2s infinite}

/* ── NOTIFICATION TOAST ── */
.notification{position:fixed;bottom:20px;left:20px;padding:.8rem 1.4rem;border-radius:12px;z-index:4000;font-size:.88rem;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.2);animation:slideUp .3s ease;max-width:360px}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.notification.success{background:#065f46;color:white}
.notification.error{background:#991b1b;color:white}
.notification.info{background:#1e40af;color:white}
.notification.emergency{background:#dc2626;color:white;font-size:.95rem;border:2px solid #fca5a5}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:600;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--white);border-radius:20px;padding:2rem;width:90%;max-width:580px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);animation:slideUp .25s}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.4rem}
.modal-title{font-size:1.1rem;font-weight:800;color:var(--text)}
.modal-close{background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--muted);padding:.3rem;border-radius:8px}
.modal-close:hover{background:#f1f5f9;color:var(--text)}
.modal-footer{display:flex;gap:.8rem;justify-content:flex-end;margin-top:1.4rem;padding-top:1rem;border-top:1px solid var(--border)}

/* ── WORKSHOP ── */
.workshop-items{display:grid;grid-template-columns:repeat(3,1fr);gap:.9rem;margin-bottom:1.4rem}
.workshop-item{background:var(--white);border:2px solid var(--border);border-radius:14px;padding:1rem;text-align:center;cursor:pointer;transition:.2s}
.workshop-item:hover{border-color:var(--primary-light);transform:translateY(-2px)}
.workshop-item.selected{border-color:var(--primary);background:#f0fdf9}
.workshop-item-icon{font-size:1.8rem;margin-bottom:.4rem}
.workshop-item-label{font-size:.85rem;font-weight:700}

/* ── DRIVER HERO ── */
.driver-hero{background:linear-gradient(135deg,var(--primary-dark),var(--primary));border-radius:var(--card-radius);color:white;padding:1.4rem 1.8rem;margin-bottom:1.4rem;display:flex;align-items:center;gap:1.2rem}
.driver-hero-icon{font-size:2.2rem}
.driver-hero h2{font-size:1.2rem;font-weight:800}
.driver-hero p{font-size:.82rem;opacity:.75;margin-top:.2rem}

/* ── MAP ── */
#fleetMap{height:500px;border-radius:12px;border:1px solid var(--border)}
.map-legend{display:flex;gap:1.4rem;flex-wrap:wrap;margin-top:.8rem;font-size:.8rem;color:var(--muted)}
.map-legend span{display:flex;align-items:center;gap:.35rem}
.legend-dot{width:12px;height:12px;border-radius:50%;display:inline-block}

/* ── EMPTY ── */
.empty-state{text-align:center;padding:3rem 1rem;color:var(--muted)}
.empty-state .empty-icon{font-size:2.5rem;margin-bottom:.8rem}

.location-hint{font-size:.72rem;color:var(--muted);margin-top:.3rem}
.location-hint.maps-only{color:#d97706;font-weight:600}
/* ── GPS PICKER ── */
.gps-picker{border:2px dashed var(--border);border-radius:12px;padding:.9rem 1rem;background:#f8fafc;transition:.25s}
.gps-picker.gps-ok{border:2px solid #10b981;background:#f0fdf9}
.gps-picker.gps-err{border:2px solid #dc2626;background:#fff5f5}
.gps-capture-btn{width:100%;padding:.75rem 1rem;border:none;border-radius:10px;font-family:inherit;font-size:.92rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.6rem;transition:.2s;color:white;background:linear-gradient(135deg,#1e40af,#3b82f6)}
.gps-capture-btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 14px rgba(59,130,246,.35)}
.gps-capture-btn:disabled{opacity:.65;cursor:not-allowed;transform:none}
.gps-capture-btn.gps-btn-ok{background:linear-gradient(135deg,#065f46,#10b981)}
.gps-capture-btn.gps-btn-spin{background:linear-gradient(135deg,#92400e,#d97706)}
.gps-result{margin-top:.55rem;font-size:.78rem;display:flex;align-items:center;gap:.4rem}
.gps-result.ok{color:#065f46;font-weight:600}
.gps-result.err{color:#dc2626;font-weight:600}
.gps-coords{font-family:monospace;color:var(--muted);font-size:.72rem;margin-top:.2rem;direction:ltr;text-align:left}
.location-link{color:var(--primary-light);text-decoration:none;font-size:.8rem}
.location-link:hover{text-decoration:underline}
code{font-size:.8rem;background:#f1f5f9;padding:.1rem .5rem;border-radius:6px;font-family:monospace}
.filters-bar{display:flex;gap:.8rem;flex-wrap:wrap;margin-bottom:1rem}
.filters-bar select,.filters-bar input{flex:1;min-width:140px;padding:.5rem .9rem;font-size:.84rem}

/* ── AUDIO PLAYER ── */
.audio-player-wrap audio{width:100%;height:36px;border-radius:8px}
.report-row-emg{background:#fff5f5!important}
.report-row-acc{background:#fffbeb!important}

/* ── MOBILE ── */
.sidebar-toggle{display:none}
@media(max-width:900px){
  /* Sidebar */
  .sidebar{transform:translateX(100%)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-toggle{display:flex}

  /* Layout */
  .main-content{margin-right:0;min-width:0;width:100%}
  .page-content{padding:.8rem;overflow-x:hidden}
  #appShell{overflow-x:hidden}

  /* Tables — scroll horizontally inside their box */
  .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;max-width:calc(100vw - 1.6rem)}
  table{min-width:600px}
  th,td{padding:.5rem .6rem;font-size:.75rem;white-space:nowrap}

  /* Cards & grids */
  .two-col{grid-template-columns:1fr}
  .stats-row{grid-template-columns:1fr 1fr}
  .stat-card{padding:.9rem 1rem}
  .stat-value{font-size:1.4rem}
  .workshop-items{grid-template-columns:repeat(2,1fr)}
  .emergency-grid{grid-template-columns:1fr}

  /* Topbar */
  .topbar{padding:0 .8rem}
  .topbar-title{font-size:1rem}

  /* Buttons in header */
  .card-header{flex-wrap:wrap;gap:.4rem}
  .card-header .btn{font-size:.72rem;padding:.35rem .65rem}

  /* Modal */
  .modal-box{width:95vw;max-height:90vh;overflow-y:auto}
}

@media(max-width:480px){
  .stats-row{grid-template-columns:1fr 1fr}
  th,td{padding:.4rem .5rem;font-size:.72rem}
  .btn{font-size:.8rem}
  .page-content{padding:.6rem}
}
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99;display:none}
.sidebar-overlay.show{display:block}

/* ════════════════════════════════════════
   DRIVER PAGE — Clean apسيطلp-like, responsive
   ════════════════════════════════════════ */

/* Hide admin elements */
body.driver-mode .sidebar,
body.driver-mode #sidebarOverlay,
body.driver-mode .topbar { display:none !important; }
body.driver-mode #appShell { display:block !important; }
body.driver-mode .main-content { margin-right:0 !important; }
body.driver-mode { background:#f5f5f5; }

/* Full-width page wrapper */
.dp-wrap {
  width:100%;
  min-height:100vh;
  max-width:640px;
  margin:0 auto;
  padding:0 0 40px;
  display:flex;
  flex-direction:column;
}

/* ── TOP SECTION: greeting + date + car ── */
.dp-top {
  background:#fff;
  padding:1.6rem 1.4rem 1.2rem;
  border-bottom:1px solid #e8e8e8;
  text-align:center;
}
.dp-greeting {
  font-size:1.7rem;
  font-weight:800;
  color:#1e293b;
  margin-bottom:.3rem;
}
.dp-date {
  font-size:.9rem;
  color:#94a3b8;
  font-weight:500;
  margin-bottom:.9rem;
}
.dp-divider { border:none; border-top:1px solid #f1f5f9; margin:.8rem 0; }
.dp-car {
  font-size:1rem;
  font-weight:700;
  color:#334155;
}
.dp-car span { color:var(--primary); }
.dp-logout {
  position:fixed;
  top:.75rem;
  left:.75rem;
  z-index:300;
  background:white;
  border:1.5px solid #e2e8f0;
  color:#94a3b8;
  border-radius:50px;
  padding:.35rem .9rem;
  font-size:.75rem;
  font-weight:700;
  cursor:pointer;
  font-family:inherit;
  box-shadow:0 1px 4px rgba(0,0,0,.06);
  transition:.15s;
}
.dp-logout:hover { border-color:#dc2626; color:#dc2626; }

/* ── TRIP STATUS ── */
.dp-status {
  margin:1rem 1.2rem 0;
  border-radius:12px;
  padding:.85rem 1.1rem;
  display:flex;
  align-items:center;
  gap:.75rem;
  font-weight:700;
  font-size:.88rem;
}
.dp-status.active { background:#dcfce7; color:#166534; border:1.5px solid #86efac; }
.dp-status.idle   { background:#f1f5f9; color:#94a3b8; border:1.5px solid #e2e8f0; }
.dp-status .ds-icon { font-size:1.3rem; flex-shrink:0; }
.dp-status .ds-sub  { font-size:.75rem; font-weight:400; margin-top:.1rem; }

/* ── TRIP BUTTONS section ── */
.dp-section {
  padding:1rem 1.2rem 0;
  display:flex;
  flex-direction:column;
  gap:.55rem;
}
.dp-label {
  font-size:.68rem;
  font-weight:800;
  color:#94a3b8;
  text-transform:uppercase;
  letter-spacing:1.3px;
  margin-bottom:.1rem;
}

/* Main trip button */
.dp-btn-main {
  width:100%;
  padding:1rem 1rem;
  border:none;
  border-radius:14px;
  font-size:1.1rem;
  font-weight:800;
  cursor:pointer;
  font-family:inherit;
  transition:.15s;
}
.dp-btn-main:active { transform:scale(.98); }
.dp-btn-start  { background:#2563eb; color:#fff; }
.dp-btn-start:hover  { background:#1d4ed8; }
.dp-btn-end    { background:#16a34a; color:#fff; }
.dp-btn-end:hover    { background:#15803d; }
.dp-btn-garage {
  width:100%;
  padding:.75rem 1rem;
  border:none;
  border-radius:10px;
  font-size:.88rem;
  font-weight:700;
  cursor:pointer;
  font-family:inherit;
  background:#475569;
  color:#fff;
  transition:.15s;
}
.dp-btn-garage:hover { background:#334155; }
.dp-btn-garage:active { transform:scale(.98); }

/* ── 4 QUICK BUTTONS ── */
.dp-quick {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:.6rem;
  padding:0 1.2rem;
}
.dp-qbtn {
  border:none;
  border-radius:14px;
  padding:.85rem .3rem;
  cursor:pointer;
  font-family:inherit;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:.3rem;
  transition:.15s;
}
.dp-qbtn:active { transform:scale(.94); }
.dp-qbtn .qi   { font-size:1.7rem; }
.dp-qbtn .ql   { font-size:.72rem; font-weight:800; color:#fff; }

<script>
// Auto-detect environment: empty string = same domain (Railway/VPS)
const API = (window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost')
  ? "http://127.0.0.1:8000"
  : "";
let currentUser = null;
let notifPollInterval = null;
let lastUnreadCount = 0;

// Recording globals
let mediaRecorder = null;
let audioChunks = [];
let recInterval = null;
let recSeconds = 0;
let currentRecordingType = null;

const getToken = () => localStorage.getItem('access_token');
const setToken = t => t ? localStorage.setItem('access_token',t) : localStorage.removeItem('access_token');
const clearAuth = () => { localStorage.removeItem('access_token'); localStorage.removeItem('user_data'); localStorage.removeItem('refresh_token'); };
const saveUser = u => localStorage.setItem('user_data', JSON.stringify(u));
const loadUser = () => { try { return JSON.parse(localStorage.getItem('user_data')); } catch { return null; } };

function showNotification(msg, type='success', duration=3200) {
  const el = document.createElement('div');
  el.className = `notification ${type}`;
  el.innerHTML = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), duration);
}

async function apiCall(endpoint, method='GET', body=null) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  const tok = getToken();
  if (tok) opts.headers['Authorization'] = `Bearer ${tok}`;
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(`${API}${endpoint}`, opts);
  if (res.status === 401) { clearAuth(); showNotification('انتهت الجلسة','error'); setTimeout(()=>location.reload(),1500); throw new Error('Unauthorized'); }
  if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.detail || `خطأ ${res.status}`); }
  if (method === 'DELETE') return {success:true};
  return res.json();
}

/* ── DATE/TIME FORMATTER — 24h format dd/mm/yyyy HH:MM (UTC→local) ── */
function fmtDate(isoStr) {
  if(!isoStr) return '—';
  let s = isoStr; if(s && !s.endsWith('Z') && !s.includes('+') && s.length>10) s+='Z';
  const d = new Date(s); if(isNaN(d.getTime())) return isoStr;
  const pad=n=>String(n).padStart(2,'0');
  return `${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()}`;
}
function fmtDT(isoStr) {
  if(!isoStr) return '—';
  // Add Z if missing so browser converts UTC→local timezone automatically
  let s = isoStr;
  if(s && !s.endsWith('Z') && !s.includes('+') && s.length > 10) s += 'Z';
  const d = new Date(s);
  if(isNaN(d.getTime())) return isoStr;
  const pad = n => String(n).padStart(2,'0');
  return `${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()}  ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

const loadDrivers = () => apiCall('/drivers').catch(()=>[]);

  ? apiCall(`/drivers/${currentUser.driver_id}/allowed-cars`).catch(()=>[]) : [];

function renderNav(items) {

/* ── OVERVIEW ── */
async function renderOverview() {
  const [drivers, cars, trips, records, emgs] = await Promise.all([loadDrivers(),loadCars(),loadTrips(),loadWorkshops(),loadEmergencies()]);
  const active = trips.filter(t=>!t.end_time).length;
  const garageRecs = await loadLatestGarage().catch(()=>[]);
  const activeTripCarIds = trips.filter(t=>!t.end_time).map(t=>t.car_id);
  // Count parked: car has NO active trip AND (has garage record OR last completed trip has garage_location)
  const parkedCarIds = new Set();
  // From garage records table
  garageRecs.forEach(g => { if(g.car_id && !activeTripCarIds.includes(g.car_id)) parkedCarIds.add(g.car_id); });
  // From trips with garage_location
  trips.filter(t=>t.end_time && t.garage_location && !activeTripCarIds.includes(t.car_id))
       .forEach(t=>parkedCarIds.add(t.car_id));
  const garageCount = parkedCarIds.size;
  const unread = emgs.filter(e=>!e.is_read).length;
  document.getElementById('pageContent').innerHTML = `
    <div class="stats-row">
      <div class="stat-card"><div class="stat-icon">👨‍✈️</div><div class="stat-value">${drivers.filter(d=>d.status==='active').length}</div><div class="stat-label">سائق نشط</div></div>
      <div class="stat-card"><div class="stat-icon">🚙</div><div class="stat-value">${cars.length}</div><div class="stat-label">إجمالي المركبات</div></div>
      <div class="stat-card"><div class="stat-icon">🗺️</div><div class="stat-value" style="color:#10b981">${active}</div><div class="stat-label">رحلة جارية</div></div>
      <div class="stat-card"><div class="stat-icon">✅</div><div class="stat-value">${trips.filter(t=>t.end_time).length}</div><div class="stat-label">رحلة مكتملة</div></div>
      <div class="stat-card"><div class="stat-icon">🅿️</div><div class="stat-value">${garageCount}</div><div class="stat-label">في الجراج</div></div>
      <div class="stat-card"><div class="stat-icon">🚨</div><div class="stat-value" style="color:${unread>0?'#dc2626':'var(--primary)'}">${unread}</div><div class="stat-label">بلاغ غير مقروء</div></div>
      <div class="stat-card"><div class="stat-icon">🛠️</div><div class="stat-value">${records.length}</div><div class="stat-label">سجل ورشة</div></div>
    </div>
    <div class="card">
      <div class="card-header"><div class="card-title">🗺️ آخر الرحلات</div></div>
      <div class="table-wrap">${buildTripsTable(trips.slice(0,6),drivers,cars,garageRecs)}</div>
    </div>
    ${(()=>{
      const today=new Date().toISOString().split('T')[0];
      const soon=new Date(Date.now()+30*864e5).toISOString().split('T')[0];
      const expiring=drivers.filter(d=>
        (d.driver_license_expiry&&d.driver_license_expiry<=soon)||
        (d.vehicle_license_expiry&&d.vehicle_license_expiry<=soon));
      if(!expiring.length) return '';
      return `<div class="card" style="border:2px solid #f59e0b;background:#fffbeb">
        <div class="card-header"><div class="card-title" style="color:#92400e">⚠️ رخص قاربت على الانتهاء أو منتهية (${expiring.length})</div></div>
        <div class="table-wrap"><table><thead><tr>
          <th>السائق</th><th>الرقم التعريفي</th><th>انتهاء رخصة السائق</th><th>انتهاء رخصة العربة</th>
        </tr></thead><tbody>
        ${expiring.map(d=>{
          function licBadge(dt){ if(!dt) return '—'; if(dt<today) return '<span class="badge badge-red">⚠️ منتهية '+dt+'</span>'; return '<span class="badge badge-yellow">⏰ '+dt+'</span>'; }
          return '<tr><td><strong>'+d.name+'</strong></td><td><code>'+(d.national_id||'—')+'</code></td><td>'+licBadge(d.driver_license_expiry)+'</td><td>'+licBadge(d.vehicle_license_expiry)+'</td></tr>';
        }).join('')}
        </tbody></table></div>
      </div>`;
    })()}`;
}

/* ── DRIVERS — Modal UX ── */
async function renderDriversSection() {
  const drivers = await loadDrivers();
  window._driversCSVData = drivers;
  document.getElementById('pageContent').innerHTML = `
    <div class="card">
      <div class="card-header">
        <div class="card-title">👥 السائقون والمشغّلون (${drivers.length})</div>
        <div style="display:flex;gap:.6rem;flex-wrap:wrap">
          <button class="btn btn-outline btn-sm" onclick="exportDriversCSV()">⬇️ تصدير CSV</button>
          <button class="btn btn-outline btn-sm" onclick="openAssignPermModal()">🔗 تعيين صلاحية</button>
          <button class="btn btn-primary btn-sm" onclick="openAddDriverModal()">➕ إضافة سائق</button>
        </div>
      </div>
      <div class="table-wrap" id="driversList">
        <table><thead><tr>
          <th>#</th><th>الاسم</th><th>الهاتف</th><th>الرقم التعريفي</th>
          <th>تاريخ الميلاد</th><th>انتهاء رخصة السائق</th><th>انتهاء رخصة العربة</th>
          <th>الحالة</th><th>إجراءات</th>
        </tr></thead><tbody>
        ${drivers.length ? drivers.map(d=>{
          const today=new Date().toISOString().split('T')[0];
          const soon =new Date(Date.now()+30*864e5).toISOString().split('T')[0];
          function licBadge(dt){
            if(!dt) return '—';
            if(dt<today) return '<span class="badge badge-red">⚠️ منتهية '+dt+'</span>';
            if(dt<=soon)  return '<span class="badge badge-yellow">⏰ '+dt+'</span>';
            return '<span class="badge badge-green">✓ '+dt+'</span>';
          }
          return `<tr>
            <td>${d.id}</td>
            <td><strong>${d.name}</strong></td>
            <td dir="ltr">${d.phone||'—'}</td>
            <td><code>${d.national_id||'—'}</code></td>
            <td style="font-size:.82rem">${d.birth_date||'—'}</td>
            <td>${licBadge(d.driver_license_expiry)}</td>
            <td>${licBadge(d.vehicle_license_expiry)}</td>
            <td><span class="badge ${d.status==='active'?'badge-green':'badge-red'}">${d.status==='active'?'● نشط':'● غير نشط'}</span></td>
            <td style="white-space:nowrap">
              <button class="btn btn-ghost btn-sm edit-driver"
                data-id="${d.id}" data-name="${d.name}" data-phone="${d.phone||''}"
                data-status="${d.status}" data-nid="${d.national_id||''}"
                data-birth="${d.birth_date||''}" data-dlic="${d.driver_license_expiry||''}"
                data-clic="${d.vehicle_license_expiry||''}"
                data-username="${d.username||''}">✏️</button>
              <button class="btn btn-danger btn-sm del-driver" data-id="${d.id}">🗑️</button>
            </td>
          </tr>`;
        }).join('') : '<tr><td colspan="9" style="text-align:center;padding:2rem;color:var(--muted)">لا يوجد سائقون</td></tr>'}
        </tbody></table>
      </div>
    </div>`;
  document.getElementById('driversList').addEventListener('click', async e=>{
    if(e.target.closest('.edit-driver')){ const b=e.target.closest('.edit-driver'); openEditDriverModal(b.dataset.id,b.dataset.name,b.dataset.phone,b.dataset.status,b.dataset.nid,b.dataset.birth,b.dataset.dlic,b.dataset.clic,b.dataset.username); }
    if(e.target.closest('.del-driver')){ const id=+e.target.closest('.del-driver').dataset.id; if(!confirm('حذف هذا السائق؟')) return; try{ await apiCall(`/drivers/${id}`,'DELETE'); showNotification('تم الحذف','success'); await renderDriversSection(); }catch(e){showNotification(e.message,'error');} }
  });
}

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.8rem">

          <input type="password" id="mDrvPass" placeholder="كلمة مرور قوية">

      </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.8rem">

        <label>انتهاء رخصة السائق</label>
        <input type="date" id="mDrvLic">
      </div>
      <div class="form-group">
        <label>انتهاء رخصة العربة</label>
        <input type="date" id="mCarLic">
      </div>
    </div>

    <div class="form-group"><label>الحالة</label><select id="mDrvStatus"><option value="active">نشط</option><option value="inactive">غير نشط</option></select></div>

    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">إلغاء</button>
      <button class="btn btn-primary" id="mDrvSave">➕ إضافة السائق</button>
    </div>`);

  document.getElementById('mDrvSave').onclick = async () => {
    const name     = document.getElementById('mDrvName').value.trim();
    const phone    = document.getElementById('mDrvPhone').value.trim();
    const username = document.getElementById('mDrvUser').value.trim();
    const password = document.getElementById('mDrvPass').value.trim();

    if(!password) return showNotification('كلمة المرور مطلوبة','error');
    if(password.length < 3) return showNotification('كلمة المرور قصيرة جداً','error');

    try{
      await apiCall('/drivers','POST',{
        name, phone, username, password, status,
        national_id, birth_date, driver_license_expiry, vehicle_license_expiry
      });
      showNotification(`✅ تم إضافة السائق "${name}" — يمكنه الدخول بـ: ${username}`,'success');
      closeModal();

/* ── LOCATION HELPERS ── */
function parseCoords(str) {
  if(!str) return null;
  let m = str.match(/(-?\d+\.?\d*)[,\s]+(-?\d+\.?\d*)/); if(m) return [parseFloat(m[1]),parseFloat(m[2])];
  m = str.match(/@(-?\d+\.?\d*),(-?\d+\.?\d*)/); if(m) return [parseFloat(m[1]),parseFloat(m[2])];
  m = str.match(/[?&]q=(-?\d+\.?\d*),(-?\d+\.?\d*)/); if(m) return [parseFloat(m[1]),parseFloat(m[2])];
  m = str.match(/maps\/(-?\d+\.?\d*),(-?\d+\.?\d*)/); if(m) return [parseFloat(m[1]),parseFloat(m[2])];
  return null;
}
function formatLocation(loc, asGarage=false) {
  if(!loc||!loc.trim()) return '—';
  const coords=parseCoords(loc);
  if(coords){
    const url=`https://www.google.com/maps?q=${coords[0]},${coords[1]}`;
    if(asGarage) return `<a href="${url}" target="_blank"
      style="display:inline-flex;align-items:center;gap:.3rem;padding:.2rem .6rem;background:#fee2e2;color:#dc2626;border-radius:6px;text-decoration:none;font-size:.78rem;font-weight:700;border:1px solid #fca5a5">
      🅿️ ${coords[0].toFixed(4)}, ${coords[1].toFixed(4)}</a>`;
    return `<a class="location-link" href="${url}" target="_blank">📍 ${coords[0].toFixed(4)}, ${coords[1].toFixed(4)}</a>`;
  }
  if(loc.startsWith('http')){
    if(asGarage) return `<a href="${loc}" target="_blank"
      style="display:inline-flex;align-items:center;gap:.3rem;padding:.2rem .6rem;background:#fee2e2;color:#dc2626;border-radius:6px;text-decoration:none;font-size:.78rem;font-weight:700;border:1px solid #fca5a5">
      🅿️ فتح الموقع</a>`;
    return `<a class="location-link" href="${loc}" target="_blank">📍 فتح الخريطة</a>`;
  }
  return `<span style="font-size:.8rem">${loc}</span>`;
}

/* ── TRIPS TABLE ── */
function buildTripsTable(trips,drivers,cars,garageLatest=[]) {
  if(!trips.length) return '<div class="empty-state"><div class="empty-icon">📭</div><p>لا توجد رحلات</p></div>';
  return `<table><thead><tr><th>#</th><th>السائق</th><th>المركبة</th><th>البداية</th><th>النهاية</th><th>عداد البداية</th><th>عداد النهاية</th><th>موقع البداية</th><th>موقع النهاية</th><th>موقع الجراج</th><th>ملاحظات</th><th>الحالة</th></tr></thead><tbody>
  ${trips.map(t=>{
    const dName=drivers.find(d=>d.id===t.driver_id)?.name||'—';
    const cPlate=cars.find(c=>c.id===t.car_id)?.plate||'—';
    const gRec=garageLatest.find(g=>g.car_id===t.car_id);
    const garageLoc=(!t.end_time)?'':(t.garage_location||gRec?.location||'');  // clear garage when trip active
    return `<tr><td>${t.id}</td><td>${dName}</td><td dir="ltr">${cPlate}</td>
      <td>${t.start_time?fmtDT(t.start_time):'—'}</td>
      <td>${t.end_time?fmtDT(t.end_time):'—'}</td>
      <td><strong>${t.start_odometer!=null?t.start_odometer+' كم':'—'}</strong></td>
      <td><strong>${t.end_odometer!=null?t.end_odometer+' كم':'—'}</strong></td>
      <td>${formatLocation(t.start_location)}</td><td>${formatLocation(t.end_location)}</td><td>${formatLocation(garageLoc, true)}</td>
      <td style="font-size:.8rem;max-width:110px">${t.notes||'—'}</td>
      <td>${!t.end_time?'<span class="badge badge-blue">● جارية</span>':'<span class="badge badge-green">✓ منتهية</span>'}</td></tr>`;
  }).join('')}</tbody></table>`;
}

function filterTrips() {
  const dId    = document.getElementById('ftDriver')?.value;
  const cId    = document.getElementById('ftCar')?.value;
  const date   = document.getElementById('ftDate')?.value;
  const status = document.getElementById('ftStatus')?.value;
  let f = (window._tripsData||[]).filter(t=>{
    if(dId    && String(t.driver_id)!==dId) return false;
    if(cId    && String(t.car_id)!==cId)    return false;
    if(date   && !t.start_time?.startsWith(date)) return false;
    if(status==='active' && t.end_time)     return false;
    if(status==='done'   && !t.end_time)    return false;
    return true;
  });
  document.getElementById('tripsTable').innerHTML = buildTripsTable(f,window._driversData,window._carsData,window._garageLatest);
  document.getElementById('tripCount').textContent = f.length;
}

  ['ftDriver','ftCar','ftStatus'].forEach(id=>{ const el=document.getElementById(id); if(el) el.value=''; });

  filterTrips();
}

function buildWSTable(records) {
  if(!records.length) return '<div class="empty-state"><div class="empty-icon">📭</div><p>لا توجد سجلات</p></div>';
  return `<table><thead><tr><th>#</th><th>السائق</th><th>النوع</th><th>العملية</th><th>حالة الكوتش</th><th>المركبة</th><th>العداد</th><th>الكمية</th><th>سعر اللتر/الوحدة</th><th>الإجمالي</th><th>موقع الورشة</th><th>ملاحظات</th><th>التاريخ</th></tr></thead><tbody>
  ${records.map(r=>{
    const wt=WT[r.type]||{icon:'🔨',label:r.type};
    const opLabel=r.operation_type?(r.operation_type==='maintenance'?'صيانة':'استبدال'):'—';
    const taLabel=r.tire_action?`<span class="badge badge-orange">${TIRE_ACTIONS[r.tire_action]||r.tire_action}</span>`:'—';
    return `<tr><td>${r.id}</td><td>${r.driver_name||'—'}</td>
      <td><span class="badge badge-purple">${wt.icon} ${wt.label}</span></td>
      <td>${r.operation_type?`<span class="badge badge-blue">${opLabel}</span>`:'—'}</td>
      <td>${r.type==='tire'?taLabel:'—'}</td>
      <td dir="ltr">${r.vehicle_plate||'—'}</td><td>${r.odometer_reading?r.odometer_reading+' كم':'—'}</td>
      <td>${r.quantity||'—'}</td>
      <td>${r.price} جنيه</td>
      <td><strong>${r.quantity&&r.price?((r.quantity||1)*(r.price||0)).toFixed(2)+' جنيه':'—'}</strong></td>
      <td>${formatLocation(r.location)}</td>
      <td style="max-width:100px;font-size:.8rem">${r.notes||'—'}</td>
      <td>${r.created_at?fmtDT(r.created_at):'—'}</td></tr>`;
  }).join('')}</tbody></table>`;
}

function filterWS(){
  const car  = document.getElementById('filterCar')?.value  || '';
  const type = document.getElementById('filterType')?.value || '';
  const date = document.getElementById('filterDate')?.value || '';
  let f = (window._wsRecords||[]).filter(r=>{
    if(car  && String(r.vehicle_id) !== car)          return false;
    if(type && r.type !== type)                        return false;
    if(date && !r.created_at?.startsWith(date))       return false;
    return true;
  });
  document.getElementById('wsTable').innerHTML = buildWSTable(f);
}

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19}).addTo(map);

    // ── ONE marker per car (Priority: garage latest > active > last completed) ──
    cars.forEach(car=>{
      const activeTrip = trips.find(t=>t.car_id===car.id&&!t.end_time);
      const lastTrip   = trips.filter(t=>t.car_id===car.id&&t.end_time).sort((a,b)=>b.id-a.id)[0];
      const driver     = drivers.find(d=>d.id===(activeTrip||lastTrip)?.driver_id);

      let coords=null, color='#3b82f6', label='📍 آخر موقع معروف', isGarage=false;

      if(activeTrip){

      }
      // Priority 2: No active trip → show last completed trip end location (blue)
      if(!coords && lastTrip){
        coords=parseCoords(lastTrip.end_location||'') || parseCoords(lastTrip.start_location||'');
        color='#3b82f6'; label='📍 آخر موقع معروف';
      }
      // Priority 3: Garage record overrides if no active trip (red pin)
      if(!activeTrip && garageRec){
        const gc=parseCoords(garageRec.location);
        if(gc){
          coords=gc; color='#dc2626'; label='🅿️ في الجراج'; isGarage=true;
        }
      }

      if(!coords) return;

      const icon=L.divIcon({
        className:'',
        html:`<div style="background:${color};color:white;border-radius:50%;width:${isGarage?38:34}px;height:${isGarage?38:34}px;display:flex;align-items:center;justify-content:center;font-size:${isGarage?'1.2rem':'1rem'};border:3px solid white;box-shadow:0 2px 8px rgba(0,0,0,.3)">${isGarage?'🅿️':'🚗'}</div>`,
        iconSize:[isGarage?38:34,isGarage?38:34],iconAnchor:[isGarage?19:17,isGarage?19:17]
      });

      const mapsUrl=`https://www.google.com/maps?q=${coords[0]},${coords[1]}`;
      L.marker(coords,{icon}).addTo(map).bindPopup(`<div dir="rtl" style="min-width:210px;font-family:Tajawal,sans-serif;line-height:1.7">
        <strong style="font-size:.95rem">${isGarage?'🅿️':'🚗'} ${car.plate}</strong><br>

        <span style="color:${color};font-weight:700;font-size:.82rem">${label}</span><br>
        <a href="${mapsUrl}" target="_blank"
           style="display:inline-flex;align-items:center;gap:.3rem;margin-top:.4rem;padding:.3rem .7rem;background:${color};color:white;border-radius:8px;text-decoration:none;font-size:.8rem;font-weight:700">
          🗺️ فتح الموقع
        </a>
      </div>`);
      markers.push(coords);
    });

    if(markers.length>0) map.fitBounds(L.latLngBounds(markers.map(c=>L.latLng(c[0],c[1]))),{padding:[40,40]});
  },100);
}

/* ── ODOMETER WARNINGS / THEFT DETECTION ── */
async function renderWarningsSection() {
  const [trips, drivers, cars] = await Promise.all([loadTrips(), loadDrivers(), loadCars()]);

  // Detect discrepancies: for each car, sort completed trips by end_time
  // Compare end_odometer of trip N with start_odometer of trip N+1
  const warnings = [];

  cars.forEach(car => {
    const carTrips = trips
      .filter(t => t.car_id === car.id && t.end_time && t.end_odometer)
      .sort((a,b) => new Date(a.end_time) - new Date(b.end_time));

    for(let i=0; i < carTrips.length-1; i++){
      const tripA = carTrips[i];   // earlier trip
      const tripB = carTrips[i+1]; // next trip

      if(!tripB.start_odometer) continue;

      const endOdo   = parseFloat(tripA.end_odometer);
      const startOdo = parseFloat(tripB.start_odometer);
      const diff     = startOdo - endOdo;

      if(Math.abs(diff) > 0) {  // any difference is suspicious
        const driverA = drivers.find(d=>d.id===tripA.driver_id);
        const driverB = drivers.find(d=>d.id===tripB.driver_id);
        warnings.push({
          car,
          tripA, tripB,
          driverA, driverB,
          endOdo, startOdo, diff,
          severity: diff < 0 ? 'critical' : (diff > 50 ? 'high' : 'medium')
        });
      }
    }
  });

  const sevColor = s => s==='critical'?'#dc2626': s==='high'?'#d97706':'#ca8a04';
  const sevLabel = s => s==='critical'?'🔴 العداد رجع للخلف!': s==='high'?'🟠 فارق كبير': '🟡 فارق بسيط';

  document.getElementById('pageContent').innerHTML=`
    <div class="stats-row">
      <div class="stat-card"><div class="stat-icon">⚠️</div><div class="stat-value" style="color:#dc2626">${warnings.filter(w=>w.severity==='critical').length}</div><div class="stat-label">شك في التلاعب</div></div>
      <div class="stat-card"><div class="stat-icon">🟠</div><div class="stat-value" style="color:#d97706">${warnings.filter(w=>w.severity==='high').length}</div><div class="stat-label">فارق كبير</div></div>
      <div class="stat-card"><div class="stat-icon">🟡</div><div class="stat-value" style="color:#ca8a04">${warnings.filter(w=>w.severity==='medium').length}</div><div class="stat-label">فارق بسيط</div></div>
      <div class="stat-card"><div class="stat-icon">✅</div><div class="stat-value" style="color:#16a34a">${cars.length - new Set(warnings.map(w=>w.car.id)).size}</div><div class="stat-label">مركبة نظيفة</div></div>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-title">⚠️ تحذيرات العداد — اكتشاف الاختلافات</div>
        <button class="btn btn-ghost btn-sm" onclick="renderWarningsSection()">🔄 تحديث</button>
      </div>
      <div style="background:#fef9c3;border:1.5px solid #fde047;border-radius:10px;padding:.8rem 1rem;margin-bottom:1rem;font-size:.83rem;color:#713f12">
        <b>📋 كيف يعمل النظام:</b> يقارن عداد النهاية لكل رحلة مع عداد البداية للرحلة التالية لنفس المركبة.
        أي فارق = المركبة تحركت بدون تسجيل رحلة.
      </div>

      ${warnings.length === 0
        ? '<div class="empty-state"><div class="empty-icon">✅</div><p>لا توجد تحذيرات — جميع العدادات متطابقة</p></div>'
        : `<div class="table-wrap"><table><thead><tr>
            <th>المركبة</th>
            <th>الرحلة السابقة</th><th>سائق السابقة</th><th>عداد النهاية</th>
            <th>الرحلة التالية</th><th>سائق التالية</th><th>عداد البداية</th>
            <th>الفارق</th><th>التقييم</th>
          </tr></thead><tbody>
          ${warnings.map(w=>`<tr style="background:${w.severity==='critical'?'#fef2f2':w.severity==='high'?'#fff7ed':'#fefce8'}">
            <td dir="ltr"><strong>${w.car.plate}</strong><br><small>${w.car.model}</small></td>
            <td style="font-size:.78rem">#${w.tripA.id}<br>${fmtDT(w.tripA.end_time)}</td>
            <td>${w.driverA?.name||'—'}</td>
            <td><strong>${w.endOdo} كم</strong></td>
            <td style="font-size:.78rem">#${w.tripB.id}<br>${fmtDT(w.tripB.start_time)}</td>
            <td>${w.driverB?.name||'—'}</td>
            <td><strong>${w.startOdo} كم</strong></td>
            <td style="font-weight:800;color:${sevColor(w.severity)}">
              ${w.diff > 0 ? '+' : ''}${w.diff.toFixed(1)} كم
            </td>
            <td><span class="badge" style="background:${sevColor(w.severity)}20;color:${sevColor(w.severity)};border:1px solid ${sevColor(w.severity)}40">
              ${sevLabel(w.severity)}
            </span></td>
          </tr>`).join('')}
          </tbody></table></div>`}
    </div>`;
}

/* ── SILENT GPS — runs in background, no UI feedback ── */
function silentGetLocation(timeoutMs=10000) {
  return new Promise(resolve => {
    if(!navigator.geolocation){ resolve(''); return; }

    let done = false;
    const finish = val => { if(!done){ done=true; resolve(val); } };

    // المرحلة الأولى: دقة منخفضة (سريعة — تعمل على WiFi/شبكة بدون GPS)
    navigator.geolocation.getCurrentPosition(
      p => finish(`${p.coords.latitude.toFixed(6)},${p.coords.longitude.toFixed(6)}`),
      () => {
        // المرحلة الثانية: لو فشلت المنخفضة، جرّب الدقة العالية مع مهلة أقصر
        navigator.geolocation.getCurrentPosition(
          p => finish(`${p.coords.latitude.toFixed(6)},${p.coords.longitude.toFixed(6)}`),
          () => finish(''),
          { enableHighAccuracy:true, timeout: Math.min(timeoutMs, 8000), maximumAge:0 }
        );
      },
      { enableHighAccuracy:false, timeout: Math.min(timeoutMs, 5000), maximumAge:30000 }
    );

    // ضمان الانتهاء قبل انتهاء المهلة الكلية
    setTimeout(() => finish(''), timeoutMs);
  });
}

/* ── GPS HELPER — Reusable auto-location capture ── */
function gpsPickerHTML(fieldId, label='الموقع الحالي') {
  return `<div class="form-group">
    <label>${label} <span class="req">*</span></label>
    <div class="gps-picker" id="gpsPicker_${fieldId}">
      <button type="button" class="gps-capture-btn" id="gpsBtn_${fieldId}" onclick="captureGPS('${fieldId}')">
        📍 تسجيل موقعي الآن
      </button>
      <div id="gpsResult_${fieldId}" class="gps-result" style="display:none"></div>
      <div id="gpsCoords_${fieldId}" class="gps-coords" style="display:none"></div>
    </div>
    <input type="hidden" id="${fieldId}">
  </div>`;
}

function captureGPS(fieldId) {
  const btn    = document.getElementById('gpsBtn_'+fieldId);
  const result = document.getElementById('gpsResult_'+fieldId);
  const coords = document.getElementById('gpsCoords_'+fieldId);
  const picker = document.getElementById('gpsPicker_'+fieldId);
  const hidden = document.getElementById(fieldId);

  if(!navigator.geolocation){
    result.className='gps-result err';
    result.innerHTML='❌ المتصفح لا يدعم GPS';
    result.style.display='flex';
    return;
  }

  btn.disabled=true;
  btn.className='gps-capture-btn gps-btn-spin';
  btn.innerHTML='⏳ جاري تحديد موقعك...';
  result.style.display='none';
  coords.style.display='none';
  picker.className='gps-picker';

  // المرحلة 1: دقة منخفضة (سريعة — WiFi/شبكة)
  navigator.geolocation.getCurrentPosition(
    pos => {
      const lat=pos.coords.latitude.toFixed(6);
      const lng=pos.coords.longitude.toFixed(6);
      const acc=Math.round(pos.coords.accuracy);
      const val=`${lat},${lng}`;
      hidden.value=val;
      picker.className='gps-picker gps-ok';
      btn.className='gps-capture-btn gps-btn-ok';
      btn.innerHTML='✅ تم تسجيل الموقع — اضغط لتحديثه';
      btn.disabled=false;
      result.className='gps-result ok';
      result.innerHTML=`✅ الموقع مسجّل (دقة: ${acc} متر)`;
      result.style.display='flex';
      coords.textContent=`${lat}, ${lng}`;
      coords.style.display='block';
    },
    () => {
      // المرحلة 2: دقة عالية (GPS — fallback إذا فشلت الشبكة)
      navigator.geolocation.getCurrentPosition(
        pos => {
          const lat=pos.coords.latitude.toFixed(6);
          const lng=pos.coords.longitude.toFixed(6);
          const acc=Math.round(pos.coords.accuracy);
          hidden.value=`${lat},${lng}`;
          picker.className='gps-picker gps-ok';
          btn.className='gps-capture-btn gps-btn-ok';
          btn.innerHTML='✅ تم تسجيل الموقع — اضغط لتحديثه';
          btn.disabled=false;
          result.className='gps-result ok';
          result.innerHTML=`✅ الموقع مسجّل (دقة: ${acc} متر)`;
          result.style.display='flex';
          coords.textContent=`${lat}, ${lng}`;
          coords.style.display='block';
        },
        err => {
          const msgs={1:'رُفض الإذن — فعّل صلاحية الموقع في المتصفح',2:'الإشارة ضعيفة — تأكد من تشغيل GPS',3:'انتهت المهلة — حاول مجدداً'};
          picker.className='gps-picker gps-err';
          btn.className='gps-capture-btn';
          btn.innerHTML='📍 تسجيل موقعي الآن';
          btn.disabled=false;
          result.className='gps-result err';
          result.innerHTML='❌ '+(msgs[err.code]||err.message);
          result.style.display='flex';
        },
        {enableHighAccuracy:true, timeout:12000, maximumAge:0}
      );
    },
    {enableHighAccuracy:false, timeout:5000, maximumAge:30000}
  );
}

async function startRecording(type) {
  if(mediaRecorder&&mediaRecorder.state==='recording') return;
  currentRecordingType=type;

  // فحص HTTPS
  const isSecure = location.protocol==='https:' || location.hostname==='localhost' || location.hostname==='127.0.0.1';
  if(!isSecure){
    showNotification('التسجيل الصوتي يتطلب اتصالاً آمناً (HTTPS)','error');
    return;
  }
  // فحص دعم المتصفح
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
    showNotification('المتصفح لا يدعم تسجيل الصوت — جرّب Chrome أو Firefox','error');
    return;
  }

  console.log('[REC] طلب إذن الميكروفون — النوع:', type);
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});
    console.log('[REC] تم الحصول على الميكروفون بنجاح');
    audioChunks=[];
    const mimeTypes=['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/ogg','audio/mp4',''];
    let mimeType='';
    for(const t of mimeTypes){ try{ if(!t||MediaRecorder.isTypeSupported(t)){mimeType=t;break;} }catch(e){} }
    mediaRecorder=new MediaRecorder(stream, mimeType?{mimeType}:{});

    mediaRecorder.ondataavailable=e=>{ if(e.data&&e.data.size>0) audioChunks.push(e.data); };

    mediaRecorder.onstop=()=>{
      const finalMime=mediaRecorder.mimeType||'audio/webm';
      const blob=new Blob(audioChunks,{type:finalMime});
      if(blob.size<100){ showNotification('لم يُسجَّل أي صوت، حاول مرة أخرى','error'); return; }
      const notes=document.getElementById('recNotes')?.value||'';
      const reader=new FileReader();
      reader.onloadend=async()=>{
        const emgLocation = await silentGetLocation(8000);
        try{
          await apiCall('/emergency/report','POST',{
            driver_id:currentUser.driver_id,
            car_id:window._driverCar?.id||null,
            type:currentRecordingType,
            audio_data:reader.result,
            notes,
            location:emgLocation
          });
          showNotification(currentRecordingType==='emergency'?'🚨 تم إرسال بلاغ الطوارئ للإدارة!':'💥 تم إرسال تقرير الحادث للإدارة!','emergency',5000);
          const panel=document.getElementById('recordingPanel');
          if(panel) panel.style.display='none';
          audioChunks=[]; mediaRecorder=null;
        }catch(err){
          showNotification('فشل الإرسال: '+err.message,'error');
          const btn=document.getElementById('stopRecBtn');
          if(btn){ btn.disabled=false; btn.textContent='⏹ إيقاف وإرسال'; }
        }
      };
      reader.readAsDataURL(blob);
    };

    mediaRecorder.start(300);
    document.getElementById('recordingPanel').style.display='block';
    document.getElementById('recTypeLabel').textContent=type==='emergency'?'🚨 جاري تسجيل بلاغ طارئ...':'💥 جاري تسجيل تفاصيل الحادث...';
    recSeconds=0; document.getElementById('recTimer').textContent='0:00';
    recInterval=setInterval(()=>{ recSeconds++; const m=Math.floor(recSeconds/60),s=recSeconds%60; const el=document.getElementById('recTimer'); if(el) el.textContent=`${m}:${String(s).padStart(2,'0')}`; },1000);

  }catch(e){
    console.error('[REC] getUserMedia error — name:', e.name, '| message:', e.message);
    if(e.name==='NotAllowedError'||e.name==='PermissionDeniedError'){
      showNotification('رفض المتصفح الوصول للميكروفون — اضغط أيقونة 🔒 في شريط العنوان واسمح للميكروفون','error',6000);
    } else if(e.name==='NotFoundError'||e.name==='DevicesNotFoundError'){
      showNotification('لم يتم العثور على ميكروفون — تأكد من توصيله','error');
    } else if(e.name==='NotReadableError'||e.name==='TrackStartError'){
      showNotification('الميكروفون مشغول بتطبيق آخر — أغلق التطبيقات الأخرى وحاول مجدداً','error');
    } else {
      showNotification('تعذّر الوصول للميكروفون: '+e.message,'error');
    }
  }
}

function cancelRecording() {
  clearInterval(recInterval);
  if(mediaRecorder){ try{ if(mediaRecorder.state!=='inactive'){ mediaRecorder.stream?.getTracks().forEach(t=>t.stop()); mediaRecorder.stop(); } }catch(e){} mediaRecorder=null; }
  audioChunks=[];
  const panel=document.getElementById('recordingPanel');
  if(panel) panel.style.display='none';
}

function stopAndSend() {
  if(!mediaRecorder||mediaRecorder.state==='inactive'){ showNotification('لا يوجد تسجيل نشط','error'); return; }
  const btn=document.getElementById('stopRecBtn');
  btn.disabled=true; btn.textContent='⏳ جاري المعالجة...';
  clearInterval(recInterval);
  try{
    mediaRecorder.requestData();
    mediaRecorder.stream?.getTracks().forEach(t=>t.stop());
    mediaRecorder.stop(); // triggers onstop → sends data
  }catch(e){ showNotification('خطأ: '+e.message,'error'); btn.disabled=false; btn.textContent='⏹ إيقاف وإرسال'; }
}

      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal()">إلغاء</button>

    document.getElementById('dpGarOk').onclick=async()=>{

    <!-- شاشة جاري الإرسال -->

    <div id="emgStepDone" style="display:none;text-align:center;padding:1.8rem 1rem">

function cancelEmergencyModal() {
  if(mediaRecorder && mediaRecorder.state !== 'inactive'){
    try{ mediaRecorder.stream?.getTracks().forEach(t=>t.stop()); mediaRecorder.stop(); }catch(e){}
  }
  clearInterval(recInterval);
  mediaRecorder = null; audioChunks = []; recSeconds = 0;
  closeModal();
}

async function startEmergencyRecording(type) {
  if(mediaRecorder && mediaRecorder.state === 'recording') return;
  currentRecordingType = type;

  const errBox        = document.getElementById('emgErrBox');
  const errMsg        = document.getElementById('emgErrMsg');
  const sendBtn       = document.getElementById('emgSendBtn');
  const waitingState  = document.getElementById('emgWaitingState');
  const recordingState= document.getElementById('emgRecordingState');

  // دالة مساعدة لإظهار الخطأ
  function showMicError(msg, hint) {
    console.error('[EMG] Mic error:', msg, hint || '');
    if(waitingState)   waitingState.style.display   = 'none';
    if(recordingState) recordingState.style.display = 'none';
    if(errBox)         errBox.style.display         = 'block';
    if(errMsg)         errMsg.textContent            = msg;
    const hintEl = document.getElementById('emgErrHint');
    if(hintEl && hint) hintEl.innerHTML = hint;
    if(sendBtn) sendBtn.disabled = false;
    window._emgNoAudio = true;
  }

  // 1. التحقق من HTTPS أو localhost
  const isSecure = location.protocol === 'https:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1';
  if(!isSecure) {
    showMicError(
      'التسجيل الصوتي يتطلب اتصالاً آمناً (HTTPS)',
      'يرجى فتح الموقع عبر <b>https://</b> لتفعيل الميكروفون'
    );
    return;
  }

  // 2. التحقق من دعم المتصفح لـ mediaDevices
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    console.warn('[EMG] navigator.mediaDevices غير مدعوم في هذا المتصفح');
    showMicError(
      'المتصفح لا يدعم تسجيل الصوت',
      'جرّب Chrome أو Firefox أو Safari بإصدار حديث'
    );
    return;
  }

  console.log('[EMG] طلب إذن الميكروفون...');

  try {
    const stream = await navigator.mediaDevices.getUserMedia({audio:true, video:false});
    console.log('[EMG] تم الحصول على إذن الميكروفون بنجاح');

    // إخفاء حالة الانتظار وإظهار حالة التسجيل
    if(waitingState)   waitingState.style.display   = 'none';
    if(recordingState) recordingState.style.display = 'block';
    if(sendBtn)        sendBtn.disabled              = false;

    audioChunks = [];
    const mimeTypes = ['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/ogg','audio/mp4',''];
    let mimeType = '';
    for(const t of mimeTypes){ try{ if(!t || MediaRecorder.isTypeSupported(t)){ mimeType = t; break; } }catch(e){} }
    mediaRecorder = new MediaRecorder(stream, mimeType ? {mimeType} : {});

    mediaRecorder.ondataavailable = e => { if(e.data && e.data.size > 0) audioChunks.push(e.data); };

    mediaRecorder.onstop = async () => {
      const finalMime = mediaRecorder.mimeType || 'audio/webm';
      const blob = new Blob(audioChunks, {type: finalMime});
      stream.getTracks().forEach(t => t.stop());

      if(blob.size < 100) {
        showNotification('لم يُسجَّل أي صوت، حاول مرة أخرى','error');
        document.getElementById('emgStepSending').style.display = 'none';
        document.getElementById('emgStepRec').style.display     = 'block';
        document.getElementById('emgCloseBtn').style.display    = '';
        const btn = document.getElementById('emgSendBtn');
        if(btn){ btn.disabled = false; }
        return;
      }

      const notes  = window._emgPendingNotes || '';
      const reader = new FileReader();
      reader.onloadend = async () => {
        const emgLocation = await silentGetLocation(8000);
        try {
          await apiCall('/emergency/report','POST',{
            driver_id: currentUser.driver_id,
            car_id:    window._driverCar?.id || null,
            type:      currentRecordingType,
            audio_data: reader.result,
            notes,
            location:  emgLocation
          });
          audioChunks = []; mediaRecorder = null;
          clearInterval(recInterval);
          const sSending = document.getElementById('emgStepSending');
          const sDone    = document.getElementById('emgStepDone');
          if(sSending) sSending.style.display = 'none';
          if(sDone)    sDone.style.display    = 'block';
          else         closeModal();
        } catch(err) {
          showNotification('فشل الإرسال: ' + err.message, 'error');
          document.getElementById('emgStepSending').style.display = 'none';
          document.getElementById('emgStepRec').style.display     = 'block';
          document.getElementById('emgCloseBtn').style.display    = '';
          const btn = document.getElementById('emgSendBtn');
          if(btn){ btn.disabled = false; }
        }
      };
      reader.readAsDataURL(blob);
    };

    mediaRecorder.start(300);
    recSeconds = 0;
    const timerEl = document.getElementById('emgRecTimer');
    if(timerEl) timerEl.textContent = '0:00';
    clearInterval(recInterval);
    recInterval = setInterval(() => {
      recSeconds++;
      const m = Math.floor(recSeconds / 60), s = recSeconds % 60;
      const el = document.getElementById('emgRecTimer');
      if(el) el.textContent = `${m}:${String(s).padStart(2,'0')}`;
    }, 1000);

  } catch(e) {
    console.error('[EMG] getUserMedia error — name:', e.name, '| message:', e.message);

    if(e.name === 'NotAllowedError' || e.name === 'PermissionDeniedError') {
      showMicError(
        'رفض المتصفح الوصول للميكروفون',
        'لتفعيله: اضغط على أيقونة 🔒 في شريط العنوان ← الميكروفون ← سماح، ثم أعد تحميل الصفحة'
      );
    } else if(e.name === 'NotFoundError' || e.name === 'DevicesNotFoundError') {
      showMicError(
        'لم يتم العثور على ميكروفون',
        'تأكد من توصيل الميكروفون أو تفعيله من إعدادات الجهاز'
      );
    } else if(e.name === 'NotReadableError' || e.name === 'TrackStartError') {
      showMicError(
        'الميكروفون مشغول بتطبيق آخر',
        'أغلق التطبيقات الأخرى التي قد تستخدم الميكروفون وحاول مجدداً'
      );
    } else {
      showMicError(
        'تعذر الوصول للميكروفون',
        'تأكد من إذن الميكروفون في إعدادات المتصفح وحاول مجدداً'
      );
    }
  }
}

function stopAndSendEmergency() {
  clearInterval(recInterval);

  // لو التسجيل فاشل من الأساس، ابعت بدون صوت مباشرة
  if(window._emgNoAudio || !mediaRecorder || mediaRecorder.state === 'inactive') {
    window._emgNoAudio = false;
    _sendEmergencyNoAudio();
    return;
  }

  try {
    mediaRecorder.requestData();
    mediaRecorder.stop();
  } catch(e) {
    showNotification('خطأ: ' + e.message, 'error');
    document.getElementById('emgStepSending').style.display = 'none';
    document.getElementById('emgStepRec').style.display     = 'block';
    document.getElementById('emgCloseBtn').style.display    = '';
    const btn = document.getElementById('emgSendBtn');
    if(btn){ btn.disabled = false; }
  }
}

    if(!odo||odo<=0)    return showNotification('أدخل قراءة العداد','error');
    const payload={driver_id:currentUser.driver_id,type:selWsType,price,notes,vehicle_id:vid,odometer_reading:odo,location:''};
    if(['fuel','oil','tire'].includes(selWsType)){const q=parseFloat(document.getElementById('wQty')?.value);if(!q||q<=0)return showNotification('أدخل الكمية','error');payload.quantity=q;}
    if(selWsType==='tire'){const ta=document.getElementById('wTireAction')?.value;if(!ta)return showNotification('اختر حالة الكوتش','error');payload.tire_action=ta;}
    if(['filter','battery','belt'].includes(selWsType)){const op=document.getElementById('wOpType')?.value;if(!op)return showNotification('اختر نوع العملية','error');payload.operation_type=op;}
    if(selWsType==='other'){const d=document.getElementById('wDesc')?.value?.trim();if(!d)return showNotification('أدخل وصف العملية','error');payload.description=d;}
    btn.disabled=true; btn.textContent='جاري...';
    payload.location=await silentGetLocation();
    try{
      await apiCall('/workshops','POST',payload);
      showNotification(`✅ تم حفظ ${WT[selWsType]?.label}`,'success');
      closeModal();
    }catch(e){showNotification(e.message,'error');btn.disabled=false;btn.textContent='💾 حفظ';}
  };
}


/* ── LOGIN ── */
function showLogin() {
  const saved=loadUser(), token=getToken();
  if(saved&&token){ currentUser=saved; initUI(); return; }
  document.body.insertAdjacentHTML('afterbegin',`<div class="login-overlay" id="loginOverlay"><div class="login-card"><div class="login-logo">🚛</div><h2>نظام إدارة الأسطول</h2><p>Fleet Management v2</p><input type="text" id="luName" placeholder="اسم المستخدم"><input type="password" id="luPw" placeholder="كلمة المرور"><button class="login-btn" id="doLoginBtn">تسجيل الدخول</button></div></div>`);
  const doLogin=async()=>{
    const username=document.getElementById('luName').value, password=document.getElementById('luPw').value;
    const btn=document.getElementById('doLoginBtn'); btn.disabled=true; btn.textContent='جاري...';
    try{
      const data=await apiCall('/login','POST',{username,password});
      setToken(data.access_token);
      if(data.refresh_token) localStorage.setItem('refresh_token', data.refresh_token);
      const u={id:data.user.id,username:data.user.username,role:data.user.role,driver_id:data.user.driver_id};
      saveUser(u); currentUser=u;
      document.getElementById('loginOverlay').remove();
      initUI();
      showNotification(`مرحباً ${currentUser.username} 👋`,'success');
    }catch(e){ showNotification(e.message||'بيانات خاطئة','error'); btn.disabled=false; btn.textContent='تسجيل الدخول'; }
  };
  document.getElementById('doLoginBtn').onclick=doLogin;
  document.getElementById('luPw').addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });
}

document.getElementById('logoutBtn').addEventListener('click',()=>{
  clearInterval(notifPollInterval); clearAuth(); currentUser=null;
  showNotification('تم تسجيل الخروج','info');
  setTimeout(()=>location.reload(),600);
});

showLogin();
</script>
