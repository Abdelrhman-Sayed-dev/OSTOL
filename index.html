async function doImportPreview() {
  const file = document.getElementById('importFileInput').files[0];
  const importType = document.getElementById('importTypeSelect').value;
  if(!file) return showNotification('يرجى اختيار ملف أولاً','error');

  const btn = document.getElementById('importPreviewBtn');
  btn.disabled=true; btn.textContent='⏳ جاري التحليل...';

  const fd = new FormData();
  fd.append('file', file);
  const token = getToken();
  const url = importType === 'permissions'
    ? `/import/permissions/preview`
    : importType === 'maintenance'
    ? `/import/maintenance/preview`
    : `/import/preview?import_type=${importType}`;
  try {
    const res = await fetch(url, { method:'POST', headers:{ Authorization:`Bearer ${token}` }, body: fd });
    const data = await res.json();
    if(!res.ok) throw new Error(data.detail || 'خطأ في التحليل');
    _importPreviewData = { file, importType };
    renderImportPreview(data);
  } catch(e) {
    showNotification(e.message,'error');
  } finally {
    btn.disabled=false; btn.textContent='🔍 استعراض البيانات';
  }
}

async function doImportConfirm() {
  if(!_importPreviewData) return;
  const { file, importType } = _importPreviewData;
  const skipErrors = document.getElementById('importSkipErrors')?.checked || false;

  const btn = document.getElementById('importConfirmBtn');
  btn.disabled=true; btn.textContent='⏳ جاري الرفع...';

  const fd = new FormData();
  fd.append('file', file);
  const token = getToken();
  const url = importType === 'permissions'
    ? `/import/permissions/confirm?skip_errors=${skipErrors}`
    : importType === 'maintenance'
    ? `/import/maintenance/confirm?skip_errors=${skipErrors}`
    : `/import/confirm?import_type=${importType}&skip_errors=${skipErrors}`;
  try {
    const res = await fetch(url, { method:'POST', headers:{ Authorization:`Bearer ${token}` }, body: fd });
    const data = await res.json();
    if(!res.ok) {
      const detail = typeof data.detail === 'object' ? data.detail.message : data.detail;
      throw new Error(detail || 'فشل الرفع');
    }
    showNotification(`✅ تم الرفع بنجاح: ${data.inserted} سجل${data.skipped>0?' (تجاهل '+data.skipped+')':''}`, 'success');
    _importPreviewData = null;
    renderImportResult(data, importType);
  } catch(e) {
    showNotification(e.message,'error');
    btn.disabled=false; btn.textContent=`✅ تأكيد الرفع`;
  }
}

function filterLogs() {
  const role     = document.getElementById('logFilterRole')?.value || '';
  const user     = (document.getElementById('logFilterUser')?.value || '').toLowerCase();
  const logs     = window._allLogs || [];
  const filtered = logs.filter(r=>(!role||r.role===role)&&(!user||r.username.toLowerCase().includes(user)));
  const roleColors  = {superuser:'badge-purple',admin:'badge-blue',driver:'badge-green',reporter:'badge-yellow'};
  const roleLabels  = {superuser:'سوبر يوزر',admin:'أدمن',driver:'سائق',reporter:'مراقب'};

  const tbody = document.getElementById('logsTableBody');

const MAINTENANCE_TYPES_FE = [
  "تغيير زيت","فلتر زيت","فلتر هواء","فلتر وقود",
  "فلتر مكيف","إطارات","بطارية","فرامل أمامية",
  "فرامل خلفية","سير توزيع","ترمس","ماء تبريد",
  "سائل فرامل","فحص دوري عام","أخرى"
];

const ALERT_COLORS = {
  overdue: {bg:'#fef2f2',border:'#fca5a5',badge:'#ef4444',label:'🔴 متأخرة'},
  warning: {bg:'#fff7ed',border:'#fed7aa',badge:'#f97316',label:'🟠 قريبة'},
  ok:      {bg:'#f0fdf4',border:'#6ee7b7',badge:'#10b981',label:'✅ سليمة'},
};

async function renderMaintenanceSection() {
  const c = document.getElementById('pageContent');
  c.innerHTML='<div class="empty-state"><div class="empty-icon">⏳</div><p>جاري التحميل...</p></div>';

  const [records, cars] = await Promise.all([
    apiCall('/maintenance/schedule').catch(()=>[]),
    loadCars()
  ]);
  // تحديث الكاش دايماً
  window._carsCache = cars;

  window._maintenanceAlertCount = records.filter(r=>r.alert_status!=='ok').length;

  const overdue = records.filter(r=>r.alert_status==='overdue');
  const warning = records.filter(r=>r.alert_status==='warning');
  const ok      = records.filter(r=>r.alert_status==='ok');

  function buildRow(r) {
    const ac = ALERT_COLORS[r.alert_status] || ALERT_COLORS.ok;
    const nextKmDisplay = r.next_due_km ? Math.round(r.next_due_km).toLocaleString('ar-EG')+' كم' : '—';
    const curKmDisplay  = r.current_km  ? Math.round(r.current_km).toLocaleString('ar-EG')+' كم'  : '—';
    const remKm = (r.next_due_km && r.current_km)
      ? Math.round(r.next_due_km - r.current_km) : null;
    const remDisplay = remKm !== null
      ? (remKm > 0 ? `${remKm.toLocaleString('ar-EG')} كم متبقي` : `${Math.abs(remKm).toLocaleString('ar-EG')} كم تأخير`)
      : '—';
    return `<tr>
      <td dir="ltr"><strong>${r.car_plate}</strong></td>
      <td style="font-size:.82rem">${r.car_model}</td>
      <td>${r.maintenance_type}</td>
      <td>${r.interval_km ? Math.round(r.interval_km).toLocaleString('ar-EG')+' كم' : '—'}${r.interval_days ? ' / '+r.interval_days+' يوم' : ''}</td>
      <td>${r.last_done_km ? Math.round(r.last_done_km).toLocaleString('ar-EG')+' كم' : '—'}</td>
      <td>${curKmDisplay}</td>
      <td><strong style="color:${ac.badge}">${remDisplay}</strong></td>
      <td>${r.next_due_date||'—'}</td>
      <td><span style="background:${ac.badge};color:white;border-radius:20px;font-size:.7rem;padding:.15rem .55rem;font-weight:700">${ac.label}</span></td>
      <td>
        ${!isReporter()?`
        <button class="btn btn-ghost btn-sm" onclick="openMaintenanceDoneModal(${r.id},'${r.car_plate}','${r.maintenance_type}')">✅ تم</button>
        <button class="btn btn-ghost btn-sm" onclick="openEditMaintenanceModal(${r.id})">✏️</button>
        <button class="btn btn-danger btn-sm" onclick="deleteMaintenanceRecord(${r.id})">🗑️</button>
        `:'—'}
      </td>
    </tr>`;
  }

  function buildGroup(title, list, color) {
    if(!list.length) return '';
    return `<div class="card" style="border:1.5px solid ${color};margin-bottom:1rem">
      <div class="card-header" style="background:${list[0]?ALERT_COLORS[list[0].alert_status]?.bg:''}">
        <div class="card-title" style="color:${color}">${title} (${list.length})</div>
      </div>
      <div class="table-wrap">
        <table><thead><tr>
          <th>اللوحة</th><th>الموديل</th><th>نوع الصيانة</th><th>الفاصل الزمني</th>
          <th>آخر صيانة (كم)</th><th>العداد الحالي</th><th>المتبقي</th>
          <th>الموعد القادم</th><th>الحالة</th><th>إجراء</th>
        </tr></thead><tbody>
        ${list.map(buildRow).join('')}
        </tbody></table>
      </div>
    </div>`;
  }

  c.innerHTML = `
    <div class="stats-row" style="margin-bottom:1rem">
      <div class="stat-card"><div class="stat-icon" style="color:#ef4444">🔴</div><div class="stat-value" style="color:#ef4444">${overdue.length}</div><div class="stat-label">متأخرة</div></div>
      <div class="stat-card"><div class="stat-icon" style="color:#f97316">🟠</div><div class="stat-value" style="color:#f97316">${warning.length}</div><div class="stat-label">قريبة</div></div>
      <div class="stat-card"><div class="stat-icon" style="color:#10b981">✅</div><div class="stat-value" style="color:#10b981">${ok.length}</div><div class="stat-label">سليمة</div></div>
      <div class="stat-card"><div class="stat-icon">🔧</div><div class="stat-value">${records.length}</div><div class="stat-label">إجمالي السجلات</div></div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
      <div style="font-size:.88rem;color:var(--muted)">تتبع مواعيد الصيانة الدورية لكل مركبة تلقائياً</div>
      ${!isReporter()?`
        <div style="display:flex;gap:.6rem">
          <button class="btn btn-outline btn-sm" onclick="openMaintenanceImportModal()">📥 استيراد CSV</button>
          <button class="btn btn-primary btn-sm" onclick="openAddMaintenanceModal()">➕ إضافة جدول صيانة</button>
        </div>
      `:''}
    </div>
    ${buildGroup('🔴 صيانة متأخرة', overdue, '#ef4444')}
    ${buildGroup('🟠 تقترب مواعيد الصيانة', warning, '#f97316')}
    ${buildGroup('✅ صيانة سليمة', ok, '#10b981')}
    ${records.length===0?'<div class="empty-state"><div class="empty-icon">🔧</div><p>لا توجد جداول صيانة بعد — أضف أول جدول</p></div>':''}
  `;
}

// MAINTENANCE CSV IMPORT — استيراد الصيانة من CSV
// ═══════════════════════════════════════════════════════════════
// أعمدة الـ CSV — مطابقة للفورم بالضبط
const MAINT_CSV_COLS = [
  "المركبة (رقم اللوحة)",
  "نوع الصيانة",
  "كل كام كم",
  "أو كل كام يوم",
  "آخر قراءة عداد عند الصيانة (كم)",
  "تاريخ آخر صيانة",
  "إنذار قبل (كم)",
  "إنذار قبل (يوم)",
  "ملاحظات"
];
const MAINT_TYPES_VALID = [
  "تغيير زيت","فلتر زيت","فلتر هواء","فلتر وقود","فلتر مكيف",
  "إطارات","بطارية","فرامل أمامية","فرامل خلفية","سير توزيع",
  "ترمس","ماء تبريد","سائل فرامل","فحص دوري عام","أخرى"
];

function downloadMaintenanceTemplate() {
  // صف الأعمدة + صف فارغ جاهز للكتابة (مع القيم الافتراضية)
  const rows = [
    MAINT_CSV_COLS,
    ["", "", "", "", "", "", "500", "7", ""],
  ];
  const csv = rows.map(r =>
    r.map(v => '"' + String(v).replace(/"/g, '""') + '"').join(',')
  ).join('\r\n');
  const blob = new Blob(['\uFEFF' + csv], {type: 'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'maintenance_schedule_template.csv';
  a.click();
  URL.revokeObjectURL(a.href);
}

function parseMaintenanceCSV(text) {
  const lines = text.replace(/\r/g,'').split('\n').filter(l => l.trim() && !l.trim().startsWith('#'));
  if(!lines.length) return [];
  const sep = lines[0].includes(';') ? ';' : ',';
  const parseRow = line => {
    const cells = []; let cur = '', inQ = false;
    for(let i = 0; i < line.length; i++){
      if(line[i] === '"'){ if(inQ && line[i+1] === '"'){cur+='"';i++;}else inQ=!inQ; }
      else if(line[i] === sep && !inQ){ cells.push(cur.trim()); cur=''; }
      else cur += line[i];
    }
    cells.push(cur.trim());
    return cells;
  };
  const headers = parseRow(lines[0]);
  return lines.slice(1).map((line) => {
    const vals = parseRow(line);
    const obj = {};
    headers.forEach((h, i) => { obj[h] = vals[i] || ''; });
    return obj;
  });
}

function validateMaintenanceRows(rows, carsMap) {
  // خريطة لربط اسم العمود في الفورمات الجديد بالـ key الداخلي
  const g = (row, ...keys) => {
    for(const k of keys){ const v=(row[k]||'').trim(); if(v) return v; }
    return '';
  };
  return rows.map((row, idx) => {
    const errors = [];
    const plate  = g(row, 'المركبة (رقم اللوحة)', 'رقم اللوحة', 'plate');
    const type   = g(row, 'نوع الصيانة', 'maintenance_type');
    const intKm  = g(row, 'كل كام كم', 'interval_km');
    const intDy  = g(row, 'أو كل كام يوم', 'كل كام يوم', 'interval_days');
    const lastKm = g(row, 'آخر قراءة عداد عند الصيانة (كم)', 'آخر قراءة عداد', 'last_done_km');
    const lastDt = g(row, 'تاريخ آخر صيانة', 'last_done_date');
    const alKm   = g(row, 'إنذار قبل (كم)', 'إنذار قبل كم', 'alert_km_before') || '500';
    const alDy   = g(row, 'إنذار قبل (يوم)', 'إنذار قبل يوم', 'alert_days_before') || '7';
    const notes  = g(row, 'ملاحظات', 'notes');

    if(!plate) errors.push('رقم اللوحة مطلوب');
    else if(!carsMap[plate]) errors.push(`لا توجد مركبة بلوحة "${plate}"`);
    if(!type) errors.push('نوع الصيانة مطلوب');
    else if(!MAINT_TYPES_VALID.includes(type)) errors.push(`نوع غير صالح: "${type}"`);
    if(!intKm && !intDy) errors.push('يجب تحديد كل كام كم أو كل كام يوم');
    if(intKm && isNaN(parseFloat(intKm))) errors.push('كل كام كم يجب أن يكون رقم');
    if(intDy && isNaN(parseInt(intDy)))   errors.push('كل كام يوم يجب أن يكون رقم');
    if(lastDt && !/^\d{4}-\d{2}-\d{2}$/.test(lastDt)) errors.push('تاريخ آخر صيانة يجب YYYY-MM-DD');

    return {
      row_num: idx + 2,
      plate, type,
      interval_km:      parseFloat(intKm) || null,
      interval_days:    parseInt(intDy)   || null,
      last_done_km:     parseFloat(lastKm)|| null,
      last_done_date:   lastDt || null,
      alert_km_before:  parseFloat(alKm)  || 500,
      alert_days_before:parseInt(alDy)    || 7,
      notes,
      car_id: carsMap[plate] || null,
      valid:  errors.length === 0,
      errors
    };
  }).filter(r => r.plate || r.type);
}

async function doMaintenancePreview(carsMap) {
  const fileInput = document.getElementById('maintCsvFile');
  if(!fileInput || !fileInput.files[0]) return showNotification('اختر ملف CSV أولاً','error');
  const file = fileInput.files[0];
  const btn = document.getElementById('maintPreviewBtn');
  btn.disabled=true; btn.textContent='⏳ جاري التحليل...';

  try {
    const text = await file.text();
    const rows = parseMaintenanceCSV(text);
    if(!rows.length) { showNotification('الملف فارغ أو لا توجد بيانات','error'); return; }
    const validated = validateMaintenanceRows(rows, carsMap);
    window._maintImportData = { validated, file };
    renderMaintenancePreviewTable(validated);
  } catch(e) {
    showNotification(e.message,'error');
  } finally {
    btn.disabled=false; btn.textContent='🔍 معاينة البيانات';
  }
}

async function doMaintenanceImportConfirm() {
  if(!window._maintImportData) return;
  const { validated } = window._maintImportData;
  const skipErrors = document.getElementById('maintSkipErrors')?.checked||false;
  const toInsert = skipErrors ? validated.filter(r=>r.valid) : validated;

  if(!skipErrors && toInsert.some(r=>!r.valid)) {
    showNotification('يوجد أخطاء — فعّل "تجاهل الأخطاء" للمتابعة','error');
    return;
  }
  const validOnly = toInsert.filter(r=>r.valid);
  if(!validOnly.length) { showNotification('لا توجد صفوف صحيحة للإضافة','error'); return; }

  const btn = document.getElementById('maintConfirmBtn');
  btn.disabled=true; btn.textContent='⏳ جاري الإضافة...';

  let inserted=0, skipped=0, errors=[];
  for(const r of validOnly) {
    try {
      await apiCall('/maintenance/schedule','POST',{
        car_id:           r.car_id,
        maintenance_type: r.type,
        interval_km:      r.interval_km,
        interval_days:    r.interval_days,
        last_done_km:     r.last_done_km,
        last_done_date:   r.last_done_date,
        alert_km_before:  r.alert_km_before,
        alert_days_before:r.alert_days_before,
        notes:            r.notes
      });
      inserted++;
    } catch(e) {
      skipped++;
      errors.push(`صف ${r.row_num} (${r.plate}): ${e.message}`);
    }
  }

  const area = document.getElementById('maintImportPreview');
  area.innerHTML = `
    <div class="card" style="border-top:3px solid ${inserted>0?'#10b981':'#ef4444'}">
      <div class="card-header" style="border-bottom:none">
        <div class="card-title" style="color:${inserted>0?'#10b981':'#ef4444'}">
          ${inserted>0?'✅ تم الاستيراد بنجاح':'❌ فشل الاستيراد'}

      <div style="padding:1.25rem;display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;text-align:center">
        <div style="padding:1rem;background:var(--surface-2);border-radius:12px">
          <div style="font-size:2rem;font-weight:800;color:#10b981">${inserted}</div>
          <div style="color:var(--muted);font-size:.85rem">تم إضافته</div>
        </div>
        <div style="padding:1rem;background:var(--surface-2);border-radius:12px">
          <div style="font-size:2rem;font-weight:800;color:#f97316">${skipped}</div>
          <div style="color:var(--muted);font-size:.85rem">تم تجاهله</div>
        </div>
        <div style="padding:1rem;background:var(--surface-2);border-radius:12px">
          <div style="font-size:2rem;font-weight:800;color:var(--primary)">${inserted+skipped}</div>
          <div style="color:var(--muted);font-size:.85rem">إجمالي الصفوف</div>

      </div>
      ${errors.length?`<div style="padding:.75rem 1.25rem;background:#fef2f2;border-top:1px solid var(--border);font-size:.8rem;color:#b91c1c">
        <strong>أخطاء:</strong><br>${errors.slice(0,5).join('<br>')}${errors.length>5?`<br>... و${errors.length-5} أخطاء أخرى`:''}
      </div>`:''}
      <div style="padding:.75rem 1.25rem;display:flex;gap:.75rem">
        <button class="btn btn-primary btn-sm" onclick="closeModal();renderMaintenanceSection()">عرض جداول الصيانة</button>
      </div>
    </div>`;
  window._maintImportData = null;
}

async function loadKpiData() {
  const month  = document.getElementById('kpiMonth')?.value || '';

  const tbody  = document.getElementById('kpiTableBody');
  const summary = document.getElementById('kpiSummary');

  if (tbody) tbody.innerHTML = `<tr><td colspan="11" style="text-align:center;padding:2rem">⏳ جاري التحميل...</td></tr>`;

  try {
    let url = `/reports/driver-kpi?month=${month}`;
    if (branch) url += `&branch=${encodeURIComponent(branch)}`;

    const data = await apiCall(url);
    _kpiData = data.drivers || [];

    // ── ملخص ──
    const active    = _kpiData.length;
    const avgScore  = active ? (_kpiData.reduce((s,d)=>s+d.total_score,0)/active).toFixed(1) : 0;
    const avgKmVal  = data.avg_km || (active ? _kpiData.reduce((s,d)=>s+(d.km||0),0)/active : 0);
    const topDriver = _kpiData[0];
    const excellent = _kpiData.filter(d=>d.grade==='ممتاز').length;
    const needsWork = _kpiData.filter(d=>d.grade==='يحتاج تحسين').length;

    if (summary) summary.innerHTML = [
      {label:'إجمالي السائقين',       value: active,                          icon:'👨‍✈️', color:'var(--primary)'},
      {label:'متوسط النقاط',           value: avgScore+'%',                    icon:'📊', color:'#3b82f6'},
      {label:'متوسط الكم / سائق',     value: Math.round(avgKmVal)+' كم',     icon:'📍', color:'#8b5cf6'},
      {label:'تصنيف ممتاز',            value: excellent,                       icon:'🌟', color:'#10b981'},
      {label:'يحتاج تحسين',            value: needsWork,                       icon:'⚠️', color:'#ef4444'},
      {label:'أفضل سائق',              value: topDriver?.driver_name||'—',     icon:'🏆', color:'#f59e0b'},

      <div class="card" style="text-align:center;padding:1rem">

        <div style="font-weight:800;color:${s.color};font-size:1rem">${s.value}</div>

         </div>`
      : `<span style="color:var(--muted);font-size:.8rem">—</span>`;

    // طوارئ (5%)
    const emgCell = `<div style="text-align:center">
      <div style="font-weight:700;color:${d.emergencies===0?'#10b981':'#ef4444'}">${d.emergencies} 🚨</div>
      <div style="font-size:.72rem;color:${d.emg_score===100?'#10b981':d.emg_score>=60?'#f97316':'#ef4444'}">${d.emg_score}%</div>
    </div>`;

    return `<tr>
      <td style="text-align:center;font-size:1.1rem">${rankEmoji}</td>
      <td><strong>${d.driver_name}</strong></td>
      <td style="font-size:.8rem;color:var(--muted)">${d.branch||'—'}</td>
      <td>${scoreBar}</td>
      <td>${tripsCell}</td>
      <td>${kmCell}</td>
      <td>${fuelCell}</td>
      <td>${oilCell}</td>
      <td>${emgCell}</td>
      <td style="text-align:center">${grade}</td>

        <button class="btn btn-ghost btn-sm" onclick="showKpiDetail(${d.driver_id})" title="تفاصيل">📋</button>
      </td>
    </tr>`;
  }).join('');
}

function filterKpiTable(q) {
  const filtered = q.trim()
    ? _kpiData.filter(d => d.driver_name.includes(q.trim()))
    : _kpiData;
  renderKpiTable(filtered);
}

function showKpiDetail(driverId) {
  const d = _kpiData.find(x => x.driver_id === driverId);
  if (!d) return;

  const meter = (label, score, detail) => {
    // لو score=null — اعرض الصف بـ "بيانات غير كافية" بدل ما تخفيه
    if (score === null || score === undefined) {
      return `
      <div style="margin-bottom:1rem">
        <div style="display:flex;justify-content:space-between;margin-bottom:.3rem">
          <span style="font-weight:700;font-size:.88rem">${label}</span>
          <span style="color:#94a3b8;font-size:.82rem">بيانات غير كافية</span>
        </div>
        <div style="background:var(--border);border-radius:6px;height:10px;overflow:hidden">
          <div style="width:0%;height:100%;background:#e2e8f0;border-radius:6px"></div>
        </div>
        ${detail ? `<div style="font-size:.78rem;color:var(--muted);margin-top:.2rem">${detail}</div>` : ''}
      </div>`;
    }
    const color = score>=85?'#10b981':score>=70?'#3b82f6':score>=50?'#f97316':'#ef4444';
    return `
      <div style="margin-bottom:1rem">
        <div style="display:flex;justify-content:space-between;margin-bottom:.3rem">
          <span style="font-weight:700;font-size:.88rem">${label}</span>
          <span style="color:${color};font-weight:800">${score}%</span>
        </div>
        <div style="background:var(--border);border-radius:6px;height:10px;overflow:hidden">
          <div style="width:${score}%;height:100%;background:${color};border-radius:6px;transition:width .5s"></div>
        </div>
        ${detail ? `<div style="font-size:.78rem;color:var(--muted);margin-top:.2rem">${detail}</div>` : ''}
      </div>`;
  };

  // عرض الوقود الحقيقي (كل التفويلات) والمعدل المحسوب (بدون آخر تفويلة)
  const fuelDisplay = d.fuel_liters > 0
    ? d.fuel_liters + ' لتر' + (d.consumption ? ' | معدل: ' + d.consumption + ' ل/100كم' : ' (تفويلة واحدة — مش كافي لحساب المعدل)')
    : null;
  const fuelLabel  = '⛽ استهلاك الوقود — 40%' + (d.consumption ? ' (' + d.consumption + ' ل/100كم)' : '');

  openModal(`
    <div class="modal-header">
      <div class="modal-title">🏆 تفاصيل KPI — ${d.driver_name}</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div style="padding:.5rem 0">

      <!-- النقاط الكلية -->
      <div style="text-align:center;padding:1.5rem;background:var(--surface-2);border-radius:16px;margin-bottom:1.5rem">
        <div style="font-size:3rem;font-weight:900;color:${d.grade_color};line-height:1">${d.total_score}%</div>
        <div style="font-size:1.1rem;color:${d.grade_color};margin-top:.5rem">${d.grade}</div>
        <div style="font-size:.82rem;color:var(--muted);margin-top:.3rem">
          ${d.month} &nbsp;|&nbsp; الترتيب: ${d.rank===1?'🥇':d.rank===2?'🥈':d.rank===3?'🥉':'#'+d.rank}
        </div>
      </div>

      <!-- المؤشرات بالأوزان الجديدة -->
      <div style="margin-bottom:1.5rem">
        ${meter('🗺️ عدد الرحلات — 10% ('+d.trips+' رحلة)', d.trips_score??null, 'كلما زادت الرحلات زادت النقاط')}
        ${meter('📍 الكيلومترات — 40% ('+d.km.toLocaleString('ar-EG')+' كم)', d.km_score, 'المتوسط: '+(d.avg_km_peers||0).toLocaleString('ar-EG')+' كم')}
        ${meter(fuelLabel, d.fuel_score??null, fuelDisplay)}
        ${meter('🛢️ استهلاك الزيوت — 5%'+(d.oil_per_1000?' ('+d.oil_per_1000+' ل/1000كم)':''), d.oil_score??null, d.oil_liters>0?d.oil_liters+' لتر زيت':null)}
        ${meter('🚨 الحوادث والطوارئ — 5% ('+d.emergencies+' حادثة)', d.emg_score, 'كلما قل عدد الحوادث زادت النقاط')}
      </div>

      <!-- إحصائيات إضافية -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem">
        ${[
          ['🗺️ الرحلات', d.trips+' رحلة'],
          ['⛽ الوقود', d.fuel_liters > 0 ? d.fuel_liters + ' لتر' : '—'],
          ['🔧 الورشة', d.maint_count+' سجل'],
          ['💰 تكلفة الورشة', d.maint_cost>0?d.maint_cost.toLocaleString('ar-EG')+' ج':'—'],
        ].map(([lbl,val])=>`
          <div style="background:var(--surface-2);border-radius:10px;padding:.75rem;text-align:center">
            <div style="font-size:.72rem;color:var(--muted)">${lbl}</div>
            <div style="font-weight:700;margin-top:.2rem">${val}</div>
          </div>`).join('')}
      </div>
    </div>
  `);
}

function exportKpiCSV() {
  if (!_kpiData.length) return showNotification('لا توجد بيانات للتصدير', 'error');
  const headers = ['الترتيب','السائق','الفرع','النقاط الكلية','التصنيف',
    'الرحلات','نقاط الرحلات(10%)','الكيلومترات','متوسط الكم','نقاط الكم(40%)',
    'وقود(ل)','استهلاك ل/100كم','نقاط الوقود(40%)',
    'زيوت(ل)','استهلاك ل/1000كم','نقاط الزيوت(5%)',
    'طوارئ','نقاط الطوارئ(5%)'];
  const rows = _kpiData.map(d=>[
    d.rank, d.driver_name, d.branch, d.total_score+'%', d.grade,
    d.trips, (d.trips_score??0)+'%',
    d.km, d.avg_km_peers||0, (d.km_score??0)+'%',
    d.fuel_liters, d.consumption??'', d.fuel_score!=null?d.fuel_score+'%':'—',
    d.oil_liters||0, d.oil_per_1000??'', d.oil_score!=null?d.oil_score+'%':'—',
    d.emergencies, d.emg_score+'%'
  ]);
  const csv = '\uFEFF' + [headers,...rows].map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\r\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  a.download = `kpi_${document.getElementById('kpiMonth')?.value||'report'}.csv`;
  a.click();
  URL.revokeObjectURL(a.href);
  showNotification('✅ تم تصدير التقرير', 'success');
}

function showEquipmentForm(id=null) {
  _eqEditId = id;
  document.getElementById('eqFormTitle').textContent = id ? '✏️ تعديل معدة' : '➕ إضافة معدة';
  const fields = ['Code','Name','Brand','Model','Year','Chassis','Type','Status','Branch','Sector','Project','License','Notes'];
  fields.forEach(f => { const el = document.getElementById('eq'+f); if(el) el.value = ''; });
  document.getElementById('eqType').value = 'معدات تحريك تربة';
  document.getElementById('eqStatus').value = 'active';

  if(id) {
    const e = _eqData.find(x => x.id === id);
    if(e) {
      document.getElementById('eqCode').value    = e.car_code||'';
      document.getElementById('eqName').value    = e.equipment_name||'';
      document.getElementById('eqBrand').value   = e.brand||'';
      document.getElementById('eqModel').value   = e.model||'';
      document.getElementById('eqYear').value    = e.year||'';
      document.getElementById('eqChassis').value = e.chassis||'';
      document.getElementById('eqType').value    = e.equipment_type||'معدات تحريك تربة';
      document.getElementById('eqStatus').value  = e.status||'active';
      document.getElementById('eqBranch').value  = e.branch||'';
      document.getElementById('eqSector').value  = e.sector||'';
      document.getElementById('eqProject').value = e.project||'';
      document.getElementById('eqLicense').value = e.license_expiry||'';
      document.getElementById('eqNotes').value   = e.notes||'';
    }
  }
  const modal = document.getElementById('eqFormModal');
  modal.style.display = 'flex';
}

function closeEquipmentForm() {
  document.getElementById('eqFormModal').style.display = 'none';
  _eqEditId = null;
}

async function saveEquipment() {
  const body = {
    car_code:       document.getElementById('eqCode').value.trim(),
    equipment_name: document.getElementById('eqName').value.trim(),
    brand:          document.getElementById('eqBrand').value.trim(),
    model:          document.getElementById('eqModel').value.trim(),
    year:           document.getElementById('eqYear').value.trim(),
    chassis:        document.getElementById('eqChassis').value.trim(),
    equipment_type: document.getElementById('eqType').value,
    status:         document.getElementById('eqStatus').value,
    branch:         document.getElementById('eqBranch').value.trim(),
    sector:         document.getElementById('eqSector').value.trim(),
    project:        document.getElementById('eqProject').value.trim(),
    license_expiry: document.getElementById('eqLicense').value,
    notes:          document.getElementById('eqNotes').value.trim(),
  };
  if(!body.car_code) return showNotification('الكود مطلوب','error');
  if(!body.equipment_name) return showNotification('اسم المعدة مطلوب','error');
  try {
    if(_eqEditId) {
      await apiCall(`/equipment/${_eqEditId}`, 'PUT', body);
      showNotification('✅ تم التعديل بنجاح','success');
    } else {
      await apiCall('/equipment', 'POST', body);
      showNotification('✅ تم الإضافة بنجاح','success');
    }
    closeEquipmentForm();
    await loadEquipmentData();
  } catch(e) {
    showNotification(e.message||'خطأ في الحفظ','error');
  }
}

async function deleteEquipment(id, name) {
  if(!confirm(`حذف "${name}"؟`)) return;
  try {
    await apiCall(`/equipment/${id}`, 'DELETE');
    showNotification('✅ تم الحذف','success');
    await loadEquipmentData();
  } catch(e) {
    showNotification(e.message,'error');
  }
}

function showEquipmentImport() {
  document.getElementById('eqImportModal').style.display = 'flex';
  document.getElementById('eqImportPreview').style.display = 'none';
  document.getElementById('eqImportFile').value = '';
}
function closeEquipmentImport() {
  document.getElementById('eqImportModal').style.display = 'none';
}

async function previewEquipmentImport() {
  const file = document.getElementById('eqImportFile').files[0];
  if(!file) return showNotification('اختر ملفاً أولاً','error');
  const fd = new FormData();
  fd.append('file', file);
  try {
    const data = await fetch('/equipment/import/preview', {
      method:'POST', headers:{'Authorization':'Bearer '+localStorage.getItem('access_token')}, body:fd
    }).then(r=>r.json());
    if(data.detail) throw new Error(typeof data.detail==='string'?data.detail:JSON.stringify(data.detail));

    const s = data.summary||{};
    document.getElementById('eqImportSummary').innerHTML = `
      <div style="display:flex;gap:.75rem;flex-wrap:wrap">
        ${[['الإجمالي',s.total,'#3b82f6'],['صالح',s.valid,'#10b981'],['أخطاء',s.invalid,'#ef4444'],['تكرار',s.duplicates,'#f97316']]
          .map(([l,v,c])=>`<span style="background:${c}15;color:${c};padding:.25rem .75rem;border-radius:20px;font-weight:700;font-size:.83rem">${l}: ${v}</span>`).join('')}
      </div>`;

    const statusMap = {active:'عاملة',inactive:'عاطلة',maintenance:'صيانة'};
    document.getElementById('eqImportRows').innerHTML = (data.rows||[]).map(r=>`
      <tr style="background:${!r.valid?'#fef2f2':r.duplicate?'#fffbeb':''}">
        <td>${r.row_index}</td>
        <td>${r.car_code||'—'}</td>
        <td>${r.equipment_name||'—'}</td>
        <td style="font-size:.78rem">${r.equipment_type||''}</td>
        <td style="font-size:.78rem">${r.branch||''}</td>
        <td style="color:${r.valid?'#10b981':'#ef4444'};font-size:.78rem">${r.valid?'✅':r.errors?.join(', ')}</td>
        <td style="text-align:center">${r.duplicate?'⚠️ موجود':''}</td>
      </tr>`).join('');

    document.getElementById('eqImportPreview').style.display = 'block';
    document.getElementById('eqImportConfirmBtn').disabled = s.valid === 0;
  } catch(e) {
    showNotification(e.message,'error');
  }
}

async function confirmEquipmentImport() {
  const file = document.getElementById('eqImportFile').files[0];
  if(!file) return;
  const updateExisting = document.getElementById('eqUpdateExisting').checked;
  const skipErrors     = document.getElementById('eqSkipErrors').checked;
  const fd = new FormData();
  fd.append('file', file);
  try {
    const res = await fetch(`/equipment/import/confirm?skip_errors=${skipErrors}&update_existing=${updateExisting}`, {
      method:'POST', headers:{'Authorization':'Bearer '+localStorage.getItem('access_token')}, body:fd
    }).then(r=>r.json());
    if(res.detail) throw new Error(typeof res.detail==='string'?res.detail:JSON.stringify(res.detail));
    showNotification(`✅ تم استيراد ${res.inserted||0} معدة، تحديث ${res.updated||0}، تخطي ${res.skipped||0}`,'success');
    closeEquipmentImport();
    await loadEquipmentData();
  } catch(e) {
    showNotification(e.message,'error');
  }
}

function exportEquipmentCSV() {
  if(!_eqData.length) return showNotification('لا توجد بيانات','error');
  const headers = ['الكود','اسم المعدة','الماركة','الموديل','السنة','الشاسيه','النوع','الفرع','القطاع','المشروع','الحالة','ملاحظات'];
  const rows = _eqData.map(e=>[
    e.car_code, e.equipment_name, e.brand, e.model, e.year, e.chassis,
    e.equipment_type, e.branch, e.sector, e.project, e.status, e.notes
  ]);
  const csv = '\uFEFF' + [headers,...rows].map(r=>r.map(v=>'"'+String(v||'').replace(/"/g,'\"')+'"').join(',')).join('\r\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  a.download = 'equipment_export.csv';
  a.click();
  URL.revokeObjectURL(a.href);
}

async function loadRentalData() {
  const month  = document.getElementById('rentalMonth')?.value  || '';
  const branch = document.getElementById('rentalBranch')?.value?.trim() || '';
  const source = document.getElementById('rentalSource')?.value?.trim() || '';
  const tbody   = document.getElementById('rentalTableBody');
  const summary = document.getElementById('rentalSummary');

  if(tbody) tbody.innerHTML = `<tr><td colspan="14" style="text-align:center;padding:2rem">⏳ جاري التحميل...</td></tr>`;
  try {
    let url = `/rental-equipment?month=${month}`;
    if(branch) url += `&branch=${encodeURIComponent(branch)}`;
    if(source) url += `&source=${encodeURIComponent(source)}`;
    const data = await apiCall(url);
    _rentalData = data.records || [];

    const fmt = v => parseFloat(v||0).toLocaleString('ar-EG');
    if(summary) summary.innerHTML = [
      {label:'إجمالي المعدات',    value: _rentalData.length,              icon:'🔑', color:'var(--primary)'},
      {label:'إجمالي القيمة',     value: fmt(data.total_monthly_cost)+' ج', icon:'💰', color:'#ef4444'},
      {label:'إجمالي السولار',    value: fmt(data.total_fuel_liters)+' ل',  icon:'⛽', color:'#f97316'},
      {label:'إجمالي أيام العمل', value: fmt(data.total_work_days),          icon:'📅', color:'#3b82f6'},
    ].map(s=>`
      <div class="card" style="text-align:center;padding:1rem">
        <div style="font-size:1.4rem">${s.icon}</div>
        <div style="font-size:.7rem;color:var(--muted);margin:.25rem 0">${s.label}</div>
        <div style="font-weight:800;color:${s.color}">${s.value}</div>
      </div>`).join('');

    renderRentalTable(_rentalData);
  } catch(e) {
    if(tbody) tbody.innerHTML = `<tr><td colspan="14" style="text-align:center;color:#ef4444;padding:2rem">❌ ${e.message}</td></tr>`;
  }
}

function renderRentalTable(rows) {
  const tbody = document.getElementById('rentalTableBody');
  if(!tbody) return;
  if(!rows.length) {
    tbody.innerHTML = `<tr><td colspan="14" style="text-align:center;padding:2rem;color:var(--muted)">لا توجد بيانات — استورد ملف CSV أو أضف سجل</td></tr>`;
return;
  }
  tbody.innerHTML = rows.map((r,i) => {
    const util = parseFloat(r.utilization_pct||0);
    const utilColor = util>=70?'#10b981':util>=40?'#f97316':'#ef4444';
    const utilCell  = r.utilization_pct ? `<span style="color:${utilColor};font-weight:700">${r.utilization_pct}%</span>` : '—';
    const monthly   = parseFloat(r.monthly_rate||0);
    const monthlyFmt = monthly>0 ? monthly.toLocaleString('ar-EG')+' ج' : '—';
    const isIdle = (r.hours_diff||'').toString().toLowerCase().includes('عاطل');
    return `<tr${isIdle?' style="background:#fef2f2"':''}>
      <td style="text-align:center;color:var(--muted)">${i+1}</td>
      <td style="font-size:.83rem;font-weight:600">${r.branch||'—'}</td>
      <td><strong>${r.equipment_name}</strong></td>
      <td style="font-size:.78rem;color:var(--muted)">${r.code||'—'}</td>
      <td style="font-size:.82rem">${r.rental_source||'—'}</td>
      <td style="text-align:center;font-weight:700">${r.work_days||'—'}</td>
      <td style="text-align:center;font-weight:700;color:#ef4444">${monthlyFmt}</td>
      <td style="text-align:center">${r.fuel_liters||'—'}</td>
      <td style="text-align:center;font-size:.8rem;color:var(--muted)">${r.hours_start||'—'}</td>
      <td style="text-align:center;font-size:.8rem;color:var(--muted)">${r.hours_end||'—'}</td>
      <td style="text-align:center;font-weight:700${isIdle?';color:#ef4444':''}">${r.hours_diff||'—'}</td>
      <td style="text-align:center">${utilCell}</td>
      <td style="font-size:.78rem;color:var(--muted)">${r.project||'—'}</td>
      <td style="text-align:center">
        <button class="btn btn-ghost btn-sm" onclick="showRentalForm(${r.id})" title="تعديل">✏️</button>
        <button class="btn btn-ghost btn-sm" onclick="deleteRentalRecord(${r.id})" style="color:#ef4444" title="حذف">🗑️</button>
      </td>
    </tr>`;
  }).join('');
}

function filterRentalTable(q) {
  const filtered = q.trim()
    ? _rentalData.filter(r => r.equipment_name.includes(q) || (r.branch||'').includes(q) || (r.code||'').includes(q))
    : _rentalData;
  renderRentalTable(filtered);
}

async function saveRentalRecord() {
  const body = {
    branch: document.getElementById('rnBranch').value.trim(),
    equipment_name: document.getElementById('rnName').value.trim(),
    code: document.getElementById('rnCode').value.trim(),
    rental_source: document.getElementById('rnSource').value.trim(),
    work_days: document.getElementById('rnDays').value,
    daily_rate: document.getElementById('rnDaily').value,
    monthly_rate: document.getElementById('rnMonthly').value,
    fuel_liters: document.getElementById('rnFuel').value,
    hours_start: document.getElementById('rnHoursStart').value,
    hours_end: document.getElementById('rnHoursEnd').value,
    hours_diff: document.getElementById('rnDiff').value,
    utilization_pct: document.getElementById('rnUtil').value,
    project: document.getElementById('rnProject').value,
    month: document.getElementById('rnMonth').value,
    sector: document.getElementById('rnSector').value,
    notes: document.getElementById('rnNotes').value,
    consumption_rate: '',
  };
  if(!body.branch) return showNotification('الفرع مطلوب','error');
  if(!body.equipment_name) return showNotification('اسم المعدة مطلوب','error');
  try {
    if(_rentalEditId) {
      await apiCall(`/rental-equipment/${_rentalEditId}`,'PUT',body);
      showNotification('✅ تم التعديل','success');
    } else {
      await apiCall('/rental-equipment','POST',body);
      showNotification('✅ تم الإضافة','success');
    }
    closeRentalForm();
    await loadRentalData();
  } catch(e) { showNotification(e.message||'خطأ','error'); }
}

    showNotification('✅ تم الحذف','success');
    await loadRentalData();

function exportRentalCSV() {
  if(!_rentalData.length) return showNotification('لا توجد بيانات','error');
  const headers = ['الفرع','اسم المعدة','الكود','جهة الإيجار','أيام العمل','قيمة يومية','قيمة شهرية',
                   'سولار(ل)','عداد أول','عداد آخر','الفرق','نسبة الاستخدام%','معدل الاستهلاك','المشروع','ملاحظات','الشهر'];
  const rows = _rentalData.map(r=>[
    r.branch,r.equipment_name,r.code,r.rental_source,r.work_days,r.daily_rate,r.monthly_rate,
    r.fuel_liters,r.hours_start,r.hours_end,r.hours_diff,r.utilization_pct,
    r.consumption_rate,r.project,r.notes,r.month
  ]);
  const csv = '\uFEFF'+[headers,...rows].map(r=>r.map(v=>'"'+String(v||'').replace(/"/g,'\"')+'"').join(',')).join('\r\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  a.download = `rental_${document.getElementById('rentalMonth')?.value||'all'}.csv`;
  a.click(); URL.revokeObjectURL(a.href);
  showNotification('✅ تم التصدير','success');
}

// ══════════════════════════════════════════════════════════
// REUSABLE PAGINATION COMPONENT — يعمل مع أي جدول في النظام
// ══════════════════════════════════════════════════════════
//
// الاستخدام:
//   buildPagination('containerId', totalItems, pageSize, currentPage, onPageChange)
//
//   مثال:
//
//   function changeMyPage(p){ currentPage=p; renderMyTable(); }
// ══════════════════════════════════════════════════════════

// ── Global pagination callbacks registry ──
const _pgnCallbacks = {};

function buildPagination(containerId, totalItems, pageSize, currentPage, onPageChange) {
  const container = document.getElementById(containerId);
  if (!container) return;

  const totalPages = Math.max(1, Math.ceil(totalItems / pageSize));
  if (totalPages <= 1 && totalItems === 0) { container.innerHTML = ''; return; }

  const start = Math.min((currentPage - 1) * pageSize + 1, totalItems);
  const end   = Math.min(currentPage * pageSize, totalItems);

  // سجّل الـ callback
  _pgnCallbacks[containerId] = onPageChange;

  // بناء أرقام الصفحات مع ...
  const pages = [];
  if (totalPages <= 7) {
    for (let i = 1; i <= totalPages; i++) pages.push(i);
  } else {
    pages.push(1);
    if (currentPage > 3) pages.push('...');
    const lo = Math.max(2, currentPage - 1);
    const hi = Math.min(totalPages - 1, currentPage + 1);
    for (let i = lo; i <= hi; i++) pages.push(i);
    if (currentPage < totalPages - 2) pages.push('...');
    pages.push(totalPages);
  }

  const btnClass = (p) => 'fs-page-btn' + (p === currentPage ? ' active' : '');
  const call     = (p) => '_pgnGo("' + containerId + '",' + p + ')';

  let btnsHtml = '';
  pages.forEach(function(p) {
    if (p === '...') {
      btnsHtml += '<span class="fs-page-dots">···</span>';
    } else {
      btnsHtml += '<button class="' + btnClass(p) + '" onclick="' + call(p) + '" aria-label="صفحة ' + p + '">' + p + '</button>';
    }
  });

  const prevDisabled = currentPage <= 1       ? ' disabled' : '';
  const nextDisabled = currentPage >= totalPages ? ' disabled' : '';

  container.className = '';
  container.innerHTML =
    '<div class="fs-pagination">' +
      '<div class="fs-pagination-info">عرض <strong>' + start + '–' + end + '</strong> من <strong>' + totalItems + '</strong></div>' +
      '<div class="fs-pagination-btns">' +
        '<button class="fs-page-btn fs-next"' + nextDisabled + ' onclick="' + call(currentPage + 1) + '" aria-label="الصفحة التالية">' +
          '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>' +
        '</button>' +
        btnsHtml +
        '<button class="fs-page-btn fs-prev"' + prevDisabled + ' onclick="' + call(currentPage - 1) + '" aria-label="الصفحة السابقة">' +
          '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>' +
        '</button>' +
      '</div>' +
    '</div>';
}

function _pgnGo(containerId, page) {
  const cb = _pgnCallbacks[containerId];
  if (typeof cb === 'function') cb(page);
}

// ── helper: قص البيانات حسب الصفحة ──
function paginateData(arr, page, size) {
  const p = Math.max(1, page);
  return arr.slice((p - 1) * size, p * size);
}

// ── Page state manager لكل جدول ──
const _pageState = {};
function getPage(key)       { return _pageState[key] || 1; }
function setPage(key, val)  { _pageState[key] = Math.max(1, val); }



// ── Table Pagination Helper (Reusable) ──
// يُستدعى بعد أي render function
// data: مصفوفة البيانات الكاملة
// bodyId: id الـ tbody
// renderFn: function تأخذ array وتعمل innerHTML
// pageKey: unique key لهذا الجدول
// pageSize: عدد الصفوف

function renderWithPagination(data, bodyId, renderFn, pageKey, pageSize, paginContainerId) {
  const page  = getPage(pageKey);
  const paged = paginateData(data, page, pageSize);
  const tbody = document.getElementById(bodyId);
  if (tbody) tbody.innerHTML = renderFn(paged);
  if (paginContainerId) {
    function _onPageChange(p) {
      setPage(pageKey, p);
      const tb = document.getElementById(bodyId);
      if (tb) tb.innerHTML = renderFn(paginateData(data, p, pageSize));
}
}
}



// ══ Pagination Init Helper ══
function _initPagination(paginId, allData, pageSize, pageKey, renderFn) {
  renderFn();
}

          style="border:2px dashed var(--border-2);border-radius:12px;padding:1.2rem;text-align:center;cursor:pointer;color:var(--muted);font-size:.85rem;transition:border-color .2s,background .2s;"
          onmouseover="this.style.borderColor='var(--primary)';this.style.background='var(--gold-pale)'"
          onmouseout="this.style.borderColor='var(--border-2)';this.style.background=''">
          📁 اضغط لاختيار صورة<br>
          <span style="font-size:.75rem;color:var(--muted)">JPG, PNG, WEBP — حتى 5 MB</span>
        </div>
        <input type="file" id="avatarFileInput" accept="image/*" style="display:none">
        <div style="display:flex;gap:.6rem;margin-top:1rem">
          <button class="btn btn-primary" id="avatarSaveBtn" disabled style="flex:1" onclick="saveAvatar()">
            💾 حفظ الصورة
          </button>
          ${hasAvatar ? `<button class="btn btn-danger" style="flex:none;padding:.5rem .9rem" onclick="deleteAvatar()" title="حذف الصورة">🗑️</button>` : ''}
        </div>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', () => overlay.remove());

  // Preview on file select
  let _avatarB64 = null;
  document.getElementById('avatarFileInput').addEventListener('change', function() {
    const file = this.files[0];
    if(!file) return;
    if(file.size > 5*1024*1024) { showNotification('الصورة أكبر من 5 MB','error'); return; }
    const reader = new FileReader();
    reader.onload = e => {
      _avatarB64 = e.target.result;
      const wrap = document.getElementById('avatarPreviewWrap');
      wrap.innerHTML = `<img src="${e.target.result}" style="width:96px;height:96px;border-radius:14px;object-fit:cover;border:2px solid var(--border);box-shadow:var(--shadow-md)">`;
      document.getElementById('avatarSaveBtn').disabled = false;
    };
    reader.readAsDataURL(file);
  });

  window._avatarB64Ref = () => _avatarB64;
}

async function saveAvatar() {
  const b64 = window._avatarB64Ref ? window._avatarB64Ref() : null;
  if(!b64) return;
  const btn = document.getElementById('avatarSaveBtn');
  btn.disabled = true; btn.textContent = '⏳ جاري الرفع...';
  try {
    const res = await apiCall('/user/avatar','POST',{ image: b64 });
    if(res.ok && res.avatar_url) {
      currentUser.avatar_url = res.avatar_url;
      // تحديث الأيقونة في الـ sidebar فوراً
      const avatarEl = document.getElementById('userAvatar');
      const existingImg = avatarEl.querySelector('img');
      if(existingImg) existingImg.remove();
      const initialSpan = document.getElementById('userAvatarInitial');
      if(initialSpan) initialSpan.style.display = 'none';
      const img = document.createElement('img');
      img.src = res.avatar_url + '?t=' + Date.now();
      img.alt = currentUser.username;
      img.onerror = () => { img.remove(); if(initialSpan) initialSpan.style.display=''; };
      avatarEl.prepend(img);
      document.getElementById('avatarModal')?.remove();
      showNotification('✅ تم رفع الصورة بنجاح','success');
    }
  } catch(e) {
    showNotification('فشل رفع الصورة: ' + (e.message||e),'error');
    btn.disabled = false; btn.textContent = '💾 حفظ الصورة';
  }
}

async function deleteAvatar() {
  if(!confirm('هل تريد حذف صورتك الشخصية؟')) return;
  try {
    await apiCall('/user/avatar','DELETE',{});
    currentUser.avatar_url = '';
    const avatarEl = document.getElementById('userAvatar');
    const existingImg = avatarEl.querySelector('img');
    if(existingImg) existingImg.remove();
    const initialSpan = document.getElementById('userAvatarInitial');
    if(initialSpan) initialSpan.style.display = '';
    document.getElementById('avatarModal')?.remove();
    showNotification('تم حذف الصورة','success');
  } catch(e) {
    showNotification('فشل الحذف','error');
  }
}

    const data = await apiCall(`/reports/fraud-detection?date_from=${from}&date_to=${to}`);
    _fraudData = data.alerts || [];
    const s = data.summary || {};

    if (sumEl) sumEl.innerHTML = [
      {label:'إجمالي التنبيهات', value: s.total||0,  icon:'⚠️', color:'#f97316'},
      {label:'خطورة عالية',      value: s.high||0,   icon:'🔴', color:'#ef4444'},
      {label:'خطورة متوسطة',     value: s.medium||0, icon:'🟠', color:'#f97316'},
      {label:'خطورة منخفضة',     value: s.low||0,    icon:'🟡', color:'#eab308'},
    ].map(x=>`
      <div class="card" style="text-align:center;padding:1rem">
        <div style="font-size:1.5rem">${x.icon}</div>
        <div style="font-size:.72rem;color:var(--muted);margin:.3rem 0">${x.label}</div>
        <div style="font-weight:800;color:${x.color};font-size:1.1rem">${x.value}</div>
      </div>`).join('');

    _fraudPage = 1; // reset page on new data
    filterFraudTable();
  } catch(e) {
    if (tbody) tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;color:#ef4444;padding:2rem">❌ ${e.message}</td></tr>`;
  }
}

function filterFraudTable() {
  const typeVal = document.getElementById('flt_type')?.value || 'all';
  const sevVal  = document.getElementById('flt_severity')?.value || 'all';
  renderFraudTable(_fraudData.filter(a => {
    if (typeVal !== 'all' && a.type !== typeVal) return false;
    if (sevVal  !== 'all' && a.severity !== sevVal) return false;
    return true;
  }));
}

function renderFraudTable(rows) {
  const tbody = document.getElementById('fraudTableBody');
  if (!tbody) return;
  const countEl = document.getElementById('fraudCount');
  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--muted)">✅ لا توجد تنبيهات للفترة المحددة</td></tr>`;
    if(countEl) countEl.textContent = '0 تنبيه';
    return;
  }
  const sevCfg = {
    high:   { color:'#ef4444', icon:'🔴', label:'عالية' },
    medium: { color:'#f97316', icon:'🟠', label:'متوسطة' },
    low:    { color:'#eab308', icon:'🟡', label:'منخفضة' },
  };
  tbody.innerHTML = rows.map((a, i) => {
    const sv = sevCfg[a.severity] || sevCfg.low;
    return `<tr>
      <td style="text-align:center;color:var(--muted)">${i+1}</td>
      <td style="text-align:center">
        <span style="background:${sv.color}20;color:${sv.color};font-size:.75rem;padding:.2rem .6rem;border-radius:20px;font-weight:700;white-space:nowrap">
          ${sv.icon} ${sv.label}
        </span>
      </td>
      <td style="font-size:.82rem;font-weight:600">${a.label}</td>
      <td>
        <strong>${a.plate}</strong>
        ${a.model ? `<br><small style="color:var(--muted)">${a.model}</small>` : ''}
      </td>
      <td style="font-size:.82rem;color:var(--muted)">${a.date||'—'}</td>
      <td style="font-size:.82rem">${a.detail}</td>
    </tr>`;
  }).join('');
  if(countEl) countEl.textContent = `${rows.length} تنبيه`;
}


function exportFraudCSV() {
  if (!_fraudData.length) return showNotification('لا توجد بيانات', 'error');
  const headers = ['الخطورة','النوع','لوحة','المركبة','التاريخ','التفاصيل'];
  const rows = _fraudData.map(a=>[a.severity, a.label, a.plate, a.model, a.date, a.detail]);
  const csv  = '\uFEFF' + [headers,...rows].map(r=>r.map(v=>'"'+String(v||'').replace(/"/g,'""')+'"').join(',')).join('\r\n');
  const el   = document.createElement('a');
  el.href    = URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  el.download= `fraud_report_${document.getElementById('fraudFrom')?.value||'export'}.csv`;
  el.click();
  URL.revokeObjectURL(el.href);
  showNotification('✅ تم تصدير التقرير', 'success');
}

// ===================================================================
async function checkAndShowVoiceNotes() {
  try {
    const notes = await apiCall('/voice-notes').catch(() => []);
    if (!notes || !notes.length) return;
    const unplayed = notes.filter(n => !n.is_deleted && n.play_count < n.max_plays && n.audio_data);
    if (!unplayed.length) return;
    // عرض أول رسالة غير مشغولة في popup
    _showVoiceNotePopup(unplayed, 0);
  } catch(e) {}
}

function _showVoiceNotePopup(notes, idx) {
  const n   = notes[idx];
  if (!n) return;
  const rem  = n.max_plays - n.play_count;
  const exp  = (n.expires_at || '').slice(0, 16).replace('T', ' ');
  const sent = (n.created_at || '').slice(0, 16).replace('T', ' ');
  const total = notes.length;
  const uid = 'vnp_' + n.id;
  // احذف popup قديم
  document.getElementById('voiceNotePopup')?.remove();
  const popup = document.createElement('div');
  popup.id = 'voiceNotePopup';
  popup.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;z-index:99999;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;padding:1rem';
  popup.innerHTML = `
    <div style="background:#0f172a;border-radius:20px;padding:1.5rem;max-width:420px;width:100%;
                box-shadow:0 24px 60px rgba(0,0,0,.5);position:relative;color:white">
      <button onclick="document.getElementById('voiceNotePopup').remove()"
        style="position:absolute;top:.8rem;left:.8rem;background:rgba(255,255,255,.12);border:none;
               color:white;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:1.1rem;
               display:flex;align-items:center;justify-content:center">✕</button>
      ${total > 1 ? `<div style="position:absolute;top:.8rem;right:.8rem;background:#3b82f6;border-radius:50px;padding:.2rem .7rem;font-size:.75rem;font-weight:700">${idx+1}/${total}</div>` : ''}
      <div style="text-align:center;margin-bottom:1.1rem;padding-top:.3rem">
        <div style="font-size:1.6rem;margin-bottom:.3rem">🎙️</div>
        <div style="font-size:1rem;font-weight:800;color:#f1f5f9">رسالة من الإدارة</div>
        <div style="font-size:.75rem;color:#94a3b8;margin-top:.2rem">${sent}</div>
      </div>
      <audio id="${uid}" controls style="width:100%;border-radius:10px;margin-bottom:1rem"
             src="${n.audio_data}">
        <source src="${n.audio_data}" type="audio/webm">
        <source src="${n.audio_data}" type="audio/ogg">
        <source src="${n.audio_data}" type="audio/mp4">
      </audio>
      <div style="font-size:.78rem;color:#94a3b8;text-align:center;margin-bottom:1rem">
        متبقي ${rem} استماع — تنتهي ${exp}
      </div>
      <div style="display:flex;gap:.6rem;justify-content:center;flex-wrap:wrap">
        ${idx + 1 < total ? `<button onclick="_showVoiceNotePopup(window._vnPopupNotes, ${idx+1})"
          style="background:#3b82f6;border:none;color:white;padding:.55rem 1.2rem;border-radius:10px;
                 cursor:pointer;font-size:.85rem;font-weight:700">التالية ›</button>` : ''}
        <button onclick="_markVoiceNotePlayed(${n.id});document.getElementById('voiceNotePopup').remove()"
          style="background:#10b981;border:none;color:white;padding:.55rem 1.2rem;border-radius:10px;
                 cursor:pointer;font-size:.85rem;font-weight:700">✓ تم السماع</button>
      </div>
    </div>`;
  document.body.appendChild(popup);
  window._vnPopupNotes = notes;
  // تشغيل تلقائي
  const audio = document.getElementById(uid);
  if (audio) {
    audio.addEventListener('play', () => _markVoiceNotePlayed(n.id), { once: true });
    audio.play().catch(() => {});
  }
}

async function _markVoiceNotePlayed(noteId) {
  try { await apiCall('/voice-notes/' + noteId + '/play', 'POST'); } catch(e) {}
}

let _mrData = null;

async function loadMonthlyReport() {
  const month  = document.getElementById('mrMonth')?.value  || '';
  const branch = document.getElementById('mrBranch')?.value?.trim() || '';
  const dBody  = document.getElementById('mrDriversBody');
  const cBody  = document.getElementById('mrCarsBody');
  const sumEl  = document.getElementById('mrSummary');

  [dBody, cBody].forEach(el => {
    if (el) el.innerHTML = `<tr><td colspan="10" style="text-align:center;padding:2rem">⏳ جاري التحميل...</td></tr>`;
  });

  try {
    let url = '/reports/monthly?month=' + month;
    if (branch) url += '&branch=' + encodeURIComponent(branch);
    const data = await apiCall(url);
    _mrData = data;
    const s = data.summary || {};

    if (sumEl) sumEl.innerHTML = [
      {label:'إجمالي السائقين',   value: s.total_drivers||0,                                   icon:'👨‍✈️', color:'var(--primary)'},
      {label:'إجمالي المركبات',   value: s.total_cars||0,                                      icon:'🚗', color:'#3b82f6'},

      {label:'إجمالي الكم',       value: Math.round(s.total_km||0).toLocaleString('ar-EG')+' كم', icon:'📍', color:'#10b981'},
      {label:'تكلفة الوقود',      value: Math.round(s.total_fuel_cost||0).toLocaleString('ar-EG')+' ج', icon:'⛽', color:'#f97316'},
      {label:'تكلفة الصيانة',     value: Math.round(s.total_maint_cost||0).toLocaleString('ar-EG')+' ج', icon:'🔧', color:'#ef4444'},
    ].map(x => `
      <div class="card" style="text-align:center;padding:.85rem">
        <div style="font-size:1.4rem">${x.icon}</div>
        <div style="font-size:.7rem;color:var(--muted);margin:.25rem 0">${x.label}</div>
        <div style="font-weight:800;color:${x.color}">${x.value}</div>
      </div>`).join('');

    const drivers = data.drivers || [];
    if (dBody) {
      if (!drivers.length) {
        dBody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--muted)">لا توجد بيانات</td></tr>`;
      } else {
        dBody.innerHTML = drivers.map((d,i) => `<tr>
          <td style="text-align:center;color:var(--muted)">${i+1}</td>
          <td><strong>${d.name}</strong>${d.fixed_number ? ` <small style="color:var(--muted)">#${d.fixed_number}</small>` : ''}</td>
          <td style="font-size:.82rem;color:var(--muted)">${d.branch||'—'}</td>
          <td style="text-align:center;font-weight:700">${d.trips}</td>
          <td style="text-align:center;color:#10b981;font-weight:700">${d.completed}</td>
          <td style="text-align:center;font-weight:700">${Math.round(d.km).toLocaleString('ar-EG')} كم</td>
        </tr>`).join('');
      }
    }

    const cars = data.cars || [];
    if (cBody) {
      if (!cars.length) {
        cBody.innerHTML = `<tr><td colspan="10" style="text-align:center;padding:2rem;color:var(--muted)">لا توجد بيانات</td></tr>`;
      } else {
        cBody.innerHTML = cars.map((car,i) => `<tr>
          <td style="text-align:center;color:var(--muted)">${i+1}</td>
          <td dir="ltr"><strong>${car.plate}</strong></td>
          <td style="font-size:.82rem">${car.model||''} ${car.car_name?'('+car.car_name+')':''}</td>
          <td style="font-size:.82rem;color:var(--muted)">${car.branch||'—'}</td>
          <td style="text-align:center;font-weight:700">${car.trips||0}</td>
          <td style="text-align:center;font-weight:700">${Math.round(car.km||0).toLocaleString('ar-EG')} كم</td>
          <td style="text-align:center">${Math.round(car.fuel_liters||0)}</td>

          <td style="text-align:center;color:#ef4444;font-weight:700">${Math.round(car.maint_cost||0).toLocaleString('ar-EG')}</td>
          <td style="text-align:center;font-weight:900;color:var(--primary)">${Math.round(car.total_cost||0).toLocaleString('ar-EG')}</td>
        </tr>`).join('');
      }
    }
  } catch(e) {
    const msg = `<tr><td colspan="10" style="text-align:center;color:#ef4444;padding:2rem">❌ ${e.message}</td></tr>`;
    if (dBody) dBody.innerHTML = msg;
    if (cBody) cBody.innerHTML = msg;
  }
}

function exportMonthlyCSV() {
  if (!_mrData) return showNotification('لا توجد بيانات', 'error');
  const month   = document.getElementById('mrMonth')?.value || 'report';
  const drivers = _mrData.drivers || [];
  const cars    = _mrData.cars    || [];
  const dHeaders = ['السائق','الرقم الثابت','الفرع','الرحلات','مكتملة','الكم'];
  const dRows    = drivers.map(d => [d.name, d.fixed_number, d.branch, d.trips, d.completed, d.km]);
  const cHeaders = ['اللوحة','المركبة','الفرع','رحلات','كم','وقود(ل)','تكلفة وقود','تكلفة صيانة','الإجمالي'];
  const cRows    = cars.map(car => [car.plate, car.model, car.branch, car.trips||0, car.km||0, car.fuel_liters||0, car.fuel_cost||0, car.maint_cost||0, car.total_cost||0]);
  const toCSV = (h, r) => [h, ...r].map(row => row.map(v => '"'+String(v||'').replace(/"/g,'""')+'"').join(',')).join('\r\n');
  const csv = '\uFEFF' + 'سائقون\r\n' + toCSV(dHeaders, dRows) + '\r\n\r\nمركبات\r\n' + toCSV(cHeaders, cRows);
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], {type: 'text/csv;charset=utf-8'}));
  a.download = 'monthly_report_' + month + '.csv';
  a.click();
  URL.revokeObjectURL(a.href);
  showNotification('✅ تم تصدير التقرير', 'success');
}

        <button class="btn btn-ghost btn-sm" onclick="document.getElementById('vnReassignCard').style.display='none'">✕ إغلاق</button>
      </div>
      <div style="padding:1.25rem">
        <div style="display:grid;grid-template-columns:1fr 1fr auto;gap:1rem;align-items:flex-end">
          <div class="form-group" style="margin:0">
            <label>المركبة</label>
            <select id="rnCar" class="form-control"><option value="">— اختر المركبة —</option></select>
          </div>
          <div class="form-group" style="margin:0">
            <label>السائق الجديد</label>
            <select id="rnDriver" class="form-control"><option value="">— اختر السائق —</option></select>
          </div>
          <button class="btn btn-primary" onclick="doReassign()">✅ تأكيد</button>
        </div>
        <div id="rnStatus" style="margin-top:.75rem;font-size:.85rem"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-title">📋 الرسائل المرسلة</div>
        <div style="display:flex;gap:.5rem">
          <button class="btn btn-outline btn-sm" onclick="showVnReassign()">🔄 إعادة تخصيص</button>
          <button class="btn btn-ghost btn-sm" onclick="loadVoiceNotes()">↺ تحديث</button>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>#</th><th>المستلم</th>
            <th style="text-align:center">المدة</th>
            <th style="text-align:center">تشغيل/حد</th>
            <th>تاريخ الإرسال</th><th>الصلاحية حتى</th>
            <th style="text-align:center">إجراء</th>
          </tr></thead>
          <tbody id="vnTableBody">
            <tr><td colspan="7" style="text-align:center;padding:2rem">⏳ جاري التحميل...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  `;
  await loadVoiceNotes();
  _vnInitReassignLists();
}

async function loadVoiceNotes() {
  const tbody = document.getElementById('vnTableBody');
  if (!tbody) return;
  try {
    // السوبر/أدمن في صفحة الإدارة: يشوف الرسائل اللي بعتوها هم
    const endpoint = (isSuperuser() || isAdmin()) ? '/voice-notes/sent' : '/voice-notes';
    _voiceNotes = await apiCall(endpoint);
    if (!_voiceNotes.length) {
      tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--muted)">لا توجد رسائل مرسلة حتى الآن</td></tr>`;
      return;
    }
    const targetLabel = { admins: '👑 المشرفون', drivers: '🚗 السائقون' };
    tbody.innerHTML = _voiceNotes.map((n, i) => {
      const deleted = n.is_deleted;
      const status  = deleted
        ? '<span style="color:#ef4444;font-size:.78rem">محذوف</span>'
        : `<span style="font-weight:700">${n.play_count}/${n.max_plays}</span>`;
      const dur    = n.duration_sec ? Math.round(n.duration_sec) + 'ث' : '—';
      const sent   = (n.created_at||'').slice(0,16).replace('T',' ');
      const expiry = (n.expires_at||'').slice(0,16).replace('T',' ');
      return `<tr style="${deleted?'opacity:.5':''}">
        <td style="text-align:center;color:var(--muted)">${i+1}</td>
        <td>${n.target_user_id ? `👤 ${n.target_name || 'شخص محدد'}` : (targetLabel[n.target_group] || n.target_group)}</td>
        <td style="text-align:center">${dur}</td>
        <td style="text-align:center">${status}</td>
        <td style="font-size:.82rem;color:var(--muted)">${sent}</td>
        <td style="font-size:.82rem;color:var(--muted)">${expiry}</td>
        <td style="text-align:center">
          ${!deleted ? `<button class="btn btn-ghost btn-sm" style="color:#ef4444" onclick="deleteVoiceNote(${n.id})" title="حذف">🗑️</button>` : ''}
        </td>
      </tr>`;
    }).join('');
  } catch(e) {
    tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;color:#ef4444;padding:2rem">❌ ${e.message}</td></tr>`;
  }
}

async function deleteVoiceNote(id) {
  if (!confirm('حذف هذه الرسالة؟')) return;
  try {
    await apiCall('/voice-notes/' + id, 'DELETE');
    showNotification('✅ تم حذف الرسالة', 'success');
    await loadVoiceNotes();
  } catch(e) {
    showNotification(e.message, 'error');
  }
}

async function toggleVoiceRecording() {
  const btn     = document.getElementById('vnRecordBtn');
  const status  = document.getElementById('vnRecordStatus');
  const sendBtn = document.getElementById('vnSendBtn');
  const preview = document.getElementById('vnPreviewAudio');

  if (_mediaRecorder && _mediaRecorder.state === 'recording') {
    _mediaRecorder.stop();
    clearInterval(_recordingTimer);
    btn.textContent = '🔴 ابدأ التسجيل';
    btn.style.background = '';
    status.textContent = 'تم إيقاف التسجيل';
    return;
  }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    _audioChunks = [];
    _mediaRecorder = new MediaRecorder(stream);
    _mediaRecorder.ondataavailable = e => { if (e.data.size > 0) _audioChunks.push(e.data); };
    _mediaRecorder.onstop = () => {
      const blob = new Blob(_audioChunks, { type: 'audio/webm' });
      const url  = URL.createObjectURL(blob);
      preview.src = url;
      preview.style.display = 'block';
      sendBtn.style.display  = 'inline-flex';
      const reader = new FileReader();
      reader.onload = () => { window._vnAudioB64 = reader.result; };
      reader.readAsDataURL(blob);
      stream.getTracks().forEach(t => t.stop());
    };
    _mediaRecorder.start();
    let secs = 0;
    status.textContent = '⏯️ جاري التسجيل... 0ث';
    btn.textContent = '⏹️ إيقاف التسجيل';
    btn.style.background = '#ef4444';
    preview.style.display = 'none';
    sendBtn.style.display  = 'none';
    _recordingTimer = setInterval(() => {
      secs++;
      status.textContent = '⏯️ جاري التسجيل... ' + secs + 'ث';
      if (secs >= 120) { _mediaRecorder.stop(); clearInterval(_recordingTimer); }
    }, 1000);
  } catch(e) {
    showNotification('تعذر الوصول للميكروفون: ' + e.message, 'error');
  }
}

async function sendVoiceNote() {
  const b64      = window._vnAudioB64;
  const target   = document.getElementById('vnTarget')?.value    || 'admins';
  const maxPlays = parseInt(document.getElementById('vnMaxPlays')?.value || '3');
  const hours    = parseInt(document.getElementById('vnHours')?.value    || '24');
  if (!b64) return showNotification('سجّل رسالة أولاً', 'error');
  if (target === 'specific' && !window._vnSelectedUserId) {
    return showNotification('يرجى اختيار الشخص المراد إرسال الرسالة إليه', 'error');
  }
  const payload = { audio_data: b64, duration_sec: 0, max_plays: maxPlays, hours_ttl: hours };
  if (target === 'specific') {
    payload.target_group   = '';
    payload.target_user_id = window._vnSelectedUserId;
  } else {
    payload.target_group   = target;
    payload.target_user_id = null;
  }
  try {
    await apiCall('/voice-notes', 'POST', payload);
    window._vnAudioB64 = null;
    document.getElementById('vnPreviewAudio').style.display = 'none';
    document.getElementById('vnSendBtn').style.display      = 'none';
    document.getElementById('vnRecordStatus').textContent   = '';
    showNotification('✅ تم إرسال الرسالة بنجاح', 'success');
    await loadVoiceNotes();
  } catch(e) {
    showNotification('فشل الإرسال: ' + e.message, 'error');
  }
}


// ── Voice Note: specific user helpers ──
var _vnSearchTimer = null;
window._vnSelectedUserId = null;

function onVnTargetChange() {
  const val = document.getElementById('vnTarget')?.value;
  const el  = document.getElementById('vnSpecificUser');
  if (el) el.style.display = val === 'specific' ? 'block' : 'none';
  if (val !== 'specific') { window._vnSelectedUserId = null; }
}

async function searchVoiceUsers(q) {
  clearTimeout(_vnSearchTimer);
  const dd = document.getElementById('vnUserDropdown');
  if (!q || q.length < 1) { if(dd) dd.style.display='none'; return; }
  _vnSearchTimer = setTimeout(async () => {
    try {
      const data = await apiCall('/voice-notes/users-search?q=' + encodeURIComponent(q));
      const users = data.users || [];
      if (!dd) return;
      if (!users.length) {
        dd.innerHTML = '<div style="padding:.75rem 1rem;color:#94a3b8;font-size:.85rem;text-align:center">لا توجد نتائج</div>';
        dd.style.display = 'block';
        return;
      }
      dd.innerHTML = users.map((u, idx) => {
        const initials = (u.name||'?').slice(0,2).toUpperCase();
        const avatarHtml = u.avatar
          ? `<img src="${u.avatar}" width="32" height="32" style="border-radius:50%;object-fit:cover;flex-shrink:0">`
          : `<div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#06B6D4,#22C55E);display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;color:#fff;flex-shrink:0">${initials}</div>`;
        const badge = u.type === 'driver'
          ? '<span style="background:#f0fdf4;color:#16a34a;font-size:.7rem;padding:.15rem .5rem;border-radius:20px;font-weight:600">سائق</span>'
          : '<span style="background:#eff6ff;color:#2563eb;font-size:.7rem;padding:.15rem .5rem;border-radius:20px;font-weight:600">مشرف</span>';
        const branch = u.branch ? `<span style="color:#94a3b8;font-size:.72rem"> · ${u.branch}</span>` : '';
        // نحفظ البيانات في global array ونستخدم index بدل JSON.stringify
        window._vnSearchResults = window._vnSearchResults || [];
        window._vnSearchResults[idx] = u;
        return `<div data-vn-idx="${idx}"
          style="padding:.6rem 1rem;cursor:pointer;border-bottom:.5px solid #f1f5f9;display:flex;align-items:center;gap:.65rem;transition:background .12s"
          onmouseover="this.style.background='#f8fafc'" onmouseout="this.style.background=''">
          ${avatarHtml}
          <div style="flex:1;min-width:0;pointer-events:none">
            <div style="font-weight:600;font-size:.85rem;color:#0f172a">${u.name}</div>
            <div style="display:flex;align-items:center;gap:.35rem;margin-top:.1rem">${badge}${branch}</div>
          </div>
        </div>`;
      }).join('');
      // إضافة click listener بعد الـ render
      dd.querySelectorAll('[data-vn-idx]').forEach(el => {
        el.addEventListener('click', function() {
          const i = +this.getAttribute('data-vn-idx');
          const u = window._vnSearchResults[i];
          if (u) selectVnUser(u.id, u.name, u.avatar||'', u.role||'');
        });
      });
      dd.style.display = 'block';
    } catch(e) {
      console.error('voice user search error:', e);
    }
  }, 280);
}

function selectVnUser(id, name, avatar, role) {
  window._vnSelectedUserId = id;
  const dd   = document.getElementById('vnUserDropdown');
  const sel  = document.getElementById('vnSelectedUser');
  const sname= document.getElementById('vnSelectedName');
  const srole= document.getElementById('vnSelectedRole');
  const avEl = document.getElementById('vnSelAvatar');
  const inp  = document.getElementById('vnUserSearch');

  if (dd)  dd.style.display = 'none';
  if (inp) inp.value = '';
  if (sname) sname.textContent = name;
  if (srole) srole.textContent = role || '';

  if (avEl) {
    if (avatar) {
      avEl.innerHTML = `<img src="${avatar}" style="width:100%;height:100%;border-radius:50%;object-fit:cover">`;
    } else {
      avEl.innerHTML = (name||'?').slice(0,2).toUpperCase();
      avEl.style.background = 'linear-gradient(135deg,#06B6D4,#22C55E)';
    }
  }
  if (sel) sel.style.display = 'flex';
}

function clearVnUser() {
  window._vnSelectedUserId = null;
  const sel = document.getElementById('vnSelectedUser');
  const inp = document.getElementById('vnUserSearch');
  const dd  = document.getElementById('vnUserDropdown');
  if (sel) sel.style.display = 'none';
  if (inp) inp.value = '';
  if (dd)  dd.style.display = 'none';
}

// ── Reassign helpers ──
async function _vnInitReassignLists() {
  try {
    const [cars, drivers] = await Promise.all([loadCars(), loadDrivers()]);
    const carSel = document.getElementById('rnCar');
    const drvSel = document.getElementById('rnDriver');
    if (carSel) {
      carSel.innerHTML = '<option value="">— اختر المركبة —</option>' +
        cars.map(c => `<option value="${c.id}">${c.plate} · ${c.car_name||c.model}</option>`).join('');
    }
    if (drvSel) {
      drvSel.innerHTML = '<option value="">— اختر السائق —</option>' +
        drivers.filter(d=>d.status==='active').map(d =>
          `<option value="${d.user_id||d.id}">${d.name}</option>`).join('');
    }
  } catch(e) { console.warn('reassign init:', e); }
}

function showVnReassign() {
  const card = document.getElementById('vnReassignCard');
  if (card) card.style.display = card.style.display === 'none' ? 'block' : 'none';
}

async function doReassign() {
  const carId = document.getElementById('rnCar')?.value;
  const drvId = document.getElementById('rnDriver')?.value;
  const status = document.getElementById('rnStatus');
  if (!carId || !drvId) { if(status) status.innerHTML='<span style="color:#ef4444">اختر المركبة والسائق</span>'; return; }
  try {
    if(status) status.innerHTML = '<span style="color:#64748b">⏳ جاري التخصيص...</span>';
    // حذف الصلاحيات القديمة للمركبة ثم إضافة جديدة
    const perms = await apiCall('/permissions');
    const old   = perms.filter(p => String(p.car_id) === String(carId));
    for (const p of old) {
      await apiCall('/permissions/' + p.id, 'DELETE').catch(()=>{});
    }
    await apiCall('/permissions', 'POST', {car_id: +carId, driver_id: +drvId});
    if(status) status.innerHTML = '<span style="color:#16a34a">✅ تم إعادة التخصيص بنجاح</span>';
    showNotification('✅ تم إعادة تخصيص المركبة', 'success');
    setTimeout(() => { if(status) status.innerHTML=''; }, 3000);
  } catch(e) {
    if(status) status.innerHTML = `<span style="color:#ef4444">❌ ${e.message}</span>`;
  }
}

</script>
