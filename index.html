async function openLicenseRenewalModal(driverId, driverName) {
  openModal(`
    <div class="modal-header">
      <div class="modal-title">📋 تجديد رخصة — ${driverName}</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div style="background:#eff6ff;border:1.5px solid #93c5fd;border-radius:10px;padding:.8rem 1rem;margin-bottom:1rem;font-size:.85rem;color:#1d4ed8">
      💡 أدخل بيانات التجديد وسيتم تحديث سجل السائق فوراً
    </div>
    <div class="form-group">
      <label>نوع الرخصة <span class="req">*</span></label>
      <select id="licRenewType" style="width:100%;padding:.6rem;border:1.5px solid var(--border);border-radius:10px;font-family:inherit">
        <option value="">— اختر —</option>
        <option value="driver">🪪 رخصة القيادة</option>
        <option value="vehicle">🚗 رخصة العربة (رخصة السيارة)</option>
      </select>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.8rem">
      <div class="form-group">
        <label>تاريخ التجديد الفعلي</label>
        <input type="date" id="licRenewDate" value="${new Date().toISOString().split('T')[0]}">
      </div>
      <div class="form-group">
        <label>تاريخ الانتهاء الجديد <span class="req">*</span></label>
        <input type="date" id="licNewExpiry">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">إلغاء</button>
      <button class="btn btn-primary" id="licRenewSave">✅ حفظ التجديد</button>
    </div>`);

  document.getElementById('licRenewSave').onclick = async () => {
    const licType    = document.getElementById('licRenewType').value;
    const renewDate  = document.getElementById('licRenewDate').value;
    const newExpiry  = document.getElementById('licNewExpiry').value;
    if(!licType)   return showNotification('اختر نوع الرخصة','error');
    if(!newExpiry) return showNotification('أدخل تاريخ انتهاء الرخصة الجديد','error');
    const btn = document.getElementById('licRenewSave');
    btn.disabled=true; btn.textContent='جاري...';
    try {
      await apiCall(`/drivers/${driverId}/license`,'PUT',{
        license_type: licType,
        renewal_date: renewDate,
        new_expiry_date: newExpiry
      });
      const licLabel = licType==='driver'?'رخصة القيادة':'رخصة العربة';
      showNotification(`✅ تم تجديد ${licLabel} لـ ${driverName} — تنتهي ${newExpiry}`,'success');
      closeModal();
      await renderDriversSection();
    } catch(e) {
      showNotification(e.message,'error');
      btn.disabled=false; btn.textContent='✅ حفظ التجديد';
    }
  };
}

function openEditDriverModal(id,name,phone,status,national_id,birth_date,driver_license_expiry,vehicle_license_expiry,currentUsername,fixed_number,branch) {
  openModal(`
    <div class="modal-header"><div class="modal-title">✏️ تعديل بيانات السائق</div><button class="modal-close" onclick="closeModal()">✕</button></div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.8rem">
      <div class="form-group"><label>الاسم الكامل <span class="req">*</span></label><input id="mEditName" value="${name}"></div>
      <div class="form-group"><label>رقم الهاتف <span class="req">*</span></label><input type="tel" id="mEditPhone" value="${phone}"></div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.8rem">
      <div class="form-group"><label>الرقم التعريفي</label><input id="mEditNid" value="${national_id||''}" maxlength="14"></div>
      <div class="form-group"><label>تاريخ الميلاد</label><input type="date" id="mEditBirth" value="${birth_date||''}"></div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.8rem">
      <div class="form-group">
        <label>انتهاء رخصة السائق</label>
        <input type="date" id="mEditLic" value="${driver_license_expiry||''}">
      </div>
      <div class="form-group">
        <label>انتهاء رخصة العربة</label>
        <input type="date" id="mEditCarLic" value="${vehicle_license_expiry||''}">
      </div>
    </div>

    <div class="form-group"><label>الحالة</label>
      <select id="mEditStatus">
        <option value="active" ${status==='active'?'selected':''}>نشط</option>
        <option value="inactive" ${status!=='active'?'selected':''}>غير نشط</option>
      </select>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.8rem">
      <div class="form-group"><label>الرقم الثابت</label><input id="mEditFixed" value="${fixed_number||''}"></div>
      <div class="form-group"><label>الفرع / الإدارة</label>${branchSearchField('mEditBranch', branch||'')}</div>
    </div>

    <hr style="margin:1rem 0;border:none;border-top:1px solid var(--border)">
    <div style="background:#f0fdf9;border:1.5px solid #10b981;border-radius:12px;padding:1rem;margin-bottom:.5rem">
      <div style="font-size:.82rem;font-weight:700;color:#065f46;margin-bottom:.7rem">🔐 تعديل بيانات تسجيل الدخول</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.8rem">
        <div class="form-group" style="margin-bottom:0">
          <label>اسم المستخدم <span class="req">*</span></label>
          <input id="mEditUser" value="${currentUsername||''}">
        </div>
        <div class="form-group" style="margin-bottom:0">
          <label>كلمة المرور الجديدة</label>
          <input type="password" id="mEditPass" placeholder="اتركه فارغاً إذا لا تريد تغييره">
        </div>
      </div>
      <div class="location-hint" style="margin-top:.5rem">⚠️ تغيير كلمة المرور سيُلغي جلسة السائق الحالية</div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">إلغاء</button>
      <button class="btn btn-primary" id="mEditSave">💾 حفظ التعديلات</button>
    </div>`);

  document.getElementById('mEditSave').onclick = async () => {
    const n    = document.getElementById('mEditName').value.trim();
    const p    = document.getElementById('mEditPhone').value.trim();
    const s    = document.getElementById('mEditStatus').value;
    const nid  = document.getElementById('mEditNid').value.trim();
    const bd   = document.getElementById('mEditBirth').value;
    const dl   = document.getElementById('mEditLic').value;
    const cl   = document.getElementById('mEditCarLic').value;
    const uname= document.getElementById('mEditUser').value.trim();
    const upass= document.getElementById('mEditPass').value.trim();
    const fixedNum = document.getElementById('mEditFixed').value.trim();
    const branchVal= document.getElementById('mEditBranch').value.trim();

    if(!n||!p)   return showNotification('الاسم والهاتف مطلوبان','error');
    if(!uname)   return showNotification('اسم المستخدم مطلوب','error');

    const btn = document.getElementById('mEditSave');
    btn.disabled=true; btn.textContent='جاري...';

    try{
      // Update driver profile
      await apiCall(`/drivers/${id}`,'PUT',{
        name:n, phone:p, status:s,
        national_id:nid, birth_date:bd,
        driver_license_expiry:dl, vehicle_license_expiry:cl,
        fixed_number:fixedNum, branch:branchVal
      });

      // Update credentials if username changed or password provided
      if(uname !== currentUsername || upass){
        await apiCall(`/drivers/${id}/credentials`,'PUT',{
          username: uname,
          password: upass || undefined
        });
      }

      showNotification('✅ تم تحديث بيانات السائق','success');
      closeModal();
      await renderDriversSection();
    }catch(e){
      showNotification(e.message,'error');
      btn.disabled=false; btn.textContent='💾 حفظ التعديلات';
    }
  };
}

async function openAssignPermModal() {
  const [drivers,cars]=await Promise.all([loadDrivers(),loadCars()]);
  openModal(`
    <div class="modal-header"><div class="modal-title">🔗 تعيين مركبة لسائق</div><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="form-group"><label>السائق <span class="req">*</span></label><select id="mAsDrv"><option value="">-- اختر --</option>${drivers.map(d=>`<option value="${d.id}">${d.name}</option>`).join('')}</select></div>
    <div class="form-group"><label>المركبة <span class="req">*</span></label><select id="mAsCar"><option value="">-- اختر --</option>${cars.map(c=>`<option value="${c.id}">${c.plate} - ${c.model}</option>`).join('')}</select></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">إلغاء</button>
      <button class="btn btn-primary" id="mAsBtn">📌 تعيين</button>
    </div>`);
  document.getElementById('mAsBtn').onclick = async()=>{
    const d=document.getElementById('mAsDrv').value, c=document.getElementById('mAsCar').value;
    if(!d||!c) return showNotification('اختر السائق والمركبة','error');
    try{ await apiCall('/permissions','POST',{driver_id:+d,car_id:+c}); showNotification('✅ تم تعيين الصلاحية','success'); closeModal(); }catch(e){showNotification(e.message,'error');}
  };
}

/* ── CARS ── */
async function renderCarsSection() {
  const [cars, perms, drivers] = await Promise.all([
    loadCars(),
    apiCall('/permissions').catch(()=>[]),
    loadDrivers().catch(()=>[])
  ]);
  window.__carsAll    = cars;
  window._carsCache   = cars;
  window._carsCSVData = cars;
  window._allPerms    = perms;

  // Unassigned cars (no active permission)
  const assignedCarIds = new Set(perms.map(p=>p.car_id));
  const unassignedCars = cars.filter(c=>!assignedCarIds.has(c.id));

  // Drivers with no car
  const assignedDriverIds = new Set(perms.map(p=>p.driver_id));
  const noCarDrivers = drivers.filter(d=>d.status==='active' && !assignedDriverIds.has(d.id));

  // Cars without project or branch
  const noProjectCars = cars.filter(c=>!c.project || c.project.trim()==='');
  const noBranchCars  = cars.filter(c=>!c.branch  || c.branch.trim()==='');

  document.getElementById('pageContent').innerHTML = `
    <!-- Tabs -->
    <div style="display:flex;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap">
      <button id="carsTabBtn_all"       class="btn btn-primary btn-sm" onclick="switchCarsTab('all')">🚗 كل المركبات (${cars.length})</button>
      <button id="carsTabBtn_unassigned" class="btn btn-ghost btn-sm" onclick="switchCarsTab('unassigned')">⚠️ غير مخصصة (${unassignedCars.length})</button>
      <button id="carsTabBtn_nodrivers" class="btn btn-ghost btn-sm" onclick="switchCarsTab('nodrivers')">👤 سائقون بلا سيارة (${noCarDrivers.length})</button>
      <button id="carsTabBtn_noproject" class="btn btn-ghost btn-sm" onclick="switchCarsTab('noproject')">📋 بدون مشروع (${noProjectCars.length})</button>
      <button id="carsTabBtn_nobranch"  class="btn btn-ghost btn-sm" onclick="switchCarsTab('nobranch')">🏢 بدون فرع (${noBranchCars.length})</button>
    </div>

    <!-- Tab: all cars -->
    <div id="carsTabPane_all">
    <div class="card">
      <div class="card-header">
        <div class="card-title">🚘 قائمة المركبات (${cars.length})</div>
        <div style="display:flex;gap:.6rem;flex-wrap:wrap">
          ${!isReporter() ? `<button class="btn btn-outline btn-sm" onclick="exportCarsCSV()">⬇️ تصدير CSV</button>` : ''}
          ${!isReporter() ? `<button class="btn btn-primary btn-sm" onclick="openAddCarModal()">➕ إضافة مركبة</button>` : ''}
        </div>
      </div>
      <div class="stats-row" style="grid-template-columns:repeat(2,1fr);margin-bottom:1rem">
        <div class="stat-card"><div class="stat-icon">🟢</div><div class="stat-value">${cars.filter(c=>c.status==='available').length}</div><div class="stat-label">متاحة</div></div>
        <div class="stat-card"><div class="stat-icon">🔧</div><div class="stat-value">${cars.filter(c=>c.status!=='available').length}</div><div class="stat-label">صيانة</div></div>
      </div>
      <div class="srch-bar">
        <input data-tsearch placeholder="🔍 بحث باللوحة / الموديل / الاسم / الفرع..."
          oninput="filterCarsTable()">
        <select id="carsFilterCat" onchange="filterCarsTable()">
          <option value="">كل التصنيفات</option>
          <option value="عربات">🚗 عربات</option>
          <option value="آلات ومعدات">⚙️ آلات ومعدات</option>
        </select>
        <select id="carsFilterStatus" onchange="filterCarsTable()">
          <option value="">كل الحالات</option>
          <option value="available">● متاحة</option>
          <option value="maintenance">🔧 صيانة</option>
          <option value="minor_fault">⚠️ عطل بسيط</option>

function filterCarsTable() {
  const txt    = document.querySelector('#carsList')?.closest('.card')?.querySelector('[data-tsearch]')?.value?.toLowerCase()||'';
  const cat    = document.getElementById('carsFilterCat')?.value||'';
  const status = document.getElementById('carsFilterStatus')?.value||'';
  const tbody  = document.getElementById('carsBody');
  if(!tbody) return;

  // Map filter values to all equivalent DB values (legacy + current)
  const STATUS_GROUPS = {
    'available':      ['available'],
    'maintenance':    ['maintenance'],
    'minor_fault':    ['minor_fault','minor_breakdown','tire_issue'],
    'major_fault':    ['major_fault','major_breakdown','breakdown'],
    'scrap':          ['scrap'],
    'scrapped':       ['scrapped'],
    'sale_committee': ['sale_committee'],
    'sold':           ['sold'],
  };
  const matchValues = status ? (STATUS_GROUPS[status] || [status]) : null;

  let vis=0;
  tbody.querySelectorAll('tr').forEach(tr=>{
    const rowCat    = tr.dataset.cat    || '';
    const rowStatus = tr.dataset.status || '';
    const matchCat    = !cat    || rowCat.includes(cat);
    const matchStatus = !matchValues || matchValues.includes(rowStatus);
    const matchTxt    = !txt    || tr.textContent.toLowerCase().includes(txt);
    const show = matchCat && matchStatus && matchTxt;
    tr.classList.toggle('row-hidden', !show);
    if(show) vis++;
  });
  const cnt = document.getElementById('carsCount');
  if(cnt) cnt.textContent = `${vis} / ${tbody.querySelectorAll('tr').length}`;
}
function resetCarsFilter() {
  const card = document.getElementById('carsList')?.closest('.card');
  if(card) card.querySelectorAll('input,select').forEach(el=>el.value='');
  filterCarsTable();
}

function onCarCategoryChange(cat) {
  const CAR_CATEGORIES = {
    'عربات': ['سيارة ركوب','بيك آب كابينة مزدوجة','بيك آب كابينة مفردة','ميكروباص','أتوبيس','سيارة نقل خفيف','سيارة إسعاف','أخرى'],
    'آلات ومعدات': ['معدات رفع','معدات حفر وتحريك تربة','معدات نقل ثقيل','معدات إنتاجية','معدات ثابتة','معدات وآلات ورش','معدات مساعدة','أخرى']
  };
  const sel = document.getElementById('mCarSubType');

/* ── LOCATION HELPERS ── */
function parseCoords(str) {
  if(!str) return null;
  let m = str.match(/(-?\d+\.?\d*)[,\s]+(-?\d+\.?\d*)/); if(m) return [parseFloat(m[1]),parseFloat(m[2])];
  m = str.match(/@(-?\d+\.?\d*),(-?\d+\.?\d*)/); if(m) return [parseFloat(m[1]),parseFloat(m[2])];
  m = str.match(/[?&]q=(-?\d+\.?\d*),(-?\d+\.?\d*)/); if(m) return [parseFloat(m[1]),parseFloat(m[2])];
  m = str.match(/maps\/(-?\d+\.?\d*),(-?\d+\.?\d*)/); if(m) return [parseFloat(m[1]),parseFloat(m[2])];
  return null;
}
function formatLocation(loc, asGarage=false) {
  if(!loc||!loc.trim()) return '—';
  const coords=parseCoords(loc);
  if(coords){
    const url=`https://www.google.com/maps?q=${coords[0]},${coords[1]}`;
    if(asGarage) return `<a href="${url}" target="_blank"
      style="display:inline-flex;align-items:center;gap:.3rem;padding:.2rem .6rem;background:#fee2e2;color:#dc2626;border-radius:6px;text-decoration:none;font-size:.78rem;font-weight:700;border:1px solid #fca5a5">
      🅿️ ${coords[0].toFixed(4)}, ${coords[1].toFixed(4)}</a>`;
    return `<a class="location-link" href="${url}" target="_blank">📍 ${coords[0].toFixed(4)}, ${coords[1].toFixed(4)}</a>`;
  }
  if(loc.startsWith('http')){
    if(asGarage) return `<a href="${loc}" target="_blank"
      style="display:inline-flex;align-items:center;gap:.3rem;padding:.2rem .6rem;background:#fee2e2;color:#dc2626;border-radius:6px;text-decoration:none;font-size:.78rem;font-weight:700;border:1px solid #fca5a5">
      🅿️ فتح الموقع</a>`;
    return `<a class="location-link" href="${loc}" target="_blank">📍 فتح الخريطة</a>`;
  }
  return `<span style="font-size:.8rem">${loc}</span>`;
}

/* ── TRIPS TABLE ── */
function buildTripsTable(trips, drivers, cars, garageLatest) {
  if (!trips || !trips.length)
    return '<div class="empty-state"><div class="empty-icon">📭</div><p>لا توجد رحلات</p></div>';

  const drvMap = Object.fromEntries((drivers||[]).map(d => [d.id, d.name]));
  const carMap = Object.fromEntries((cars||[]).map(c => [c.id, c.plate]));
  const canEdit = !isReporter();

  let rows = '';
  trips.forEach(function(t) {
    const dName    = drvMap[t.driver_id] || '—';
    const cPlate   = carMap[t.car_id]   || '—';
    const isActive = !t.end_time;
    const startT   = t.start_time ? (isSuperuser() ? fmtDT(t.start_time) : fmtDate(t.start_time)) : '—';
    const endT     = t.end_time   ? (isSuperuser() ? fmtDT(t.end_time)   : fmtDate(t.end_time))   : '—';
    const km       = (t.start_odometer != null && t.end_odometer != null)
      ? Math.max(0, t.end_odometer - t.start_odometer).toFixed(0) + ' كم' : '—';
    const statusBadge = isActive
      ? '<span class="badge badge-blue">● جارية</span>'
      : '<span class="badge badge-green">✓ منتهية</span>';
    const editBtn = canEdit
      ? '<button class="btn btn-ghost btn-sm edit-odo" data-id="' + t.id +
        '" data-start="' + (t.start_odometer||'') +
        '" data-end="'   + (t.end_odometer||'')   +
        '" data-driver="' + dName.replace(/"/g,'') +
        '" data-active="' + (isActive?'1':'0') + '">✏️</button>'
      : '';

    rows +=
      '<tr>' +
        '<td style="color:var(--muted);font-size:.75rem">' + t.id + '</td>' +
        '<td><strong>' + dName + '</strong></td>' +
        '<td dir="ltr" style="font-weight:700;color:#1e3a5f">' + cPlate + '</td>' +
        '<td style="font-size:.8rem;white-space:nowrap">' + startT + '</td>' +
        '<td style="font-size:.8rem;white-space:nowrap">' + endT + '</td>' +
        '<td style="text-align:center">' + (t.start_odometer != null ? t.start_odometer : '—') + '</td>' +
        '<td style="text-align:center">' + (t.end_odometer   != null ? t.end_odometer   : '—') + '</td>' +
        '<td style="text-align:center"><span style="background:#dbeafe;color:#1d4ed8;border-radius:20px;padding:.1rem .5rem;font-size:.78rem;font-weight:700">' + km + '</span></td>' +
        '<td>' + formatLocation(t.start_location) + '</td>' +
        '<td>' + formatLocation(t.end_location)   + '</td>' +
        '<td style="text-align:center">' + statusBadge + '</td>' +
        '<td style="text-align:center">' + editBtn + '</td>' +
      '</tr>';
  });

  return (
    '<table>' +
      '<thead><tr>' +
        '<th>#</th>' +
        '<th>السائق</th>' +
        '<th>المركبة</th>' +
        '<th>البداية</th>' +
        '<th>النهاية</th>' +
        '<th style="text-align:center">عداد البداية</th>' +
        '<th style="text-align:center">عداد النهاية</th>' +
        '<th style="text-align:center">المسافة</th>' +
        '<th>موقع البداية</th>' +
        '<th>موقع النهاية</th>' +
        '<th style="text-align:center">الحالة</th>' +
        '<th style="text-align:center">تعديل</th>' +
      '</tr></thead>' +
      '<tbody>' + rows + '</tbody>' +
    '</table>'
  );
}

/* ── Combobox helpers ── */
function openCombo(type) {
  const isDriver = type === 'driver';
  const searchEl = document.getElementById(isDriver ? 'ftDriverSearch' : 'ftCarSearch');
  const drop     = document.getElementById(isDriver ? 'ftDriverDrop'   : 'ftCarDrop');
  const query    = searchEl.value.trim().toLowerCase();
  const data     = isDriver ? (window._driversData||[]) : (window._carsData||[]);

  const items = data.filter(item => {
    const text = isDriver ? item.name : item.plate;
    return !query || text.toLowerCase().includes(query);
  }).slice(0, 60);

  if(!items.length) { drop.style.display='none'; return; }

  const highlight = (text) => {
    if(!query) return text;
    const idx = text.toLowerCase().indexOf(query);
    if(idx === -1) return text;
    return text.slice(0,idx) + `<mark style="background:#fde68a;border-radius:2px">${text.slice(idx,idx+query.length)}</mark>` + text.slice(idx+query.length);
  };

  drop.innerHTML = items.map(item => {
    const label = isDriver ? item.name : item.plate;
    const sub   = isDriver ? (item.fixed_number ? `<span style="color:var(--muted);font-size:.78rem"> · ${item.fixed_number}</span>` : '') : (item.model ? `<span style="color:var(--muted);font-size:.78rem"> · ${item.model}</span>` : '');
    return `<div data-id="${item.id}" data-label="${label}"
                 style="padding:.5rem .85rem;cursor:pointer;font-size:.88rem;border-bottom:1px solid var(--border)"
                 onmousedown="selectCombo('${type}',${item.id},'${label.replace(/'/g,"\\'")}')">
              ${highlight(label)}${sub}
            </div>`;
  }).join('');
  drop.style.display = 'block';
}

function selectCombo(type, id, label) {
  const isDriver = type === 'driver';
  document.getElementById(isDriver ? 'ftDriverSearch' : 'ftCarSearch').value = label;
  document.getElementById(isDriver ? 'ftDriverVal'    : 'ftCarVal').value    = id;
  document.getElementById(isDriver ? 'ftDriverDrop'   : 'ftCarDrop').style.display = 'none';
  filterTrips();
}

function closeCombo(type) {
  const isDriver = type === 'driver';
  // لو ما اختارش حاجة وكتب نص فارغ → امسح الفلتر
  const searchEl = document.getElementById(isDriver ? 'ftDriverSearch' : 'ftCarSearch');
  const valEl    = document.getElementById(isDriver ? 'ftDriverVal'    : 'ftCarVal');
  if(!searchEl.value.trim()) { valEl.value = ''; filterTrips(); }
  document.getElementById(isDriver ? 'ftDriverDrop' : 'ftCarDrop').style.display = 'none';
}

function filterTrips() {
  const dId    = document.getElementById('ftDriverVal')?.value;
  const cId    = document.getElementById('ftCarVal')?.value;
  const date   = document.getElementById('ftDate')?.value;
  const status = document.getElementById('ftStatus')?.value;
  const search = (document.getElementById('ftSearch')?.value||'').trim().toLowerCase();

  const drvMap = Object.fromEntries((window._driversData||[]).map(d=>[d.id, d.name]));
  const carMap = Object.fromEntries((window._carsData||[]).map(c=>[c.id, c.plate]));

  let f=(window._tripsData||[]).filter(t=>{
    if(dId    && String(t.driver_id)!==dId)  return false;
    if(cId    && String(t.car_id)!==cId)     return false;
    if(date) {
      if(!t.start_time) return false;
      const localDate = new Date(t.start_time).toLocaleDateString('en-CA');
      if(localDate !== date) return false;
    }
    if(status==='active' && t.end_time)   return false;
    if(status==='done'   && !t.end_time)  return false;
    if(search) {
      const haystack = [
        drvMap[t.driver_id]||'', carMap[t.car_id]||'',
        t.start_odometer, t.end_odometer,
        t.start_time, t.end_time,
        t.notes, t.start_location, t.end_location
      ].join(' ').toLowerCase();
      if(!haystack.includes(search)) return false;
    }
    return true;
  });

  const twrap = document.getElementById('tripsTableWrap');
  if(twrap) twrap.innerHTML = buildTripsTable(f, window._driversData, window._carsData, window._garageLatest);
  const tcEl = document.getElementById('tripCount');
  if(tcEl) tcEl.textContent = f.length;
}

function clearTripFilters(){

  ['ftDriverDrop','ftCarDrop'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.display='none';});

}

function switchWsTab(tabId, clickedBtn) {
  const panels = ['fuel','oils','main','parts'];
  panels.forEach(id => {
    const panel = document.getElementById('wsTabPanel_' + id);
    const btn   = document.getElementById('wsTab_' + id);
    if (!panel || !btn) return;
    const isActive = id === tabId;
    panel.style.display = isActive ? 'block' : 'none';
    btn.style.color = isActive ? '#059669' : '#64748b';
    const indicator = btn.querySelector('span');
    if (isActive && !indicator) {
      const sp = document.createElement('span');
      sp.style.cssText = 'position:absolute;bottom:0;left:0;right:0;height:2px;background:#10b981;border-radius:2px 2px 0 0';
      btn.appendChild(sp);
    } else if (!isActive && indicator) {
      indicator.remove();
    }
  });
}

function buildWSTable(records) {

    <th>العداد</th><th>ساعات المحرك</th><th>الكمية</th><th>الإجمالي</th>
    <th>اسم الصنف</th><th>المقاس</th><th>رقم المستند</th><th>جهة الصرف</th>
    <th>الموقع</th><th>المتسلم</th><th>ملاحظات</th><th>التاريخ</th>
  </tr></thead><tbody>
  ${records.map(r=>{
    const wt=WT[r.type]||{icon:'🔨',label:r.type};
    // Build detail badge

async function filterWS(){
  const car  = document.getElementById('filterCar')?.value  || '';
  const type = document.getElementById('filterType')?.value || '';
  const date = document.getElementById('filterDate')?.value || '';
  const txt  = (document.getElementById('wsSearchText')?.value||'').trim().toLowerCase();
  let f = (window._wsRecords||[]).filter(r=>{
    if(txt){
      const hay = [r.driver_name||'',r.vehicle_plate||'',r.notes||'',r.description||'',r.location||''].join(' ').toLowerCase();
      if(!hay.includes(txt)) return false;
    }
    if(car  && String(r.vehicle_id) !== car)          return false;
    if(type && r.type !== type)                        return false;
    if(date && !r.created_at?.startsWith(date))       return false;
    return true;
  });
  document.getElementById('wsTable').innerHTML = buildWSTable(f);
  const wsCnt=document.getElementById('wsCount');
  if(wsCnt) wsCnt.textContent=`${f.length} / ${(window._wsRecords||[]).length}`;
}

/* ── ROUTE MAP ── */
function loadRouteMap() {
  const sel = document.getElementById('routeTripSelect');
  if(!sel||!sel.value) return;
  const opt = sel.options[sel.selectedIndex];
  const startStr = opt.dataset.start||'';
  const endStr   = opt.dataset.end||'';
  const driverName = opt.dataset.driver||'—';
  const carPlate   = opt.dataset.car||'—';
  const startTime  = opt.dataset.startTime||'';
  const endTime    = opt.dataset.endTime||'';

  const startCoords = parseCoords(startStr);
  const endCoords   = parseCoords(endStr);

  if(!startCoords || !endCoords) {
    showNotification('لا توجد إحداثيات كافية لهذه الرحلة', 'error');
    return;
  }

  const map = window._routeMapInstance;
  if(!map) return;

  // Clear previous layers
  map.eachLayer(layer=>{ if(layer instanceof L.Marker || layer instanceof L.Polyline) map.removeLayer(layer); });

  // Start marker (green)
  const startIcon = L.divIcon({
    className:'',
    html:`<div style="background:#10b981;color:white;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:1rem;border:3px solid white;box-shadow:0 2px 10px rgba(0,0,0,.3)">🟢</div>`,
    iconSize:[36,36],iconAnchor:[18,18]
  });
  // End marker (gold)
  const endIcon = L.divIcon({
    className:'',
    html:`<div style="background:#b8860b;color:white;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:1rem;border:3px solid white;box-shadow:0 2px 10px rgba(184,134,11,.4)">🏁</div>`,
    iconSize:[36,36],iconAnchor:[18,18]
  });

  L.marker(startCoords, {icon:startIcon}).addTo(map).bindPopup(`
    <div dir="rtl" style="font-family:Cairo,sans-serif;min-width:170px">
      <strong style="color:#10b981">🟢 نقطة البداية</strong><br>
      <span style="font-size:.8rem;color:#666">👨‍✈️ ${driverName} — ${carPlate}</span><br>
      <span style="font-size:.78rem;color:#999">${fmtDT(startTime)}</span>
    </div>`).openPopup();

  L.marker(endCoords, {icon:endIcon}).addTo(map).bindPopup(`
    <div dir="rtl" style="font-family:Cairo,sans-serif;min-width:170px">
      <strong style="color:#b8860b">🏁 نقطة النهاية</strong><br>
      <span style="font-size:.8rem;color:#666">👨‍✈️ ${driverName} — ${carPlate}</span><br>
      <span style="font-size:.78rem;color:#999">${fmtDT(endTime)}</span>
    </div>`);

  // Draw route line with animated dashes
  const routeLine = L.polyline([startCoords, endCoords], {
    color:'#1e3a5f', weight:4, opacity:.8,
    dashArray:'10 8'
  }).addTo(map);

  // Midpoint arrow decoration
  const midLat = (startCoords[0]+endCoords[0])/2;
  const midLng = (startCoords[1]+endCoords[1])/2;
  const arrowIcon = L.divIcon({
    className:'',
    html:`<div style="background:#1e3a5f;color:white;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:.85rem;border:2px solid white;box-shadow:0 1px 6px rgba(0,0,0,.2)">🚛</div>`,
    iconSize:[28,28],iconAnchor:[14,14]
  });
  L.marker([midLat,midLng], {icon:arrowIcon}).addTo(map);

  // Fit bounds
  map.fitBounds(L.latLngBounds([startCoords, endCoords]), {padding:[60,60]});

  // Show info bar
  const infoBar = document.getElementById('routeInfoBar');
  if(infoBar){
    const dist = calcDistance(startCoords,endCoords);
    infoBar.style.display='flex';
    infoBar.innerHTML=`
      <div class="route-info-chip">👨‍✈️ ${driverName}</div>
      <div class="route-info-chip">🚗 ${carPlate}</div>
      <div class="route-info-chip">📅 ${fmtDate(startTime)}</div>
      <div class="route-info-chip highlight">📏 ~${dist} كم (خط مستقيم)</div>
      ${endTime?`<div class="route-info-chip">⏱️ ${fmtDT(startTime)} ← → ${fmtDT(endTime)}</div>`:''}
    `;
  }
}

function calcDistance(c1, c2) {
  const R=6371, dLat=(c2[0]-c1[0])*Math.PI/180, dLon=(c2[1]-c1[1])*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(c1[0]*Math.PI/180)*Math.cos(c2[0]*Math.PI/180)*Math.sin(dLon/2)**2;
  return (R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))).toFixed(1);
}

            <select id="opGranularity" style="width:100%">
              <option value="daily">📅 يومي</option>
              <option value="weekly">📆 أسبوعي</option>
              <option value="monthly" selected>🗓️ شهري</option>
            </select>
          </div>
          <div>
            <button class="btn btn-primary" onclick="generateOpCard()" style="white-space:nowrap;height:38px">
              ⚙️ إنشاء التقرير
            </button>
          </div>
        </div>
        <div style="margin-top:.7rem;font-size:.78rem;color:#94a3b8">
          💡 التفصيلي يتطلب اختيار مركبة محددة
        </div>
      </div>
    </div>

    <div id="opCardResult" style="margin-top:1rem"></div>
    <div id="anomalyResult"  style="margin-top:1rem"></div>
    <div id="driversReport" style="margin-top:1rem"></div>`;

  // Add anomaly check button
  setTimeout(() => {
    const filterDiv = document.querySelector('.filter-grid');
    if (filterDiv) {
      const btn = document.createElement('div');
      btn.style.cssText = 'display:flex;align-items:flex-end;gap:.4rem';
      btn.innerHTML = `<button class="btn btn-warning btn-sm" onclick="checkAnomalousTrips()" title="كشف الرحلات ذات قراءات عداد غير منطقية" style="height:38px;white-space:nowrap">⚠️ رحلات شاذة</button>`;
      filterDiv.appendChild(btn);
    }
  }, 50);

  // Set sensible defaults: current year
  const now = new Date();
  document.getElementById('opFrom').value = `${now.getFullYear()}-01-01`;
  document.getElementById('opTo').value   = now.toISOString().slice(0,10);

  // ── Searchable car dropdown ──
  window._opCars = cars;  // store for filtering
  _renderOpCarList(cars, '');

  // Close dropdown on outside click
  document.addEventListener('click', function _opCarOutside(e) {
    const wrap = document.getElementById('opCarWrap');
    if (wrap && !wrap.contains(e.target)) {
      const dd = document.getElementById('opCarDropdown');
      const tr = document.getElementById('opCarTrigger');
      if (dd) { dd.classList.remove('cs-open'); }
      if (tr) { tr.classList.remove('cs-open'); }
    }
  });
}

function _renderOpCarList(cars, query) {
  const list = document.getElementById('opCarList');
  if (!list) return;
  const q = (query||'').trim().toLowerCase();
  const selectedId = document.getElementById('opCar')?.value || '';

  function hl(text) {
    if (!q) return text;
    const idx = text.toLowerCase().indexOf(q);
    if (idx < 0) return text;
    return text.slice(0,idx) + '<mark>' + text.slice(idx, idx+q.length) + '</mark>' + text.slice(idx+q.length);
  }

  const filtered = cars.filter(c => {
    const text = (c.plate + ' ' + c.model + ' ' + (c.car_name||'')).toLowerCase();
    return !q || text.includes(q);
  });

  const allSel = selectedId === '';
  const allItem = `<div class="cs-option ${allSel?'cs-selected':''}"
    onclick="selectOpCar('', '— كل المركبات —')">
    <span>— كل المركبات —</span>
  </div>`;

  const items = filtered.map(c => {
    const label = c.plate + ' — ' + c.model + (c.car_name?' ('+c.car_name+')':'');
    const isSel = String(c.id) === String(selectedId);
    return `<div class="cs-option ${isSel?'cs-selected':''}"
      onclick="selectOpCar('${c.id}', '${label.replace(/'/g,"\'")}')" >
      <strong style="color:#1e3a5f">${hl(c.plate)}</strong>
      <span style="color:#64748b;margin-right:.35rem">${hl(c.model)}${c.car_name?' — '+hl(c.car_name):''}</span>
    </div>`;
  });

  if (!filtered.length) {
    list.innerHTML = allItem + '<div class="cs-empty">لا توجد نتائج</div>';
  } else {
    list.innerHTML = allItem + items.join('');
  }
}

function toggleOpCarDropdown() {
  const dd = document.getElementById('opCarDropdown');
  const tr = document.getElementById('opCarTrigger');
  if (!dd || !tr) return;
  const isOpen = dd.classList.contains('cs-open');
  if (isOpen) {
    dd.classList.remove('cs-open');
    tr.classList.remove('cs-open');
  } else {
    dd.classList.add('cs-open');
    tr.classList.add('cs-open');
    setTimeout(() => document.getElementById('opCarSearch')?.focus(), 80);
    _renderOpCarList(window._opCars || [], '');
    if (document.getElementById('opCarSearch'))
      document.getElementById('opCarSearch').value = '';
  }
}

async function showOpCarList() {
  const dd = document.getElementById('opCarDropdown');
  const tr = document.getElementById('opCarTrigger');
  if (dd) dd.classList.add('cs-open');
  if (tr) tr.classList.add('cs-open');
  filterOpCarList();
}

async function filterOpCarList() {
  const q = document.getElementById('opCarSearch')?.value || '';
  _renderOpCarList(window._opCars || [], q);
}

async function selectOpCar(val, label) {
  document.getElementById('opCar').value = val;
  const lbl = document.getElementById('opCarLabel');
  if (lbl) {
    lbl.textContent = label || '— كل المركبات —';
    lbl.classList.toggle('cs-placeholder', !val);
  }
  const dd = document.getElementById('opCarDropdown');
  const tr = document.getElementById('opCarTrigger');
  if (dd) dd.classList.remove('cs-open');
  if (tr) tr.classList.remove('cs-open');
}

async function generateOpCard() {
  const car_id      = document.getElementById('opCar').value;
  const date_from   = document.getElementById('opFrom').value;
  const date_to     = document.getElementById('opTo').value;
  const report_type = document.getElementById('opType').value;
  const granularity = document.getElementById('opGranularity')?.value || 'monthly';
  const res_el      = document.getElementById('opCardResult');

  if(!date_from||!date_to) { showNotification('يرجى تحديد الفترة الزمنية','error'); return; }
  if(date_from > date_to)  { showNotification('تاريخ البداية يجب أن يسبق تاريخ النهاية','error'); return; }

  // التفصيلي يتطلب مركبة محددة
  if(report_type==='detailed' && !car_id) {
    showNotification('التقرير التفصيلي يتطلب اختيار مركبة محددة', 'error');
    return;
  }

  res_el.innerHTML = '<div class="empty-state"><div class="empty-icon">⏳</div><p>جاري إنشاء التقرير...</p></div>';

  // map frontend granularity → backend group_by
  const groupBy = granularity==='daily' ? 'day' : granularity==='weekly' ? 'week' : 'month';
  let params = `date_from=${date_from}&date_to=${date_to}&report_type=${report_type}&group_by=${groupBy}`;
  if(car_id) params += `&car_id=${car_id}`;

  let data;
  try { data = await apiCall(`/reports/operational?${params}`); }
  catch(e) { res_el.innerHTML=`<div style="color:#ef4444;padding:1rem">${e.message}</div>`; return; }

  if(!data.rows || data.rows.length===0) {
    res_el.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>لا توجد رحلات في هذه الفترة</p></div>';
    return;
  }

  // لو summary وفيه صف واحد بـ trip_count=0 → مفيش بيانات
  if(data.report_type === 'summary' && data.rows.length === 1 && (data.rows[0].trip_count||0) === 0) {
    res_el.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>لا توجد رحلات مسجلة في هذه الفترة للمركبة المحددة</p></div>';
    return;
  }

  // Determine column labels from backend group_by field
  const gb = data.group_by || 'month';   // day | week | month | year
  const isDaily   = gb === 'day';
  const isWeekly  = gb === 'week';
  const isMonthly = gb === 'month';
  const isYearly  = gb === 'year';

  function periodLabel(p) {
    if(!p) return '—';
    // لو مش تاريخ (زي "إجمالي الفترة") → رجّعه كما هو
    if(!/^\d{4}/.test(p)) return p;
    if(isDaily) {
      // p = "2026-04-20" → الأحد 20 أبريل
      const d = new Date(p + 'T00:00:00');
      if(isNaN(d)) return p;
      return d.toLocaleDateString('ar-EG',{weekday:'long', day:'numeric', month:'long'});
    }
    if(isWeekly) {
      // p = "2026-04-14" (Monday) → 14 أبريل – 20 أبريل 2026
      const start = new Date(p + 'T00:00:00');
      if(isNaN(start)) return p;
      const end   = new Date(start); end.setDate(end.getDate() + 6);
      const opts  = {day:'numeric', month:'long'};
      const optsY = {day:'numeric', month:'long', year:'numeric'};
      return start.toLocaleDateString('ar-EG', opts) + ' – ' + end.toLocaleDateString('ar-EG', optsY);
    }
    if(isMonthly) {
      // p = "2026-04" → أبريل 2026
      const parts = p.split('-');
      if(parts.length < 2) return p;
      const [y,m] = parts;
      return new Date(+y,+m-1,1).toLocaleDateString('ar-EG',{month:'long', year:'numeric'});
    }
    if(isYearly) return `عام ${p}`;
    return p;
  }

  const maxKm = Math.max(...data.rows.map(r=>Math.max(0,(r.max_odo||0)-(r.min_odo||0))));

  const car    = data.car_info;
  const carStr = car
    ? `${car.plate} — ${car.model}${car.car_name?' ('+car.car_name+')':''}`
    : 'جميع المركبات';
  // معلومات إضافية للعرض في البطاقة
  const carCodeStr    = car?.car_code  ? `الكود: ${car.car_code}`    : '';
  const carChassisStr = car?.chassis   ? `الشاسيه: ${car.chassis}`   : '';
  const carExtraInfo  = [carCodeStr, carChassisStr].filter(Boolean).join('   |   ');

  function fmt(n) { return fmtNum(n); }
  function fmtDate(d) {
    if(!d) return '—';
    // YYYY-MM → أول يوم في الشهر
    if(/^\d{4}-\d{2}$/.test(d)) {
      const [y,m] = d.split('-');
      return new Date(+y, +m-1, 1).toLocaleDateString('ar-EG', {month:'long', year:'numeric'});
    }
    // YYYY → سنة فقط
    if(/^\d{4}$/.test(d)) return `عام ${d}`;
    // YYYY-MM-DD
    return new Date(d + 'T00:00:00').toLocaleDateString('ar-EG');
  }

  const periodHeader = isDaily?'اليوم' : isWeekly?'الأسبوع' : isMonthly?'الشهر' : isYearly?'السنة' : 'الفترة';

  const tableRows = data.rows.filter(r => !String(r.period||'').includes('إجمالي')).map((r,i)=>{
    const km  = Math.max(0, (r.max_odo||0) - (r.min_odo||0));
    const pct = maxKm>0 ? (km/maxKm*100).toFixed(1) : 0;
    // ── تمييز الصفوف الشاذة: مسافة > 900 كم في الفترة أو رحلات > 50 ──
    const isAnomalous = km > 900 || r.trip_count > 50;
    // لا نعرض badge "شاذ" على صف إجمالي الفترة
    const isTotal = String(r.period||'').includes('إجمالي');
    const rowStyle = isAnomalous
      ? 'background:linear-gradient(90deg,#fef9c3 0%,#fff 100%);border-right:3px solid #f59e0b;'
      : '';
    const anomalyBadge = (isAnomalous && !isTotal)
      ? `<span title="قيمة شاذة — يُنصح بمراجعة البيانات"
               style="background:#fef3c7;color:#92400e;font-size:.62rem;padding:.1rem .4rem;
                      border-radius:20px;border:1px solid #fcd34d;font-weight:700;margin-right:.4rem">
           ⚠️ شاذ
         </span>`
      : '';
    return `<tr style="${rowStyle}">
      <td style="text-align:center;color:#94a3b8;font-size:.78rem">${i+1}</td>
      <td style="font-weight:700;white-space:nowrap">${anomalyBadge}${periodLabel(r.period)}</td>
      <td style="text-align:center">${r.trip_count}</td>
      <td>
        <span class="op-km-badge" style="${isAnomalous?'background:#fef3c7;color:#b45309;':''}">${fmt(km)} كم</span>
        <div class="op-bar-wrap"><div class="op-bar" style="width:${pct}%;${isAnomalous?'background:#f59e0b;':''}"></div></div>
      </td>
      <td style="text-align:center;color:#64748b;font-size:.82rem">${fmt(r.min_odo)}</td>
      <td style="text-align:center;color:#64748b;font-size:.82rem">${fmt(r.max_odo)}</td>
      <td style="text-align:center;font-size:.8rem;color:#94a3b8">${r.first_date ? fmtDate(r.first_date) : '—'}</td>
    </tr>`;
  }).join('');

  // Summary cards — المسافة الكلية = عداد نهاية آخر رحلة − عداد بداية أول رحلة
  const realTotalKm = Math.max(0, (data.max_odo||0) - (data.min_odo||0));
  // أيام عمل المركبة — جاية مباشرة من الـ API (COUNT DISTINCT date)
  const workDays = data.work_days || 0;
  const summaryCards = `
    <div class="op-summary-cards" style="display:grid;grid-template-columns:repeat(5,1fr);gap:.8rem;margin-bottom:.8rem">
      ${[
        {icon:'🛣️', label:'إجمالي المسافة',         val:fmt(realTotalKm)+' كم',  color:'#3b82f6'},
        {icon:'🗺️', label:'عدد الرحلات',             val:data.total_trips,         color:'#8b5cf6'},
        {icon:'📅', label:'أيام عمل المركبة',         val:workDays+' يوم',          color:'#0891b2'},
        {icon:'📟', label:'عداد البداية (أول رحلة)', val:fmt(data.min_odo)+' كم', color:'#10b981'},
        {icon:'📟', label:'عداد النهاية (آخر رحلة)', val:fmt(data.max_odo)+' كم', color:'#f59e0b'},
      ].map(s=>`
        <div class="op-summary-card-item" style="background:#fff;border:1.5px solid ${s.color}22;
                    border-radius:14px;padding:.8rem 1rem;text-align:center">
          <div class="op-summary-icon" style="font-size:1.4rem">${s.icon}</div>
          <div style="font-size:.72rem;color:#64748b;margin:.2rem 0">${s.label}</div>
          <div style="font-weight:800;color:${s.color};font-size:.95rem">${s.val}</div>
        </div>`).join('')}
    </div>`;

  // ── جلب بيانات السائقين ونوع الوقود ──
  let driversHtml = '';
  let fuelTypeHtml = '';
  if(car_id) {
    try {
      const dData = await apiCall(`/reports/operational-by-driver?car_id=${car_id}&date_from=${date_from}&date_to=${date_to}`);

      // ── نوع الوقود + كمية السولار + معدل الاستهلاك + جدول المسحوبات ──
      const fuelDetail = dData.fuel_detail || [];
      // نحدد نوع الوقود الأساسي: السولار أولاً، ثم البنزين الأكثر استخداماً
      const fuelRecords = dData.fuel_records || [];
      const solarRec    = fuelRecords.find(f=>f.type==='fuel_solar');
      const petrolTypes = ['fuel_92','fuel_95','fuel_80','fuel_cng'];
      const petrolRec   = fuelRecords.filter(f=>petrolTypes.includes(f.type))
                                     .sort((a,b)=>(b.count||0)-(a.count||0))[0];
      const primaryFuelType = solarRec ? 'fuel_solar' : (petrolRec?.type || null);
      const primaryFuelLabel = primaryFuelType === 'fuel_solar' ? 'السولار'
        : primaryFuelType === 'fuel_92' ? 'بنزين 92'
        : primaryFuelType === 'fuel_95' ? 'بنزين 95'
        : primaryFuelType === 'fuel_80' ? 'بنزين 80'
        : primaryFuelType === 'fuel_cng' ? 'غاز طبيعي'
        : 'الوقود';
      const totalSolar  = solarRec ? (solarRec.total_qty||0) : 0;
      const primaryDetail = primaryFuelType ? fuelDetail.filter(f=>f.type===primaryFuelType) : [];
      // للتوافق مع الكود القديم
      const solarDetail = fuelDetail.filter(f=>f.type==='fuel_solar');

      // ── معدل الاستهلاك الصحيح (بدون آخر تفويلة) ──
      // المنطق: آخر تفويلة لسه جوه التانك ومش اتحرقت كلها
      // المسافة = عداد آخر تفويلة  − عداد أول تفويلة
      // الوقود  = إجمالي الكميات بدون آخر تفويلة
      // المعدل  = (الوقود ÷ المسافة) × 100  →  ل/100كم
      let consumption = null;
      if (primaryDetail.length >= 2) {
        // رتّب تصاعدياً بالتاريخ
        const sorted = [...primaryDetail].sort((a,b)=>
          (a.fuel_date||'') < (b.fuel_date||'') ? -1 : 1
        );
        const first   = sorted[0];
        const last    = sorted[sorted.length - 1];
        // المسافة بين أول وآخر تفويلة (بالعداد)
        const distKm  = (last.odometer_reading||0) - (first.odometer_reading||0);
        // إجمالي الوقود باستثناء آخر تفويلة
        const liters  = sorted.slice(0, -1).reduce((s,r)=> s + (r.quantity||0), 0);
        if (distKm > 0 && liters > 0) {
          consumption = ((liters / distKm) * 100).toFixed(1);
        }
      } else if (primaryDetail.length === 1 && (totalSolar > 0 || petrolRec) && realTotalKm > 0) {
        // تفويلة واحدة فقط — مش كافي نستبعد، نعرض null
        consumption = null;
      }

      if(dData.fuel_records && dData.fuel_records.length > 0) {
        const allFuels = dData.fuel_records.map(f=>`${WT[f.type]?.icon||'⛽'} ${WT[f.type]?.label||f.type} (${f.count} مرة)`).join(' &nbsp;·&nbsp; ');

        // كروت الوقود الإضافية
        const fuelCards = [
          totalSolar > 0 ? `<div style="background:#fff;border:1.5px solid #f9731622;border-radius:14px;padding:.8rem 1rem;text-align:center">
            <div style="font-size:1.4rem">⛽</div>
            <div style="font-size:.72rem;color:#64748b;margin:.2rem 0">إجمالي السولار</div>
            <div style="font-weight:800;color:#ea580c;font-size:.95rem">${totalSolar.toLocaleString('ar-EG')} لتر</div>
          </div>` : '',
          consumption ? `<div style="background:#fff;border:1.5px solid #8b5cf622;border-radius:14px;padding:.8rem 1rem;text-align:center">
            <div style="font-size:1.4rem">📊</div>
            <div style="font-size:.72rem;color:#64748b;margin:.2rem 0">معدل الاستهلاك</div>
            <div style="font-weight:800;color:#7c3aed;font-size:.95rem">${consumption} ل/100كم</div>
          </div>` : '',
        ].filter(Boolean).join('');

        fuelTypeHtml = `
          <div style="display:flex;align-items:center;gap:.6rem;background:#f0fdf4;
                      border:1.5px solid #86efac;border-radius:10px;padding:.55rem 1rem;
                      margin-bottom:.5rem;font-size:.82rem">
            <span style="font-size:1.2rem">⛽</span>
            <span><strong style="color:#166534">نوع الوقود:</strong>
            <span style="color:#15803d">${allFuels}</span></span>
          </div>
          ${fuelCards ? `<div class="op-fuel-cards-grid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:.8rem;margin-bottom:.8rem">${fuelCards}</div>` : ''}
          ${primaryDetail.length > 0 ? buildFuelDetailTable(primaryDetail, primaryFuelLabel) : ''}
        `;
      } else {
        fuelTypeHtml = `
          <div style="background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:10px;
                      padding:.55rem 1rem;margin-bottom:.8rem;font-size:.78rem;color:#94a3b8">
            ⛽ لا توجد سجلات وقود لهذه المركبة في الفترة المحددة
          </div>`;
      }

      // السائقون
      if(dData.drivers && dData.drivers.length > 0) {
        const dRows = dData.drivers.map((d,i)=>{
          const dKm = Math.max(0, (d.last_odo||d.max_odo||0) - (d.first_odo||d.min_odo||0));
          return `
          <tr>
            <td style="text-align:center;color:#94a3b8;font-size:.78rem">${i+1}</td>
            <td style="font-weight:700">${d.driver_name}</td>
            <td style="text-align:center">${d.trip_count}</td>
            <td><span style="background:#bfdbfe;color:#1e40af;padding:.2rem .7rem;
                             border-radius:20px;font-weight:700;font-size:.85rem">
              ${fmt(dKm)} كم
            </span></td>
            <td style="text-align:center;color:#64748b;font-size:.82rem">${fmt(d.first_odo||d.min_odo)}</td>
            <td style="text-align:center;color:#64748b;font-size:.82rem">${fmt(d.last_odo||d.max_odo)}</td>
            <td style="text-align:center;font-size:.8rem;color:#94a3b8">${d.first_date||'—'}</td>
          </tr>`;}).join('');
        driversHtml = `
          <div class="op-drivers-section" style="margin-top:1rem">
            <div style="font-weight:800;font-size:.88rem;color:#334155;margin-bottom:.6rem">
              👤 السائقون في هذه الفترة (${dData.drivers.length})
            </div>
            <div style="overflow-x:auto">
              <table class="op-table">
                <thead>
                  <tr>
                    <th style="width:36px">#</th>
                    <th>السائق</th>
                    <th style="text-align:center">الرحلات</th>
                    <th>المسافة</th>
                    <th style="text-align:center">عداد البداية</th>
                    <th style="text-align:center">عداد النهاية</th>
                    <th style="text-align:center">أول رحلة</th>
                  </tr>
                </thead>
                <tbody>${dRows}</tbody>
              </table>
            </div>
          </div>`;
      } else {
        driversHtml = `<div style="font-size:.8rem;color:#94a3b8;margin-top:.8rem">لا توجد رحلات مسجلة بسائقين في هذه الفترة</div>`;
      }
    } catch(e) { /* تجاهل لو فشل */ }
  }

  res_el.innerHTML = `
    <!-- Print Header (hidden on screen) -->

  const OIL_COL = {motor:0, gear:1, brake:2, hydraulic:3, grease:4, other:5};

  // ── جدول الزيوت (16 أعمدة) ──
  // التاريخ | محرك | تروس | فرامل | هيدروليك | شحم | أخرى | التكلفة | رقم مستند | تاريخ مستند | جهة الصرف | عداد(كم) | ساعات محرك | الاسم | عدد التشغيل | التوقيع
  const oilsTbody = document.querySelector('#oilsTable tbody');
  if (oilsTbody) {
    const oils = p2.oils || [];
    const EMPTY_OILS = 8;
    const rows = [];
    let totalCost = 0;
    oils.forEach(o => {
      // تجاهل السجلات اللي مفيهاش كمية مسجّلة
      if(!o.quantity || parseFloat(o.quantity) === 0) return;
      const qtyCells = ['&nbsp;','&nbsp;','&nbsp;','&nbsp;','&nbsp;','&nbsp;'];
      const col = OIL_COL[o.oil_col] ?? 5;
      if(o.quantity) qtyCells[col] = o.quantity;
      const priceNum = parseFloat(o.price) || 0;
      totalCost += priceNum;
      // نعرض التكلفة لو فيه كمية مسجلة (حتى لو السعر لسه 0)
      const hasQty = o.quantity && parseFloat(o.quantity) > 0;
      const costVal = (priceNum > 0)
        ? priceNum.toLocaleString('ar-EG', {minimumFractionDigits:2, maximumFractionDigits:2})
        : (hasQty ? '<span style="color:#94a3b8;font-size:.75rem">لم يُدخل</span>' : '&nbsp;');
      rows.push(`<tr>
        <td>${o.date||'&nbsp;'}</td>
        ${qtyCells.map(c=>`<td>${c}</td>`).join('')}
        <td style="background:#fef9e7;font-weight:700;color:#92400e;text-align:center">${costVal}</td>
        <td>${o.doc_number||'&nbsp;'}</td>
        <td>&nbsp;</td>
        <td>${o.supply_source||'&nbsp;'}</td>
        <td style="background:#f0f9ff;font-weight:700;color:#0369a1;text-align:center">${o.odometer_reading ? fmtNum(o.odometer_reading)+' كم' : '&nbsp;'}</td>
        <td>${o.engine_hours||'&nbsp;'}</td>
        <td>${o.driver||'&nbsp;'}</td>
        <td>&nbsp;</td>
        <td>&nbsp;</td>
      </tr>`);
    });
    while(rows.length < EMPTY_OILS) rows.push('<tr>' + '<td>&nbsp;</td>'.repeat(16) + '</tr>');

    oilsTbody.innerHTML = rows.join('');
  }

  // ── جدول الكاوتش والبطاريات (12 أعمدة) ──
  // التاريخ | اسم الصنف | المقاس | الكمية | رقم مستند | تاريخ مستند | الاجمالي | الوحدة | اسم القائم | توقيع | اسم المتسلم
  const tiresTbody = document.querySelector('#tiresTable tbody');
  if (tiresTbody) {
    const tires = p2.tires || [];
    const EMPTY_TIRES = 6;
    const rows = [];
    tires.forEach(t => {
      rows.push(`<tr>
        <td>${t.date||'&nbsp;'}</td>
        <td>${t.item||'&nbsp;'}</td>
        <td>${t.spec||'&nbsp;'}</td>
        <td>${t.quantity||'&nbsp;'}</td>
        <td style="font-weight:600;color:#0891b2">${t.odometer_reading ? fmtNum(t.odometer_reading)+' كم' : '&nbsp;'}</td>
        <td>${t.doc_number||'&nbsp;'}</td>
        <td>&nbsp;</td>
        <td>${t.price||'&nbsp;'}</td>
        <td>&nbsp;</td>
        <td>${t.driver||'&nbsp;'}</td>
        <td style="min-width:40px">&nbsp;</td>
        <td>${t.receiver_name||'&nbsp;'}</td>
      </tr>`);
    });
    while(rows.length < EMPTY_TIRES) rows.push('<tr>' + '<td>&nbsp;</td>'.repeat(13) + '</tr>');
    tiresTbody.innerHTML = rows.join('');
  }
}

async function generateDriversReport() {

  let url = `/reports/operational-by-driver?car_id=${car_id}&date_from=${date_from}&date_to=${date_to}`;
  let data;
  try { data = await apiCall(url); }

          {icon:'🛣️', label:'إجمالي المسافة', val:fmt((data.max_odo||0)-(data.min_odo||0))+' كم', color:'#3b82f6'},
          {icon:'🗺️', label:'إجمالي الرحلات', val:data.total_trips,         color:'#8b5cf6'},
          {icon:'👥', label:'عدد السائقين',    val:data.drivers.length,       color:'#10b981'},

  let url = '/reports/anomalous-trips?threshold=1000';
  if (car_id) url += `&car_id=${car_id}`;

  let data;
  try { data = await apiCall(url); }
  catch(e) { res_el.innerHTML = `<div style="color:#ef4444;padding:1rem">${e.message}</div>`; return; }

  if (!data.trips || data.trips.length === 0) {
    res_el.innerHTML = `<div class="card" style="border:2px solid #059669">

        ✅ لا توجد رحلات شاذة — جميع قراءات العداد منطقية

    <td style="font-weight:800;color:${kmColor};font-size:1rem">${fmt(km)} كم</td>

    <td>${t.car_plate||'—'}</td>
    <td style="font-size:.82rem;color:#475569">${t.start_odometer!=null?fmt(t.start_odometer)+' كم':'—'}</td>
    <td style="font-size:.82rem;color:#475569">${t.end_odometer!=null?fmt(t.end_odometer)+' كم':'—'}</td>
    <td style="font-size:.78rem;color:#64748b">${t.start_time?(isSuperuser()?fmtDT(t.start_time):t.start_time.slice(0,10)):'—'}</td>
    <td style="text-align:center">
      <button class="btn btn-danger btn-sm" onclick="fixAnomalousTrip(${t.id},${t.start_odometer||0},${t.end_odometer||0})">🛠️ تصحيح</button>
    </td>
  </tr>`;}).join('');

  res_el.innerHTML = `<div class="card" style="border:2px solid #f59e0b">
    <div class="card-header" style="background:#fef3c7;border-radius:12px 12px 0 0;margin:-1.4rem -1.6rem 1rem">
      <div style="padding:.8rem 1.2rem">
        <div class="card-title" style="color:#92400e">
          ⚠️ رحلات بقراءات عداد غير منطقية (أكثر من 1000 كم في رحلة واحدة) — ${data.count} رحلة
        </div>
        <div style="font-size:.78rem;color:#b45309;margin-top:.2rem">
          هذه الرحلات تُؤثر على دقة التقارير — يُرجى مراجعتها وتصحيحها
        </div>
      </div>
    </div>
    <div style="overflow-x:auto">
      <table class="op-table">
        <thead><tr>
          <th style="width:35px">#</th>
          <th>المسافة</th>
          <th>السائق</th>
          <th>المركبة</th>
          <th>عداد البداية</th>
          <th>عداد النهاية</th>
          <th>التاريخ</th>
          <th>إجراء</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>`;
}

async function fixAnomalousTrip(tripId, currentStart, currentEnd) {
  const curKm = currentEnd && currentStart ? (currentEnd - currentStart).toLocaleString('ar-EG',{maximumFractionDigits:1}) : '—';
  openModal(`
    <div class="modal-header">
      <div class="modal-title">🛠️ تصحيح رحلة #${tripId}</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div style="background:#fef3c7;border-radius:8px;padding:.6rem .9rem;margin-bottom:1rem;font-size:.82rem;color:#92400e">
      ⚠️ القراءات الحالية: بداية <strong>${(currentStart||0).toLocaleString('ar-EG')}</strong> كم
      ← نهاية <strong>${(currentEnd||0).toLocaleString('ar-EG')}</strong> كم
      = <strong>${curKm}</strong> كم (مشبوه)
    </div>
    <p style="color:#64748b;margin-bottom:1rem;font-size:.88rem">
      أدخل القراءات الصحيحة للعداد:
    </p>
    <div class="form-group">
      <label>عداد البداية الصحيح (كم)</label>
      <input type="number" id="fixStart" value="${currentStart||''}" min="0"
        oninput="(function(){const s=+document.getElementById('fixStart').value,e=+document.getElementById('fixEnd').value,p=document.getElementById('fixPreview');if(p)p.textContent=(s&&e&&e>s)?'✅ المسافة: '+(e-s).toLocaleString('ar-EG')+' كم':''})()">
    </div>
    <div class="form-group">
      <label>عداد النهاية الصحيح (كم)</label>
      <input type="number" id="fixEnd" value="${currentEnd||''}" min="0"
        oninput="(function(){const s=+document.getElementById('fixStart').value,e=+document.getElementById('fixEnd').value,p=document.getElementById('fixPreview');if(p)p.textContent=(s&&e&&e>s)?'✅ المسافة: '+(e-s).toLocaleString('ar-EG')+' كم':''})()">
    </div>
    <div id="fixPreview" style="margin-top:.5rem;font-size:.82rem;color:#059669;font-weight:700;text-align:center"></div>
    <div id="fixScriptInit" style="display:none"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">إلغاء</button>
      <button class="btn btn-primary" onclick="submitTripFix(${tripId})">✅ حفظ التصحيح</button>
    </div>
  `);
}

async function submitTripFix(tripId) {
  const startV = parseFloat(document.getElementById('fixStart').value);
  const endV   = parseFloat(document.getElementById('fixEnd').value);
  if (isNaN(startV)||isNaN(endV)) return showNotification('يرجى إدخال القيمتين','error');
  if (endV <= startV) return showNotification('عداد النهاية يجب أن يكون أكبر من البداية','error');
  if ((endV - startV) >= 1000) return showNotification('المسافة لا تزال كبيرة جداً ('+Math.round(endV-startV)+' كم) — تحقق من القراءات','error');
  try {
    await apiCall(`/trips/${tripId}`, 'PUT', { start_odometer: startV, end_odometer: endV });
    closeModal();
    showNotification('تم تصحيح الرحلة بنجاح ✅','success');
    checkAnomalousTrips();
  } catch(e) { showNotification(e.message,'error'); }
}

function _reqSkeleton() {
  return `<div style="animation:pulse 1.5s infinite">
    <div style="height:2rem;background:#f1f5f9;border-radius:8px;width:200px;margin-bottom:1.5rem"></div>
    <div style="background:#fff;border:1px solid #e2e8f0;border-radius:16px;overflow:hidden">
      <div style="height:60px;background:#f8fafc;border-bottom:1px solid #f1f5f9"></div>
      ${[1,2,3,4,5].map(()=>`<div style="height:56px;border-bottom:1px solid #f9fafb;padding:1rem 1.25rem">
        <div style="height:14px;background:#f1f5f9;border-radius:4px;width:60%;margin-bottom:.5rem"></div>
        <div style="height:12px;background:#f1f5f9;border-radius:4px;width:40%"></div>
      </div>`).join('')}
    </div>
  </div>`;
}

function _reqStatusPills(isSuper) {
  const all = [...(window._reqData.driver||[]), ...(window._reqData.operator||[])];
  const pills = [
    { v:'all',           l:'الكل', count: all.length },
    { v:'pending',       l:'⏳ انتظار', count: all.filter(r=>r.status==='pending').length },
    { v:'approved',      l:'✅ مقبول',  count: all.filter(r=>r.status==='approved').length },
    { v:'rejected',      l:'❌ مرفوض',  count: all.filter(r=>r.status==='rejected').length },
    ...(isSuper ? [{ v:'pending_super', l:'📤 محال', count: all.filter(r=>r.status==='pending_super').length }] : []),
  ];
  return pills.map(p => {
    const active = window._reqStatusFilt === p.v;
    return `<button onclick="_reqSetStatus('${p.v}')"
      style="display:inline-flex;align-items:center;gap:.3rem;padding:.3rem .75rem;border-radius:20px;border:1.5px solid ${active?'#6366f1':'#e2e8f0'};background:${active?'#6366f1':'#fff'};color:${active?'#fff':'#64748b'};font-size:.76rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s">
      ${p.l} <span style="background:${active?'rgba(255,255,255,.25)':'#f1f5f9'};border-radius:10px;padding:0 .4rem;font-size:.72rem">${p.count}</span>
    </button>`;
  }).join('');
}

function _reqRenderStats() {
  const el = document.getElementById('reqStatsRow');
  if (!el) return;
  const all = [...(window._reqData.driver||[]), ...(window._reqData.operator||[])];
  const total   = all.length;
  const pending = all.filter(r=>r.status==='pending').length;
  const approved= all.filter(r=>r.status==='approved').length;
  const urgent  = all.filter(r=>r.priority==='urgent'&&r.status==='pending').length;
  const cards = [
    { label:'إجمالي الطلبات', value: total,   icon:'📋', color:'#0f172a', bg:'#f8fafc' },
    { label:'في الانتظار',    value: pending,  icon:'⏳', color:'#d97706', bg:'#fffbeb' },
    { label:'تمت الموافقة',   value: approved, icon:'✅', color:'#16a34a', bg:'#f0fdf4' },
    { label:'عاجلة',          value: urgent,   icon:'🔴', color:'#dc2626', bg:'#fef2f2' },
  ];
  el.innerHTML = cards.map(c => `
    <div style="background:${c.bg};border:1.5px solid #e2e8f0;border-radius:14px;padding:.85rem 1.1rem">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.2rem">
        <span style="font-size:.73rem;font-weight:700;color:#64748b">${c.label}</span>
        <span style="font-size:1.1rem">${c.icon}</span>
      </div>
      <div style="font-size:1.6rem;font-weight:900;color:${c.color}">${c.value}</div>
    </div>`).join('');
}

function _reqSetType(type) {
  // Unified view: type switching is internal-only, no UI tabs exist
  window._reqUserType = type;
  _reqApplyFilters();
}

function _reqSetStatus(status) {
  window._reqStatusFilt = status;
  _reqApplyFilters();
  // update pill styles
  document.querySelectorAll('[onclick^="_reqSetStatus"]').forEach(btn => {
    const v = btn.getAttribute('onclick').match(/'([^']+)'/)?.[1];
    const active = v === status;
    btn.style.background   = active ? '#6366f1' : '#fff';
    btn.style.color        = active ? '#fff'    : '#64748b';
    btn.style.borderColor  = active ? '#6366f1' : '#e2e8f0';
  });
}

function _reqApplyFilters() {
  const isAdminRole = currentUser?.role === 'admin';
  const isSuper     = currentUser?.role === 'superuser';
  const search    = (document.getElementById('reqSearchInput')?.value  || '').toLowerCase().trim();
  const typeFilt  = document.getElementById('reqTypeFilter')?.value   || 'all';
  const statusFilt= window._reqStatusFilt;

  // Unified: merge driver + operator requests, tag each with its source
  const driverRows   = (window._reqData.driver   || []).map(r => ({...r, _entityType:'driver'}));
  const operatorRows = (window._reqData.operator  || []).map(r => ({...r, _entityType:'operator'}));
  let rows = [...driverRows, ...operatorRows].filter(r => {
    if (statusFilt !== 'all' && r.status !== statusFilt && r.priority !== statusFilt) return false;
    if (typeFilt   !== 'all' && r.type   !== typeFilt)   return false;
    if (search) {
      const hay = `${r.driver_name||''} ${r.operator_name||''} ${r.type||''} ${r.notes||''}`.toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });
  // Sort: pending first, then by date desc
  rows.sort((a,b) => {
    if (a.status === 'pending' && b.status !== 'pending') return -1;
    if (b.status === 'pending' && a.status !== 'pending') return 1;
    return (b.created_at||'').localeCompare(a.created_at||'');
  });

  const tbody  = document.getElementById('reqTableBody');
  const footer = document.getElementById('reqFooter');

  if (!rows.length) {
    if (tbody) tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:3rem">
      <div style="font-size:2rem;margin-bottom:.5rem">📭</div>
      <div style="color:#94a3b8;font-size:.9rem">لا توجد طلبات مطابقة</div>
    </td></tr>`;
    if (footer) footer.innerHTML = '<span style="font-size:.82rem;color:#94a3b8">0 نتيجة</span>';
    return;
  }

  if (tbody) tbody.innerHTML = rows.map(r => {
    const isOp  = r._entityType === 'operator';
    const st  = REQ_STATUS[r.status] || REQ_STATUS.pending;
    const pr  = REQ_PRIORITY[r.priority || 'medium'];
    const tl  = REQ_TYPE_LABELS[r.type] || r.type;
    const name= r.driver_name || r.operator_name || '—';
    const isPending      = r.status === 'pending';
    const isPendingSuper = r.status === 'pending_super';
    const hasExtra = r.notes || r.admin_notes || r.admin_message || r.super_notes;
    const rowId = `req-row-${r.id}`;
    const detId = `req-det-${r.id}`;

    const actionBtns = (isAdminRole || isSuper) ? `
      <td style="padding:.65rem .75rem;text-align:center;white-space:nowrap">
        ${isPending && isAdminRole && !isReporter() ? `
          <button onclick="adminDirectDecision(${r.id},'approved','${r.type}')"
            style="padding:.3rem .6rem;border:none;border-radius:6px;background:#dcfce7;color:#16a34a;cursor:pointer;font-size:.75rem;font-weight:700;font-family:inherit;margin-left:.25rem">✅</button>
          <button onclick="adminDirectDecision(${r.id},'rejected','${r.type}')"
            style="padding:.3rem .6rem;border:none;border-radius:6px;background:#fee2e2;color:#dc2626;cursor:pointer;font-size:.75rem;font-weight:700;font-family:inherit;margin-left:.25rem">❌</button>
          <button onclick="openAdminRequestModal(${r.id})"
            style="padding:.3rem .6rem;border:none;border-radius:6px;background:#eff6ff;color:#2563eb;cursor:pointer;font-size:.75rem;font-weight:700;font-family:inherit">📤</button>
        ` : ''}
        ${isPendingSuper && isSuper ? `
          <button onclick="openSuperDecisionModal(${r.id},'approved')"
            style="padding:.3rem .6rem;border:none;border-radius:6px;background:#dcfce7;color:#16a34a;cursor:pointer;font-size:.75rem;font-weight:700;font-family:inherit;margin-left:.25rem">✅ قبول</button>
          <button onclick="openSuperDecisionModal(${r.id},'rejected')"
            style="padding:.3rem .6rem;border:none;border-radius:6px;background:#fee2e2;color:#dc2626;cursor:pointer;font-size:.75rem;font-weight:700;font-family:inherit">❌ رفض</button>
        ` : ''}
        ${r.status === 'approved' || r.status === 'rejected' ? '<span style="color:#94a3b8;font-size:.78rem">—</span>' : ''}
      </td>` : '';

    return `<tr id="${rowId}" style="border-bottom:1px solid #f1f5f9;cursor:pointer;transition:background .1s"
      onmouseenter="this.style.background='#f8fafc'" onmouseleave="this.style.background=''"
      onclick="_reqToggleDetail('${detId}')">
      <td style="padding:.7rem 1rem">
        <div style="display:flex;align-items:center;gap:.5rem">
          <span style="width:32px;height:32px;border-radius:50%;background:${isOp?'#eff6ff':'#f0fdf4'};display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0">${isOp?'⚙️':'🚗'}</span>
          <div>
            <div style="font-weight:700;color:#0f172a;font-size:.86rem">${name}</div>
          </div>
        </div>
      </td>
      <td style="padding:.7rem .6rem;text-align:center">
        <span style="display:inline-block;padding:.18rem .5rem;border-radius:20px;font-size:.7rem;font-weight:700;background:${isOp?'#eff6ff':'#f0fdf4'};color:${isOp?'#2563eb':'#16a34a'};white-space:nowrap">${isOp?'مشغل':'سائق'}</span>
      </td>
      <td style="padding:.7rem 1rem">
        <span style="font-size:.84rem;font-weight:600;color:#334155">${tl}</span>
      </td>
      <td style="padding:.7rem 1rem">
        ${r.new_odometer ? `<span style="font-size:.8rem;color:#2563eb;font-weight:600">${r.new_odometer} ${isOp?'ساعة':'كم'}</span>` : ''}
        ${r.notes ? `<span style="font-size:.78rem;color:#64748b">${r.notes.slice(0,40)}${r.notes.length>40?'...':''}</span>` : '<span style="color:#cbd5e1;font-size:.78rem">—</span>'}
      </td>
      <td style="padding:.7rem .75rem;text-align:center">
        <span style="display:inline-block;padding:.2rem .55rem;border-radius:20px;background:${pr.bg};color:${pr.color};font-size:.72rem;font-weight:700">${pr.label}</span>
      </td>
      <td style="padding:.7rem .75rem;text-align:center">
        <span style="display:inline-flex;align-items:center;gap:.3rem;padding:.25rem .6rem;border-radius:20px;background:${st.bg};border:1px solid ${st.border};font-size:.73rem;font-weight:700;color:${st.dot}">
          <span style="width:6px;height:6px;border-radius:50%;background:${st.dot};display:inline-block"></span>
          ${st.label}
        </span>
      </td>
      <td style="padding:.7rem 1rem;font-size:.78rem;color:#64748b;white-space:nowrap">${fmtDT(r.created_at)}</td>
      ${actionBtns}
    </tr>
    ${hasExtra ? `<tr id="${detId}" style="display:none;background:#f9fafb">
      <td colspan="8" style="padding:.75rem 1.25rem 1rem">
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:.6rem">
          ${r.notes        ? `<div style="background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:.6rem .8rem"><div style="font-size:.71rem;font-weight:700;color:#94a3b8;margin-bottom:.2rem">📝 الطلب</div><div style="font-size:.82rem;color:#334155">${r.notes}</div></div>` : ''}
          ${r.admin_notes  ? `<div style="background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:.6rem .8rem"><div style="font-size:.71rem;font-weight:700;color:#94a3b8;margin-bottom:.2rem">🗒️ ملاحظات الأدمن</div><div style="font-size:.82rem;color:#334155">${r.admin_notes}</div><div style="font-size:.71rem;color:#94a3b8;margin-top:.25rem">بواسطة: ${r.handled_by||'—'}</div></div>` : ''}
          ${r.admin_message? `<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:.6rem .8rem"><div style="font-size:.71rem;font-weight:700;color:#16a34a;margin-bottom:.2rem">💬 رسالة للمستخدم</div><div style="font-size:.82rem;color:#166534">${r.admin_message}</div></div>` : ''}
          ${r.super_notes  ? `<div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:.6rem .8rem"><div style="font-size:.71rem;font-weight:700;color:#2563eb;margin-bottom:.2rem">🏛️ قرار السوبر</div><div style="font-size:.82rem;color:#1e40af">${r.super_notes}</div><div style="font-size:.71rem;color:#94a3b8;margin-top:.25rem">${fmtDT(r.super_handled_at)}</div></div>` : ''}
        </div>
      </td>
    </tr>` : ''}`;
  }).join('');

  if (footer) footer.innerHTML = `<span style="font-size:.82rem;color:#475569">${rows.length} طلب</span>`;
}

function _reqToggleDetail(id) {
  const el = document.getElementById(id);
  if (!el) return;
  const showing = el.style.display !== 'none';
  el.style.display = showing ? 'none' : 'table-row';
}

// الأدمن: قرار مباشر
async function adminDirectDecision(rid, status, reqType) {
  const label = status === 'approved' ? 'قبول' : 'رفض';
  openModal(`
    <div class="modal-header">
      <div class="modal-title">${status==='approved'?'✅':'❌'} ${label} مباشر</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div style="background:${status==='approved'?'#f0fdf4':'#fef2f2'};border:1.5px solid ${status==='approved'?'#bbf7d0':'#fecaca'};border-radius:10px;padding:.8rem 1rem;margin-bottom:1rem;font-size:.88rem;color:${status==='approved'?'#166534':'#991b1b'}">
      ${status==='approved'?'✅ موافقة مباشرة من الأدمن':'❌ رفض مباشر من الأدمن'}
    </div>
    <div class="form-group">
      <label>رسالة للمستخدم (اختياري)</label>
      <textarea id="directMsg" rows="2" placeholder="مثال: تمت الموافقة على طلبك"
        style="width:100%;resize:vertical;padding:.6rem;border:1.5px solid var(--border);border-radius:10px;font-family:inherit;font-size:.88rem"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">إلغاء</button>
      <button class="btn" style="background:${status==='approved'?'#16a34a':'#dc2626'};color:white;border:none" id="directDecBtn">
        ${status==='approved'?'✅ تأكيد القبول':'❌ تأكيد الرفض'}
      </button>
    </div>`);
  document.getElementById('directDecBtn').onclick = async () => {
    const msg = document.getElementById('directMsg').value.trim();
    const btn = document.getElementById('directDecBtn');
    btn.disabled=true; btn.textContent='جاري...';
    try {
      await apiCall(`/requests/${rid}`,'PUT',{ status, admin_message: msg });
      showNotification(`✅ تم ${label} الطلب`, 'success');
      closeModal(); await renderRequestsSection();
    } catch(e) {
      showNotification(e.message,'error');
      btn.disabled=false; btn.textContent=`${status==='approved'?'✅':'❌'} تأكيد ${label}`;
    }
  };
}

function filterEmgTable() {
  const txt     = (document.querySelector('#emgBody')?.closest('.card')?.querySelector('[data-tsearch]')?.value || '').toLowerCase();
  const type    = document.getElementById('emgTypeFilter')?.value || '';
  const handled = document.getElementById('emgStatusFilter')?.value ?? '';
  const tbody   = document.getElementById('emgBody');
  if (!tbody) return;
  let vis = 0;
  tbody.querySelectorAll('tr').forEach(tr => {
    const matchType    = !type    || tr.dataset.type === type;
    const matchHandled = handled === '' || tr.dataset.handled === handled;
    const matchTxt     = !txt    || tr.textContent.toLowerCase().includes(txt);
    const show = matchType && matchHandled && matchTxt;
    tr.classList.toggle('row-hidden', !show);
    if (show) vis++;
  });
  const cnt = tbody.closest('.card')?.querySelector('.srch-count');
  if (cnt) cnt.textContent = `${vis} / ${tbody.querySelectorAll('tr').length}`;
}

function resetEmgFilter() {
  ['emgTypeFilter','emgStatusFilter'].forEach(id => {
    const el = document.getElementById(id); if (el) el.value = '';
  });
  const bar = document.querySelector('#emgBody')?.closest('.card')?.querySelector('[data-tsearch]');
  if (bar) bar.value = '';
  filterEmgTable();
}

/* ── SILENT GPS — runs in background, no UI feedback ── */
// maximumAge=0 دايماً عشان نضمن موقع جديد وليس من الكاش
function silentGetLocation(timeoutMs=10000) {
  return new Promise(resolve => {
    if(!navigator.geolocation){ resolve(''); return; }

    let done = false;
    const finish = val => { if(!done){ done=true; resolve(val); } };

    // المرحلة الأولى: دقة منخفضة — maximumAge=0 لضمان موقع حديث
    navigator.geolocation.getCurrentPosition(
      p => finish(`${p.coords.latitude.toFixed(6)},${p.coords.longitude.toFixed(6)}`),
      () => {
        // المرحلة الثانية: دقة عالية مع maximumAge=0
        navigator.geolocation.getCurrentPosition(
          p => finish(`${p.coords.latitude.toFixed(6)},${p.coords.longitude.toFixed(6)}`),
          () => finish(''),
          { enableHighAccuracy:true, timeout: Math.min(timeoutMs, 8000), maximumAge:0 }
        );
      },
      { enableHighAccuracy:false, timeout: Math.min(timeoutMs, 5000), maximumAge:0 }
    );

    // ضمان الانتهاء قبل انتهاء المهلة الكلية
    setTimeout(() => finish(''), timeoutMs);
  });
}

      return showNotification('عداد النهاية يجب أن يكون أكبر من '+activeTrip.start_odometer+' كم','error');
    btn.disabled=true; btn.textContent='🏁 جاري...';
    const location = await silentGetLocation();
    try{
      await apiCall('/trips/end','POST',{trip_id:activeTrip.id,end_odometer:end_odo,end_location:location,notes});
      showNotification('✅ انتهت الرحلة بنجاح!','success');
      await renderDriverTrip();
    }catch(e){ showNotification(e.message,'error'); btn.disabled=false; btn.textContent='🏁 إنهاء الرحلة'; }
  });
}
