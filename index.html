<title>نظام إدارة الأسطول</title>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Cairo:wght@300;400;600;700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',system-ui,sans-serif}
:root{
  /* ══ NEW ENTERPRISE NAVY + GOLD SYSTEM ══ */
  --primary:#1e3a5f;
  --primary-light:#2d5486;
  --primary-dark:#142847;
  --primary-glow:rgba(30,58,95,0.15);

  /* Gold Accent */
  --gold:#b8860b;
  --gold-light:#d4a017;
  --gold-pale:rgba(184,134,11,0.12);
  --gold-glow:rgba(184,134,11,0.25);

  --danger:#C84B31;
  --success:#0d6e3c;
  --success-light:#10b981;
  --warning:#d97706;

  --sidebar-bg:#1e3a5f;
  --sidebar-width:256px;
  --header-h:64px;
  --card-radius:14px;

  /* Backgrounds */
  --bg:#f0f2f5;
  --surface:#FFFFFF;
  --surface-2:#f8f9fb;

  /* Text */
  --text:#0f1d2e;
  --text-2:#374151;
  --muted:#6b7280;

  /* Borders */
  --border:#e5e9f0;
  --border-2:#d1d9e6;

  --emergency:#C84B31;--accident:#C87941;
  --sidebar-accent:var(--gold);

  --shadow-sm:0 1px 3px rgba(15,29,46,.05),0 1px 2px rgba(15,29,46,.03);
  --shadow-md:0 4px 16px rgba(15,29,46,.08),0 2px 6px rgba(15,29,46,.04);
  --shadow-lg:0 12px 40px rgba(15,29,46,.12),0 4px 12px rgba(15,29,46,.06);
  --shadow-gold:0 4px 20px rgba(184,134,11,.2);
}
body{background:var(--bg);min-height:100vh;overflow-x:hidden;color:var(--text)}


/* ── LOGIN ── */
.login-overlay{
  position:fixed;inset:0;
  background:var(--primary-dark);
  display:flex;align-items:center;justify-content:center;z-index:2000;
  overflow:hidden;
}
.login-overlay::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 70% 55% at 65% 35%, rgba(184,134,11,.14) 0%, transparent 65%),
    radial-gradient(ellipse 50% 45% at 15% 75%, rgba(30,58,95,.5) 0%, transparent 60%),
    linear-gradient(160deg, #0a1929 0%, #1e3a5f 50%, #0a1929 100%);
}
.login-overlay::after{
  content:'';position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(184,134,11,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(184,134,11,.04) 1px, transparent 1px);
  background-size:48px 48px;
}
.login-card{
  position:relative;z-index:2;
  background:rgba(255,255,255,.03);
  backdrop-filter:blur(32px);
  border:1px solid rgba(184,134,11,.2);
  border-top:1px solid rgba(184,134,11,.35);
  border-radius:24px;
  padding:3rem 2.6rem 2.6rem;
  width:90%;max-width:400px;
  text-align:center;
  box-shadow:0 0 0 1px rgba(255,255,255,.03), 0 40px 80px rgba(0,0,0,.5), 0 0 60px rgba(184,134,11,.08);
}
.login-logo{
  width:66px;height:66px;
  background:linear-gradient(135deg,var(--primary) 0%, var(--primary-light) 100%);
  border-radius:18px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.9rem;margin:0 auto 1.3rem;
  box-shadow:0 8px 24px rgba(30,58,95,.5), 0 0 0 1px rgba(184,134,11,.3);
}
.login-card h2{font-size:1.5rem;color:#fff;font-weight:800;margin-bottom:.35rem;letter-spacing:-.3px}
.login-card p{color:rgba(255,255,255,.35);font-size:.83rem;margin-bottom:2rem;font-weight:400}
.login-card input{
  width:100%;padding:.88rem 1.2rem;margin-bottom:.85rem;
  border:1.5px solid rgba(255,255,255,.08);
  border-radius:12px;font-size:.92rem;
  background:rgba(255,255,255,.05);color:white;
  transition:.2s;font-family:inherit;
}
.login-card input::placeholder{color:rgba(255,255,255,.25)}
.login-card input:focus{
  outline:none;border-color:rgba(184,134,11,.5);
  background:rgba(255,255,255,.08);
  box-shadow:0 0 0 3px rgba(184,134,11,.12);
}
.login-btn{
  width:100%;
  background:linear-gradient(135deg,var(--gold) 0%,var(--gold-light) 100%);
  border:none;padding:.92rem;border-radius:12px;
  font-weight:800;font-size:1rem;color:white;cursor:pointer;
  transition:.2s;font-family:inherit;letter-spacing:.2px;
  box-shadow:var(--shadow-gold);
}
.login-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(184,134,11,.4)}

/* ── SHELL ── */
#appShell{display:flex;min-height:100vh}
.sidebar{
  width:var(--sidebar-width);
  background:var(--sidebar-bg);
  min-height:100vh;display:flex;flex-direction:column;
  position:fixed;right:0;top:0;bottom:0;z-index:100;
  transition:.3s cubic-bezier(.4,0,.2,1);
  border-left:1px solid rgba(255,255,255,.06);
  /* مخفي دايماً حتى لما يُفتح */
  transform:translateX(100%);
}
.sidebar.open{
  transform:translateX(0);
}
.sidebar::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:
    linear-gradient(180deg, rgba(184,134,11,.06) 0%, transparent 30%),
    linear-gradient(160deg, rgba(255,255,255,.02) 0%, transparent 60%);
}
.sidebar-header{
  padding:1.4rem 1.2rem 1.1rem;
  border-bottom:1px solid rgba(255,255,255,.06);
  position:relative;
}
.sidebar-logo{
  font-size:1.05rem;color:white;font-weight:900;
  display:flex;align-items:center;gap:.65rem;letter-spacing:-.2px;
}
.sidebar-subtitle{
  color:rgba(184,134,11,.55);font-size:.62rem;
  margin-top:.25rem;letter-spacing:1px;text-transform:uppercase;
  font-weight:600;
}
.sidebar-user{
  padding:1rem 1.2rem;
  border-bottom:1px solid rgba(255,255,255,.06);
  display:flex;align-items:center;gap:.85rem;
}
.user-avatar{
  width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,var(--gold),var(--gold-light));
  display:flex;align-items:center;justify-content:center;
  font-size:.9rem;color:white;font-weight:800;
  box-shadow:0 3px 10px rgba(184,134,11,.3);
  flex-shrink:0;
}
.user-name{font-size:.81rem;color:rgba(255,255,255,.92);font-weight:700}
.user-role{font-size:.64rem;color:rgba(184,134,11,.65);margin-top:2px;font-weight:500}
.sidebar-nav{flex:1;padding:.75rem .65rem;overflow-y:auto;scrollbar-width:none}
.sidebar-nav::-webkit-scrollbar{display:none}
.nav-section-label{
  font-size:.6rem;font-weight:700;
  color:rgba(255,255,255,.2);
  text-transform:uppercase;letter-spacing:1.2px;
  padding:.6rem .55rem .3rem;
  margin-top:.4rem;
}
.nav-item{
  display:flex;align-items:center;gap:.75rem;
  padding:.58rem .85rem;border-radius:10px;cursor:pointer;
  color:rgba(255,255,255,.42);font-size:.83rem;font-weight:600;
  transition:.15s cubic-bezier(.4,0,.2,1);
  margin-bottom:1px;border:none;background:none;
  width:100%;text-align:right;position:relative;
  font-family:inherit;
}
.nav-item:hover{
  background:rgba(255,255,255,.06);
  color:rgba(255,255,255,.82);
}
.nav-item.active{
  background:rgba(184,134,11,.14);
  color:var(--gold-light);font-weight:700;
  border:1px solid rgba(184,134,11,.2);
}
.nav-item.active::before{
  content:'';position:absolute;right:0;top:50%;transform:translateY(-50%);
  width:3px;height:55%;background:var(--gold);
  border-radius:2px 0 0 2px;
}
.nav-icon{font-size:.9rem;width:20px;text-align:center;flex-shrink:0}
.nav-badge{
  background:var(--danger);color:white;border-radius:50px;
  font-size:.6rem;font-weight:800;padding:.1rem .4rem;
  min-width:18px;text-align:center;animation:pulse 1.5s infinite;
  margin-right:auto;
}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
.sidebar-footer{
  padding:.85rem .65rem;
  border-top:1px solid rgba(255,255,255,.06);
}
.logout-btn-sidebar{
  display:flex;align-items:center;gap:.75rem;
  padding:.58rem .85rem;border-radius:10px;cursor:pointer;
  color:rgba(200,75,49,.7);font-size:.82rem;font-weight:700;
  transition:.15s;background:none;border:none;
  width:100%;text-align:right;font-family:inherit;
}
.logout-btn-sidebar:hover{background:rgba(200,75,49,.1);color:#C84B31}
.main-content{
  margin-right:0;flex:1;   /* السايدبار overlay — مش بيأكل مساحة */
  min-height:100vh;display:flex;flex-direction:column;
  background:var(--bg);
}
.topbar{
  height:var(--header-h);
  background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 1.8rem;gap:1rem;
  position:sticky;top:0;z-index:50;
  box-shadow:0 1px 0 var(--border), var(--shadow-sm);
}
.topbar-title{
  font-size:1rem;font-weight:800;color:var(--primary);flex:1;
  letter-spacing:-.2px;
}
.page-content{padding:1.6rem;flex:1}

/* ── CARDS & STATS ── */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:.9rem;margin-bottom:1.5rem}
.stat-card{
  background:var(--surface);border-radius:var(--card-radius);
  padding:1.3rem 1.4rem;
  border:1px solid var(--border);
  box-shadow:var(--shadow-sm);
  position:relative;overflow:hidden;
  transition:.2s;
}
.stat-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--primary),var(--gold));
  opacity:0;transition:.2s;
}
.stat-card::after{
  content:'';position:absolute;top:0;right:0;width:64px;height:64px;
  background:var(--gold-pale);border-radius:50%;transform:translate(20px,-20px);
  pointer-events:none;
}
.stat-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.stat-card:hover::before{opacity:1}
.stat-icon{font-size:1.35rem;margin-bottom:.6rem;display:block}
.stat-value{font-size:1.75rem;font-weight:900;color:var(--primary);line-height:1;letter-spacing:-.5px;font-family:'Cairo',sans-serif}
.stat-label{font-size:.72rem;color:var(--muted);margin-top:.3rem;font-weight:500}
.card{
  background:var(--surface);border-radius:var(--card-radius);
  border:1px solid var(--border);
  box-shadow:var(--shadow-sm);
  padding:1.4rem 1.6rem;margin-bottom:1.2rem;
  transition:.15s;
}
.card:last-child{margin-bottom:0}
.card:hover{box-shadow:var(--shadow-md)}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem}
.card-title{font-size:.92rem;font-weight:800;color:var(--text);display:flex;align-items:center;gap:.5rem;letter-spacing:-.1px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;margin-bottom:1.2rem}
@media(max-width:900px){.two-col{grid-template-columns:1fr}}

/* ── FORMS ── */
.form-group{margin-bottom:.9rem}
label{display:block;font-weight:700;margin-bottom:.38rem;font-size:.71rem;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
label .req{color:var(--danger);margin-right:.2rem}
input,select,textarea{
  width:100%;padding:.68rem 1rem;
  border:1.5px solid var(--border);
  border-radius:10px;font-size:.88rem;
  background:var(--surface-2);color:var(--text);
  transition:.2s;font-family:inherit;
}
input:focus,select:focus,textarea:focus{
  outline:none;border-color:var(--primary);
  background:white;
  box-shadow:0 0 0 3px var(--primary-glow);
}
input[disabled]{background:#f1f5f9;color:var(--muted);cursor:not-allowed;opacity:.7}
textarea{resize:vertical;min-height:70px}

/* ── BUTTONS ── */
.btn{
  display:inline-flex;align-items:center;gap:.4rem;
  padding:.6rem 1.15rem;border-radius:9px;
  font-weight:700;font-size:.82rem;cursor:pointer;
  border:none;transition:.18s cubic-bezier(.4,0,.2,1);
  font-family:inherit;letter-spacing:.1px;
}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none!important}
.btn-primary{
  background:var(--primary);
  color:white;box-shadow:0 2px 8px rgba(30,58,95,.25);
}
.btn-primary:hover:not(:disabled){
  background:var(--primary-light);
  transform:translateY(-1px);
  box-shadow:0 4px 14px rgba(30,58,95,.35);
}
.btn-accent{
  background:linear-gradient(135deg,var(--gold),var(--gold-light));
  color:white;box-shadow:var(--shadow-gold);
}
.btn-accent:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 20px rgba(184,134,11,.35)}
.btn-outline{
  background:transparent;
  border:1.5px solid var(--primary);
  color:var(--primary);
}
.btn-outline:hover{background:var(--primary);color:white}
.btn-danger{
  background:#C84B31;
  color:white;box-shadow:0 2px 8px rgba(200,75,49,.2);
}
.btn-danger:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(200,75,49,.3)}
.btn-ghost{
  background:var(--surface-2);color:var(--text-2);border:1px solid var(--border);
}
.btn-ghost:hover{background:var(--border);color:var(--primary)}
.btn-success{
  background:#0d6e3c;
  color:white;box-shadow:0 2px 8px rgba(13,110,60,.2);
}
.btn-success:hover{transform:translateY(-1px)}
.btn-warning{
  background:#d97706;
  color:white;
}
.btn-sm{padding:.32rem .75rem;font-size:.74rem;border-radius:7px}

/* ── EMERGENCY BUTTONS ── */
.emergency-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.4rem;margin-bottom:1.4rem}
.emergency-btn-card{
  border-radius:22px;padding:2.2rem 1.8rem;
  text-align:center;cursor:pointer;
  transition:.2s cubic-bezier(.4,0,.2,1);
  border:2px solid transparent;
  position:relative;overflow:hidden;
}
.emergency-btn-card::before{
  content:'';position:absolute;inset:0;
  background:rgba(255,255,255,.08);
  opacity:0;transition:.2s;
}
.emergency-btn-card:hover{transform:translateY(-4px);box-shadow:0 16px 40px rgba(0,0,0,.18)}
.emergency-btn-card:hover::before{opacity:1}
.emergency-btn-card.emg{
  background:linear-gradient(145deg,#9B1C1C,#C84B31);
  color:white;box-shadow:0 6px 24px rgba(200,75,49,.35);
}
.emergency-btn-card.acc{
  background:linear-gradient(145deg,#92400e,#C87941);
  color:white;box-shadow:0 6px 24px rgba(200,121,65,.35);
}
.emg-icon{font-size:2.8rem;margin-bottom:.8rem;display:block}
.emg-title{font-size:1.25rem;font-weight:900;margin-bottom:.4rem;letter-spacing:-.2px}
.emg-sub{font-size:.82rem;opacity:.8}

/* ── RECORDING UI ── */
.recording-indicator{
  display:flex;align-items:center;gap:.8rem;
  background:#FEF2F2;border:2px solid #FCA5A5;
  border-radius:14px;padding:1rem 1.4rem;margin-bottom:1rem;
}
.rec-dot{width:12px;height:12px;border-radius:50%;background:#C84B31;animation:blink .8s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
.rec-text{font-weight:800;color:#C84B31;font-size:.92rem}
.rec-timer{margin-right:auto;font-weight:800;color:#C84B31;font-family:'Cairo',monospace;font-size:.95rem}

/* ── TABLES ── */
.table-wrap{
  overflow-x:auto;
  border-radius:10px;
  border:1px solid var(--border);
  background:var(--surface);
}
table{width:100%;border-collapse:collapse;font-size:.83rem;direction:rtl}
th{
  background:var(--surface-2);color:var(--muted);
  font-size:.68rem;font-weight:700;
  text-transform:uppercase;letter-spacing:.7px;
  padding:.75rem 1rem;text-align:right;
  border-bottom:1.5px solid var(--border);
}
td{padding:.72rem 1rem;border-bottom:1px solid var(--border);text-align:right;color:var(--text)}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:rgba(30,58,95,.03);transition:.12s}

/* ── BADGES ── */
.badge{
  display:inline-flex;align-items:center;gap:.25rem;
  padding:.2rem .65rem;border-radius:50px;
  font-size:.68rem;font-weight:700;letter-spacing:.2px;
}
.badge-green{background:#d1fae5;color:#065F46}
.badge-red{background:#fee2e2;color:#991B1B}
.badge-blue{background:#dbeafe;color:#1E40AF}
.badge-yellow{background:#fef9c3;color:#713f12}
.badge-purple{background:#ede9fe;color:#5B21B6}
.badge-orange{background:#ffedd5;color:#9A3412}
.badge-pink{background:#fce7f3;color:#9D174D}
.badge-gold{background:rgba(184,134,11,.12);color:var(--gold);border:1px solid rgba(184,134,11,.25)}
.badge-navy{background:rgba(30,58,95,.1);color:var(--primary);border:1px solid rgba(30,58,95,.15)}
.badge-emg{background:#fee2e2;color:#991B1B;animation:pulse 2s infinite}
.badge-acc{background:#fef9c3;color:#713f12;animation:pulse 2s infinite}

/* ── NOTIFICATION TOAST ── */
.notification{
  position:fixed;bottom:24px;left:24px;
  padding:.8rem 1.4rem;border-radius:12px;z-index:4000;
  font-size:.85rem;font-weight:700;
  box-shadow:0 8px 28px rgba(0,0,0,.15);
  animation:slideUp .3s cubic-bezier(.4,0,.2,1);
  max-width:340px;border:1px solid rgba(255,255,255,.12);
}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.notification.success{background:var(--primary);color:white}
.notification.error{background:#7F1D1D;color:white}
.notification.info{background:var(--primary-dark);color:white}
.notification.emergency{background:#7F1D1D;color:white;font-size:.9rem;border:1.5px solid #FCA5A5}

/* ── MODAL ── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(15,29,46,.55);
  backdrop-filter:blur(4px);
  z-index:600;display:flex;align-items:center;justify-content:center;
  animation:fadeIn .2s;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{
  background:var(--surface);border-radius:16px;
  padding:2rem;width:90%;max-width:560px;
  max-height:92vh;overflow-y:auto;
  box-shadow:var(--shadow-lg);
  animation:slideUp .25s cubic-bezier(.4,0,.2,1);
  border:1px solid var(--border);
}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.4rem}
.modal-title{font-size:1.05rem;font-weight:900;color:var(--text);letter-spacing:-.2px}
.modal-close{
  background:none;border:none;font-size:1.15rem;cursor:pointer;
  color:var(--muted);padding:.3rem;border-radius:8px;transition:.15s;
}
.modal-close:hover{background:var(--border);color:var(--text)}
.modal-footer{
  display:flex;gap:.75rem;justify-content:flex-end;
  margin-top:1.4rem;padding-top:1rem;
  border-top:1px solid var(--border);
}

/* ── WORKSHOP ── */
.workshop-items{display:grid;grid-template-columns:repeat(3,1fr);gap:.8rem;margin-bottom:1.3rem}
.workshop-item{background:var(--surface-2);border:1.5px solid var(--border);border-radius:10px;padding:.9rem;text-align:center;cursor:pointer;transition:.2s}
.workshop-item:hover{border-color:var(--gold);transform:translateY(-2px);background:rgba(184,134,11,.04)}
.workshop-item.selected{border-color:var(--primary);background:rgba(30,58,95,.05)}
.workshop-item-icon{font-size:1.65rem;margin-bottom:.35rem}
.workshop-item-label{font-size:.82rem;font-weight:700;color:var(--text-2)}

/* ── DRIVER HERO ── */
.driver-hero{background:linear-gradient(135deg,var(--primary-dark),var(--primary));border-radius:var(--card-radius);color:white;padding:1.3rem 1.6rem;margin-bottom:1.3rem;display:flex;align-items:center;gap:1.1rem;border:1px solid rgba(184,134,11,.15)}
.driver-hero-icon{font-size:2rem}
.driver-hero h2{font-size:1.15rem;font-weight:800}
.driver-hero p{font-size:.8rem;opacity:.72;margin-top:.2rem}

/* ── MAP ── */
#fleetMap{height:480px;border-radius:10px;border:1px solid var(--border)}
#routeMap{height:480px;border-radius:10px;border:1px solid var(--border)}
.map-legend{display:flex;gap:1.2rem;flex-wrap:wrap;margin-top:.75rem;font-size:.78rem;color:var(--muted)}
.map-legend span{display:flex;align-items:center;gap:.35rem}
.legend-dot{width:11px;height:11px;border-radius:50%;display:inline-block}

/* Map Tabs */
.map-tabs{display:flex;gap:.5rem;margin-bottom:1.2rem;border-bottom:1.5px solid var(--border);padding-bottom:.5rem}
.map-tab{
  padding:.45rem 1.1rem;border-radius:8px 8px 0 0;
  font-size:.82rem;font-weight:700;cursor:pointer;
  border:none;background:none;font-family:inherit;
  color:var(--muted);transition:.15s;
}
.map-tab.active{background:var(--primary);color:white}
.map-tab:hover:not(.active){background:var(--surface-2);color:var(--text)}
.map-panel{display:none}
.map-panel.active{display:block}

/* Route selector */
.route-selector{
  display:flex;gap:.75rem;align-items:flex-end;
  flex-wrap:wrap;margin-bottom:1rem;
  padding:1rem;background:var(--surface-2);
  border-radius:10px;border:1px solid var(--border);
}
.route-selector .form-group{flex:1;min-width:180px;margin-bottom:0}
.route-info-bar{
  display:flex;gap:1rem;flex-wrap:wrap;
  margin-bottom:1rem;
}
.route-info-chip{
  display:flex;align-items:center;gap:.4rem;
  padding:.4rem .85rem;
  background:var(--surface-2);border:1px solid var(--border);
  border-radius:8px;font-size:.78rem;font-weight:600;color:var(--text-2);
}
.route-info-chip.highlight{background:var(--gold-pale);border-color:rgba(184,134,11,.3);color:var(--gold)}
.route-line-animated{
  stroke-dasharray:12 6;
  animation:dashMove 1.2s linear infinite;
}
@keyframes dashMove{to{stroke-dashoffset:-18}}

/* ── EMPTY ── */
.empty-state{text-align:center;padding:3rem 1rem;color:var(--muted)}
.empty-state .empty-icon{font-size:2.5rem;margin-bottom:.8rem}

.location-hint{font-size:.72rem;color:var(--muted);margin-top:.3rem}
.location-hint.maps-only{color:#d97706;font-weight:600}
/* ── GPS PICKER ── */
.gps-picker{border:2px dashed var(--border);border-radius:12px;padding:.9rem 1rem;background:#f8fafc;transition:.25s}
.gps-picker.gps-ok{border:2px solid #10b981;background:#f0fdf9}
.gps-picker.gps-err{border:2px solid #dc2626;background:#fff5f5}
.gps-capture-btn{width:100%;padding:.75rem 1rem;border:none;border-radius:10px;font-family:inherit;font-size:.92rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.6rem;transition:.2s;color:white;background:linear-gradient(135deg,#1e40af,#3b82f6)}
.gps-capture-btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 14px rgba(59,130,246,.35)}
.gps-capture-btn:disabled{opacity:.65;cursor:not-allowed;transform:none}
.gps-capture-btn.gps-btn-ok{background:linear-gradient(135deg,#065f46,#10b981)}
.gps-capture-btn.gps-btn-spin{background:linear-gradient(135deg,#92400e,#d97706)}
.gps-result{margin-top:.55rem;font-size:.78rem;display:flex;align-items:center;gap:.4rem}
.gps-result.ok{color:#065f46;font-weight:600}
.gps-result.err{color:#dc2626;font-weight:600}
.gps-coords{font-family:monospace;color:var(--muted);font-size:.72rem;margin-top:.2rem;direction:ltr;text-align:left}
.location-link{color:var(--primary-light);text-decoration:none;font-size:.8rem}
.location-link:hover{text-decoration:underline}
code{font-size:.8rem;background:#f1f5f9;padding:.1rem .5rem;border-radius:6px;font-family:monospace}
.filters-bar{display:flex;gap:.8rem;flex-wrap:wrap;margin-bottom:1rem}
.filters-bar select,.filters-bar input{flex:1;min-width:140px;padding:.5rem .9rem;font-size:.84rem}

/* ── AUDIO PLAYER ── */
.audio-player-wrap audio{width:100%;height:36px;border-radius:8px}
.report-row-emg{background:#fff5f5!important}
.report-row-acc{background:#fffbeb!important}

/* ── MOBILE ── */
.sidebar-toggle{display:flex}
/* ══════════════════════════════════════════════════
   RESPONSIVE — Tablet (≤900px)
══════════════════════════════════════════════════ */
@media(max-width:900px){
  /* ── Sidebar ── */

  /* ── Layout ── */
  .main-content{width:100vw;max-width:100vw;overflow-x:hidden}
  #appShell{overflow-x:hidden;width:100vw}
  .page-content{padding:.7rem;overflow-x:hidden}

  /* ── Tables ── */
  .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;max-width:calc(100vw - 1.4rem)}
  table{min-width:480px;font-size:.74rem}
  th,td{padding:.4rem .45rem;white-space:nowrap}

  /* ── Cards ── */
  .card{padding:.9rem}
  .card-header{flex-wrap:wrap;gap:.4rem}
  .card-header .btn{font-size:.72rem;padding:.3rem .6rem}

  /* ── Grids ── */
  .two-col{grid-template-columns:1fr}
  .stats-row{grid-template-columns:repeat(2,1fr) !important}
  .emergency-grid{grid-template-columns:1fr}

  /* ── Stat cards ── */
  .stat-card{padding:.8rem .7rem}
  .stat-value{font-size:1.35rem}
  .stat-icon{font-size:1.5rem}
  .stat-label{font-size:.7rem}

  /* ── Topbar ── */
  .topbar{padding:0 .8rem}
  .topbar-title{font-size:.9rem}

  /* ── Filters & Search ── */
  .filters-bar{flex-wrap:wrap}
  .filters-bar select,.filters-bar input{min-width:120px;flex:1}
  .srch-bar{flex-wrap:wrap;gap:.4rem}
  .srch-bar input{min-width:150px}
  .srch-bar select{min-width:110px}

  /* ── Workshop ── */
  .workshop-items{grid-template-columns:repeat(2,1fr)}

  /* layout grids: handled per-section */

  /* ── Misc ── */
  .badge{font-size:.65rem}
  .modal-body{max-height:70vh;overflow-y:auto}
}

/* ══════════════════════════════════════════════════
   RESPONSIVE — Mobile (≤600px)
══════════════════════════════════════════════════ */
@media(max-width:600px){
  .page-content{padding:.45rem}
  .card{padding:.7rem}
  .card-header{gap:.3rem}

  /* Stats: 2 columns on mobile */
  .stats-row{grid-template-columns:repeat(2,1fr) !important;gap:.5rem}
  .stat-card{padding:.65rem .5rem;border-radius:10px}
  .stat-value{font-size:1.2rem}
  .stat-icon{font-size:1.3rem}
  .stat-label{font-size:.66rem}

  /* Force stat card with grid-column:span 2 to stay full width */
  .stat-card[style*="grid-column:span 2"],
  .stat-card[style*="grid-column: span 2"]{
    grid-column:span 2 !important;
  }

  /* Tables */
  table{min-width:420px;font-size:.7rem}
  th,td{padding:.32rem .38rem}

  /* Workshop items: 2 per row on mobile */
  .workshop-items{grid-template-columns:repeat(2,1fr);gap:.55rem}
  .workshop-item-icon{font-size:1.8rem}
  .workshop-item-label{font-size:.72rem}

  /* Buttons */
  .btn{font-size:.76rem;padding:.35rem .65rem}
  .btn-sm{font-size:.7rem;padding:.28rem .5rem}

  /* Topbar */
  .topbar-title{font-size:.82rem}

  /* two-col always 1 column */
  .two-col{grid-template-columns:1fr !important}

  /* Search bars */
  .srch-bar{gap:.35rem;padding:.5rem .7rem}
  .srch-bar input{font-size:.82rem;padding:.38rem .6rem}
  .srch-bar select{font-size:.82rem;padding:.38rem .5rem}
  .srch-count{font-size:.72rem}


}

/* ══════════════════════════════════════════════════
   RESPONSIVE — Small Mobile (≤400px)
══════════════════════════════════════════════════ */
@media(max-width:400px){
  .stats-row{grid-template-columns:1fr 1fr !important;gap:.4rem}
  .stat-value{font-size:1.05rem}
  .stat-card{padding:.55rem .4rem}
  table{min-width:360px;font-size:.67rem}
  th,td{padding:.28rem .32rem}
  .workshop-items{grid-template-columns:1fr 1fr}
}
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99;display:none}
.sidebar-overlay.show{display:block}

/* ════════════════════════════════════════
   DRIVER PAGE — Clean apسيطلp-like, responsive
   ════════════════════════════════════════ */

/* Hide admin elements */
body.driver-mode .sidebar,
body.driver-mode #sidebarOverlay,
body.driver-mode .topbar { display:none !important; }
body.driver-mode #appShell { display:block !important; }
body.driver-mode .main-content { margin-right:0 !important; }
body.driver-mode { background:#f5f5f5; }

/* Full-width page wrapper */
.dp-wrap {
  width:100%;
  min-height:100vh;
  max-width:480px;
  margin:0 auto;
  padding:0 0 60px;
  display:flex;
  flex-direction:column;
  background:#f4f6fb;
}

/* ── TOP SECTION: greeting + date + car ── */
.dp-top {
  background:#fff;
  padding:2rem 1.4rem 1.5rem;
  border-bottom:1px solid #eef0f6;
  text-align:center;
  position:relative;
}
/* ── DRIVER INTERFACE REDESIGN ── */
.dp-greeting {
  font-size:1.35rem;
  font-weight:900;
  color:#1a1a2e;
  margin-bottom:.3rem;
}
.dp-date {
  font-size:.82rem;
  color:#8a8a9a;
  font-weight:500;
  display:flex;align-items:center;justify-content:center;gap:.35rem;
}
.dp-divider { display:none; }
.dp-avatar {
  width:68px; height:68px;
  border-radius:50%;
  background:linear-gradient(135deg,#f59e0b,#fbbf24);
  color:#fff;
  font-size:28px;
  font-weight:900;
  display:flex; align-items:center; justify-content:center;
  margin:0 auto .85rem;
  box-shadow:0 6px 20px rgba(245,158,11,.4);
}
.dp-car {
  display:inline-flex;
  align-items:center;
  gap:.55rem;
  border:1.5px solid #eef0f6;
  border-radius:50px;
  padding:.6rem 1.3rem;
  font-size:.95rem;
  font-weight:700;
  color:#1a1a2e;
  background:#f8faff;
  margin-top:.85rem;
  box-shadow:0 2px 8px rgba(0,0,0,.04);
}
.dp-car span { color:#94a3b8; font-weight:400; }
.dp-logout {
  position:fixed;
  top:.75rem;
  left:.75rem;
  z-index:300;
  background:white;
  border:1.5px solid #e2e8f0;
  color:#94a3b8;
  border-radius:50px;
  padding:.35rem .9rem;
  font-size:.75rem;
  font-weight:700;
  cursor:pointer;
  font-family:inherit;
  box-shadow:0 1px 4px rgba(0,0,0,.06);
  transition:.15s;
}
.dp-logout:hover { border-color:#dc2626; color:#dc2626; }

/* ── TRIP STATUS ── */
.dp-status {
  margin:0 1rem;
  border-radius:12px;
  padding:.75rem 1rem;
  display:flex;
  align-items:center;
  gap:.75rem;
  font-weight:700;
  font-size:.85rem;
}
.dp-status.active { background:#dcfce7; color:#166534; border:1.5px solid #86efac; }
.dp-status.idle   { background:#f1f5f9; color:#94a3b8; border:1.5px solid #e2e8f0; }
.dp-status .ds-icon { font-size:1.2rem; flex-shrink:0; }
.dp-status .ds-sub  { font-size:.73rem; font-weight:400; margin-top:.1rem; }

/* ── CARD SECTIONS ── */
.dp-section {
  background:#fff;
  margin:.7rem .85rem 0;
  border-radius:20px;
  padding:1.1rem;
  display:flex;
  flex-direction:column;
  gap:.6rem;
  box-shadow:0 2px 12px rgba(0,0,0,.06);
}
.dp-label {
  font-size:.7rem;
  font-weight:800;
  color:#94a3b8;
  letter-spacing:.8px;
  margin-bottom:.15rem;
  display:flex;align-items:center;gap:.35rem;
}

/* Main trip button — GOLDEN */
.dp-btn-main {
  width:100%;
  padding:1.2rem 1rem;
  border:none;
  border-radius:16px;
  font-size:1.15rem;
  font-weight:900;
  cursor:pointer;
  font-family:inherit;
  transition:.18s;
  letter-spacing:.3px;
  position:relative;
  overflow:hidden;
}
.dp-btn-main:active { transform:scale(.97); }
.dp-btn-start {
  background:linear-gradient(135deg,#1e3a5f 0%,#2d5a8e 100%);
  color:#fff;
  box-shadow:0 6px 20px rgba(30,58,95,.35);
}
.dp-btn-start:hover { box-shadow:0 8px 24px rgba(30,58,95,.5); }
.dp-btn-end {
  background:linear-gradient(135deg,#b8860b 0%,#d4a017 100%);
  color:#fff;
  box-shadow:0 6px 20px rgba(184,134,11,.35);
}
.dp-btn-end:hover { box-shadow:0 8px 24px rgba(184,134,11,.5); }

/* Garage button — outlined */
.dp-btn-garage {
  width:100%;
  padding:.95rem 1rem;
  border:1.5px solid #eef0f6;
  border-radius:14px;
  font-size:.92rem;
  font-weight:700;
  cursor:pointer;
  font-family:inherit;
  background:#fff;
  color:#1a1a2e;
  transition:.18s;
  box-shadow:0 1px 4px rgba(0,0,0,.04);
}
.dp-btn-garage:hover { border-color:#1e3a5f; background:#f0f4ff; color:#1e3a5f; }
.dp-btn-garage:active { transform:scale(.98); }

/* ── 4 QUICK BUTTONS — 2x2 grid ── */
.dp-quick {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:.65rem;
}
.dp-qbtn {
  border:none;
  border-radius:18px;
  padding:1.1rem .75rem 1rem;
  cursor:pointer;
  font-family:inherit;
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  gap:.6rem;
  transition:.18s;
  box-shadow:0 2px 8px rgba(0,0,0,.05);
  position:relative;
  overflow:hidden;
}
.dp-qbtn:active { transform:scale(.95); }
.dp-qbtn .qi-wrap {
  width:44px; height:44px;
  border-radius:13px;
  display:flex; align-items:center; justify-content:center;
  font-size:1.35rem;
}
.dp-qbtn .ql   { font-size:.88rem; font-weight:800; color:#1a1a2e; }
.dp-qbtn .qs   { font-size:.72rem; font-weight:500; color:#94a3b8; margin-top:-.2rem; }

async function apiCall(endpoint, method='GET', body=null) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  const tok = getToken();
  if (tok) opts.headers['Authorization'] = `Bearer ${tok}`;
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(`${API}${endpoint}`, opts);
  if (res.status === 401) { clearAuth(); showNotification('انتهت الجلسة','error'); setTimeout(()=>location.reload(),1500); throw new Error('Unauthorized'); }
  if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.detail || `خطأ ${res.status}`); }
  if (method === 'DELETE') return {success:true};
  return res.json();
}

/* ── DATE/TIME FORMATTER — 24h format dd/mm/yyyy HH:MM (UTC→local) ── */
function fmtDate(isoStr) {
  if(!isoStr) return '—';
  let s = isoStr; if(s && !s.endsWith('Z') && !s.includes('+') && s.length>10) s+='Z';
  const d = new Date(s); if(isNaN(d.getTime())) return isoStr;
  const pad=n=>String(n).padStart(2,'0');
  return `${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()}`;
}
function fmtDT(isoStr) {
  if(!isoStr) return '—';
  // Add Z if missing so browser converts UTC→local timezone automatically
  let s = isoStr;
  if(s && !s.endsWith('Z') && !s.includes('+') && s.length > 10) s += 'Z';
  const d = new Date(s);
  if(isNaN(d.getTime())) return isoStr;
  const pad = n => String(n).padStart(2,'0');
  return `${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()}  ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

/** Format a number in Arabic locale (1 decimal place); returns '—' for null/undefined. */
function fmtNum(n) {
  return n != null ? (+n).toLocaleString('ar-EG', { maximumFractionDigits: 1 }) : '—';
}

/** Return a colored license-expiry badge. showGreen adds a green ✓ badge for valid dates. */
function licBadge(dt, showGreen = false) {
  if (!dt) return '—';
  const today = new Date().toISOString().split('T')[0];
  const soon  = new Date(Date.now() + 30 * 864e5).toISOString().split('T')[0];
  if (dt < today) return `<span class="badge badge-red">⚠️ منتهية ${dt}</span>`;
  if (dt <= soon)  return `<span class="badge badge-yellow">⏰ ${dt}</span>`;
  return showGreen ? `<span class="badge badge-green">✓ ${dt}</span>` : dt;
}

function tableSearch(tableId, countId, fields) {
  /**
   * tableId  : id of <table> or wrapping element containing <tr>
   * countId  : id of element showing count (optional)
   * fields   : array of column indices to search in (0-based)
   */
  const wrap   = document.getElementById(tableId);
  if(!wrap) return;
  const inputs = wrap.closest('.card')?.querySelectorAll('.srch-bar input, .srch-bar select') || [];
  const rows   = wrap.querySelectorAll('tbody tr');

  let visible = 0;
  rows.forEach(tr => {
    let show = true;
    inputs.forEach(inp => {
      const val = inp.value.trim().toLowerCase();
      if(!val) return;
      if(inp.dataset.col !== undefined) {
        // column-specific
        const col = tr.cells[+inp.dataset.col];
        if(col && !col.textContent.toLowerCase().includes(val)) show = false;
      } else {
        // global text search across all cells
        if(fields) {
          const haystack = fields.map(i => tr.cells[i]?.textContent||'').join(' ').toLowerCase();
          if(!haystack.includes(val)) show = false;
        } else {
          if(!tr.textContent.toLowerCase().includes(val)) show = false;
        }
      }
    });
    tr.classList.toggle('row-hidden', !show);
    if(show) visible++;
  });

  const countEl = countId ? document.getElementById(countId) : null;
  if(countEl) countEl.textContent = visible;

  // update srch-count span inside the bar
  const countSpan = wrap.closest('.card')?.querySelector('.srch-count');
  if(countSpan) countSpan.textContent = `${visible} / ${rows.length}`;
}

function buildSearchBar(placeholder='بحث...', extraSelects=[]) {
  /**
   * extraSelects: [{label, options:[{v,l}], col}]
   * Returns HTML string for .srch-bar div
   */
  const selHtml = extraSelects.map(s =>
    `<select data-col="${s.col}" onchange="this.closest('.card').querySelector('[data-tsearch]').dispatchEvent(new Event('input'))">
      <option value="">${s.label}</option>
      ${s.options.map(o=>`<option value="${o.v}">${o.l}</option>`).join('')}
    </select>`
  ).join('');
  return `<div class="srch-bar">
    <input data-tsearch placeholder="🔍 ${placeholder}" oninput="this.closest('.card').querySelector('[data-table-search]') && eval(this.closest('.card').querySelector('[data-table-search]').dataset.tableSearch)">
    ${selHtml}
    <span class="srch-count"></span>
    <button class="srch-reset" onclick="resetSearch(this)">✕ مسح</button>
  </div>`;
}

function resetSearch(btn) {
  const bar = btn.closest('.srch-bar');
  bar.querySelectorAll('input,select').forEach(el=>el.value='');
  // trigger re-filter
  bar.querySelectorAll('input').forEach(el=>el.dispatchEvent(new Event('input')));
}

/** Generic: search all <tr> in a table by text across given columns */
function liveSearch(inputEl, tableBodyId, colIndices) {
  const q = inputEl.value.trim().toLowerCase();
  const tbody = document.getElementById(tableBodyId);
  if(!tbody) return;
  let vis = 0;
  tbody.querySelectorAll('tr').forEach(tr=>{
    const hay = (colIndices ? colIndices.map(i=>tr.cells[i]?.textContent||'') : [...tr.cells].map(c=>c.textContent)).join(' ').toLowerCase();
    const show = !q || hay.includes(q);
    tr.classList.toggle('row-hidden', !show);
    if(show) vis++;
  });
  // update counter
  const bar = inputEl.closest('.srch-bar');
  if(bar){
    const cnt = bar.querySelector('.srch-count');
    if(cnt) cnt.textContent = `${vis} / ${tbody.querySelectorAll('tr').length}`;
  }
}

/** Generic: filter <tr> by select value in a specific column */
function liveFilter(selectEl, tableBodyId, colIdx) {
  const val = selectEl.value.toLowerCase();
  const tbody = document.getElementById(tableBodyId);
  if(!tbody) return;
  let vis = 0;
  tbody.querySelectorAll('tr').forEach(tr=>{
    const cell = tr.cells[colIdx]?.textContent?.toLowerCase()||'';
    const show = !val || cell.includes(val);
    tr.classList.toggle('row-hidden', !show);
    if(show) vis++;
  });
  // sync with any text search already applied (re-run text search)
  const bar = selectEl.closest('.srch-bar');
  if(bar){
    const txt = bar.querySelector('input[data-tsearch]');
    if(txt && txt.value) liveSearch(txt, tableBodyId);
    const cnt = bar.querySelector('.srch-count');
    if(cnt){
      const tbody2 = document.getElementById(tableBodyId);
      const v2 = tbody2?.querySelectorAll('tr:not(.row-hidden)').length||0;
      const t2 = tbody2?.querySelectorAll('tr').length||0;
      cnt.textContent = `${v2} / ${t2}`;
    }
  }
}

function filterCarsTable() {
  const txt    = document.querySelector('#carsList')?.closest('.card')?.querySelector('[data-tsearch]')?.value?.toLowerCase()||'';
  const cat    = document.getElementById('carsFilterCat')?.value||'';
  const status = document.getElementById('carsFilterStatus')?.value||'';
  const tbody  = document.getElementById('carsBody');
  if(!tbody) return;
  let vis=0;
  tbody.querySelectorAll('tr').forEach(tr=>{
    const matchCat    = !cat    || (tr.dataset.cat||'').includes(cat);
    const matchStatus = !status || (tr.dataset.status||'')=== status;
    const matchTxt    = !txt    || tr.textContent.toLowerCase().includes(txt);
    const show = matchCat && matchStatus && matchTxt;
    tr.classList.toggle('row-hidden', !show);
    if(show) vis++;
  });
  const cnt = document.getElementById('carsCount');
  if(cnt) cnt.textContent = `${vis} / ${tbody.querySelectorAll('tr').length}`;
}
function resetCarsFilter() {
  const card = document.getElementById('carsList')?.closest('.card');
  if(card) card.querySelectorAll('input,select').forEach(el=>el.value='');
  filterCarsTable();
}

function onCarCategoryChange(cat) {

    'عربات': ['سيارة ركوب','بيك آب كابينة مزدوجة','بيك آب كابينة مفردة','ميكروباص','أتوبيس','سيارة نقل خفيف','سيارة إسعاف','أخرى'],

  };
  const sel = document.getElementById('mCarSubType');
  if(!sel) return;

/* ── LOCATION HELPERS ── */
function parseCoords(str) {
  if(!str) return null;
  let m = str.match(/(-?\d+\.?\d*)[,\s]+(-?\d+\.?\d*)/); if(m) return [parseFloat(m[1]),parseFloat(m[2])];
  m = str.match(/@(-?\d+\.?\d*),(-?\d+\.?\d*)/); if(m) return [parseFloat(m[1]),parseFloat(m[2])];
  m = str.match(/[?&]q=(-?\d+\.?\d*),(-?\d+\.?\d*)/); if(m) return [parseFloat(m[1]),parseFloat(m[2])];
  m = str.match(/maps\/(-?\d+\.?\d*),(-?\d+\.?\d*)/); if(m) return [parseFloat(m[1]),parseFloat(m[2])];
  return null;
}
function formatLocation(loc, asGarage=false) {
  if(!loc||!loc.trim()) return '—';
  const coords=parseCoords(loc);
  if(coords){
    const url=`https://www.google.com/maps?q=${coords[0]},${coords[1]}`;
    if(asGarage) return `<a href="${url}" target="_blank"
      style="display:inline-flex;align-items:center;gap:.3rem;padding:.2rem .6rem;background:#fee2e2;color:#dc2626;border-radius:6px;text-decoration:none;font-size:.78rem;font-weight:700;border:1px solid #fca5a5">
      🅿️ ${coords[0].toFixed(4)}, ${coords[1].toFixed(4)}</a>`;
    return `<a class="location-link" href="${url}" target="_blank">📍 ${coords[0].toFixed(4)}, ${coords[1].toFixed(4)}</a>`;
  }
  if(loc.startsWith('http')){
    if(asGarage) return `<a href="${loc}" target="_blank"
      style="display:inline-flex;align-items:center;gap:.3rem;padding:.2rem .6rem;background:#fee2e2;color:#dc2626;border-radius:6px;text-decoration:none;font-size:.78rem;font-weight:700;border:1px solid #fca5a5">
      🅿️ فتح الموقع</a>`;
    return `<a class="location-link" href="${loc}" target="_blank">📍 فتح الخريطة</a>`;
  }
  return `<span style="font-size:.8rem">${loc}</span>`;
}

/* ── Combobox helpers ── */
function openCombo(type) {
  const isDriver = type === 'driver';
  const searchEl = document.getElementById(isDriver ? 'ftDriverSearch' : 'ftCarSearch');
  const drop     = document.getElementById(isDriver ? 'ftDriverDrop'   : 'ftCarDrop');
  const query    = searchEl.value.trim().toLowerCase();
  const data     = isDriver ? (window._driversData||[]) : (window._carsData||[]);

  const items = data.filter(item => {
    const text = isDriver ? item.name : item.plate;
    return !query || text.toLowerCase().includes(query);
  }).slice(0, 60);

  if(!items.length) { drop.style.display='none'; return; }

  const highlight = (text) => {
    if(!query) return text;
    const idx = text.toLowerCase().indexOf(query);
    if(idx === -1) return text;
    return text.slice(0,idx) + `<mark style="background:#fde68a;border-radius:2px">${text.slice(idx,idx+query.length)}</mark>` + text.slice(idx+query.length);
  };

  drop.innerHTML = items.map(item => {
    const label = isDriver ? item.name : item.plate;
    const sub   = isDriver ? (item.fixed_number ? `<span style="color:var(--muted);font-size:.78rem"> · ${item.fixed_number}</span>` : '') : (item.model ? `<span style="color:var(--muted);font-size:.78rem"> · ${item.model}</span>` : '');
    return `<div data-id="${item.id}" data-label="${label}"
                 style="padding:.5rem .85rem;cursor:pointer;font-size:.88rem;border-bottom:1px solid var(--border)"
                 onmousedown="selectCombo('${type}',${item.id},'${label.replace(/'/g,"\\'")}')">
              ${highlight(label)}${sub}
            </div>`;
  }).join('');
  drop.style.display = 'block';
}

function selectCombo(type, id, label) {
  const isDriver = type === 'driver';
  document.getElementById(isDriver ? 'ftDriverSearch' : 'ftCarSearch').value = label;
  document.getElementById(isDriver ? 'ftDriverVal'    : 'ftCarVal').value    = id;
  document.getElementById(isDriver ? 'ftDriverDrop'   : 'ftCarDrop').style.display = 'none';
  filterTrips();
}

function closeCombo(type) {
  const isDriver = type === 'driver';
  // لو ما اختارش حاجة وكتب نص فارغ → امسح الفلتر
  const searchEl = document.getElementById(isDriver ? 'ftDriverSearch' : 'ftCarSearch');
  const valEl    = document.getElementById(isDriver ? 'ftDriverVal'    : 'ftCarVal');
  if(!searchEl.value.trim()) { valEl.value = ''; filterTrips(); }
  document.getElementById(isDriver ? 'ftDriverDrop' : 'ftCarDrop').style.display = 'none';
}

function filterTrips() {
  const dId    = document.getElementById('ftDriverVal')?.value;
  const cId    = document.getElementById('ftCarVal')?.value;
  const date   = document.getElementById('ftDate')?.value;
  const status = document.getElementById('ftStatus')?.value;
  const search = (document.getElementById('ftSearch')?.value||'').trim().toLowerCase();

  // اجمع كل بيانات السائقين والمركبات في map للبحث السريع
  const drvMap = Object.fromEntries((window._driversData||[]).map(d=>[d.id, d.name]));
  const carMap = Object.fromEntries((window._carsData||[]).map(c=>[c.id, c.plate]));

  let f=(window._tripsData||[]).filter(t=>{
    if(dId    && String(t.driver_id)!==dId)  return false;
    if(cId    && String(t.car_id)!==cId)     return false;
    if(date) {
      if(!t.start_time) return false;
      const localDate = new Date(t.start_time).toLocaleDateString('en-CA');
      if(localDate !== date) return false;
    }
    if(status==='active' && t.end_time)   return false;
    if(status==='done'   && !t.end_time)  return false;
    if(search) {
      const haystack = [
        drvMap[t.driver_id]||'', carMap[t.car_id]||'',
        t.start_odometer, t.end_odometer,
        t.start_time, t.end_time,
        t.notes, t.start_location, t.end_location
      ].join(' ').toLowerCase();
      if(!haystack.includes(search)) return false;
    }
    return true;
  });
  document.getElementById('tripsTable').innerHTML=buildTripsTable(f,window._driversData,window._carsData,window._garageLatest);
  document.getElementById('tripCount').textContent=f.length;
}

function clearTripFilters(){
  ['ftDriverSearch','ftCarSearch','ftSearch'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  ['ftDriverVal','ftCarVal'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  ['ftDriverDrop','ftCarDrop'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.display='none';});
  const fd=document.getElementById('ftDate');if(fd)fd.value='';
  const fs=document.getElementById('ftStatus');if(fs)fs.value='';
  filterTrips();
}

function exportCSV(){
  const trips=window._tripsData||[],drivers=window._driversData||[],cars=window._carsData||[];
  const rows=[['#','السائق','المركبة','وقت البداية','وقت النهاية','عداد البداية','عداد النهاية','موقع البداية','موقع النهاية','موقع الجراج','ملاحظات','الحالة']];

function buildWSTable(records) {
  if(!records.length) return '<div class="empty-state"><div class="empty-icon">📭</div><p>لا توجد سجلات</p></div>';
  return `<table><thead><tr><th>#</th><th>السائق</th><th>النوع</th><th>العملية</th><th>حالة الكوتش</th><th>المركبة</th><th>العداد</th><th>الكمية</th><th>سعر الوحدة</th><th>الإجمالي</th><th>ملاحظات</th><th>📍 الموقع</th><th>التاريخ</th></tr></thead><tbody>
  ${records.map(r=>{
    const wt=WT[r.type]||{icon:'🔨',label:r.type};
    const opLabel=r.operation_type?(r.operation_type==='maintenance'?'صيانة':'استبدال'):'—';
    const taLabel=r.tire_action?`<span class="badge badge-orange">${TIRE_ACTIONS[r.tire_action]||r.tire_action}</span>`:'—';
    return `<tr><td>${r.id}</td><td>${r.driver_name||'—'}</td>
      <td><span class="badge badge-purple">${wt.icon} ${wt.label}</span></td>
      <td>${r.operation_type?`<span class="badge badge-blue">${opLabel}</span>`:'—'}</td>
      <td>${r.type==='tire'?taLabel:'—'}</td>
      <td dir="ltr">${r.vehicle_plate||'—'}</td><td>${r.odometer_reading?r.odometer_reading+' كم':'—'}</td>
      <td>${r.quantity||'—'}</td>
      <td style="font-size:.82rem">${r.price} جنيه</td>
      <td><strong>${r.price?(parseFloat(r.price)).toFixed(2)+' جنيه':'—'}</strong></td>
      <td style="max-width:120px;font-size:.8rem">${r.notes||'—'}</td>
      <td>${r.location?formatLocation(r.location):'<span style="color:var(--muted);font-size:.78rem">—</span>'}</td>
      <td>${r.created_at?fmtDT(r.created_at):'—'}</td></tr>`;
  }).join('')}</tbody></table>`;
}

function filterWS(){
  const car  = document.getElementById('filterCar')?.value  || '';
  const type = document.getElementById('filterType')?.value || '';
  const date = document.getElementById('filterDate')?.value || '';
  const txt  = (document.getElementById('wsSearchText')?.value||'').trim().toLowerCase();
  let f = (window._wsRecords||[]).filter(r=>{
    if(txt){
      const hay = [r.driver_name||'',r.vehicle_plate||'',r.notes||'',r.description||''].join(' ').toLowerCase();
      if(!hay.includes(txt)) return false;
    }
    if(car  && String(r.vehicle_id) !== car)          return false;
    if(type && r.type !== type)                        return false;
    if(date && !r.created_at?.startsWith(date))       return false;
    return true;
  });
  document.getElementById('wsTable').innerHTML = buildWSTable(f);
  const wsCnt=document.getElementById('wsCount');
  if(wsCnt) wsCnt.textContent=`${f.length} / ${(window._wsRecords||[]).length}`;
}

function buildGarageTable(records){

  ${records.map(r=>`<tr>
    <td><strong>${r.driver_name||'—'}</strong></td>
    <td dir="ltr">${r.car_plate||'—'}</td>
    <td>${r.recorded_at?fmtDT(r.recorded_at):'—'}</td>
    <td style="font-size:.82rem">${r.notes||'—'}</td>
    <td>${formatLocation(r.location)}</td>
  </tr>`).join('')}</tbody></table>`;

function buildMapSummaryTable(trips,drivers,cars,garageLatest){
  if(!cars.length) return '<div class="empty-state"><div class="empty-icon">📭</div><p>لا توجد مركبات</p></div>';
  return `<table><thead><tr><th>رقم المركبة</th><th>الموديل</th><th>السائق</th><th>الحالة</th><th>آخر موقع معروف</th><th>موقع الجراج</th></tr></thead><tbody>
  ${cars.map(car=>{
    const activeTrip=trips.find(t=>t.car_id===car.id&&!t.end_time);
    const lastTrip=trips.filter(t=>t.car_id===car.id&&t.end_time).sort((a,b)=>b.id-a.id)[0];
    const trip=activeTrip||lastTrip;
    const drv=trip?drivers.find(d=>d.id===trip.driver_id):null;
    const lastLoc=activeTrip?activeTrip.start_location:(lastTrip?.end_location);
    // Garage from standalone garage_records table
    const hasActiveTrip=!!activeTrip;
    const garageRec=(garageLatest||[]).find(g=>g.car_id===car.id);
    const garageLoc=hasActiveTrip?'':garageRec?.location; const statusBadge=hasActiveTrip?'<span class="badge badge-blue">● نشطة</span>':(garageLoc?'<span class="badge badge-gold">🅿️ جراج</span>':'<span class="badge badge-green">✓ متاحة</span>');
    return `<tr><td dir="ltr"><strong>${car.plate}</strong></td><td>${car.model}</td><td>${drv?.name||'—'}</td><td>${statusBadge}</td><td>${formatLocation(lastLoc)}</td><td>${formatLocation(garageLoc)}</td></tr>`;
  }).join('')}</tbody></table>`;
}

}

/* ── ROUTE MAP ── */
function loadRouteMap() {
  const sel = document.getElementById('routeTripSelect');
  if(!sel||!sel.value) return;
  const opt = sel.options[sel.selectedIndex];
  const startStr = opt.dataset.start||'';
  const endStr   = opt.dataset.end||'';
  const driverName = opt.dataset.driver||'—';
  const carPlate   = opt.dataset.car||'—';
  const startTime  = opt.dataset.startTime||'';
  const endTime    = opt.dataset.endTime||'';

  const startCoords = parseCoords(startStr);
  const endCoords   = parseCoords(endStr);

  if(!startCoords || !endCoords) {
    showNotification('لا توجد إحداثيات كافية لهذه الرحلة', 'error');
    return;
  }

  const map = window._routeMapInstance;
  if(!map) return;

  // Clear previous layers
  map.eachLayer(layer=>{ if(layer instanceof L.Marker || layer instanceof L.Polyline) map.removeLayer(layer); });

  // Start marker (green)
  const startIcon = L.divIcon({
    className:'',
    html:`<div style="background:#10b981;color:white;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:1rem;border:3px solid white;box-shadow:0 2px 10px rgba(0,0,0,.3)">🟢</div>`,
    iconSize:[36,36],iconAnchor:[18,18]
  });
  // End marker (gold)
  const endIcon = L.divIcon({
    className:'',
    html:`<div style="background:#b8860b;color:white;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:1rem;border:3px solid white;box-shadow:0 2px 10px rgba(184,134,11,.4)">🏁</div>`,
    iconSize:[36,36],iconAnchor:[18,18]
  });

  L.marker(startCoords, {icon:startIcon}).addTo(map).bindPopup(`
    <div dir="rtl" style="font-family:Cairo,sans-serif;min-width:170px">
      <strong style="color:#10b981">🟢 نقطة البداية</strong><br>
      <span style="font-size:.8rem;color:#666">👨‍✈️ ${driverName} — ${carPlate}</span><br>
      <span style="font-size:.78rem;color:#999">${fmtDT(startTime)}</span>
    </div>`).openPopup();

  L.marker(endCoords, {icon:endIcon}).addTo(map).bindPopup(`
    <div dir="rtl" style="font-family:Cairo,sans-serif;min-width:170px">
      <strong style="color:#b8860b">🏁 نقطة النهاية</strong><br>
      <span style="font-size:.8rem;color:#666">👨‍✈️ ${driverName} — ${carPlate}</span><br>
      <span style="font-size:.78rem;color:#999">${fmtDT(endTime)}</span>
    </div>`);

  // Draw route line with animated dashes
  const routeLine = L.polyline([startCoords, endCoords], {
    color:'#1e3a5f', weight:4, opacity:.8,
    dashArray:'10 8'
  }).addTo(map);

  // Midpoint arrow decoration
  const midLat = (startCoords[0]+endCoords[0])/2;
  const midLng = (startCoords[1]+endCoords[1])/2;
  const arrowIcon = L.divIcon({
    className:'',
    html:`<div style="background:#1e3a5f;color:white;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:.85rem;border:2px solid white;box-shadow:0 1px 6px rgba(0,0,0,.2)">🚛</div>`,
    iconSize:[28,28],iconAnchor:[14,14]
  });
  L.marker([midLat,midLng], {icon:arrowIcon}).addTo(map);

  // Fit bounds
  map.fitBounds(L.latLngBounds([startCoords, endCoords]), {padding:[60,60]});

  // Show info bar
  const infoBar = document.getElementById('routeInfoBar');
  if(infoBar){
    const dist = calcDistance(startCoords,endCoords);
    infoBar.style.display='flex';
    infoBar.innerHTML=`
      <div class="route-info-chip">👨‍✈️ ${driverName}</div>
      <div class="route-info-chip">🚗 ${carPlate}</div>
      <div class="route-info-chip">📅 ${fmtDate(startTime)}</div>
      <div class="route-info-chip highlight">📏 ~${dist} كم (خط مستقيم)</div>
      ${endTime?`<div class="route-info-chip">⏱️ ${fmtDT(startTime)} ← → ${fmtDT(endTime)}</div>`:''}
    `;
  }
}

function calcDistance(c1, c2) {
  const R=6371, dLat=(c2[0]-c1[0])*Math.PI/180, dLon=(c2[1]-c1[1])*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(c1[0]*Math.PI/180)*Math.cos(c2[0]*Math.PI/180)*Math.sin(dLon/2)**2;
  return (R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))).toFixed(1);
}

async function generateOpCard() {
  const car_id      = document.getElementById('opCar').value;

  const date_to     = document.getElementById('opTo').value;
  const report_type = document.getElementById('opType').value;
  const res_el      = document.getElementById('opCardResult');

  if(!date_from||!date_to) { showNotification('يرجى تحديد الفترة الزمنية','error'); return; }
  if(date_from > date_to)  { showNotification('تاريخ البداية يجب أن يسبق تاريخ النهاية','error'); return; }

  res_el.innerHTML = '<div class="empty-state"><div class="empty-icon">⏳</div><p>جاري إنشاء التقرير...</p></div>';

  let params = `date_from=${date_from}&date_to=${date_to}&report_type=${report_type}`;
  if(car_id) params += `&car_id=${car_id}`;

  let data;
  try { data = await apiCall(`/reports/operational?${params}`); }
  catch(e) { res_el.innerHTML=`<div style="color:#ef4444;padding:1rem">${e.message}</div>`; return; }

  if(!data.rows || data.rows.length===0) {
    res_el.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>لا توجد رحلات في هذه الفترة</p></div>';
    return;
  }

  // Determine column labels
  const isMonthly = !data.single_month && !data.multi_year && report_type==='detailed';
  const isDaily   = data.single_month  && report_type==='detailed';
  const isYearly  = data.multi_year;

  function periodLabel(p) {
    if(isDaily)   { // 2026-04-01 → 1 أبريل
      const d = new Date(p + 'T00:00:00');
      return d.toLocaleDateString('ar-EG',{weekday:'short',day:'numeric',month:'long'});
    }
    if(isMonthly) { // 2026-04 → أبريل 2026
      const [y,m] = p.split('-');

  const maxKm = Math.max(...data.rows.map(r=>Math.max(0,(r.max_odo||0)-(r.min_odo||0))));

        <div style="font-size:.78rem;color:#b45309;margin-top:.2rem">

      </div>

    <div style="overflow-x:auto">
      <table class="op-table">
        <thead><tr>

async function fixAnomalousTrip(tripId, currentStart, currentEnd) {
  const curKm = currentEnd && currentStart ? (currentEnd - currentStart).toLocaleString('ar-EG',{maximumFractionDigits:1}) : '—';
  openModal(`
    <div class="modal-header">
      <div class="modal-title">🛠️ تصحيح رحلة #${tripId}</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div style="background:#fef3c7;border-radius:8px;padding:.6rem .9rem;margin-bottom:1rem;font-size:.82rem;color:#92400e">
      ⚠️ القراءات الحالية: بداية <strong>${(currentStart||0).toLocaleString('ar-EG')}</strong> كم
      ← نهاية <strong>${(currentEnd||0).toLocaleString('ar-EG')}</strong> كم
      = <strong>${curKm}</strong> كم (مشبوه)
    </div>
    <p style="color:#64748b;margin-bottom:1rem;font-size:.88rem">
      أدخل القراءات الصحيحة للعداد:
    </p>
    <div class="form-group">
      <label>عداد البداية الصحيح (كم)</label>
      <input type="number" id="fixStart" value="${currentStart||''}" min="0">
    </div>
    <div class="form-group">
      <label>عداد النهاية الصحيح (كم)</label>
      <input type="number" id="fixEnd" value="${currentEnd||''}" min="0">
    </div>
    <div id="fixPreview" style="margin-top:.5rem;font-size:.82rem;color:#059669;font-weight:700;text-align:center"></div>
    <script>
      ['fixStart','fixEnd'].forEach(id=>{
        document.getElementById(id).addEventListener('input',()=>{
          const s=+document.getElementById('fixStart').value,e=+document.getElementById('fixEnd').value;
          const p=document.getElementById('fixPreview');
          if(s&&e&&e>s) p.textContent='✅ المسافة بعد التصحيح: '+(e-s).toLocaleString('ar-EG',{maximumFractionDigits:1})+' كم';
          else p.textContent='';
        });
      });
    <\/script>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">إلغاء</button>
      <button class="btn btn-primary" onclick="submitTripFix(${tripId})">✅ حفظ التصحيح</button>
    </div>
  `);
}

async function submitTripFix(tripId) {
  const startV = parseFloat(document.getElementById('fixStart').value);
  const endV   = parseFloat(document.getElementById('fixEnd').value);
  if (isNaN(startV)||isNaN(endV)) return showNotification('يرجى إدخال القيمتين','error');
  if (endV <= startV) return showNotification('عداد النهاية يجب أن يكون أكبر من البداية','error');
  if ((endV - startV) >= 1000) return showNotification('المسافة لا تزال كبيرة جداً ('+Math.round(endV-startV)+' كم) — تحقق من القراءات','error');
  try {
    await apiCall(`/trips/${tripId}`, 'PUT', { start_odometer: startV, end_odometer: endV });
    closeModal();
    showNotification('تم تصحيح الرحلة بنجاح ✅','success');
    checkAnomalousTrips();
  } catch(e) { showNotification(e.message,'error'); }
}

function filterReqCards(q) {
  q = (q||'').toLowerCase().trim();
  const cnt = document.getElementById('reqCount');
  let vis = 0, total = 0;
  document.querySelectorAll('.req-card').forEach(card=>{
    total++;
    const hidden = card.style.display==='none';
    if(hidden){ total--; return; } // already hidden by status filter
    const hay = card.textContent.toLowerCase();
    const show = !q || hay.includes(q);
    card.style.opacity = show ? '1' : '0.2';
    card.style.pointerEvents = show ? 'auto' : 'none';
    card.dataset.textHidden = show ? '' : '1';
    if(show) vis++;
    total++;
  });
  // re-count only visible + not text-hidden
  vis = document.querySelectorAll('.req-card:not([data-text-hidden="1"])').length;
  total = document.querySelectorAll('.req-card').length;
  if(cnt) cnt.textContent = `${vis} / ${total}`;
}

function filterRequests(status, btn) {
  document.querySelectorAll('.req-filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.req-card').forEach(card=>{
    const match = status==='all' || card.dataset.status===status || card.dataset.priority===status;
    card.style.display = match ? 'block' : 'none';
  });
}

/* ── SILENT GPS — runs in background, no UI feedback ── */
// maximumAge=0 دايماً عشان نضمن موقع جديد وليس من الكاش
function silentGetLocation(timeoutMs=10000) {
  return new Promise(resolve => {
    if(!navigator.geolocation){ resolve(''); return; }

    let done = false;
    const finish = val => { if(!done){ done=true; resolve(val); } };

    // المرحلة الأولى: دقة منخفضة — maximumAge=0 لضمان موقع حديث
    navigator.geolocation.getCurrentPosition(
      p => finish(`${p.coords.latitude.toFixed(6)},${p.coords.longitude.toFixed(6)}`),
      () => {
        // المرحلة الثانية: دقة عالية مع maximumAge=0
        navigator.geolocation.getCurrentPosition(
          p => finish(`${p.coords.latitude.toFixed(6)},${p.coords.longitude.toFixed(6)}`),
          () => finish(''),
          { enableHighAccuracy:true, timeout: Math.min(timeoutMs, 8000), maximumAge:0 }
        );
      },
      { enableHighAccuracy:false, timeout: Math.min(timeoutMs, 5000), maximumAge:0 }
    );

    // ضمان الانتهاء قبل انتهاء المهلة الكلية
    setTimeout(() => finish(''), timeoutMs);
  });
}

      return showNotification('عداد النهاية يجب أن يكون أكبر من '+activeTrip.start_odometer+' كم','error');
    btn.disabled=true; btn.textContent='🏁 جاري...';
    const location = await silentGetLocation();
    try{
      await apiCall('/trips/end','POST',{trip_id:activeTrip.id,end_odometer:end_odo,end_location:location,notes});
      showNotification('✅ انتهت الرحلة بنجاح!','success');
      await renderDriverTrip();
    }catch(e){ showNotification(e.message,'error'); btn.disabled=false; btn.textContent='🏁 إنهاء الرحلة'; }
  });
}

/* ── GPS HELPER — Reusable auto-location capture ── */
function gpsPickerHTML(fieldId, label='الموقع الحالي') {
  return `<div class="form-group">
    <label>${label} <span class="req">*</span></label>
    <div class="gps-picker" id="gpsPicker_${fieldId}">
      <button type="button" class="gps-capture-btn" id="gpsBtn_${fieldId}" onclick="captureGPS('${fieldId}')">
        📍 تسجيل موقعي الآن
      </button>
      <div id="gpsResult_${fieldId}" class="gps-result" style="display:none"></div>
      <div id="gpsCoords_${fieldId}" class="gps-coords" style="display:none"></div>
    </div>
    <input type="hidden" id="${fieldId}">
  </div>`;
}

function captureGPS(fieldId) {
  const btn    = document.getElementById('gpsBtn_'+fieldId);
  const result = document.getElementById('gpsResult_'+fieldId);
  const coords = document.getElementById('gpsCoords_'+fieldId);
  const picker = document.getElementById('gpsPicker_'+fieldId);
  const hidden = document.getElementById(fieldId);

  if(!navigator.geolocation){
    result.className='gps-result err';
    result.innerHTML='❌ المتصفح لا يدعم GPS';
    result.style.display='flex';
    return;
  }

  btn.disabled=true;
  btn.className='gps-capture-btn gps-btn-spin';
  btn.innerHTML='⏳ جاري تحديد موقعك...';
  result.style.display='none';
  coords.style.display='none';
  picker.className='gps-picker';

  // المرحلة 1: دقة منخفضة (سريعة — WiFi/شبكة)
  navigator.geolocation.getCurrentPosition(
    pos => {
      const lat=pos.coords.latitude.toFixed(6);
      const lng=pos.coords.longitude.toFixed(6);
      const acc=Math.round(pos.coords.accuracy);
      const val=`${lat},${lng}`;
      hidden.value=val;
      picker.className='gps-picker gps-ok';
      btn.className='gps-capture-btn gps-btn-ok';
      btn.innerHTML='✅ تم تسجيل الموقع — اضغط لتحديثه';
      btn.disabled=false;
      result.className='gps-result ok';
      result.innerHTML=`✅ الموقع مسجّل (دقة: ${acc} متر)`;
      result.style.display='flex';
      coords.textContent=`${lat}, ${lng}`;
      coords.style.display='block';
    },
    () => {
      // المرحلة 2: دقة عالية (GPS — fallback إذا فشلت الشبكة)
      navigator.geolocation.getCurrentPosition(
        pos => {
          const lat=pos.coords.latitude.toFixed(6);
          const lng=pos.coords.longitude.toFixed(6);
          const acc=Math.round(pos.coords.accuracy);
          hidden.value=`${lat},${lng}`;
          picker.className='gps-picker gps-ok';
          btn.className='gps-capture-btn gps-btn-ok';
          btn.innerHTML='✅ تم تسجيل الموقع — اضغط لتحديثه';
          btn.disabled=false;
          result.className='gps-result ok';
          result.innerHTML=`✅ الموقع مسجّل (دقة: ${acc} متر)`;
          result.style.display='flex';
          coords.textContent=`${lat}, ${lng}`;
          coords.style.display='block';
        },
        err => {
          const msgs={1:'رُفض الإذن — فعّل صلاحية الموقع في المتصفح',2:'الإشارة ضعيفة — تأكد من تشغيل GPS',3:'انتهت المهلة — حاول مجدداً'};
          picker.className='gps-picker gps-err';
          btn.className='gps-capture-btn';
          btn.innerHTML='📍 تسجيل موقعي الآن';
          btn.disabled=false;
          result.className='gps-result err';
          result.innerHTML='❌ '+(msgs[err.code]||err.message);
          result.style.display='flex';
        },
        {enableHighAccuracy:true, timeout:12000, maximumAge:0}
      );
    },
    {enableHighAccuracy:false, timeout:5000, maximumAge:0}
  );
}

async function renderDriverEmergency() {
  const [allowedCars, allTrips, myReports] = await Promise.all([
    loadAllowedCars(), loadTrips(),
    apiCall('/emergency/reports').catch(()=>[])
  ]);
  const activeTrip = allTrips.find(t=>t.driver_id==currentUser.driver_id && !t.end_time);
  window._emergAllowedCars  = allowedCars;
  window._emergActiveTripId = activeTrip?.id  || null;
  window._emergActiveCarId  = activeTrip?.car_id || null;

  // ── بلاغات آخر 24 ساعة فقط ──────────────────────────────
  const now24 = Date.now() - 24*60*60*1000;
  const recentReports = myReports.filter(r => {
    if(!r.created_at) return false;
    return new Date(r.created_at).getTime() >= now24;
  });

  // ── كارد حالة البلاغ ──────────────────────────────────────
  function buildReportCard(r) {
    const isEmg    = r.type === 'emergency';
    const handled  = r.is_handled;
    const hasMsg   = r.driver_message && r.driver_message.trim();
    const typeColor = isEmg ? '#dc2626' : '#d97706';
    const typeBg    = isEmg ? '#fef2f2' : '#fffbeb';
    const typeBorder= isEmg ? '#fca5a5' : '#fde68a';

    // ── مراحل التتبع ─────────────────────────────────────────
    const step1 = true;           // دايماً — تم الإرسال
    const step2 = handled;        // الأدمن اتخد إجراء
    const step3 = handled && hasMsg; // في رسالة

    const stepStyle = (active, done) =>
      `display:flex;align-items:flex-start;gap:.75rem;padding:.6rem 0;opacity:${active||done?1:.35}`;
    const dotStyle = (active, done) =>
      `width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0;
       background:${done?'#10b981':active?'#f59e0b':'#e2e8f0'};color:white;font-weight:700`;

    return `
    <div style="border-radius:18px;overflow:hidden;margin-bottom:1rem;
                border:2px solid ${handled ? '#10b981' : '#f59e0b'};
                background:white;box-shadow:0 4px 16px rgba(0,0,0,.07)">

      <!-- هيدر البطاقة -->
      <div style="background:${typeBg};border-bottom:1.5px solid ${typeBorder};
                  padding:.85rem 1.1rem;display:flex;align-items:center;justify-content:space-between">
        <div style="font-weight:800;font-size:.95rem;color:${typeColor}">
          ${isEmg ? '🚨 بلاغ طارئ' : '💥 بلاغ حادث'}
        </div>
        <div style="font-size:.75rem;color:#64748b">📅 ${fmtDT(r.created_at)}</div>
      </div>

      <!-- ملاحظات السائق -->
      ${r.notes ? `<div style="padding:.7rem 1.1rem;font-size:.83rem;color:#475569;
                              background:#f8fafc;border-bottom:1px solid #e2e8f0">
        📝 ${r.notes}
      </div>` : ''}

      <!-- مراحل الحالة -->
      <div style="padding:.8rem 1.1rem 1rem">

        <!-- المرحلة 1: تم الإرسال -->
        <div style="${stepStyle(true, true)}">
          <div style="${dotStyle(true, true)}">✓</div>
          <div style="padding-top:.3rem">
            <div style="font-weight:700;font-size:.88rem;color:#059669">تم إرسال البلاغ للإدارة</div>
            <div style="font-size:.75rem;color:#64748b;margin-top:.1rem">استلمت الإدارة بلاغك وسيتم التعامل معه</div>
          </div>
        </div>

        <!-- خط رابط -->
        <div style="width:2px;height:18px;background:${step2?'#10b981':'#e2e8f0'};margin-right:13px;margin-bottom:0"></div>

        <!-- المرحلة 2: إجراء الإدارة -->
        <div style="${stepStyle(step2, step2)}">
          <div style="${dotStyle(step2, step2)}">${step2?'✓':'2'}</div>
          <div style="padding-top:.3rem">
            <div style="font-weight:700;font-size:.88rem;color:${step2?'#059669':'#94a3b8'}">
              ${step2 ? 'تم اتخاذ إجراء من قبل الإدارة' : 'في انتظار إجراء الإدارة'}
            </div>
            ${step2 && r.handled_by ? `<div style="font-size:.75rem;color:#64748b;margin-top:.1rem">بواسطة: ${r.handled_by}</div>` : ''}
          </div>
        </div>

        ${step3 ? `
        <!-- خط رابط -->
        <div style="width:2px;height:18px;background:#10b981;margin-right:13px"></div>

        <!-- المرحلة 3: رسالة الإدارة -->
        <div style="${stepStyle(true, true)}">
          <div style="${dotStyle(true, true)}">💬</div>
          <div style="padding-top:.2rem;flex:1">
            <div style="font-weight:700;font-size:.88rem;color:#059669;margin-bottom:.4rem">رسالة من الإدارة</div>
            <div style="background:#f0fdf9;border:1.5px solid #6ee7b7;border-radius:10px;
                        padding:.65rem .85rem;font-size:.88rem;color:#1e293b;line-height:1.6">
              ${r.driver_message}
            </div>
          </div>
        </div>` : ''}

      </div>

  const recentCard = recentReports.length
    ? recentReports.map(r => buildReportCard(r)).join('')
    : '';

  document.getElementById('pageContent').innerHTML=`
    <div class="driver-hero" style="background:linear-gradient(135deg,#7f1d1d,#dc2626)">

    ${recentCard}
    <div class="emergency-grid">
      <div class="emergency-btn-card emg" onclick="startRecording('emergency')">

      <div id="recIndicator" class="recording-indicator">

        <div class="rec-text" id="recTypeLabel">جاري التسجيل...</div>

      </div>
      <div class="form-group"><label>ملاحظات إضافية</label><input id="recNotes" placeholder="وصف موجز للموقف..."></div>
      <div style="display:flex;gap:.8rem;flex-wrap:wrap">

async function startRecording(type) {
  if(mediaRecorder&&mediaRecorder.state==='recording') return;
  currentRecordingType=type;

  // فحص HTTPS
  const isSecure = location.protocol==='https:' || location.hostname==='localhost' || location.hostname==='127.0.0.1';
  if(!isSecure){
    showNotification('التسجيل الصوتي يتطلب اتصالاً آمناً (HTTPS)','error');
    return;
  }
  // فحص دعم المتصفح
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
    showNotification('المتصفح لا يدعم تسجيل الصوت — جرّب Chrome أو Firefox','error');
    return;
  }

  console.log('[REC] طلب إذن الميكروفون — النوع:', type);
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});
    console.log('[REC] تم الحصول على الميكروفون بنجاح');
    audioChunks=[];
    const mimeTypes=['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/ogg','audio/mp4',''];
    let mimeType='';
    for(const t of mimeTypes){ try{ if(!t||MediaRecorder.isTypeSupported(t)){mimeType=t;break;} }catch(e){} }
    mediaRecorder=new MediaRecorder(stream, mimeType?{mimeType}:{});

    mediaRecorder.ondataavailable=e=>{ if(e.data&&e.data.size>0) audioChunks.push(e.data); };

    mediaRecorder.onstop=()=>{
      const finalMime=mediaRecorder.mimeType||'audio/webm';
      const blob=new Blob(audioChunks,{type:finalMime});
      if(blob.size<100){ showNotification('لم يُسجَّل أي صوت، حاول مرة أخرى','error'); return; }
      const notes=document.getElementById('recNotes')?.value||'';
      const reader=new FileReader();
      reader.onloadend=async()=>{
        const emgLocation = await silentGetLocation(8000);
        try{
          await apiCall('/emergency/report','POST',{
            driver_id:currentUser.driver_id,
            car_id:window._driverCar?.id||null,
            type:currentRecordingType,
            audio_data:reader.result,
            notes,
            location:emgLocation
          });
          showNotification(currentRecordingType==='emergency'?'🚨 تم إرسال بلاغ الطوارئ للإدارة!':'💥 تم إرسال تقرير الحادث للإدارة!','emergency',4000);
          audioChunks=[]; mediaRecorder=null;
          // إعادة تحميل الصفحة عشان كارد الحالة يظهر فوراً
          setTimeout(()=>renderDriverEmergency(), 1200);
        }catch(err){
          showNotification('فشل الإرسال: '+err.message,'error');
          const btn=document.getElementById('stopRecBtn');
          if(btn){ btn.disabled=false; btn.textContent='⏹ إيقاف وإرسال'; }
        }
      };
      reader.readAsDataURL(blob);
    };

    mediaRecorder.start(300);
    document.getElementById('recordingPanel').style.display='block';
    document.getElementById('recTypeLabel').textContent=type==='emergency'?'🚨 جاري تسجيل بلاغ طارئ...':'💥 جاري تسجيل تفاصيل الحادث...';
    recSeconds=0; document.getElementById('recTimer').textContent='0:00';
    recInterval=setInterval(()=>{ recSeconds++; const m=Math.floor(recSeconds/60),s=recSeconds%60; const el=document.getElementById('recTimer'); if(el) el.textContent=`${m}:${String(s).padStart(2,'0')}`; },1000);

  }catch(e){
    console.error('[REC] getUserMedia error — name:', e.name, '| message:', e.message);
    if(e.name==='NotAllowedError'||e.name==='PermissionDeniedError'){
      showNotification('رفض المتصفح الوصول للميكروفون — اضغط أيقونة 🔒 في شريط العنوان واسمح للميكروفون','error',6000);
    } else if(e.name==='NotFoundError'||e.name==='DevicesNotFoundError'){
      showNotification('لم يتم العثور على ميكروفون — تأكد من توصيله','error');
    } else if(e.name==='NotReadableError'||e.name==='TrackStartError'){
      showNotification('الميكروفون مشغول بتطبيق آخر — أغلق التطبيقات الأخرى وحاول مجدداً','error');
    } else {
      showNotification('تعذّر الوصول للميكروفون: '+e.message,'error');
    }
  }
}

function cancelRecording() {
  clearInterval(recInterval);
  if(mediaRecorder){ try{ if(mediaRecorder.state!=='inactive'){ mediaRecorder.stream?.getTracks().forEach(t=>t.stop()); mediaRecorder.stop(); } }catch(e){} mediaRecorder=null; }
  audioChunks=[];
  const panel=document.getElementById('recordingPanel');
  if(panel) panel.style.display='none';
}

function stopAndSend() {
  if(!mediaRecorder||mediaRecorder.state==='inactive'){ showNotification('لا يوجد تسجيل نشط','error'); return; }
  const btn=document.getElementById('stopRecBtn');
  btn.disabled=true; btn.textContent='⏳ جاري المعالجة...';
  clearInterval(recInterval);
  try{
    mediaRecorder.requestData();
    mediaRecorder.stream?.getTracks().forEach(t=>t.stop());
    mediaRecorder.stop(); // triggers onstop → sends data
  }catch(e){ showNotification('خطأ: '+e.message,'error'); btn.disabled=false; btn.textContent='⏹ إيقاف وإرسال'; }
}

/* ── NOTIFICATION POLLING ── */
async function pollNotifications() {
  if(!isAdminLike()) return;
  try{
    const r=await apiCall('/emergency/unread-count');
    const count=r.count||0;
    if(count>lastUnreadCount && lastUnreadCount>=0 && count>0){
      showNotification(`🚨 ${count} بلاغ طوارئ/حوادث جديد — <a href="#" onclick="switchSection('emergencies');return false;" style="color:white;text-decoration:underline">عرض</a>`,'emergency',6000);
    }
    lastUnreadCount=count;
  }catch(e){}
  try{
    const rr=await apiCall('/requests/pending-count');
    const prev=window._pendingRequestsCount||0;
    const newCount=rr.count||0;
    if(newCount>prev && prev>=0 && newCount>0){
      showNotification(`📋 ${newCount} طلب جديد من السائقين — <a href="#" onclick="switchSection('requests');return false;" style="color:white;text-decoration:underline">عرض</a>`,'info',6000);
    }
    window._pendingRequestsCount=newCount;
  }catch(e){}
  // حساب عدد تنبيهات الرخص (السوبر فقط)
  if(isSuperuser()){
    try{
      const allDrvs=await apiCall('/drivers').catch(()=>[]);
      const d60=new Date(Date.now()+60*864e5).toISOString().split('T')[0];
      const allCarsForCount = await apiCall('/cars').catch(()=>[]);
      const drvAlerts = allDrvs.filter(d=>
        (d.driver_license_expiry&&d.driver_license_expiry<=d60)||
        (d.vehicle_license_expiry&&d.vehicle_license_expiry<=d60)
      ).length;
      const carAlerts = allCarsForCount.filter(c=>c.car_license_expiry&&c.car_license_expiry<=d60).length;
      window._licenseAlertsCount = drvAlerts + carAlerts;
    }catch(e){}
  }
  // Poll maintenance alerts
  await pollMaintenanceAlerts();
  renderNav(buildAdminNav());
}

          else if(dl<=d60)  alerts.push({msg:`🟡 رخصة القيادة تنتهي في ${dl} (أقل من 60 يوم)`,color:'#d97706',bg:'#fffbeb',border:'#fde68a'});
        }

      <!-- TRIP BUTTONS -->
      <div class="dp-section">

          ? `<button class="dp-btn-main dp-btn-start" id="dpStart">▶ ابدأ الرحلة<br><small style="font-size:.75rem;font-weight:500;opacity:.8">جاهز للانطلاق؟ ابدأ رحلتك الآن</small></button>`
          : `<button class="dp-btn-main dp-btn-end"   id="dpEnd">✔ إنهاء الرحلة<br><small style="font-size:.75rem;font-weight:500;opacity:.8">هل وصلت؟ سجّل نهاية رحلتك</small></button>`}

      ${emgCardsHtml ? `<!-- بلاغات الـ 24 ساعة الأخيرة -->
      <div class="dp-section">

        ${emgCardsHtml}

      <!-- 4 QUICK BUTTONS — 2x2 -->

  // Logout

    let lastOdo = null;
    try {
      const r = await apiCall(`/cars/${primaryCar.id}/last-odometer`);

    } catch(e) {}

    openModal(`

        `}

    document.getElementById('dpStartOk').onclick=async()=>{

      const btn=document.getElementById('dpStartOk');
      btn.disabled=true; btn.textContent='جاري...';
      const loc=await silentGetLocation();
      try{
        await apiCall('/trips/start','POST',{driver_id:currentUser.driver_id,car_id:primaryCar.id,start_odometer:odo,start_location:loc});

        closeModal(); await renderDriverSinglePage();
      }catch(e){ showNotification(e.message,'error'); btn.disabled=false; btn.textContent='تأكيد وبدء ▶'; }
    };

        <div style="font-size:.78rem;color:#94a3b8;margin-top:.3rem;text-align:center">

      const loc=await silentGetLocation();
      try{
        await apiCall('/trips/end','POST',{trip_id:activeTrip.id,end_odometer:end_odo,end_location:loc,notes});
        showNotification('✅ انتهت الرحلة!','success');
        closeModal(); await renderDriverSinglePage();
      }catch(e){ showNotification(e.message,'error'); btn.disabled=false; btn.textContent='✔ إنهاء الرحلة'; }
    };
  });

  // Garage
  document.getElementById('dpGarage').addEventListener('click',()=>{
    const minOdo=activeTrip?activeTrip.start_odometer+1:0;

      '<div class="modal-header"><div class="modal-title">🅿 دخول الجراج / نهاية اليوم</div><button class="modal-close" onclick="closeModal()">✕</button></div>'+

      }
      btn.textContent='جاري الإرسال...';
      try{
        const res=await apiCall('/garage/record','POST',{
          driver_id:currentUser.driver_id,
          car_id:primaryCar?.id||null,
          location:loc,
          notes,
          odometer:odo
        });

          showNotification('✅ تم تسجيل موقع الجراج','success');
