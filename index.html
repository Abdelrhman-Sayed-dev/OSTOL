  0%,100% { box-shadow:0 3px 12px rgba(16,185,129,.35),0 0 0 0 rgba(16,185,129,.4); }
  50%      { box-shadow:0 3px 12px rgba(16,185,129,.35),0 0 0 8px rgba(16,185,129,0); }

:root{
  /* ══ FleetSync Design System ══ */
  /* Brand Colors from logo */
  --brand-green:#22C55E;
  --brand-teal:#06B6D4;
  --brand-blue:#2563EB;
  --brand-dark:#1e3a5f;
  --brand-darker:#0f1a2e;

  /* Primary = Dark Navy (sidebar) */
  --primary:#1a2942;
  --primary-light:#243656;
  --primary-dark:#0f1a2e;
  --primary-glow:rgba(26,41,66,0.12);

  /* Accent = Teal/Green gradient */
  --gold:#06B6D4;
  --gold-light:#22C55E;
  --gold-pale:rgba(6,182,212,0.08);
  --gold-glow:rgba(6,182,212,0.2);

  --danger:#ef4444;
  --success:#22C55E;
  --success-light:#4ade80;
  --warning:#f59e0b;

  --sidebar-bg:#f8fafc;
  --sidebar-width:256px;
  --header-h:64px;
  --card-radius:16px;

  /* Backgrounds */
  --bg:#F1F5F9;
  --surface:#FFFFFF;
  --surface-2:#F8FAFC;

  /* Text */
  --text:#0f172a;
  --text-2:#334155;
  --muted:#64748b;

  /* Borders */
  --border:#E2E8F0;
  --border-2:#cbd5e1;

  --emergency:#ef4444;--accident:#f97316;
  --sidebar-accent:var(--brand-teal);

  --shadow-sm:0 1px 3px rgba(15,23,42,.05),0 1px 2px rgba(15,23,42,.03);
  --shadow-md:0 4px 16px rgba(15,23,42,.07),0 2px 6px rgba(15,23,42,.04);
  --shadow-lg:0 12px 40px rgba(15,23,42,.10),0 4px 12px rgba(15,23,42,.05);
  --shadow-gold:0 4px 20px rgba(14,165,233,.15);
}
body{background:var(--bg);min-height:100vh;overflow-x:hidden;color:var(--text)}

/* ══════════════════════════════════════════════
   CUSTOM SELECT — نظام القوائم المنسدلة الموحد
   ══════════════════════════════════════════════ */
.cs-wrapper {
  position: relative;
  width: 100%;
  font-family: inherit;
}
.cs-trigger {
  width: 100%;
  min-height: 38px;
  padding: .5rem 2.4rem .5rem .85rem;
  border: 1.5px solid var(--border-2, #d1d9e6);
  border-radius: 10px;
  background: var(--surface-2, #f8f9fb);
  color: var(--text, #0f1d2e);
  font-family: inherit;
  font-size: .88rem;
  cursor: pointer;
  text-align: right;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: .5rem;
  transition: border-color .2s, box-shadow .2s;
  user-select: none;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.cs-trigger:hover { border-color: var(--primary, #1e3a5f); }
.cs-trigger.cs-open {
  border-color: var(--primary, #1e3a5f);
  box-shadow: 0 0 0 3px rgba(30,58,95,.12);
}
.cs-trigger .cs-arrow {
  flex-shrink: 0;
  color: var(--muted, #6b7280);
  font-size: .7rem;
  transition: transform .22s;
  pointer-events: none;
}
.cs-trigger.cs-open .cs-arrow { transform: rotate(180deg); }
.cs-trigger .cs-label {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.cs-trigger .cs-label.cs-placeholder { color: var(--muted, #6b7280); }

.cs-dropdown {
  display: none;
  position: absolute;
  top: calc(100% + 5px);
  right: 0; left: 0;
  z-index: 99999;
  background: var(--surface, #fff);
  border: 1.5px solid var(--border-2, #d1d9e6);
  border-radius: 12px;
  box-shadow: 0 12px 36px rgba(15,29,46,.14), 0 2px 8px rgba(15,29,46,.06);
  overflow: hidden;
  animation: csFadeIn .18s ease;
}
.cs-dropdown.cs-open { display: flex; flex-direction: column; }

@keyframes csFadeIn {
  from { opacity:0; transform:translateY(-6px); }
  to   { opacity:1; transform:translateY(0); }
}

.cs-search-wrap {
  padding: .55rem .65rem .45rem;
  border-bottom: 1px solid var(--border, #e5e9f0);
  background: var(--surface-2, #f8f9fb);
  flex-shrink: 0;
}
.cs-search {
  width: 100%;
  padding: .42rem .75rem .42rem 2rem;
  border: 1.5px solid var(--border-2, #d1d9e6);
  border-radius: 8px;
  background: var(--surface, #fff);
  color: var(--text, #0f1d2e);
  font-family: inherit;
  font-size: .84rem;
  outline: none;
  transition: border-color .2s;
  direction: rtl;
}
.cs-search:focus { border-color: var(--primary, #1e3a5f); }
.cs-search-icon {
  position: absolute;
  left: 1.05rem;
  top: 50%;
  transform: translateY(-50%);
  color: var(--muted, #6b7280);
  font-size: .85rem;
  pointer-events: none;
}

.cs-list {
  overflow-y: auto;
  max-height: 220px;
  padding: .3rem 0;
}
.cs-list::-webkit-scrollbar { width: 5px; }
.cs-list::-webkit-scrollbar-track { background: transparent; }
.cs-list::-webkit-scrollbar-thumb { background: var(--border-2,#d1d9e6); border-radius:3px; }

.cs-option {
  padding: .55rem 1rem;
  font-size: .88rem;
  cursor: pointer;
  color: var(--text, #0f1d2e);
  transition: background .13s;
  border-radius: 0;
  display: flex;
  align-items: center;
  gap: .45rem;
}
.cs-option:hover, .cs-option.cs-focused { background: var(--primary-glow, rgba(30,58,95,.07)); }
.cs-option.cs-selected {
  background: var(--primary-glow, rgba(30,58,95,.1));
  font-weight: 700;
  color: var(--primary, #1e3a5f);
}
.cs-option.cs-selected::after {
  content: '✓';
  margin-right: auto;
  font-size: .8rem;
  color: var(--primary, #1e3a5f);
}
.cs-option mark {
  background: #fde68a;
  border-radius: 2px;
  padding: 0 1px;
  font-style: normal;
}
.cs-empty {
  padding: .9rem 1rem;
  text-align: center;
  color: var(--muted, #6b7280);
  font-size: .84rem;
}

/* داخل modal */
.modal-body .cs-dropdown,
.modal-content .cs-dropdown { z-index: 99999; }



/* ── LOGIN ── */
.login-overlay{
  position:fixed;inset:0;z-index:2000;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;min-width:100vw;
  background:
    radial-gradient(ellipse 900px 600px at 15% 50%, rgba(6,182,212,0.12) 0%, transparent 70%),
    radial-gradient(ellipse 700px 500px at 85% 20%, rgba(34,197,94,0.08) 0%, transparent 65%),
    radial-gradient(ellipse 500px 400px at 70% 85%, rgba(37,99,235,0.07) 0%, transparent 60%),
    linear-gradient(145deg, #f0fdfa 0%, #e8f4f8 30%, #f1f5f9 60%, #eef9f4 100%);
}

/* Fleet Background Image - الصورة الحقيقية */
.login-overlay::before{
  display:none;
}


/* Overlay to darken slightly for text readability */
.login-overlay::after{
  display:none;
}

.login-bg-pattern{
  display:none;
}


.login-panel{
  position:relative;z-index:10;
  background:#ffffff;
  border-radius:20px;
  padding:0;overflow:hidden;
  width:390px;max-width:calc(100vw - 2.5rem);
  box-shadow:0 16px 48px rgba(0,0,0,.16), 0 0 0 1px rgba(6,182,212,.06);
  animation:loginSlideIn .5s cubic-bezier(.34,1.56,.64,1) forwards;
}
@keyframes loginSlideIn{
  from{opacity:0;transform:translateY(24px) scale(.97)}
  to{opacity:1;transform:translateY(0) scale(1)}
}


.login-panel-header{
  background:linear-gradient(180deg, #f0fdfa 0%, #ffffff 100%);
  padding:1.75rem 2rem 1.25rem;
  text-align:center;
  border-bottom:1px solid #e2e8f0;
}

.login-panel h2{font-size:1.5rem;color:#0f172a;font-weight:800;margin-bottom:.28rem}
.login-panel p{color:#64748b;font-size:.83rem;line-height:1.5}

.login-form{
  padding:1.1rem 1.75rem 1.75rem;
}

.login-input-wrap{
  position:relative;
  background:#f8fafc;
  border:1.5px solid #e2e8f0;
  border-radius:12px;
  transition:.2s;
}
.login-input-wrap:focus-within{
  border-color:rgba(6,182,212,.7);
  background:#fff;
  box-shadow:0 0 0 3px rgba(6,182,212,.12);
}

.login-field input{
  width:100%;padding:.76rem 2.5rem .76rem .9rem;
  border:1.5px solid #E2E8F0;border-radius:11px;
  font-size:.88rem;background:#F8FAFC;color:#0f172a;
  transition:.2s;font-family:inherit;direction:rtl;
}
.login-field input::placeholder{color:#94a3b8}
.login-field input:focus{
  outline:none;border-color:#1e3a5f;background:#fff;
  box-shadow:0 0 0 3px rgba(30,58,95,.1);
}
.login-btn{
  width:100%;padding:.85rem;
  background:linear-gradient(90deg, #06B6D4, #22C55E);
  color:#fff;border:none;border-radius:10px;font-size:.95rem;font-weight:700;
  cursor:pointer;transition:.2s;margin-top:.5rem;
  font-family:inherit;
  box-shadow:0 4px 16px rgba(6,182,212,.3);
}
.login-btn:hover{opacity:.9;box-shadow:0 6px 24px rgba(6,182,212,.4);}
.login-btn:disabled{opacity:.6;cursor:wait}

.login-btn:hover:not(:disabled){background:#2d5486;transform:translateY(-1px);box-shadow:0 6px 18px rgba(30,58,95,.35)}
.login-btn:disabled{opacity:.55;cursor:not-allowed;transform:none}
.login-roles{
  background:#EFF6FF;border:1px solid #BFDBFE;border-radius:11px;
  padding:.75rem .9rem;display:flex;align-items:center;gap:.7rem;
}
.login-roles-icon{font-size:1.35rem;flex-shrink:0}
.login-roles-text{font-size:.73rem;color:#1e40af;line-height:1.55}
.login-roles-text strong{display:block;font-size:.75rem;margin-bottom:.1rem;color:#1e3a5f}
.login-panel-footer{
  padding-top:1.1rem;margin-top:1rem;
  text-align:center;color:#94a3b8;font-size:.7rem;
  border-top:1px solid #F1F5F9;
}

/* ═══ عناصر الـ hero مخفية (مش محتاجينها دلوقتي) ═══ */
.login-hero{display:none}
.login-brand{display:none}

/* ═══ RESPONSIVE ═══ */
@media(max-width:480px){
  .login-panel{
    padding:2rem 1.5rem;
    border-radius:16px;
    margin:.75rem;
  }
  .login-panel h2{font-size:1.35rem}
}

/* ── SHELL ── */
#appShell{display:flex;min-height:100vh}
.sidebar{
  width:var(--sidebar-width);
  background:var(--sidebar-bg);
  min-height:100vh;display:flex;flex-direction:column;
  position:fixed;right:0;top:0;bottom:0;z-index:2000;
  transition:.28s cubic-bezier(.4,0,.2,1);
  border-left:1px solid #e2e8f0;
  transform:translateX(100%);
  box-shadow:-2px 0 24px rgba(15,23,42,.08);
}
.sidebar.open{ transform:translateX(0); }
.sidebar::before{ content:'';display:none; }
.sidebar-header{
  padding:1.4rem 1.25rem 1rem;
  border-bottom:1px solid #e2e8f0;
  position:relative;
  background:linear-gradient(180deg, rgba(37,99,235,.05) 0%, transparent 100%);
}
.sidebar-logo{
  font-size:.95rem;color:#1e3a5f;font-weight:800;
  display:flex;align-items:center;gap:.6rem;
}
.sidebar-subtitle{
  color:#94a3b8;font-size:.58rem;
  margin-top:.2rem;letter-spacing:1px;text-transform:uppercase;font-weight:600;
}
.sidebar-user{
  padding:.8rem 1.1rem;
  border-bottom:1px solid #e2e8f0;
  display:flex;align-items:center;gap:.8rem;
  background:#f1f5f9;
}
.user-avatar{
  width:54px;height:54px;border-radius:13px;
  background:linear-gradient(135deg,#1e3a5f,#2563eb);
  display:flex;align-items:center;justify-content:center;
  font-size:1.25rem;color:white;font-weight:800;flex-shrink:0;
  cursor:pointer;overflow:hidden;position:relative;
  transition:box-shadow .2s, transform .15s;
  border:2.5px solid #e2e8f0;
  box-shadow:0 2px 8px rgba(30,58,95,.12);
}
.user-avatar:hover{box-shadow:0 0 0 3px rgba(37,99,235,.18);transform:scale(1.04);}
.user-avatar img{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;border-radius:10px;z-index:1;
}
.user-avatar #userAvatarInitial{z-index:0;}
.user-avatar .avatar-edit-overlay{
  display:none;position:absolute;inset:0;background:rgba(0,0,0,.45);
  align-items:center;justify-content:center;font-size:.9rem;border-radius:10px;z-index:2;
}
.user-avatar:hover .avatar-edit-overlay{display:flex;}
.user-name{font-size:.8rem;color:#1e293b;font-weight:700}
.user-role{font-size:.62rem;color:#64748b;margin-top:2px;font-weight:500}
.sidebar-nav{flex:1;padding:.6rem .55rem;overflow-y:auto;scrollbar-width:none}
.sidebar-nav::-webkit-scrollbar{display:none}
.nav-section-label{
  font-size:.57rem;font-weight:700;color:#94a3b8;
  text-transform:uppercase;letter-spacing:1.2px;
  padding:.5rem .5rem .25rem;margin-top:.3rem;
}
.nav-item{
  display:flex;align-items:center;gap:.7rem;
  padding:.52rem .8rem;border-radius:10px;cursor:pointer;
  color:#475569;font-size:.82rem;font-weight:500;
  transition:.13s cubic-bezier(.4,0,.2,1);
  margin-bottom:1px;border:none;background:none;
  width:100%;text-align:right;position:relative;font-family:inherit;
}
.nav-item:hover{
  background:#e0e7ef;color:#1e3a5f;
}
.nav-item.active{
  background:#dbeafe;color:#1d4ed8;font-weight:700;
}
.nav-item.active::before{
  content:'';position:absolute;right:0;top:50%;transform:translateY(-50%);
  width:3px;height:52%;background:#2563eb;border-radius:2px 0 0 2px;
}
.nav-icon{font-size:.88rem;width:20px;text-align:center;flex-shrink:0}
.nav-badge{
  background:#ef4444;color:white;border-radius:50px;
  font-size:.58rem;font-weight:700;padding:.1rem .38rem;
  min-width:17px;text-align:center;animation:pulse 1.5s infinite;margin-right:auto;
}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
.sidebar-footer{padding:.7rem .55rem;border-top:1px solid #e2e8f0;}
.logout-btn-sidebar{
  display:flex;align-items:center;gap:.7rem;
  padding:.52rem .8rem;border-radius:10px;cursor:pointer;
  color:#ef4444;font-size:.8rem;font-weight:600;
  transition:.13s;background:none;border:none;width:100%;text-align:right;font-family:inherit;
}
.logout-btn-sidebar:hover{background:#FEF2F2;}
.main-content{
  margin-right:0;flex:1;
  min-height:100vh;display:flex;flex-direction:column;
  background:var(--bg);
}
.topbar{
  height:var(--header-h);
  background:#ffffff;
  border-bottom:1px solid #E2E8F0;
  display:flex;align-items:center;padding:0 1.6rem;gap:1rem;
  position:sticky;top:0;z-index:50;
}
.topbar-title{
  font-size:.95rem;font-weight:700;color:var(--text);flex:1;
  letter-spacing:-.1px;
}
.topbar-logout-btn{
  display:none; /* مخفي على الديسكتوب */
  background:none;border:none;cursor:pointer;
  font-size:1.2rem;padding:.3rem .5rem;border-radius:8px;
  color:var(--muted);transition:.15s;
}
.topbar-logout-btn:hover{background:#FEF2F2;color:#ef4444}
@media(max-width:900px){
  .topbar-logout-btn{display:flex;align-items:center;justify-content:center}
}
.page-content{padding:1.4rem;flex:1}

/* ── CARDS & STATS ── */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:.85rem;margin-bottom:1.4rem}
.stat-card{
  background:#ffffff;border-radius:var(--card-radius);
  padding:1.2rem 1.3rem;
  border:1px solid #E2E8F0;
  position:relative;overflow:hidden;transition:.18s;
}
.stat-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--primary),var(--gold));
  opacity:0;transition:.18s;
}
.stat-card::after{
  content:'';position:absolute;top:-12px;right:-12px;width:56px;height:56px;
  background:var(--gold-pale);border-radius:50%;pointer-events:none;
}
.stat-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.stat-card:hover::before{opacity:1}
.stat-icon{font-size:1.25rem;margin-bottom:.5rem;display:block}
.stat-value{font-size:1.65rem;font-weight:900;color:var(--primary);line-height:1;letter-spacing:-.5px}
.stat-label{font-size:.7rem;color:var(--muted);margin-top:.28rem;font-weight:500}
.card{
  background:#ffffff;border-radius:var(--card-radius);
  border:1px solid #E2E8F0;
  padding:1.3rem 1.5rem;margin-bottom:1.1rem;transition:.15s;
}
.card:last-child{margin-bottom:0}
.card:hover{box-shadow:0 4px 16px rgba(15,23,42,.07)}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.1rem}
.card-title{font-size:.9rem;font-weight:700;color:var(--text);display:flex;align-items:center;gap:.5rem}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:1.1rem;margin-bottom:1.1rem}
@media(max-width:900px){.two-col{grid-template-columns:1fr}}

/* ── FORMS ── */
.form-group{margin-bottom:.9rem}
label{display:block;font-weight:700;margin-bottom:.38rem;font-size:.71rem;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
label .req{color:var(--danger);margin-right:.2rem}
input,select,textarea{
  width:100%;padding:.68rem 1rem;
  border:1.5px solid var(--border);
  border-radius:10px;font-size:.88rem;
  background:var(--surface-2);color:var(--text);
  transition:.2s;font-family:inherit;
}
input:focus,select:focus,textarea:focus{
  outline:none;border-color:var(--primary);
  background:white;
  box-shadow:0 0 0 3px var(--primary-glow);
}
input[disabled]{background:#f1f5f9;color:var(--muted);cursor:not-allowed;opacity:.7}
textarea{resize:vertical;min-height:70px}

/* ── BUTTONS ── */
.btn{
  display:inline-flex;align-items:center;gap:.4rem;
  padding:.58rem 1.1rem;border-radius:10px;
  font-weight:600;font-size:.82rem;cursor:pointer;
  border:none;transition:.16s cubic-bezier(.4,0,.2,1);
  font-family:inherit;letter-spacing:.1px;
}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}
.btn-primary{
  background:var(--primary);color:white;
  box-shadow:0 1px 4px rgba(79,70,229,.3);
}
.btn-primary:hover:not(:disabled){
  background:var(--primary-light);transform:translateY(-1px);
  box-shadow:0 4px 12px rgba(79,70,229,.35);
}
.btn-accent{
  background:linear-gradient(135deg,var(--gold),var(--gold-light));
  color:white;box-shadow:var(--shadow-gold);
}
.btn-accent:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 16px rgba(14,165,233,.35)}
.btn-outline{
  background:transparent;border:1.5px solid var(--primary);color:var(--primary);
}
.btn-outline:hover{background:var(--primary);color:white}
.btn-danger{background:#ef4444;color:white;box-shadow:0 1px 4px rgba(239,68,68,.25);}
.btn-danger:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(239,68,68,.3)}
.btn-ghost{background:var(--surface-2);color:var(--text-2);border:1px solid var(--border);}
.btn-ghost:hover{background:var(--border);color:var(--primary)}
.btn-success{background:#059669;color:white;box-shadow:0 1px 4px rgba(5,150,105,.25);}
.btn-success:hover:not(:disabled){background:#047857;transform:translateY(-1px)}
.btn-success{
  background:#0d6e3c;
  color:white;box-shadow:0 2px 8px rgba(13,110,60,.2);
}
.btn-success:hover{transform:translateY(-1px)}
.btn-warning{
  background:#d97706;
  color:white;
}
.btn-sm{padding:.32rem .75rem;font-size:.74rem;border-radius:7px}

/* ── EMERGENCY BUTTONS ── */
.emergency-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.4rem;margin-bottom:1.4rem}
.emergency-btn-card{
  border-radius:22px;padding:2.2rem 1.8rem;
  text-align:center;cursor:pointer;
  transition:.2s cubic-bezier(.4,0,.2,1);
  border:2px solid transparent;
  position:relative;overflow:hidden;
}
.emergency-btn-card::before{
  content:'';position:absolute;inset:0;
  background:rgba(255,255,255,.08);
  opacity:0;transition:.2s;
}
.emergency-btn-card:hover{transform:translateY(-4px);box-shadow:0 16px 40px rgba(0,0,0,.18)}
.emergency-btn-card:hover::before{opacity:1}
.emergency-btn-card.emg{
  background:linear-gradient(145deg,#9B1C1C,#C84B31);
  color:white;box-shadow:0 6px 24px rgba(200,75,49,.35);
}
.emergency-btn-card.acc{
  background:linear-gradient(145deg,#92400e,#C87941);
  color:white;box-shadow:0 6px 24px rgba(200,121,65,.35);
}
.emg-icon{font-size:2.8rem;margin-bottom:.8rem;display:block}
.emg-title{font-size:1.25rem;font-weight:900;margin-bottom:.4rem;letter-spacing:-.2px}
.emg-sub{font-size:.82rem;opacity:.8}

/* ── RECORDING UI ── */
.recording-indicator{
  display:flex;align-items:center;gap:.8rem;
  background:#FEF2F2;border:2px solid #FCA5A5;
  border-radius:14px;padding:1rem 1.4rem;margin-bottom:1rem;
}
.rec-dot{width:12px;height:12px;border-radius:50%;background:#C84B31;animation:blink .8s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
.rec-text{font-weight:800;color:#C84B31;font-size:.92rem}
.rec-timer{margin-right:auto;font-weight:800;color:#C84B31;font-family:'Cairo',monospace;font-size:.95rem}

/* ── TABLES ── */
.table-wrap{
  overflow-x:auto;border-radius:14px;
  border:1px solid var(--border);background:var(--surface);
}
table{width:100%;border-collapse:collapse;font-size:.82rem;direction:rtl}
th{
  background:var(--surface-2);color:var(--muted);
  font-size:.67rem;font-weight:600;
  text-transform:uppercase;letter-spacing:.7px;
  padding:.7rem .95rem;text-align:right;
  border-bottom:1px solid var(--border);
}
td{padding:.68rem .95rem;border-bottom:1px solid var(--border);text-align:right;color:var(--text)}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:#F8FAFC;transition:.1s}

/* ── BADGES ── */
.badge{
  display:inline-flex;align-items:center;gap:.25rem;
  padding:.18rem .6rem;border-radius:50px;
  font-size:.67rem;font-weight:600;letter-spacing:.2px;
}
.badge-green{background:#d1fae5;color:#065F46}
.badge-red{background:#fee2e2;color:#991B1B}
.badge-blue{background:#ede9fe;color:#4338ca}
.badge-yellow{background:#fef9c3;color:#713f12}
.badge-purple{background:#ede9fe;color:#5B21B6}
.badge-orange{background:#ffedd5;color:#9A3412}
.badge-pink{background:#fce7f3;color:#9D174D}
.badge-gold{background:rgba(14,165,233,.1);color:var(--gold);border:1px solid rgba(14,165,233,.2)}
.badge-navy{background:rgba(79,70,229,.08);color:var(--primary);border:1px solid rgba(79,70,229,.15)}
.badge-emg{background:#fee2e2;color:#991B1B;animation:pulse 2s infinite}
.badge-acc{background:#fef9c3;color:#713f12;animation:pulse 2s infinite}

/* ── NOTIFICATION TOAST ── */
.notification{
  position:fixed;bottom:24px;left:24px;
  padding:.75rem 1.3rem;border-radius:12px;z-index:4000;
  font-size:.83rem;font-weight:600;
  box-shadow:0 8px 28px rgba(0,0,0,.15);
  animation:slideUp .3s cubic-bezier(.4,0,.2,1);
  max-width:340px;border:1px solid rgba(255,255,255,.1);
}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.notification.success{background:#4f46e5;color:white}
.notification.error{background:#7F1D1D;color:white}
.notification.info{background:#1e1b4b;color:white}
.notification.warning{background:#92400e;color:white}
.notification.emergency{background:#7F1D1D;color:white;font-size:.88rem;border:1.5px solid #FCA5A5}

/* ── MODAL ── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(15,23,42,.4);
  backdrop-filter:blur(6px);
  z-index:600;display:flex;align-items:center;justify-content:center;
  animation:fadeIn .18s;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{
  background:var(--surface);border-radius:18px;
  padding:1.8rem;width:90%;max-width:560px;
  max-height:92vh;overflow-y:auto;
  box-shadow:0 24px 60px rgba(15,23,42,.18);
  animation:slideUp .22s cubic-bezier(.34,1.56,.64,1);
  border:1px solid var(--border);
}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.3rem}
.modal-title{font-size:.95rem;font-weight:700;color:var(--text)}
.modal-close{
  background:var(--surface-2);border:none;font-size:1rem;cursor:pointer;
  color:var(--muted);padding:.3rem;border-radius:8px;
  width:30px;height:30px;display:flex;align-items:center;justify-content:center;
  transition:.13s;
}
.modal-close:hover{background:var(--border);color:var(--text)}
.modal-footer{
  display:flex;gap:.7rem;justify-content:flex-end;
  margin-top:1.3rem;padding-top:.9rem;
  border-top:1px solid var(--border);
}

/* ── WORKSHOP ── */
.workshop-items{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;margin-bottom:1.2rem}
.workshop-item{background:var(--surface-2);border:1.5px solid var(--border);border-radius:12px;padding:.85rem;text-align:center;cursor:pointer;transition:.18s}
.workshop-item:hover{border-color:var(--gold);transform:translateY(-2px);background:rgba(14,165,233,.04)}
.workshop-item.selected{border-color:var(--primary);background:rgba(79,70,229,.05)}
.workshop-item-icon{font-size:1.6rem;margin-bottom:.32rem}
.workshop-item-label{font-size:.8rem;font-weight:600;color:var(--text-2)}

/* ── DRIVER HERO ── */
.driver-hero{background:linear-gradient(135deg,#3730a3,#4f46e5);border-radius:var(--card-radius);color:white;padding:1.2rem 1.5rem;margin-bottom:1.2rem;display:flex;align-items:center;gap:1rem;border:1px solid rgba(99,102,241,.2)}
.driver-hero-icon{font-size:1.9rem}
.driver-hero h2{font-size:1.1rem;font-weight:700}
.driver-hero p{font-size:.78rem;opacity:.7;margin-top:.18rem}

/* ── MAP ── */
#fleetMap{height:480px;border-radius:12px;border:1px solid var(--border)}
#routeMap{height:480px;border-radius:12px;border:1px solid var(--border)}
.map-legend{display:flex;gap:1.1rem;flex-wrap:wrap;margin-top:.7rem;font-size:.76rem;color:var(--muted)}
.map-legend span{display:flex;align-items:center;gap:.32rem}
.legend-dot{width:10px;height:10px;border-radius:50%;display:inline-block}

/* Map Tabs */
.map-tabs{display:flex;gap:.5rem;margin-bottom:1.1rem;border-bottom:1px solid var(--border);padding-bottom:.5rem}
.map-tab{
  padding:.42rem 1rem;border-radius:8px 8px 0 0;
  font-size:.8rem;font-weight:600;cursor:pointer;
  border:none;background:none;font-family:inherit;
  color:var(--muted);transition:.14s;
}
.map-tab.active{background:var(--primary);color:white}
.map-tab:hover:not(.active){background:var(--surface-2);color:var(--text)}
.map-panel{display:none}
.map-panel.active{display:block}

/* Route selector */
.route-selector{
  display:flex;gap:.75rem;align-items:flex-end;
  flex-wrap:wrap;margin-bottom:1rem;
  padding:1rem;background:var(--surface-2);
  display:flex;gap:.75rem;align-items:flex-end;
  flex-wrap:wrap;margin-bottom:1rem;
  padding:1rem;background:var(--surface-2);
  border-radius:10px;border:1px solid var(--border);
}
.route-selector .form-group{flex:1;min-width:180px;margin-bottom:0}
.route-info-bar{
  display:flex;gap:1rem;flex-wrap:wrap;
  margin-bottom:1rem;
}
.route-info-chip{
  display:flex;align-items:center;gap:.4rem;
  padding:.4rem .85rem;
  background:var(--surface-2);border:1px solid var(--border);
  border-radius:8px;font-size:.78rem;font-weight:600;color:var(--text-2);
}
.route-info-chip.highlight{background:var(--gold-pale);border-color:rgba(184,134,11,.3);color:var(--gold)}
.route-line-animated{
  stroke-dasharray:12 6;
  animation:dashMove 1.2s linear infinite;
}
@keyframes dashMove{to{stroke-dashoffset:-18}}

/* ── EMPTY ── */
.empty-state{text-align:center;padding:3rem 1rem;color:var(--muted)}
.empty-state .empty-icon{font-size:2.5rem;margin-bottom:.8rem}

.location-hint{font-size:.72rem;color:var(--muted);margin-top:.3rem}
.location-hint.maps-only{color:#d97706;font-weight:600}
/* ── GPS PICKER ── */
.gps-picker{border:2px dashed var(--border);border-radius:12px;padding:.9rem 1rem;background:#f8fafc;transition:.25s}
.gps-picker.gps-ok{border:2px solid #10b981;background:#f0fdf9}
.gps-picker.gps-err{border:2px solid #dc2626;background:#fff5f5}
.gps-capture-btn{width:100%;padding:.75rem 1rem;border:none;border-radius:10px;font-family:inherit;font-size:.92rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.6rem;transition:.2s;color:white;background:linear-gradient(135deg,#1e40af,#3b82f6)}
.gps-capture-btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 14px rgba(59,130,246,.35)}
.gps-capture-btn:disabled{opacity:.65;cursor:not-allowed;transform:none}
.gps-capture-btn.gps-btn-ok{background:linear-gradient(135deg,#065f46,#10b981)}
.gps-capture-btn.gps-btn-spin{background:linear-gradient(135deg,#92400e,#d97706)}
.gps-result{margin-top:.55rem;font-size:.78rem;display:flex;align-items:center;gap:.4rem}
.gps-result.ok{color:#065f46;font-weight:600}
.gps-result.err{color:#dc2626;font-weight:600}
.gps-coords{font-family:monospace;color:var(--muted);font-size:.72rem;margin-top:.2rem;direction:ltr;text-align:left}
.location-link{color:var(--primary-light);text-decoration:none;font-size:.8rem}
.location-link:hover{text-decoration:underline}
code{font-size:.8rem;background:#f1f5f9;padding:.1rem .5rem;border-radius:6px;font-family:monospace}
.filters-bar{display:flex;gap:.8rem;flex-wrap:wrap;margin-bottom:1rem}
.filters-bar select,.filters-bar input{flex:1;min-width:140px;padding:.5rem .9rem;font-size:.84rem}

/* ── AUDIO PLAYER ── */
.audio-player-wrap audio{width:100%;height:36px;border-radius:8px}
.report-row-emg{background:#fff5f5!important}
.report-row-acc{background:#fffbeb!important}

/* ── MOBILE ── */
.sidebar-toggle{display:flex}
/* ══════════════════════════════════════════════════
   RESPONSIVE — Tablet (≤900px)
══════════════════════════════════════════════════ */
@media(max-width:900px){
  /* ── Sidebar ── */

  /* ── Layout ── */
  .main-content{width:100vw;max-width:100vw;overflow-x:hidden}
  #appShell{overflow-x:hidden;width:100vw}
  .page-content{padding:.7rem;overflow-x:hidden}

  /* ── Tables ── */
  .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;max-width:calc(100vw - 1.4rem)}
  table{min-width:480px;font-size:.74rem}
  th,td{padding:.4rem .45rem;white-space:nowrap}

  /* ── Cards ── */
  .card{padding:.9rem}
  .card-header{flex-wrap:wrap;gap:.4rem}
  .card-header .btn{font-size:.72rem;padding:.3rem .6rem}

  /* ── Grids ── */
  .two-col{grid-template-columns:1fr}
  .stats-row{grid-template-columns:repeat(2,1fr) !important}
  .emergency-grid{grid-template-columns:1fr}

  /* ── Stat cards ── */
  .stat-card{padding:.8rem .7rem}
  .stat-value{font-size:1.35rem}
  .stat-icon{font-size:1.5rem}
  .stat-label{font-size:.7rem}

  /* ── Topbar ── */
  .topbar{padding:0 .8rem}
  .topbar-title{font-size:.9rem}

  /* ── Filters & Search ── */
  .filters-bar{flex-wrap:wrap}
  .filters-bar select,.filters-bar input{min-width:120px;flex:1}
  .srch-bar{flex-wrap:wrap;gap:.4rem}
  .srch-bar input{min-width:150px}
  .srch-bar select{min-width:110px}

  /* ── Workshop ── */
  .workshop-items{grid-template-columns:repeat(2,1fr)}

  /* layout grids: handled per-section */

  /* ── Misc ── */
  .badge{font-size:.65rem}
  .modal-body{max-height:70vh;overflow-y:auto}
}

/* ══════════════════════════════════════════════════
   RESPONSIVE — Mobile (≤600px)
══════════════════════════════════════════════════ */
@media(max-width:600px){
  .page-content{padding:.45rem}
  .card{padding:.7rem}
  .card-header{gap:.3rem}

  /* Stats: 2 columns on mobile */
  .stats-row{grid-template-columns:repeat(2,1fr) !important;gap:.5rem}
  .stat-card{padding:.65rem .5rem;border-radius:10px}
  .stat-value{font-size:1.2rem}
  .stat-icon{font-size:1.3rem}
  .stat-label{font-size:.66rem}

  /* Force stat card with grid-column:span 2 to stay full width */
  .stat-card[style*="grid-column:span 2"],
  .stat-card[style*="grid-column: span 2"]{
    grid-column:span 2 !important;
  }

  /* Tables */
  table{min-width:420px;font-size:.7rem}
  th,td{padding:.32rem .38rem}

  /* Workshop items: 2 per row on mobile */
  .workshop-items{grid-template-columns:repeat(2,1fr);gap:.55rem}
  .workshop-item-icon{font-size:1.8rem}
  .workshop-item-label{font-size:.72rem}

  /* Buttons */
  .btn{font-size:.76rem;padding:.35rem .65rem}

/* ── DATE/TIME FORMATTER — 24h format dd/mm/yyyy HH:MM (UTC→local) ── */
function fmtDate(isoStr) {
  if(!isoStr) return '—';
  let s = isoStr; if(s && !s.endsWith('Z') && !s.includes('+') && s.length>10) s+='Z';
  const d = new Date(s); if(isNaN(d.getTime())) return isoStr;
  const pad=n=>String(n).padStart(2,'0');
  return `${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()}`;
}
function fmtDT(isoStr) {
  if(!isoStr) return '—';
  // Add Z if missing so browser converts UTC→local timezone automatically
  let s = isoStr;
  if(s && !s.endsWith('Z') && !s.includes('+') && s.length > 10) s += 'Z';
  const d = new Date(s);
  if(isNaN(d.getTime())) return isoStr;
  const pad = n => String(n).padStart(2,'0');
  return `${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()}  ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

/** Format a number in Arabic locale (1 decimal place); returns '—' for null/undefined. */
function fmtNum(n) {
  return n != null ? (+n).toLocaleString('ar-EG', { maximumFractionDigits: 1 }) : '—';

/** Return a colored license-expiry badge. showGreen adds a green ✓ badge for valid dates. */
function licBadge(dt, showGreen = false) {
  if (!dt) return '—';
  const today = new Date().toISOString().split('T')[0];
  const soon  = new Date(Date.now() + 30 * 864e5).toISOString().split('T')[0];
  if (dt < today) return `<span class="badge badge-red">⚠️ منتهية ${dt}</span>`;

  ov.className='modal-overlay'; ov.id='activeModal';
  ov.innerHTML=`<div class="modal">${html}</div>`;
  ov.addEventListener('click', e=>{ if(e.target===ov) closeModal(); });
  document.body.appendChild(ov);
  // تحديث الـ custom selects بعد فتح الـ modal
  setTimeout(()=>{ if(window.CS) window.CS.upgradeAll(); }, 40);
}

// ══════════════════════════════════════════════
// Universal table search/filter helper
// ══════════════════════════════════════════════
function tableSearch(tableId, countId, fields) {
  /**
   * tableId  : id of <table> or wrapping element containing <tr>
   * countId  : id of element showing count (optional)
   * fields   : array of column indices to search in (0-based)
   */
  const wrap   = document.getElementById(tableId);
  if(!wrap) return;
  const inputs = wrap.closest('.card')?.querySelectorAll('.srch-bar input, .srch-bar select') || [];
  const rows   = wrap.querySelectorAll('tbody tr');

  let visible = 0;
  rows.forEach(tr => {
    let show = true;
    inputs.forEach(inp => {
      const val = inp.value.trim().toLowerCase();
      if(!val) return;
      if(inp.dataset.col !== undefined) {
        // column-specific
        const col = tr.cells[+inp.dataset.col];
        if(col && !col.textContent.toLowerCase().includes(val)) show = false;
      } else {
        // global text search across all cells
        if(fields) {
          const haystack = fields.map(i => tr.cells[i]?.textContent||'').join(' ').toLowerCase();
          if(!haystack.includes(val)) show = false;
        } else {
          if(!tr.textContent.toLowerCase().includes(val)) show = false;
        }
      }
    });
    tr.classList.toggle('row-hidden', !show);
    if(show) visible++;
  });

  const countEl = countId ? document.getElementById(countId) : null;
  if(countEl) countEl.textContent = visible;

  // update srch-count span inside the bar
  const countSpan = wrap.closest('.card')?.querySelector('.srch-count');
  if(countSpan) countSpan.textContent = `${visible} / ${rows.length}`;
}

function buildSearchBar(placeholder='بحث...', extraSelects=[]) {
  /**
   * extraSelects: [{label, options:[{v,l}], col}]
   * Returns HTML string for .srch-bar div
   */
  const selHtml = extraSelects.map(s =>
    `<select data-col="${s.col}" onchange="this.closest('.card').querySelector('[data-tsearch]').dispatchEvent(new Event('input'))">
      <option value="">${s.label}</option>
      ${s.options.map(o=>`<option value="${o.v}">${o.l}</option>`).join('')}
    </select>`
  ).join('');
  return `<div class="srch-bar">
    <input data-tsearch placeholder="🔍 ${placeholder}" oninput="this.closest('.card').querySelector('[data-table-search]') && eval(this.closest('.card').querySelector('[data-table-search]').dataset.tableSearch)">
    ${selHtml}
    <span class="srch-count"></span>
    <button class="srch-reset" onclick="resetSearch(this)">✕ مسح</button>
  </div>`;
}

function resetSearch(btn) {
  const bar = btn.closest('.srch-bar');
  bar.querySelectorAll('input,select').forEach(el=>el.value='');
  // trigger re-filter
  bar.querySelectorAll('input').forEach(el=>el.dispatchEvent(new Event('input')));
}

/** Generic: search all <tr> in a table by text across given columns */
function liveSearch(inputEl, tableBodyId, colIndices) {
  const q = inputEl.value.trim().toLowerCase();
  const tbody = document.getElementById(tableBodyId);
  if(!tbody) return;
  let vis = 0;
  tbody.querySelectorAll('tr').forEach(tr=>{
    const hay = (colIndices ? colIndices.map(i=>tr.cells[i]?.textContent||'') : [...tr.cells].map(c=>c.textContent)).join(' ').toLowerCase();
    const show = !q || hay.includes(q);
    tr.classList.toggle('row-hidden', !show);
    if(show) vis++;
  });
  // update counter
  const bar = inputEl.closest('.srch-bar');
  if(bar){
    const cnt = bar.querySelector('.srch-count');
    if(cnt) cnt.textContent = `${vis} / ${tbody.querySelectorAll('tr').length}`;
  }
}

/** Generic: filter <tr> by select value in a specific column */
function liveFilter(selectEl, tableBodyId, colIdx) {
  const val = selectEl.value.toLowerCase();
  const tbody = document.getElementById(tableBodyId);
  if(!tbody) return;
  let vis = 0;
  tbody.querySelectorAll('tr').forEach(tr=>{
    const cell = tr.cells[colIdx]?.textContent?.toLowerCase()||'';
    const show = !val || cell.includes(val);
    tr.classList.toggle('row-hidden', !show);
    if(show) vis++;
  });
  // sync with any text search already applied (re-run text search)
  const bar = selectEl.closest('.srch-bar');
  if(bar){
    const txt = bar.querySelector('input[data-tsearch]');
    if(txt && txt.value) liveSearch(txt, tableBodyId);
    const cnt = bar.querySelector('.srch-count');
    if(cnt){
      const tbody2 = document.getElementById(tableBodyId);
      const v2 = tbody2?.querySelectorAll('tr:not(.row-hidden)').length||0;
      const t2 = tbody2?.querySelectorAll('tr').length||0;
      cnt.textContent = `${v2} / ${t2}`;
    }
  }
}

/* ── DRIVERS — Modal UX ── */
async function renderDriversSection() {
  const [drivers, perms, cars] = await Promise.all([
    loadDrivers(),
    apiCall('/permissions').catch(()=>[]),
    loadCars().catch(()=>[])
  ]);
  window.__driversAll     = drivers;
  window._driversCSVData  = drivers;
  window._allPerms = perms;
  window._allCars  = cars;
  document.getElementById('pageContent').innerHTML = `
    <div class="card">
      <div class="card-header">
        <div class="card-title">👥 السائقون والمشغّلون (${drivers.length})</div>
        <div style="display:flex;gap:.6rem;flex-wrap:wrap">
          ${!isReporter() ? `<button class="btn btn-outline btn-sm" onclick="exportDriversCSV()">⬇️ تصدير CSV</button>` : ''}
          ${!isReporter() ? `<button class="btn btn-outline btn-sm" onclick="openAssignPermModal()">🔗 تعيين صلاحية</button>` : ''}
          ${!isReporter() ? `<button class="btn btn-primary btn-sm" onclick="openAddDriverModal()">➕ إضافة سائق</button>` : ''}
        </div>
      </div>
      <div class="srch-bar">
        <input data-tsearch placeholder="🔍 بحث بالاسم أو الهاتف أو الرقم الثابت..."
          oninput="liveSearch(this,'driversBody',[1,2,3])">
        <select onchange="liveFilter(this,'driversBody',5)">
          <option value="">كل الحالات</option>
          <option value="نشط">● نشط</option>
          <option value="غير نشط">● غير نشط</option>
        </select>
        <span class="srch-count"></span>
        <button class="srch-reset" onclick="resetSearch(this)">✕ مسح</button>
      </div>
      <div class="table-wrap" id="driversList">
        <table><thead><tr>
          <th>#</th><th>الاسم</th><th>الهاتف</th><th>الرقم الثابت</th>
          <th>السيارة المخصصة</th>
          <th>انتهاء رخصة السائق</th>
          <th>الحالة</th><th>إجراءات</th>
        </tr></thead><tbody id="driversBody">
        ${drivers.length ? drivers.map(d=>{
          // find assigned car from permissions
          const perm = window._allPerms ? window._allPerms.find(p=>p.driver_id===d.id) : null;
          const car  = perm && window._allCars ? window._allCars.find(c=>c.id===perm.car_id) : null;
          const carBadge = car
            ? `<span class="badge badge-navy" dir="ltr">🚗 ${car.plate}</span>`
            : '<span style="color:var(--muted);font-size:.78rem">—</span>';
          return `<tr>
            <td>${d.id}</td>
            <td><strong>${d.name}</strong></td>
            <td dir="ltr">${d.phone||'—'}</td>
            <td><code>${d.fixed_number||'—'}</code></td>
            <td>${carBadge}</td>
            <td>${licBadge(d.driver_license_expiry, true)}</td>
            <td><span class="badge ${d.status==='active'?'badge-green':'badge-red'}">${d.status==='active'?'● نشط':'● غير نشط'}</span></td>
            <td style="white-space:nowrap">
              ${!isReporter() ? `<button class="btn btn-ghost btn-sm edit-driver"
                data-id="${d.id}" data-name="${d.name}" data-phone="${d.phone||''}"
                data-status="${d.status}" data-nid="${d.national_id||''}"
                data-birth="${d.birth_date||''}" data-dlic="${d.driver_license_expiry||''}"
                data-clic="${d.vehicle_license_expiry||''}"
                data-username="${d.username||''}"
                data-fixed="${d.fixed_number||''}"
                data-branch="${d.branch||''}">✏️</button>
              <button class="btn btn-outline btn-sm renew-license" data-id="${d.id}" data-name="${d.name}"
                title="تجديد رخصة">📋</button>
              <button class="btn btn-danger btn-sm del-driver" data-id="${d.id}">🗑️</button>` : '—'}
            </td>
          </tr>`;

  window.__driversAll = drivers;
  // ── Pagination ──
}).join('') : '<tr><td colspan="8" style="text-align:center;padding:2rem;color:var(--muted)">لا يوجد سائقون</td></tr>'}
        </tbody></table>

      </div>
    </div>`;
  document.getElementById('driversList').addEventListener('click', async e=>{
    if(e.target.closest('.edit-driver')){ const b=e.target.closest('.edit-driver'); openEditDriverModal(b.dataset.id,b.dataset.name,b.dataset.phone,b.dataset.status,b.dataset.nid,b.dataset.birth,b.dataset.dlic,b.dataset.clic,b.dataset.username,b.dataset.fixed,b.dataset.branch); }
    if(e.target.closest('.renew-license')){ const b=e.target.closest('.renew-license'); openLicenseRenewalModal(+b.dataset.id, b.dataset.name); }
    if(e.target.closest('.del-driver')){ const id=+e.target.closest('.del-driver').dataset.id; if(!confirm('حذف هذا السائق؟')) return; try{ await apiCall(`/drivers/${id}`,'DELETE'); showNotification('تم الحذف','success'); await renderDriversSection(); }catch(e){showNotification(e.message,'error');} }
  });
}

function openLicenseRenewalModal(driverId, driverName) {
  openModal(`
    <div class="modal-header">
      <div class="modal-title">📋 تجديد رخصة — ${driverName}</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div style="background:#eff6ff;border:1.5px solid #93c5fd;border-radius:10px;padding:.8rem 1rem;margin-bottom:1rem;font-size:.85rem;color:#1d4ed8">
      💡 أدخل بيانات التجديد وسيتم تحديث سجل السائق فوراً
    </div>
    <div class="form-group">
      <label>نوع الرخصة <span class="req">*</span></label>
      <select id="licRenewType" style="width:100%;padding:.6rem;border:1.5px solid var(--border);border-radius:10px;font-family:inherit">
        <option value="">— اختر —</option>
        <option value="driver">🪪 رخصة القيادة</option>
        <option value="vehicle">🚗 رخصة العربة (رخصة السيارة)</option>
      </select>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.8rem">
      <div class="form-group">
        <label>تاريخ التجديد الفعلي</label>
        <input type="date" id="licRenewDate" value="${new Date().toISOString().split('T')[0]}">
      </div>
      <div class="form-group">
        <label>تاريخ الانتهاء الجديد <span class="req">*</span></label>
        <input type="date" id="licNewExpiry">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">إلغاء</button>
      <button class="btn btn-primary" id="licRenewSave">✅ حفظ التجديد</button>
    </div>`);

  document.getElementById('licRenewSave').onclick = async () => {
    const licType    = document.getElementById('licRenewType').value;
    const renewDate  = document.getElementById('licRenewDate').value;
    const newExpiry  = document.getElementById('licNewExpiry').value;
    if(!licType)   return showNotification('اختر نوع الرخصة','error');
    if(!newExpiry) return showNotification('أدخل تاريخ انتهاء الرخصة الجديد','error');
    const btn = document.getElementById('licRenewSave');
    btn.disabled=true; btn.textContent='جاري...';
    try {
      await apiCall(`/drivers/${driverId}/license`,'PUT',{
        license_type: licType,
        renewal_date: renewDate,
        new_expiry_date: newExpiry
      });
      const licLabel = licType==='driver'?'رخصة القيادة':'رخصة العربة';
      showNotification(`✅ تم تجديد ${licLabel} لـ ${driverName} — تنتهي ${newExpiry}`,'success');
      closeModal();
      await renderDriversSection();
    } catch(e) {
      showNotification(e.message,'error');
      btn.disabled=false; btn.textContent='✅ حفظ التجديد';
    }
  };
}

        driver_license_expiry:dl, vehicle_license_expiry:cl,
        fixed_number:fixedNum, branch:branchVal
      });

      // Update credentials if username changed or password provided
      if(uname !== currentUsername || upass){
        await apiCall(`/drivers/${id}/credentials`,'PUT',{
          username: uname,
          password: upass || undefined
        });
      }

      showNotification('✅ تم تحديث بيانات السائق','success');
      closeModal();
      await renderDriversSection();
    }catch(e){
      showNotification(e.message,'error');
      btn.disabled=false; btn.textContent='💾 حفظ التعديلات';
    }
  };
}

function filterCarsTable() {
  const txt    = document.querySelector('#carsList')?.closest('.card')?.querySelector('[data-tsearch]')?.value?.toLowerCase()||'';
  const cat    = document.getElementById('carsFilterCat')?.value||'';
  const status = document.getElementById('carsFilterStatus')?.value||'';
  const tbody  = document.getElementById('carsBody');
  if(!tbody) return;
  let vis=0;
  tbody.querySelectorAll('tr').forEach(tr=>{
    const matchCat    = !cat    || (tr.dataset.cat||'').includes(cat);
    const matchStatus = !status || (tr.dataset.status||'')=== status;
    const matchTxt    = !txt    || tr.textContent.toLowerCase().includes(txt);
    const show = matchCat && matchStatus && matchTxt;
    tr.classList.toggle('row-hidden', !show);
    if(show) vis++;
  });
  const cnt = document.getElementById('carsCount');
  if(cnt) cnt.textContent = `${vis} / ${tbody.querySelectorAll('tr').length}`;
}
function resetCarsFilter() {
  const card = document.getElementById('carsList')?.closest('.card');
  if(card) card.querySelectorAll('input,select').forEach(el=>el.value='');
  filterCarsTable();
}

function parseCoords(str) {
  if(!str) return null;
  let m = str.match(/(-?\d+\.?\d*)[,\s]+(-?\d+\.?\d*)/); if(m) return [parseFloat(m[1]),parseFloat(m[2])];
  m = str.match(/@(-?\d+\.?\d*),(-?\d+\.?\d*)/); if(m) return [parseFloat(m[1]),parseFloat(m[2])];
  m = str.match(/[?&]q=(-?\d+\.?\d*),(-?\d+\.?\d*)/); if(m) return [parseFloat(m[1]),parseFloat(m[2])];
  m = str.match(/maps\/(-?\d+\.?\d*),(-?\d+\.?\d*)/); if(m) return [parseFloat(m[1]),parseFloat(m[2])];
  return null;
}
function formatLocation(loc, asGarage=false) {
  if(!loc||!loc.trim()) return '—';
  const coords=parseCoords(loc);
  if(coords){
    const url=`https://www.google.com/maps?q=${coords[0]},${coords[1]}`;
    if(asGarage) return `<a href="${url}" target="_blank"
      style="display:inline-flex;align-items:center;gap:.3rem;padding:.2rem .6rem;background:#fee2e2;color:#dc2626;border-radius:6px;text-decoration:none;font-size:.78rem;font-weight:700;border:1px solid #fca5a5">
      🅿️ ${coords[0].toFixed(4)}, ${coords[1].toFixed(4)}</a>`;
    return `<a class="location-link" href="${url}" target="_blank">📍 ${coords[0].toFixed(4)}, ${coords[1].toFixed(4)}</a>`;
  }
  if(loc.startsWith('http')){
    if(asGarage) return `<a href="${loc}" target="_blank"
      style="display:inline-flex;align-items:center;gap:.3rem;padding:.2rem .6rem;background:#fee2e2;color:#dc2626;border-radius:6px;text-decoration:none;font-size:.78rem;font-weight:700;border:1px solid #fca5a5">
      🅿️ فتح الموقع</a>`;
    return `<a class="location-link" href="${loc}" target="_blank">📍 فتح الخريطة</a>`;
  }
  return `<span style="font-size:.8rem">${loc}</span>`;
}

function buildTripsTable(trips,drivers,cars,garageLatest=[]) {

  ${trips.map(t=>{

/* ── Combobox helpers ── */
function openCombo(type) {
  const isDriver = type === 'driver';
  const searchEl = document.getElementById(isDriver ? 'ftDriverSearch' : 'ftCarSearch');
  const drop     = document.getElementById(isDriver ? 'ftDriverDrop'   : 'ftCarDrop');
  const query    = searchEl.value.trim().toLowerCase();
  const data     = isDriver ? (window._driversData||[]) : (window._carsData||[]);

  const items = data.filter(item => {
    const text = isDriver ? item.name : item.plate;
    return !query || text.toLowerCase().includes(query);
  }).slice(0, 60);

  if(!items.length) { drop.style.display='none'; return; }

  const highlight = (text) => {
    if(!query) return text;
    const idx = text.toLowerCase().indexOf(query);
    if(idx === -1) return text;
    return text.slice(0,idx) + `<mark style="background:#fde68a;border-radius:2px">${text.slice(idx,idx+query.length)}</mark>` + text.slice(idx+query.length);
  };

  drop.innerHTML = items.map(item => {
    const label = isDriver ? item.name : item.plate;
    const sub   = isDriver ? (item.fixed_number ? `<span style="color:var(--muted);font-size:.78rem"> · ${item.fixed_number}</span>` : '') : (item.model ? `<span style="color:var(--muted);font-size:.78rem"> · ${item.model}</span>` : '');
    return `<div data-id="${item.id}" data-label="${label}"
                 style="padding:.5rem .85rem;cursor:pointer;font-size:.88rem;border-bottom:1px solid var(--border)"
                 onmousedown="selectCombo('${type}',${item.id},'${label.replace(/'/g,"\\'")}')">
              ${highlight(label)}${sub}
            </div>`;
  }).join('');
  drop.style.display = 'block';
}

function selectCombo(type, id, label) {
  const isDriver = type === 'driver';
  document.getElementById(isDriver ? 'ftDriverSearch' : 'ftCarSearch').value = label;
  document.getElementById(isDriver ? 'ftDriverVal'    : 'ftCarVal').value    = id;
  document.getElementById(isDriver ? 'ftDriverDrop'   : 'ftCarDrop').style.display = 'none';
  filterTrips();
}

function closeCombo(type) {
  const isDriver = type === 'driver';
  // لو ما اختارش حاجة وكتب نص فارغ → امسح الفلتر
  const searchEl = document.getElementById(isDriver ? 'ftDriverSearch' : 'ftCarSearch');
  const valEl    = document.getElementById(isDriver ? 'ftDriverVal'    : 'ftCarVal');
  if(!searchEl.value.trim()) { valEl.value = ''; filterTrips(); }
  document.getElementById(isDriver ? 'ftDriverDrop' : 'ftCarDrop').style.display = 'none';
}

function filterTrips() {
  const dId    = document.getElementById('ftDriverVal')?.value;
  const cId    = document.getElementById('ftCarVal')?.value;
  const date   = document.getElementById('ftDate')?.value;
  const status = document.getElementById('ftStatus')?.value;
  const search = (document.getElementById('ftSearch')?.value||'').trim().toLowerCase();

  // اجمع كل بيانات السائقين والمركبات في map للبحث السريع
  const drvMap = Object.fromEntries((window._driversData||[]).map(d=>[d.id, d.name]));
  const carMap = Object.fromEntries((window._carsData||[]).map(c=>[c.id, c.plate]));

  let f=(window._tripsData||[]).filter(t=>{
    if(dId    && String(t.driver_id)!==dId)  return false;
    if(cId    && String(t.car_id)!==cId)     return false;
    if(date) {
      if(!t.start_time) return false;
      const localDate = new Date(t.start_time).toLocaleDateString('en-CA');
      if(localDate !== date) return false;
    }
    if(status==='active' && t.end_time)   return false;
    if(status==='done'   && !t.end_time)  return false;
    if(search) {
      const haystack = [
        drvMap[t.driver_id]||'', carMap[t.car_id]||'',
        t.start_odometer, t.end_odometer,
        t.start_time, t.end_time,
        t.notes, t.start_location, t.end_location
      ].join(' ').toLowerCase();
      if(!haystack.includes(search)) return false;
    }
    return true;
  });
  // pagination
  const _tPage = getPage('trips');
  const _tSize = 15;
  const _tPaged = paginateData(f, _tPage, _tSize);
  const twrap = document.getElementById('tripsTableWrap');
  if(twrap) twrap.innerHTML = buildTripsTable(_tPaged, window._driversData, window._carsData, window._garageLatest);
  const _tcEl = document.getElementById('tripCount'); if(_tcEl) _tcEl.textContent=f.length;
}

function resetTripsPage(){ setPage('trips',1); }

function clearTripFilters(){
  ['ftDriverSearch','ftCarSearch','ftSearch'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  ['ftDriverVal','ftCarVal'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  ['ftDriverDrop','ftCarDrop'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.display='none';});
  const fd=document.getElementById('ftDate');if(fd)fd.value='';
  const fs=document.getElementById('ftStatus');if(fs)fs.value='';
  filterTrips();
}

function openEditOdoModal(tid, curStart, curEnd, dName, isActive) {
  openModal(`

      <button class="modal-close" onclick="closeModal()">✕</button>

      <input type="number" id="odoStart" value="${curStart}" min="0" step="0.1"
             placeholder="مثال: 54200">
    </div>
    <div class="form-group">
      <label>عداد النهاية (كم) ${isActive?'<span style="font-size:.75rem;color:#94a3b8">(الرحلة جارية — اختياري)</span>':''}</label>
      <input type="number" id="odoEnd" value="${curEnd}" min="0" step="0.1"
             placeholder="${isActive?'لم تنته بعد':'مثال: 54500'}"
             ${isActive&&!curEnd?'':''}>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">إلغاء</button>
      <button class="btn btn-primary" id="odoSaveBtn">💾 حفظ التعديل</button>
    </div>`);

  document.getElementById('odoSaveBtn').onclick = async () => {
    const startVal = document.getElementById('odoStart').value.trim();
    const endVal   = document.getElementById('odoEnd').value.trim();
    if(!startVal) return showNotification('عداد البداية مطلوب','error');
    const body = { start_odometer: parseFloat(startVal) };
    if(endVal !== '') body.end_odometer = parseFloat(endVal);
    if(isNaN(body.start_odometer)) return showNotification('قيمة عداد البداية غير صحيحة','error');
    if(body.end_odometer !== undefined && isNaN(body.end_odometer))
      return showNotification('قيمة عداد النهاية غير صحيحة','error');
    const btn = document.getElementById('odoSaveBtn');
    btn.disabled=true; btn.textContent='جاري...';
    try {
      await apiCall(`/trips/${tid}/odometer`,'PUT', body);
      showNotification(`✅ تم تعديل عداد الرحلة #${tid} بنجاح`,'success');
      closeModal();
      await renderTripsSection();
    } catch(err) {
      showNotification(err.message,'error');
      btn.disabled=false; btn.textContent='💾 حفظ التعديل';
    }
  };
}

  const csv='\uFEFF'+rows.map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');

function buildWSTable(records) {
  if(!records.length) return '<div class="empty-state"><div class="empty-icon">📭</div><p>لا توجد سجلات</p></div>';
  return `<table><thead><tr>
    <th>#</th><th>السائق</th><th>النوع</th><th>التفاصيل</th><th>المركبة</th>
    <th>العداد</th><th>ساعات المحرك</th><th>الكمية</th><th>الإجمالي</th>
    <th>اسم الصنف</th><th>المقاس</th><th>رقم المستند</th><th>جهة الصرف</th>
    <th>المتسلم</th><th>ملاحظات</th><th>التاريخ</th>
  </tr></thead><tbody>
  ${records.map(r=>{
    const wt=WT[r.type]||{icon:'🔨',label:r.type};
    // Build detail badge
    let detail = '—';
    if(r.type==='oil' && r.operation_type) detail=`<span class="badge badge-blue">${r.operation_type}</span>`;
    else if(r.type==='tire' && r.tire_action) detail=`<span class="badge badge-orange">${TIRE_ACTIONS[r.tire_action]||r.tire_action}</span>`;
    else if(r.operation_type) detail=`<span class="badge badge-navy">${r.operation_type==='maintenance'?'صيانة':'استبدال'}</span>`;
    return `<tr>
      <td>${r.id}</td>
      <td>${r.driver_name||'—'}</td>
      <td><span class="badge badge-purple">${wt.icon} ${wt.label}</span></td>
      <td>${detail}</td>
      <td dir="ltr">${r.vehicle_plate||'—'}</td>
      <td>${r.odometer_reading?r.odometer_reading+' كم':'—'}</td>
      <td>${r.engine_hours?r.engine_hours+' س':'—'}</td>
      <td>${r.quantity||'—'}</td>
      <td><strong>${r.price?(parseFloat(r.price)).toFixed(2)+' جنيه':'—'}</strong></td>
      <td style="font-size:.82rem">${r.item_name||'—'}</td>
      <td style="font-size:.82rem">${r.item_spec||'—'}</td>
      <td style="font-size:.82rem">${r.doc_number||'—'}</td>
      <td style="font-size:.82rem">${r.supply_source||'—'}</td>
      <td style="font-size:.82rem">${r.receiver_name||'—'}</td>
      <td style="max-width:120px;font-size:.8rem">${r.notes||'—'}</td>
      <td>${r.created_at?fmtDT(r.created_at):'—'}</td>
    </tr>`;
  }).join('')}</tbody></table>
      `;
}

function filterWS(){
  const car  = document.getElementById('filterCar')?.value  || '';
  const type = document.getElementById('filterType')?.value || '';
  const date = document.getElementById('filterDate')?.value || '';
  const txt  = (document.getElementById('wsSearchText')?.value||'').trim().toLowerCase();
  let f = (window._wsRecords||[]).filter(r=>{
    if(txt){
      const hay = [r.driver_name||'',r.vehicle_plate||'',r.notes||'',r.description||''].join(' ').toLowerCase();
      if(!hay.includes(txt)) return false;
    }
    if(car  && String(r.vehicle_id) !== car)          return false;
    if(type && r.type !== type)                        return false;
    if(date && !r.created_at?.startsWith(date))       return false;
    return true;
  });
  document.getElementById('wsTable').innerHTML = buildWSTable(f);
  const wsCnt=document.getElementById('wsCount');
  if(wsCnt) wsCnt.textContent=`${f.length} / ${(window._wsRecords||[]).length}`;
}

          🗺️ فتح الموقع
        </a>

      markers.push(coords);

  },150);

  // ── Init Live Map (الخريطة الحية) ──
  setTimeout(()=>{

  }, 200);

/* ── MAP TABS ── */
function switchMapTab(tab, btn) {
  document.querySelectorAll('.map-tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.map-panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('mapPanel'+tab.charAt(0).toUpperCase()+tab.slice(1)).classList.add('active');
  setTimeout(()=>{
    if(tab==='fleet' && window._fleetMap) window._fleetMap.invalidateSize();
    if(tab==='route' && window._routeMapInstance) window._routeMapInstance.invalidateSize();
    if(tab==='live'  && window._liveMapInstance) {
      window._liveMapInstance.invalidateSize();
      // أعد تشغيل الـ tracking لو كان متوقف
      if(!_liveTrackingInterval) startLiveTracking(window._liveMapInstance);
    }
    // وقّف الـ live tracking لو مش في tab الـ live عشان توفير battery
    if(tab !== 'live') {
      if(_liveTrackingInterval) { clearInterval(_liveTrackingInterval); _liveTrackingInterval = null; }
    }
  },50);
}

/* ── ROUTE MAP ── */
function loadRouteMap() {
  const sel = document.getElementById('routeTripSelect');
  if(!sel||!sel.value) return;
  const opt = sel.options[sel.selectedIndex];
  const startStr = opt.dataset.start||'';
  const endStr   = opt.dataset.end||'';
  const driverName = opt.dataset.driver||'—';
  const carPlate   = opt.dataset.car||'—';
  const startTime  = opt.dataset.startTime||'';
  const endTime    = opt.dataset.endTime||'';

  const startCoords = parseCoords(startStr);
  const endCoords   = parseCoords(endStr);

  if(!startCoords || !endCoords) {
    showNotification('لا توجد إحداثيات كافية لهذه الرحلة', 'error');
    return;
  }

  const map = window._routeMapInstance;
  if(!map) return;

  // Clear previous layers
  map.eachLayer(layer=>{ if(layer instanceof L.Marker || layer instanceof L.Polyline) map.removeLayer(layer); });

  // Start marker (green)
  const startIcon = L.divIcon({
    className:'',
    html:`<div style="background:#10b981;color:white;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:1rem;border:3px solid white;box-shadow:0 2px 10px rgba(0,0,0,.3)">🟢</div>`,
    iconSize:[36,36],iconAnchor:[18,18]
  });
  // End marker (gold)
  const endIcon = L.divIcon({
    className:'',
    html:`<div style="background:#b8860b;color:white;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:1rem;border:3px solid white;box-shadow:0 2px 10px rgba(184,134,11,.4)">🏁</div>`,
    iconSize:[36,36],iconAnchor:[18,18]
  });

  L.marker(startCoords, {icon:startIcon}).addTo(map).bindPopup(`
    <div dir="rtl" style="font-family:Cairo,sans-serif;min-width:170px">
      <strong style="color:#10b981">🟢 نقطة البداية</strong><br>
      <span style="font-size:.8rem;color:#666">👨‍✈️ ${driverName} — ${carPlate}</span><br>
      <span style="font-size:.78rem;color:#999">${fmtDT(startTime)}</span>
    </div>`).openPopup();

  L.marker(endCoords, {icon:endIcon}).addTo(map).bindPopup(`
    <div dir="rtl" style="font-family:Cairo,sans-serif;min-width:170px">
      <strong style="color:#b8860b">🏁 نقطة النهاية</strong><br>
      <span style="font-size:.8rem;color:#666">👨‍✈️ ${driverName} — ${carPlate}</span><br>
      <span style="font-size:.78rem;color:#999">${fmtDT(endTime)}</span>
    </div>`);

  // Draw route line with animated dashes
  const routeLine = L.polyline([startCoords, endCoords], {
    color:'#1e3a5f', weight:4, opacity:.8,
    dashArray:'10 8'
  }).addTo(map);

  // Midpoint arrow decoration
  const midLat = (startCoords[0]+endCoords[0])/2;
  const midLng = (startCoords[1]+endCoords[1])/2;
  const arrowIcon = L.divIcon({
    className:'',
    html:`<div style="background:#1e3a5f;color:white;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:.85rem;border:2px solid white;box-shadow:0 1px 6px rgba(0,0,0,.2)">🚛</div>`,
    iconSize:[28,28],iconAnchor:[14,14]
  });
  L.marker([midLat,midLng], {icon:arrowIcon}).addTo(map);

  // Fit bounds
  map.fitBounds(L.latLngBounds([startCoords, endCoords]), {padding:[60,60]});

  // Show info bar
  const infoBar = document.getElementById('routeInfoBar');
  if(infoBar){
    const dist = calcDistance(startCoords,endCoords);
    infoBar.style.display='flex';
    infoBar.innerHTML=`
      <div class="route-info-chip">👨‍✈️ ${driverName}</div>
      <div class="route-info-chip">🚗 ${carPlate}</div>
      <div class="route-info-chip">📅 ${fmtDate(startTime)}</div>
      <div class="route-info-chip highlight">📏 ~${dist} كم (خط مستقيم)</div>
      ${endTime?`<div class="route-info-chip">⏱️ ${fmtDT(startTime)} ← → ${fmtDT(endTime)}</div>`:''}
    `;
  }
}

function calcDistance(c1, c2) {
  const R=6371, dLat=(c2[0]-c1[0])*Math.PI/180, dLon=(c2[1]-c1[1])*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(c1[0]*Math.PI/180)*Math.cos(c2[0]*Math.PI/180)*Math.sin(dLon/2)**2;
  return (R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))).toFixed(1);
}

function buildFuelDetailTable(rows) {
  if(!rows || !rows.length) return '';
  let totalQty = 0, totalCost = 0;
  const tRows = rows.map((r, i) => {

  });
  if (!filtered.length) {
    dd.innerHTML = allItem + `<div style="padding:.6rem .9rem;color:#94a3b8;font-size:.82rem">لا توجد نتائج</div>`;
  } else {
    dd.innerHTML = allItem + items.join('');
  }
}

function showOpCarList() {
  const dd = document.getElementById('opCarDropdown');
  if (dd) dd.style.display = 'block';
  filterOpCarList();
}

function filterOpCarList() {
  const q = document.getElementById('opCarSearch')?.value || '';
  const dd = document.getElementById('opCarDropdown');
  if (dd) dd.style.display = 'block';
  _renderOpCarList(window._opCars || [], q);
}

function selectOpCar(val, label) {
  document.getElementById('opCar').value = val;
  document.getElementById('opCarSearch').value = val ? label : '';
  const dd = document.getElementById('opCarDropdown');
  if (dd) dd.style.display = 'none';
}

async function generateOpCard() {
  const car_id      = document.getElementById('opCar').value;
  const date_from   = document.getElementById('opFrom').value;
  const date_to     = document.getElementById('opTo').value;
  const report_type = document.getElementById('opType').value;
  const granularity = document.getElementById('opGranularity')?.value || 'monthly';
  const res_el      = document.getElementById('opCardResult');

  if(!date_from||!date_to) { showNotification('يرجى تحديد الفترة الزمنية','error'); return; }
  if(date_from > date_to)  { showNotification('تاريخ البداية يجب أن يسبق تاريخ النهاية','error'); return; }

  // التفصيلي يتطلب مركبة محددة
  if(report_type==='detailed' && !car_id) {
    showNotification('التقرير التفصيلي يتطلب اختيار مركبة محددة', 'error');
    return;
  }

  res_el.innerHTML = '<div class="empty-state"><div class="empty-icon">⏳</div><p>جاري إنشاء التقرير...</p></div>';

  // map frontend granularity → backend group_by
  const groupBy = granularity==='daily' ? 'day' : granularity==='weekly' ? 'week' : 'month';
  let params = `date_from=${date_from}&date_to=${date_to}&report_type=${report_type}&group_by=${groupBy}`;
  if(car_id) params += `&car_id=${car_id}`;

  let data;
  try { data = await apiCall(`/reports/operational?${params}`); }
  catch(e) { res_el.innerHTML=`<div style="color:#ef4444;padding:1rem">${e.message}</div>`; return; }

  if(!data.rows || data.rows.length===0) {
    res_el.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>لا توجد رحلات في هذه الفترة</p></div>';
    return;
  }

  // لو summary وفيه صف واحد بـ trip_count=0 → مفيش بيانات
  if(data.report_type === 'summary' && data.rows.length === 1 && (data.rows[0].trip_count||0) === 0) {
    res_el.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>لا توجد رحلات مسجلة في هذه الفترة للمركبة المحددة</p></div>';
    return;
  }

  // Determine column labels from backend group_by field
  const gb = data.group_by || 'month';   // day | week | month | year
  const isDaily   = gb === 'day';
  const isWeekly  = gb === 'week';
  const isMonthly = gb === 'month';
  const isYearly  = gb === 'year';

  function periodLabel(p) {
    if(!p) return '—';
    // لو مش تاريخ (زي "إجمالي الفترة") → رجّعه كما هو
    if(!/^\d{4}/.test(p)) return p;
    if(isDaily) {
      // p = "2026-04-20" → الأحد 20 أبريل
      const d = new Date(p + 'T00:00:00');
      if(isNaN(d)) return p;
      return d.toLocaleDateString('ar-EG',{weekday:'long', day:'numeric', month:'long'});
    }
    if(isWeekly) {
      // p = "2026-04-14" (Monday) → 14 أبريل – 20 أبريل 2026
      const start = new Date(p + 'T00:00:00');
      if(isNaN(start)) return p;
      const end   = new Date(start); end.setDate(end.getDate() + 6);
      const opts  = {day:'numeric', month:'long'};
      const optsY = {day:'numeric', month:'long', year:'numeric'};
      return start.toLocaleDateString('ar-EG', opts) + ' – ' + end.toLocaleDateString('ar-EG', optsY);
    }
    if(isMonthly) {
      // p = "2026-04" → أبريل 2026
      const parts = p.split('-');
      if(parts.length < 2) return p;
      const [y,m] = parts;
      return new Date(+y,+m-1,1).toLocaleDateString('ar-EG',{month:'long', year:'numeric'});
    }
    if(isYearly) return `عام ${p}`;
    return p;
  }

  const maxKm = Math.max(...data.rows.map(r=>Math.max(0,(r.max_odo||0)-(r.min_odo||0))));

  const car    = data.car_info;
  const carStr = car
    ? `${car.plate} — ${car.model}${car.car_name?' ('+car.car_name+')':''}`
    : 'جميع المركبات';

  function fmt(n) { return fmtNum(n); }
  function fmtDate(d) {
    if(!d) return '—';
    // YYYY-MM → أول يوم في الشهر
    if(/^\d{4}-\d{2}$/.test(d)) {
      const [y,m] = d.split('-');
      return new Date(+y, +m-1, 1).toLocaleDateString('ar-EG', {month:'long', year:'numeric'});
    }
    // YYYY → سنة فقط
    if(/^\d{4}$/.test(d)) return `عام ${d}`;
    // YYYY-MM-DD
    return new Date(d + 'T00:00:00').toLocaleDateString('ar-EG');
  }

  const periodHeader = isDaily?'اليوم' : isWeekly?'الأسبوع' : isMonthly?'الشهر' : isYearly?'السنة' : 'الفترة';

  const tableRows = data.rows.map((r,i)=>{
    const km  = Math.max(0, (r.max_odo||0) - (r.min_odo||0));
    const pct = maxKm>0 ? (km/maxKm*100).toFixed(1) : 0;
    // ── تمييز الصفوف الشاذة: مسافة > 900 كم في الفترة أو رحلات > 50 ──
    const isAnomalous = km > 900 || r.trip_count > 50;
    const rowStyle = isAnomalous
      ? 'background:linear-gradient(90deg,#fef9c3 0%,#fff 100%);border-right:3px solid #f59e0b;'
      : '';
    const anomalyBadge = isAnomalous
      ? `<span title="قيمة شاذة — يُنصح بمراجعة البيانات"
               style="background:#fef3c7;color:#92400e;font-size:.62rem;padding:.1rem .4rem;
                      border-radius:20px;border:1px solid #fcd34d;font-weight:700;margin-right:.4rem">
           ⚠️ شاذ
         </span>`
      : '';
    return `<tr style="${rowStyle}">
      <td style="text-align:center;color:#94a3b8;font-size:.78rem">${i+1}</td>
      <td style="font-weight:700;white-space:nowrap">${anomalyBadge}${periodLabel(r.period)}</td>
      <td style="text-align:center">${r.trip_count}</td>
      <td>
        <span class="op-km-badge" style="${isAnomalous?'background:#fef3c7;color:#b45309;':''}">${fmt(km)} كم</span>
        <div class="op-bar-wrap"><div class="op-bar" style="width:${pct}%;${isAnomalous?'background:#f59e0b;':''}"></div></div>
      </td>
      <td style="text-align:center;color:#64748b;font-size:.82rem">${fmt(r.min_odo)}</td>
      <td style="text-align:center;color:#64748b;font-size:.82rem">${fmt(r.max_odo)}</td>
      <td style="text-align:center;font-size:.8rem;color:#94a3b8">${r.first_date ? fmtDate(r.first_date) : '—'}</td>
    </tr>`;
  }).join('');

  // Summary cards — المسافة الكلية = عداد نهاية آخر رحلة − عداد بداية أول رحلة
  const realTotalKm = Math.max(0, (data.max_odo||0) - (data.min_odo||0));
  const summaryCards = `
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:.8rem;margin-bottom:.8rem">
      ${[
        {icon:'🛣️', label:'إجمالي المسافة',           val:fmt(realTotalKm)+' كم',   color:'#3b82f6'},
        {icon:'🗺️', label:'عدد الرحلات',               val:data.total_trips,          color:'#8b5cf6'},
        {icon:'📟', label:'عداد البداية (أول رحلة)',   val:fmt(data.min_odo)+' كم',  color:'#10b981'},
        {icon:'📟', label:'عداد النهاية (آخر رحلة)',   val:fmt(data.max_odo)+' كم',  color:'#f59e0b'},
      ].map(s=>`
        <div style="background:#fff;border:1.5px solid ${s.color}22;border-radius:14px;
                    padding:.8rem 1rem;text-align:center">
          <div style="font-size:1.4rem">${s.icon}</div>
          <div style="font-size:.72rem;color:#64748b;margin:.2rem 0">${s.label}</div>
          <div style="font-weight:800;color:${s.color};font-size:.95rem">${s.val}</div>
        </div>`).join('')}
    </div>`;

  // ── جلب بيانات السائقين ونوع الوقود ──
  let driversHtml = '';
  let fuelTypeHtml = '';
  if(car_id) {
    try {
      const dData = await apiCall(`/reports/operational-by-driver?car_id=${car_id}&date_from=${date_from}&date_to=${date_to}`);

      // ── نوع الوقود + كمية السولار + معدل الاستهلاك + جدول المسحوبات ──
      const solarRec   = (dData.fuel_records||[]).find(f=>f.type==='fuel_solar');
      const totalSolar = solarRec ? (solarRec.total_qty||0) : 0;
      const fuelDetail = dData.fuel_detail || [];
      const solarDetail= fuelDetail.filter(f=>f.type==='fuel_solar');

      // ── معدل الاستهلاك الصحيح (بدون آخر تفويلة) ──
      // المنطق: آخر تفويلة لسه جوه التانك ومش اتحرقت كلها
      // المسافة = عداد آخر تفويلة  − عداد أول تفويلة
      // الوقود  = إجمالي الكميات بدون آخر تفويلة
      // المعدل  = (الوقود ÷ المسافة) × 100  →  ل/100كم
      let consumption = null;
      if (solarDetail.length >= 2) {
        // رتّب تصاعدياً بالتاريخ
        const sorted = [...solarDetail].sort((a,b)=>
          (a.fuel_date||'') < (b.fuel_date||'') ? -1 : 1
        );
        const first   = sorted[0];
        const last    = sorted[sorted.length - 1];
        // المسافة بين أول وآخر تفويلة (بالعداد)
        const distKm  = (last.odometer_reading||0) - (first.odometer_reading||0);
        // إجمالي الوقود باستثناء آخر تفويلة
        const liters  = sorted.slice(0, -1).reduce((s,r)=> s + (r.quantity||0), 0);
        if (distKm > 0 && liters > 0) {
          consumption = ((liters / distKm) * 100).toFixed(1);
        }
      } else if (solarDetail.length === 1 && totalSolar > 0 && realTotalKm > 0) {
        // تفويلة واحدة فقط — مش كافي نستبعد، نعرض null
        consumption = null;
      }

      if(dData.fuel_records && dData.fuel_records.length > 0) {
        const allFuels = dData.fuel_records.map(f=>`${WT[f.type]?.icon||'⛽'} ${WT[f.type]?.label||f.type} (${f.count} مرة)`).join(' &nbsp;·&nbsp; ');

        // كروت الوقود الإضافية
        const fuelCards = [
          totalSolar > 0 ? `<div style="background:#fff;border:1.5px solid #f9731622;border-radius:14px;padding:.8rem 1rem;text-align:center">
            <div style="font-size:1.4rem">⛽</div>

            <div style="font-weight:800;color:#ea580c;font-size:.95rem">${totalSolar.toLocaleString('ar-EG')} لتر</div>
          </div>` : '',
          consumption ? `<div style="background:#fff;border:1.5px solid #8b5cf622;border-radius:14px;padding:.8rem 1rem;text-align:center">
            <div style="font-size:1.4rem">📊</div>

            <div style="font-weight:800;color:#7c3aed;font-size:.95rem">${consumption} ل/100كم</div>
          </div>` : '',
        ].filter(Boolean).join('');

        fuelTypeHtml = `
          <div style="display:flex;align-items:center;gap:.6rem;background:#f0fdf4;
                      border:1.5px solid #86efac;border-radius:10px;padding:.55rem 1rem;
                      margin-bottom:.5rem;font-size:.82rem">
            <span style="font-size:1.2rem">⛽</span>
            <span><strong style="color:#166534">نوع الوقود:</strong>
            <span style="color:#15803d">${allFuels}</span></span>
          </div>
          ${fuelCards ? `<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:.8rem;margin-bottom:.8rem">${fuelCards}</div>` : ''}
          ${solarDetail.length > 0 ? buildFuelDetailTable(solarDetail) : ''}
        `;
      } else {
        fuelTypeHtml = `
          <div style="background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:10px;
                      padding:.55rem 1rem;margin-bottom:.8rem;font-size:.78rem;color:#94a3b8">
            ⛽ لا توجد سجلات وقود لهذه المركبة في الفترة المحددة
          </div>`;
      }

      // السائقون
      if(dData.drivers && dData.drivers.length > 0) {
        const dRows = dData.drivers.map((d,i)=>{
          const dKm = Math.max(0, (d.last_odo||d.max_odo||0) - (d.first_odo||d.min_odo||0));
          return `
          <tr>
            <td style="text-align:center;color:#94a3b8;font-size:.78rem">${i+1}</td>
            <td style="font-weight:700">${d.driver_name}</td>
            <td style="text-align:center">${d.trip_count}</td>
            <td><span style="background:#bfdbfe;color:#1e40af;padding:.2rem .7rem;
                             border-radius:20px;font-weight:700;font-size:.85rem">
              ${fmt(dKm)} كم
            </span></td>
            <td style="text-align:center;color:#64748b;font-size:.82rem">${fmt(d.first_odo||d.min_odo)}</td>
            <td style="text-align:center;color:#64748b;font-size:.82rem">${fmt(d.last_odo||d.max_odo)}</td>
            <td style="text-align:center;font-size:.8rem;color:#94a3b8">${d.first_date||'—'}</td>
          </tr>`;}).join('');
        driversHtml = `
          <div class="op-drivers-section" style="margin-top:1rem">
            <div style="font-weight:800;font-size:.88rem;color:#334155;margin-bottom:.6rem">
              👤 السائقون في هذه الفترة (${dData.drivers.length})
            </div>
            <div style="overflow-x:auto">
              <table class="op-table">
                <thead>
                  <tr>
                    <th style="width:36px">#</th>
                    <th>السائق</th>
                    <th style="text-align:center">الرحلات</th>
                    <th>المسافة</th>
                    <th style="text-align:center">عداد البداية</th>
                    <th style="text-align:center">عداد النهاية</th>
                    <th style="text-align:center">أول رحلة</th>
                  </tr>
                </thead>
                <tbody>${dRows}</tbody>
              </table>
            </div>
          </div>`;
      } else {
        driversHtml = `<div style="font-size:.8rem;color:#94a3b8;margin-top:.8rem">لا توجد رحلات مسجلة بسائقين في هذه الفترة</div>`;
      }
    } catch(e) { /* تجاهل لو فشل */ }
  }

  res_el.innerHTML = `
    <!-- Print Header (hidden on screen) -->
    <div class="op-print-header" style="text-align:center;margin-bottom:1rem;padding-bottom:.5rem;border-bottom:2px solid #0f2027">
      <div style="font-size:16pt;font-weight:800">المقاولون العرب — عثمان أحمد عثمان وشركاه</div>
      <div style="font-size:13pt;font-weight:700;margin-top:.3rem">البطاقة التشغيلية للمركبات</div>
      <div style="font-size:10pt;color:#64748b;margin-top:.2rem">
        المركبة: ${carStr} &nbsp;|&nbsp; الفترة: ${fmtDate(date_from)} — ${fmtDate(date_to)}
        &nbsp;|&nbsp; نوع التقرير: ${report_type==='detailed'?'تفصيلي':'إجمالي'}
      </div>
    </div>

    <div class="card">
      <div class="card-header" style="flex-wrap:wrap;gap:.5rem">

            ${fmtDate(date_from)} — ${fmtDate(date_to)} &nbsp;|&nbsp;
            ${report_type==='detailed'?'تقرير تفصيلي':'تقرير إجمالي'}
          </div>
        </div>
        <div style="display:flex;gap:.5rem" class="no-print">
          <button class="btn btn-ghost btn-sm" onclick="window.print()">🖨️ طباعة</button>

      <div style="padding:0 1.2rem 1.4rem">
        ${summaryCards}
        ${fuelTypeHtml}
        <div style="overflow-x:auto">
          <table class="op-table">
            <thead>
              <tr>
                <th style="width:40px">#</th>
                <th>${periodHeader}</th>
                <th style="text-align:center">عدد الرحلات</th>
                <th>المسافة المقطوعة</th>
                <th style="text-align:center">عداد البداية</th>
                <th style="text-align:center">عداد النهاية</th>
                <th style="text-align:center">أول رحلة</th>
              </tr>
            </thead>
            <tbody>${tableRows}</tbody>
            <tfoot>
              <tr>
                <td colspan="2" style="font-weight:800">🏁 الإجمالي</td>
                <td style="text-align:center">${data.total_trips}</td>
                <td><span class="op-km-badge" style="background:#bfdbfe;color:#1e40af">${fmt(realTotalKm)} كم</span></td>
                <td style="text-align:center">${fmt(data.min_odo)}</td>
                <td style="text-align:center">${fmt(data.max_odo)}</td>
                <td style="text-align:center;font-size:.8rem;color:#94a3b8">—</td>

    <!-- ════════════════════════════════════════

    <div class="card op-page2" id="opPage2Card">

      <div style="padding:.5rem 1.2rem 1.4rem">
