const ROLE_CONFIG = {
  admin:    { endpoint: '/superuser/admins',    label: 'الأدمن',    icon: '👑', emptyMsg: 'لا يوجد أدمنز',   render: () => renderSuperUserRole('admin') },
  reporter: { endpoint: '/superuser/reporters', label: 'المراقب',   icon: '👁️', emptyMsg: 'لا يوجد مراقبون', render: () => renderSuperUserRole('reporter') },
};

async function renderSuperUserRole(role) {
  const cfg = ROLE_CONFIG[role];
  const c = document.getElementById('pageContent');
  c.innerHTML = '<div class="empty-state"><div class="empty-icon">⏳</div><p>جاري التحميل...</p></div>';
  let users = [];
  try { users = await apiCall(cfg.endpoint); }
  catch(e) { c.innerHTML=`<div class="empty-state"><div class="empty-icon">❌</div><p>${e.message}</p></div>`; return; }

  c.innerHTML = `
    <div class="card">
      <div class="card-header">
        <div class="card-title">${cfg.icon} إدارة حسابات ${cfg.label}</div>
        <button class="btn btn-primary btn-sm" onclick="openAddRoleModal('${role}')">➕ إضافة ${cfg.label}</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>#</th><th>اسم المستخدم</th><th>الفرع</th><th>تاريخ الإنشاء</th><th>آخر دخول</th><th>الإجراءات</th></tr></thead>
          <tbody>
            ${users.length===0
              ? `<tr><td colspan="6" style="text-align:center;color:var(--muted)">${cfg.emptyMsg}</td></tr>`
              : users.map(u=>`
                <tr>
                  <td>${u.id}</td>
                  <td><b>${u.username}</b></td>
                  <td>${u.branch ? `<span class="badge badge-blue">${u.branch}</span>` : '<span style="color:var(--muted);font-size:.8rem">بدون فرع</span>'}</td>
                  <td>${fmtDate(u.created_at)||'—'}</td>
                  <td>${fmtDT(u.last_login)||'لم يدخل بعد'}</td>
                  <td style="display:flex;gap:.5rem;flex-wrap:wrap">
                    <button class="btn btn-outline btn-sm" onclick="openEditRoleModal('${role}',${u.id},'${u.username.replace(/'/g,"\\'")}','${(u.branch||'').replace(/'/g,"\\'")}')">✏️ تعديل</button>
                    <button class="btn btn-danger btn-sm"  onclick="deleteRoleUser('${role}',${u.id},'${u.username.replace(/'/g,"\\'")}')">🗑️ حذف</button>
                  </td>
                </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
}

async function openAddRoleModal(role) {
  const cfg = ROLE_CONFIG[role];
  openModal(`
    <div class="modal-header">
      <div class="modal-title">➕ إضافة ${cfg.icon} ${cfg.label} جديد</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="form-group"><label>اسم المستخدم <span class="req">*</span></label>
      <input type="text" id="roleUserInput" placeholder="اسم المستخدم"></div>
    <div class="form-group"><label>كلمة المرور <span class="req">*</span></label>
      <input type="password" id="rolePwInput" placeholder="كلمة المرور"></div>
    <div class="form-group">
      <label>الفرع <span style="font-size:.75rem;color:var(--muted)">(اتركه فارغاً ليرى كل الفروع)</span></label>
      ${branchSearchField('roleBranchInput')}
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">إلغاء</button>
      <button class="btn btn-primary" id="roleModalSubmit">💾 إضافة</button>
    </div>`);
  document.getElementById('roleModalSubmit').onclick = async () => {
    const username = document.getElementById('roleUserInput').value.trim();
    const password = document.getElementById('rolePwInput').value;
    const branch   = document.getElementById('roleBranchInput').value.trim();
    if(!username || !password) return showNotification('يرجى ملء جميع الحقول المطلوبة','error');
    const btn = document.getElementById('roleModalSubmit');
    btn.disabled=true; btn.textContent='جاري...';
    try {
      await apiCall(cfg.endpoint, 'POST', {username, password, branch});
      showNotification(`✅ تم إنشاء ${cfg.label}: ${username}${branch?' (فرع: '+branch+')':''}`, 'success');
      closeModal(); cfg.render();
    } catch(e) { showNotification(e.message,'error'); btn.disabled=false; btn.textContent='💾 إضافة'; }
  };
}

async function openEditRoleModal(role, uid, oldUsername, oldBranch='') {
  const cfg = ROLE_CONFIG[role];
  openModal(`
    <div class="modal-header">
      <div class="modal-title">✏️ تعديل ${cfg.icon} ${cfg.label}: ${oldUsername}</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="form-group"><label>اسم المستخدم الجديد <span class="req">*</span></label>
      <input type="text" id="roleUserInput" value="${oldUsername}"></div>
    <div class="form-group"><label>كلمة المرور الجديدة <span style="font-size:.75rem;color:var(--muted)">(فارغة = بدون تغيير)</span></label>
      <input type="password" id="rolePwInput" placeholder="اتركها فارغة للإبقاء على الحالية"></div>
    <div class="form-group">
      <label>الفرع <span style="font-size:.75rem;color:var(--muted)">(فارغ = يرى كل الفروع)</span></label>
      ${branchSearchField('roleBranchInput', oldBranch)}
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">إلغاء</button>
      <button class="btn btn-primary" id="roleModalSubmit">💾 حفظ التعديلات</button>
    </div>`);
  document.getElementById('roleModalSubmit').onclick = async () => {
    const username = document.getElementById('roleUserInput').value.trim();
    const password = document.getElementById('rolePwInput').value || null;
    const branch   = document.getElementById('roleBranchInput').value.trim();
    if(!username) return showNotification('اسم المستخدم مطلوب','error');
    const btn = document.getElementById('roleModalSubmit');
    btn.disabled=true; btn.textContent='جاري...';
    try {
      await apiCall(`${cfg.endpoint}/${uid}`, 'PUT', {username, password, branch});
      showNotification(`✅ تم تحديث بيانات ${cfg.label}`, 'success');
      closeModal(); cfg.render();
    } catch(e) { showNotification(e.message,'error'); btn.disabled=false; btn.textContent='💾 حفظ التعديلات'; }
  };
}

async function deleteRoleUser(role, uid, username) {
  const cfg = ROLE_CONFIG[role];
  if(!confirm(`⚠️ هل أنت متأكد من حذف ${cfg.label} "${username}"?`)) return;
  try {
    await apiCall(`${cfg.endpoint}/${uid}`, 'DELETE');
    showNotification(`✅ تم حذف ${cfg.label}: ${username}`, 'success');
    cfg.render();
  } catch(e) { showNotification(e.message,'error'); }
}

async function renderSuperLicenses() {
  const c = document.getElementById('pageContent');
  c.innerHTML = '<div class="empty-state"><div class="empty-icon">⏳</div><p>جاري التحميل...</p></div>';
  const [drivers, cars] = await Promise.all([loadDrivers(), loadCars()]);

  const now  = new Date().toISOString().split('T')[0];
  const d30  = new Date(Date.now() +  30*864e5).toISOString().split('T')[0];
  const d60  = new Date(Date.now() +  60*864e5).toISOString().split('T')[0];
  const d90  = new Date(Date.now() +  90*864e5).toISOString().split('T')[0];

  // تصنيف السائقين حسب حالة الرخصة
  function classify(d) {
    const dl = d.driver_license_expiry || '';
    const vl = d.vehicle_license_expiry || '';
    const worst = [dl, vl].filter(Boolean).sort()[0];
    if (!worst) return null;
    if (worst < now)  return { level: 'expired',  label: '🔴 منتهية',   color: '#ef4444', bg: '#fef2f2', border: '#fca5a5', date: worst, field: dl <= vl || !vl ? 'رخصة السائق' : 'رخصة السيارة' };
    if (worst <= d30) return { level: 'critical',  label: '🟠 خلال 30 يوم', color: '#f97316', bg: '#fff7ed', border: '#fed7aa', date: worst, field: dl <= vl || !vl ? 'رخصة السائق' : 'رخصة السيارة' };
    if (worst <= d60) return { level: 'warning',   label: '🟡 خلال 60 يوم', color: '#f59e0b', bg: '#fffbeb', border: '#fde68a', date: worst, field: dl <= vl || !vl ? 'رخصة السائق' : 'رخصة السيارة' };
    if (worst <= d90) return { level: 'notice',    label: '🟢 خلال 90 يوم', color: '#10b981', bg: '#f0fdf9', border: '#6ee7b7', date: worst, field: dl <= vl || !vl ? 'رخصة السائق' : 'رخصة السيارة' };
    return null;
  }

  const tagged = drivers.map(d => ({ ...d, _lic: classify(d) }))
                        .filter(d => d._lic)
                        .sort((a,b) => a._lic.date.localeCompare(b._lic.date));

  const expired  = tagged.filter(d => d._lic.level === 'expired');
  const critical = tagged.filter(d => d._lic.level === 'critical');
  const warning  = tagged.filter(d => d._lic.level === 'warning');
  const notice   = tagged.filter(d => d._lic.level === 'notice');

  function buildGroup(title, list) {
    if (!list.length) return '';
    return `
      <div class="card" style="border:1.5px solid ${list[0]._lic.border};margin-bottom:1rem">
        <div class="card-header" style="background:${list[0]._lic.bg}">
          <div class="card-title" style="color:${list[0]._lic.color}">${title} (${list.length})</div>
        </div>
        <div class="table-wrap">
          <table><thead><tr>
            <th>السائق</th><th>الرقم الثابت</th><th>الفرع</th>
            <th>نوع الرخصة</th><th>تاريخ الانتهاء</th><th>رخصة السائق</th><th>رخصة السيارة</th>
          </tr></thead><tbody>
          ${list.map(d => `<tr>
            <td><strong>${d.name}</strong></td>
            <td><code>${d.fixed_number||'—'}</code></td>
            <td>${d.branch||'—'}</td>
            <td><span style="color:${d._lic.color};font-weight:700">${d._lic.field}</span></td>
            <td><span style="color:${d._lic.color};font-weight:700">${d._lic.date}</span></td>
            <td>${licBadge(d.driver_license_expiry)}</td>
            <td>${licBadge(d.vehicle_license_expiry)}</td>
          </tr>`).join('')}
          </tbody></table>
        </div>
      </div>`;
  }

  c.innerHTML = `
    <div class="stats-row" style="margin-bottom:1.2rem;grid-template-columns:repeat(auto-fit,minmax(120px,1fr))">
      <div class="stat-card"><div class="stat-icon" style="color:#ef4444">🔴</div><div class="stat-value" style="color:#ef4444">${expired.length}</div><div class="stat-label">رخصة منتهية</div></div>
      <div class="stat-card"><div class="stat-icon" style="color:#f97316">🟠</div><div class="stat-value" style="color:#f97316">${critical.length}</div><div class="stat-label">تنتهي خلال 30 يوم</div></div>
      <div class="stat-card"><div class="stat-icon" style="color:#f59e0b">🟡</div><div class="stat-value" style="color:#f59e0b">${warning.length}</div><div class="stat-label">تنتهي خلال 60 يوم</div></div>
      <div class="stat-card"><div class="stat-icon" style="color:#10b981">🟢</div><div class="stat-value" style="color:#10b981">${notice.length}</div><div class="stat-label">تنتهي خلال 90 يوم</div></div>
    </div>
    <div class="card" style="margin-bottom:1rem;background:#eff6ff;border:1.5px solid #93c5fd">
      <div style="padding:.8rem 1.2rem;font-size:.88rem;color:#1e40af">
        💡 <strong>ملاحظة:</strong> السائقون يرون إشعار ثابت في واجهتهم عند اقتراب انتهاء رخصهم.
      </div>
    </div>
    ${buildGroup('🔴 رخص منتهية', expired)}
    ${buildGroup('🟠 تنتهي خلال 30 يوم', critical)}
    ${buildGroup('🟡 تنتهي خلال 60 يوم', warning)}
    ${buildGroup('🟢 تنتهي خلال 90 يوم', notice)}
    ${tagged.length === 0 ? '<div class="empty-state"><div class="empty-icon">✅</div><p>جميع رخص السائقين سارية — لا توجد تنبيهات</p></div>' : ''}

    <!-- ══ رخص المركبات ══ -->
    <div style="margin:1.5rem 0 .75rem;font-size:.75rem;font-weight:600;color:var(--muted);letter-spacing:.06em;text-transform:uppercase">رخص المركبات</div>
    ${buildCarLicenses(cars, now, d30, d60, d90)}
  `;
}

function buildCarLicenses(cars, now, d30, d60, d90) {
  function classifyCar(car) {
    const cl = car.car_license_expiry || '';
    if (!cl) return null;
    if (cl < now)  return { level:'expired',  label:'🔴 منتهية',       color:'#ef4444', bg:'#fef2f2', border:'#fca5a5', date:cl };
    if (cl <= d30) return { level:'critical', label:'🟠 خلال 30 يوم',  color:'#f97316', bg:'#fff7ed', border:'#fed7aa', date:cl };
    if (cl <= d60) return { level:'warning',  label:'🟡 خلال 60 يوم',  color:'#f59e0b', bg:'#fffbeb', border:'#fde68a', date:cl };
    if (cl <= d90) return { level:'notice',   label:'🟢 خلال 90 يوم',  color:'#10b981', bg:'#f0fdf9', border:'#6ee7b7', date:cl };
    return null;
  }
  const tagged = cars.map(c=>({...c, _lic:classifyCar(c)})).filter(c=>c._lic)
                     .sort((a,b)=>a._lic.date.localeCompare(b._lic.date));
  if (!tagged.length)
    return '<div class="empty-state" style="padding:.8rem"><div class="empty-icon">✅</div><p style="font-size:.85rem">جميع رخص المركبات سارية</p></div>';

  const groups = [
    {level:'expired',  title:'🔴 رخص منتهية',         items:tagged.filter(c=>c._lic.level==='expired')},
    {level:'critical', title:'🟠 تنتهي خلال 30 يوم',  items:tagged.filter(c=>c._lic.level==='critical')},
    {level:'warning',  title:'🟡 تنتهي خلال 60 يوم',  items:tagged.filter(c=>c._lic.level==='warning')},
    {level:'notice',   title:'🟢 تنتهي خلال 90 يوم',  items:tagged.filter(c=>c._lic.level==='notice')},
  ].filter(g=>g.items.length);

  return groups.map(g => `
    <div class="card" style="border:1.5px solid ${g.items[0]._lic.border};margin-bottom:.75rem">
      <div class="card-header" style="background:${g.items[0]._lic.bg}">
        <div class="card-title" style="color:${g.items[0]._lic.color}">${g.title} (${g.items.length})</div>
      </div>
      <div class="table-wrap">
        <table><thead><tr><th>رقم اللوحة</th><th>الموديل</th><th>الفرع</th><th>تاريخ انتهاء الرخصة</th></tr></thead><tbody>
        ${g.items.map(car=>`<tr>
          <td dir="ltr"><strong>${car.plate}</strong></td>
          <td>${car.model}</td>
          <td>${car.branch||'—'}</td>
          <td><span style="color:${car._lic.color};font-weight:700">${car._lic.date}</span></td>
        </tr>`).join('')}
        </tbody></table>
      </div>
    </div>`).join('');
}

async function doImportPreview() {
  const file = document.getElementById('importFileInput').files[0];
  const importType = document.getElementById('importTypeSelect').value;
  if(!file) return showNotification('يرجى اختيار ملف أولاً','error');

  const btn = document.getElementById('importPreviewBtn');
  btn.disabled=true; btn.textContent='⏳ جاري التحليل...';

  const fd = new FormData();
  fd.append('file', file);
  const token = getToken();
  const url = importType === 'permissions'
    ? `/import/permissions/preview`
    : importType === 'maintenance'
    ? `/import/maintenance/preview`
    : importType === 'operators'
    ? `/import/operators/preview`
    : `/import/preview?import_type=${importType}`;
  try {
    const res = await fetch(url, { method:'POST', headers:{ Authorization:`Bearer ${token}` }, body: fd });
    const data = await res.json();
    if(!res.ok) throw new Error(data.detail || 'خطأ في التحليل');
    _importPreviewData = { file, importType };
    renderImportPreview(data);
  } catch(e) {
    showNotification(e.message,'error');
  } finally {
    btn.disabled=false; btn.textContent='🔍 استعراض البيانات';
  }
}

  const btn = document.getElementById('importConfirmBtn');
  btn.disabled=true; btn.textContent='⏳ جاري الرفع...';

  const fd = new FormData();
  fd.append('file', file);
  const token = getToken();
  const url = importType === 'permissions'
    ? `/import/permissions/confirm?skip_errors=${skipErrors}`
    : importType === 'maintenance'
    ? `/import/maintenance/confirm?skip_errors=${skipErrors}`
    : importType === 'operators'
    ? `/import/operators/confirm?skip_errors=${skipErrors}`
    : `/import/confirm?import_type=${importType}&skip_errors=${skipErrors}`;
  try {
    const res = await fetch(url, { method:'POST', headers:{ Authorization:`Bearer ${token}` }, body: fd });
    const data = await res.json();
    if(!res.ok) {
      const detail = typeof data.detail === 'object' ? data.detail.message : data.detail;
      throw new Error(detail || 'فشل الرفع');
    }
    showNotification(`✅ تم الرفع بنجاح: ${data.inserted} سجل${data.skipped>0?' (تجاهل '+data.skipped+')':''}`, 'success');
    _importPreviewData = null;
    renderImportResult(data, importType);
  } catch(e) {
    showNotification(e.message,'error');
    btn.disabled=false; btn.textContent=`✅ تأكيد الرفع`;
  }
}

function filterLogs() {
  const role     = document.getElementById('logFilterRole')?.value || '';

  const filtered = logs.filter(r=>(!role||r.role===role)&&(!user||r.username.toLowerCase().includes(user)));
  const roleColors  = {superuser:'badge-purple',admin:'badge-blue',driver:'badge-green',reporter:'badge-yellow'};
  const roleLabels  = {superuser:'سوبر يوزر',admin:'أدمن',driver:'سائق',reporter:'مراقب'};

  const tbody = document.getElementById('logsTableBody');
  if(!tbody) return;
  tbody.innerHTML = filtered.length===0

}

function toggleSarkyDriver() {
  const dd = document.getElementById('sarkyDriverDd');
  const tr = document.getElementById('sarkyDriverTrigger');
  if(!dd||!tr) return;
  const isOpen = dd.classList.contains('cs-open');
  if(isOpen) {
    dd.classList.remove('cs-open'); tr.classList.remove('cs-open');
  } else {
    dd.classList.add('cs-open'); tr.classList.add('cs-open');
    _sarkyRenderDriverList('');
    setTimeout(()=>document.getElementById('sarkyDriverSearch')?.focus(),80);
    const s = document.getElementById('sarkyDriverSearch');
    if(s) s.value='';
  }
}

function _sarkyFilterDrivers() {
  const q = document.getElementById('sarkyDriverSearch')?.value||'';
  _sarkyRenderDriverList(q);
}

function _sarkyRenderDriverList(query) {
  const list = document.getElementById('sarkyDriverList');
  if(!list) return;
  const q = query.trim().toLowerCase();
  const drivers = window._sarkyDrivers||[];
  const selId = document.getElementById('sarkyDriverId')?.value||'';

  function hl(t) {
    if(!q) return t;
    const i = t.toLowerCase().indexOf(q);
    if(i<0) return t;
    return t.slice(0,i)+'<mark>'+t.slice(i,i+q.length)+'</mark>'+t.slice(i+q.length);
  }

  const filtered = drivers.filter(d=>!q||(d.name+' '+(d.fixed_number||'')).toLowerCase().includes(q));
  const allSel = selId==='';

  // ── نبني الـ all option ──
  const allDiv = document.createElement('div');
  allDiv.className = 'cs-option' + (allSel?' cs-selected':'');
  allDiv.textContent = '— كل السائقين —';
  allDiv.addEventListener('click', function(){ sarkySelectDriver('','— كل السائقين —'); });
  list.innerHTML = '';
  list.appendChild(allDiv);

  if(!filtered.length) {
    const empty = document.createElement('div');
    empty.className = 'cs-empty';
    empty.textContent = 'لا توجد نتائج';
    list.appendChild(empty);
    return;
  }

  filtered.forEach(function(d) {
    const isSel = String(d.id)===String(selId);
    const lbl   = d.name + (d.fixed_number?' ('+d.fixed_number+')':'');
    const div   = document.createElement('div');
    div.className = 'cs-option' + (isSel?' cs-selected':'');
    div.style.display = 'flex';
    div.style.alignItems = 'center';
    div.style.gap = '.4rem';
    div.addEventListener('click', function(){ sarkySelectDriver(d.id, lbl); });

    const nameSpan = document.createElement('span');
    nameSpan.style.fontWeight = '700';
    nameSpan.style.color = '#1e3a5f';
    nameSpan.innerHTML = hl(d.name);
    div.appendChild(nameSpan);

    if(d.fixed_number) {
      const numSpan = document.createElement('span');
      numSpan.style.color = '#94a3b8';
      numSpan.style.fontSize = '.8rem';
      numSpan.innerHTML = hl(d.fixed_number);
      div.appendChild(numSpan);
    }
    if(d.branch) {
      const brSpan = document.createElement('span');
      brSpan.style.fontSize = '.72rem';
      brSpan.style.color = '#10b981';
      brSpan.style.marginRight = 'auto';
      brSpan.textContent = d.branch;
      div.appendChild(brSpan);
    }
    list.appendChild(div);
  });
}


function sarkySelectDriver(id, label) {
  document.getElementById('sarkyDriverId').value = id;
  const lbl = document.getElementById('sarkyDriverLabel');
  if(lbl){ lbl.textContent=label||'— كل السائقين —'; lbl.classList.toggle('cs-placeholder',!id); }
  const dd=document.getElementById('sarkyDriverDd');
  const tr=document.getElementById('sarkyDriverTrigger');
  if(dd) dd.classList.remove('cs-open');
  if(tr) tr.classList.remove('cs-open');
}

async function loadSarky() {
  const res = document.getElementById('sarkyResult');
  if(!res) return;

  const driverId = document.getElementById('sarkyDriverId')?.value||'';
  const from     = document.getElementById('sarkyFrom')?.value||'';
  const to       = document.getElementById('sarkyTo')?.value||'';

  // يجب اختيار سائق أولاً
  if(!driverId) {
    res.innerHTML = '<div class="empty-state"><div class="empty-icon">👆</div><p style="font-weight:700;color:#f59e0b">يرجى اختيار سائق من القائمة أولاً</p></div>';
    return;
  }

  res.innerHTML = '<div class="empty-state"><div class="empty-icon">⏳</div><p>جاري التحميل...</p></div>';

  let url = '/reports/sarky?date_from='+from+'&date_to='+to;
  if(driverId) url += '&driver_id='+driverId;

  let data;
  try { data = await apiCall(url); }
  catch(e) { res.innerHTML='<div class="empty-state"><div class="empty-icon">❌</div><p>'+e.message+'</p></div>'; return; }

  const drivers = data.drivers||[];
  if(!drivers.length) {
    res.innerHTML='<div class="empty-state"><div class="empty-icon">📭</div><p>لا توجد بيانات للفترة المحددة</p></div>';
    return;
  }

  // ── إجماليات كلية ──
  const totalDays  = drivers.reduce((s,d)=>s+d.total_days,0);
  const totalTrips = drivers.reduce((s,d)=>s+d.total_trips,0);
  const totalKm    = drivers.reduce((s,d)=>s+d.total_km,0);

  // ── هيدر إجمالي ──
  const summaryHtml = drivers.length>1 ? '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;margin-bottom:1.25rem">'
    + _sarkyKpiBlock('📅','إجمالي أيام الحضور',totalDays,'يوم','#1d4ed8','#eff6ff')
    + _sarkyKpiBlock('🚗','إجمالي الرحلات',totalTrips,'رحلة','#059669','#f0fdf4')
    + _sarkyKpiBlock('📏','إجمالي الكيلومترات',totalKm.toFixed(1),'كم','#7c3aed','#f5f3ff')
    + '</div>' : '';

  // ── جلب KPI score للسائق/السائقين بشكل موازي ──
  let kpiMap = {};
  try {
    // نحدد الشهر من from (YYYY-MM-DD → YYYY-MM)
    const month = from ? from.substring(0,7) : '';
    const kpiParams = month ? `?month=${month}` : '';
    const kpiData = await apiCall(`/reports/driver-kpi${kpiParams}`);
    (kpiData.drivers||[]).forEach(k => { kpiMap[k.driver_id] = k; });
  } catch(e) { /* مش مشكلة لو KPI مش متاح */ }

  // ── بطاقة لكل سائق ──
  const cardsHtml = drivers.map(d=>_buildSarkyCard(d, from, to, kpiMap[d.driver_id]||null)).join('');

  res.innerHTML = summaryHtml + cardsHtml;
}

function _sarkyKpiBlock(icon, label, value, unit, color, bg) {
  return '<div style="background:'+bg+';border-radius:14px;padding:1rem;text-align:center;border:1.5px solid '+color+'22">'
    + '<div style="font-size:1.5rem;margin-bottom:.35rem">'+icon+'</div>'
    + '<div style="font-size:1.6rem;font-weight:900;color:'+color+';line-height:1">'+value+'</div>'
    + '<div style="font-size:.7rem;color:'+color+';font-weight:700;margin-top:.2rem">'+unit+'</div>'
    + '<div style="font-size:.75rem;color:#64748b;margin-top:.15rem">'+label+'</div>'
    + '</div>';
}

function _buildSarkyCard(d, from, to, kpi=null) {
  const hasData = d.total_days > 0;
  const pct = d.total_km > 0 ? Math.round(d.total_km / Math.max(d.total_trips,1)) : 0;

  // جدول الأيام التفصيلية
  const daysHtml = (d.days_detail||[]).map((day,i)=>{
    const km  = typeof day.km_total==='number' ? day.km_total.toFixed(1) : '0';
    return '<div class="sarky-day-row" style="background:'+(i%2===0?'#fff':'#f8fafc')+';display:grid;grid-template-columns:95px 55px 65px 65px 65px;align-items:center;gap:.4rem;font-size:.78rem">'
      + '<span style="font-weight:700;color:#334155">'+day.trip_date+'</span>'
      + '<span class="sarky-day-badge">'+day.trip_count+' رحلة</span>'
      + '<span style="color:#7c3aed;font-weight:700">'+km+' كم</span>'
      + '<span style="color:#0891b2;font-weight:600" title="بداية أول رحلة من الجراج">🚀 '+(day.first_trip_time||'—')+'</span>'
      + '<span style="color:#be185d;font-weight:600" title="وقت إيداع الجراج (نهاية آخر رحلة)">🏁 '+(day.garage_time||'—')+'</span>'
      + '</div>';
  }).join('') || '<div style="padding:.75rem 1rem;color:#94a3b8;font-size:.82rem">لا توجد أيام مسجّلة</div>';

  // رأس أعمدة الجدول
  const daysHeader = '<div style="display:grid;grid-template-columns:95px 55px 65px 65px 65px;align-items:center;gap:.4rem;padding:.4rem .85rem;background:#f1f5f9;border-bottom:1px solid #e2e8f0;font-size:.7rem;font-weight:700;color:#64748b">'
    + '<span>التاريخ</span><span>الرحلات</span><span>الكم</span>'
    + '<span>بداية الجراج</span><span>نهاية الجراج</span>'
    + '</div>';



  // توقيع المدير
  const signatureBlock = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:2rem;padding:1.25rem 1.5rem;margin-top:.5rem;border-top:1px dashed #cbd5e1">
      <div style="text-align:center">
        <div style="font-size:.78rem;color:#64748b;font-weight:700;margin-bottom:.5rem">الرقم الثابت للسائق</div>
        <div style="font-size:1.1rem;font-weight:900;color:#1e293b;letter-spacing:2px;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:8px;padding:.4rem 1rem;display:inline-block">
          ${d.fixed_number||'—'}
        </div>
      </div>
      <div style="text-align:center">
        <div style="font-size:.78rem;color:#64748b;font-weight:700;margin-bottom:.5rem">توقيع المدير المسؤول</div>
        <div style="border-bottom:2px solid #334155;margin:0 1rem;height:30px"></div>
        <div style="font-size:.7rem;color:#94a3b8;margin-top:.3rem">الاسم / التوقيع / الختم</div>
      </div>
    </div>`;

  return '<div class="sarky-card no-break" style="page-break-inside:avoid">'
    // هيدر البطاقة
    + '<div class="sarky-card-header">'    +   '<div style="display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap">'    +     '<div>'    +       '<div style="font-size:1.05rem;font-weight:800;margin-bottom:.2rem">🧑‍✈️ '+d.driver_name+'</div>'    +       '<div style="font-size:.78rem;opacity:.8">'    +         (d.branch?'📍 '+d.branch:'')    +         (d.fixed_number?' &nbsp;|&nbsp; # '+d.fixed_number:'')    +       '</div>'    +       '<div style="font-size:.72rem;color:rgba(255,255,255,.6);margin-top:.25rem">'+from+' → '+to+'</div>'    +     '</div>'    +     (kpi ? (() => {        const R=22,S=5,C=2*Math.PI*R,D=(kpi.total_score/100)*C;        const gc=kpi.total_score>=85?'#4ade80':kpi.total_score>=70?'#60a5fa':kpi.total_score>=50?'#fb923c':'#f87171';        const rankStr=kpi.rank===1?'🥇':kpi.rank===2?'🥈':kpi.rank===3?'🥉':('<span style="color:#fff;font-weight:900">#'+kpi.rank+'</span>');        return '<div style="display:flex;flex-direction:column;align-items:center;gap:.25rem">'          +'<svg viewBox="0 0 54 54" width="56" height="56">'          +'<circle cx="27" cy="27" r="'+R+'" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="'+S+'"/>'          +'<circle cx="27" cy="27" r="'+R+'" fill="none" stroke="'+gc+'" stroke-width="'+S+'"'          +' stroke-linecap="round"'          +' stroke-dasharray="'+D.toFixed(1)+' '+(C-D).toFixed(1)+'"'          +' stroke-dashoffset="'+(C/4).toFixed(1)+'"/>'          +'<text x="27" y="23" text-anchor="middle" font-size="12" font-weight="900" fill="'+gc+'" font-family="Cairo,sans-serif">'+kpi.total_score+'</text>'          +'<text x="27" y="35" text-anchor="middle" font-size="7.5" fill="rgba(255,255,255,.7)" font-family="Cairo,sans-serif">'+kpi.grade+'</text>'          +'</svg>'          +'<div style="font-size:.78rem;font-weight:800;color:'+gc+'">'+rankStr+'</div>'          +'</div>';      })() : '')    +   '</div>'    + '</div>'    // KPIs
    + '<div class="sarky-kpi-grid" style="border-bottom:1px solid #f1f5f9">'
    +   '<div class="sarky-kpi">'
    +     '<div class="sarky-kpi-val" style="color:#1d4ed8">'+d.total_days+'</div>'
    +     '<div class="sarky-kpi-lbl">📅 أيام الحضور</div>'
    +   '</div>'
    +   '<div class="sarky-kpi">'
    +     '<div class="sarky-kpi-val" style="color:#059669">'+d.total_trips+'</div>'
    +     '<div class="sarky-kpi-lbl">🚗 إجمالي الرحلات</div>'
    +   '</div>'
    +   '<div class="sarky-kpi">'
    +     '<div class="sarky-kpi-val" style="color:#7c3aed;font-size:'+(d.total_km>=10000?'1.4':'2')+'rem">'+d.total_km.toFixed(1)+'</div>'
    +     '<div class="sarky-kpi-lbl">📏 إجمالي كم</div>'
    +   '</div>'
    + '</div>'
    // متوسط يومي + وقت إضافي إجمالي
    + (d.total_days>0 ? '<div style="display:flex;gap:1rem;padding:.65rem 1rem;background:#f8fafc;border-bottom:1px solid #f1f5f9;font-size:.8rem;flex-wrap:wrap;align-items:center">'
    +   '<span style="color:#475569">⚡ معدل الرحلات/يوم: <strong>'+(d.total_trips/d.total_days).toFixed(1)+'</strong></span>'
    +   '<span style="color:#475569">📐 معدل الكم/رحلة: <strong>'+pct+'</strong> كم</span>'
    +   '<span style="color:#475569">🛣️ معدل الكم/يوم: <strong>'+(d.total_km/d.total_days).toFixed(1)+'</strong> كم</span>'
    + '</div>' : '')
    // جدول الأيام مع هيدر
    + '<div style="max-height:300px;overflow-y:auto">'+daysHeader+daysHtml+'</div>'
    // توقيع المدير + الرقم الثابت
    + signatureBlock
    + '</div>';
}


function printSarkyResult() {
  const el = document.getElementById('sarkyResult');
  if (!el || !el.innerHTML.trim()) {
    alert('لا توجد بيانات للطباعة — اختر سائقاً واضغط عرض أولاً');
    return;
  }

  // جيب CSS الخاص بالسركي من الصفحة الحالية
  const sarkyCss = Array.from(document.styleSheets)
    .map(ss => {
      try {
        return Array.from(ss.cssRules).map(r => r.cssText).join('\n');
      } catch(e) { return ''; }
    }).join('\n');

  const html = `<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <title>السركي — طباعة</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap');
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Cairo',sans-serif;background:#fff;color:#0f172a;direction:rtl;padding:1.5rem}
    ${sarkyCss}
    /* إزالة overflow وmax-height للطباعة */
    [style*="max-height"]{max-height:none!important;overflow:visible!important}
    .sarky-card{box-shadow:none!important;border:1.5px solid #cbd5e1!important;page-break-inside:avoid;margin-bottom:1.5rem}
    .sarky-card-header{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;background:linear-gradient(135deg,#1a2942,#0f4c81)!important;color:#fff!important;border-radius:16px 16px 0 0;padding:1rem 1.25rem}
    .sarky-kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0}
    .sarky-kpi{padding:1.1rem .75rem;text-align:center}
    .sarky-kpi-val{font-size:2rem;font-weight:900;line-height:1;margin-bottom:.3rem}
    .sarky-kpi-lbl{font-size:.72rem;color:#64748b;font-weight:600}
    .no-print{display:none!important}
    @page{size:A4 portrait;margin:1.5cm}
    @media print{
      body{padding:0}
      .sarky-card{page-break-inside:avoid}
    }
  </style>
</head>
<body>
  ${el.innerHTML}
  <script>
    // افتح dialog الطباعة بعد تحميل الـ CSS
    window.onload = function() {
      setTimeout(function(){ window.print(); window.close(); }, 400);
    };
  <\/script>
</body>
</html>`;

  const win = window.open('', '_blank', 'width=900,height=700');
  win.document.write(html);
  win.document.close();
}

  document.body.insertAdjacentHTML('afterbegin',`

    </div>
    <div class="login-form">
      <div class="login-field" style="margin-bottom:1rem">
        <label>اسم المستخدم</label>
        <input type="text" id="luName" placeholder="أدخل اسم المستخدم" autocomplete="username"
          style="width:100%;padding:.75rem 1rem;border:1.5px solid #e2e8f0;border-radius:10px;font-size:.9rem;font-family:inherit;background:#fafafa;color:var(--text);outline:none;transition:.2s;box-sizing:border-box"
          onfocus="this.style.borderColor='#06B6D4';this.style.background='#fff';this.style.boxShadow='0 0 0 3px rgba(6,182,212,.1)'"
          onblur="this.style.borderColor='#e2e8f0';this.style.background='#fafafa';this.style.boxShadow='none'">
      </div>
      <div class="login-field" style="margin-bottom:1.25rem">
        <label>كلمة المرور</label>
        <input type="password" id="luPw" placeholder="أدخل كلمة المرور" autocomplete="current-password"
          style="width:100%;padding:.75rem 1rem;border:1.5px solid #e2e8f0;border-radius:10px;font-size:.9rem;font-family:inherit;background:#fafafa;color:var(--text);outline:none;transition:.2s;box-sizing:border-box"

          onblur="this.style.borderColor='#e2e8f0';this.style.background='#fafafa';this.style.boxShadow='none'">

      <button class="login-btn" id="doLoginBtn">تسجيل الدخول</button>

    const btn=document.getElementById('doLoginBtn'); btn.disabled=true; btn.textContent='جاري...';
    try{
      const data=await apiCall('/login','POST',{username,password});
      setToken(data.access_token);
      if(data.refresh_token) localStorage.setItem('refresh_token', data.refresh_token);
      const u={id:data.user.id,username:data.user.username,role:data.user.role,driver_id:data.user.driver_id,

      document.getElementById('loginOverlay').remove();
      initUI();
      showNotification(`مرحباً ${currentUser.username} 👋`,'success');

  document.getElementById('luPw').addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });
}

document.getElementById('logoutBtn').addEventListener('click',()=>{
  clearInterval(notifPollInterval); clearAuth(); currentUser=null;
  showNotification('تم تسجيل الخروج','info');
  setTimeout(()=>location.reload(),600);
});

// ═══════════════════════════════════════════════════════════════
const MAINTENANCE_TYPES_FE = [
  "تغيير زيت","فلتر زيت","فلتر هواء","فلتر وقود",
  "فلتر مكيف","إطارات","بطارية","فرامل أمامية",
  "فرامل خلفية","سير توزيع","ترمس","ماء تبريد",
  "سائل فرامل","فحص دوري عام","أخرى"
];

const ALERT_COLORS = {
  overdue: {bg:'#fef2f2',border:'#fca5a5',badge:'#ef4444',label:'🔴 متأخرة'},
  warning: {bg:'#fff7ed',border:'#fed7aa',badge:'#f97316',label:'🟠 قريبة'},
  ok:      {bg:'#f0fdf4',border:'#6ee7b7',badge:'#10b981',label:'✅ سليمة'},
};

async function renderMaintenanceSection() {
  const c = document.getElementById('pageContent');
  c.innerHTML='<div class="empty-state"><div class="empty-icon">⏳</div><p>جاري التحميل...</p></div>';

  const [records, cars, drivers, perms] = await Promise.all([
    apiCall('/maintenance/schedule').catch(()=>[]),
    loadCars(),
    loadDrivers().catch(()=>[]),
    apiCall('/permissions').catch(()=>[])
  ]);
  // تحديث الكاش دايماً
  window._carsCache = cars;
  window._allDriversCache = drivers;
  window._allPermsCache = perms;

  window._maintenanceAlertCount = records.filter(r=>r.alert_status!=='ok').length;

  const overdue = records.filter(r=>r.alert_status==='overdue');
  const warning = records.filter(r=>r.alert_status==='warning');
  const ok      = records.filter(r=>r.alert_status==='ok');

  // بناء map سائق من الكاش
  const driversMap = {};
  (window._allDriversCache || []).forEach(d => { driversMap[d.id] = d; });
  const permsArr = window._allPermsCache || [];

  function getDriverForCar(carId) {
    const perm = permsArr.find(p => p.car_id === carId);
    return perm ? (driversMap[perm.driver_id] || null) : null;
  }

  function buildRow(r) {
    const ac = ALERT_COLORS[r.alert_status] || ALERT_COLORS.ok;
    const curKmDisplay = r.current_km ? Math.round(r.current_km).toLocaleString('ar-EG')+' كم' : '—';
    const remKm = (r.next_due_km && r.current_km) ? Math.round(r.next_due_km - r.current_km) : null;
    const remDisplay = remKm !== null
      ? (remKm > 0 ? `${remKm.toLocaleString('ar-EG')} كم متبقي` : `${Math.abs(remKm).toLocaleString('ar-EG')} كم تأخير`)
      : '—';
    const driver = getDriverForCar(r.car_id);
    const driverCell = driver
      ? `<strong style="font-size:.84rem">${driver.name}</strong>${driver.phone ? `<br><small style="color:var(--muted)">${driver.phone}</small>` : ''}`
      : '<span style="color:var(--muted);font-size:.78rem">—</span>';
    const branchCell = r.car_branch
      ? `<span class="badge badge-blue" style="font-size:.72rem">${r.car_branch}</span>`
      : '<span style="color:var(--muted);font-size:.78rem">—</span>';
    return `<tr>
      <td dir="ltr"><strong>${r.car_plate}</strong></td>
      <td style="font-size:.82rem">${r.car_model}</td>
      <td>${driverCell}</td>
      <td>${branchCell}</td>
      <td>${r.maintenance_type}</td>
      <td>${r.interval_km ? Math.round(r.interval_km).toLocaleString('ar-EG')+' كم' : '—'}${r.interval_days ? ' / '+r.interval_days+' يوم' : ''}</td>
      <td>${r.last_done_km ? Math.round(r.last_done_km).toLocaleString('ar-EG')+' كم' : '—'}</td>
      <td>${curKmDisplay}</td>
      <td><strong style="color:${ac.badge}">${remDisplay}</strong></td>
      <td>${r.next_due_date||'—'}</td>
      <td><span style="display:inline-flex;align-items:center;gap:.28rem;background:${ac.badge};color:white;border-radius:8px;font-size:.7rem;padding:.22rem .6rem;font-weight:700;white-space:nowrap">${ac.label}</span></td>
      <td style="white-space:nowrap">
        ${!isReporter()?`
        <button title="تم" style="width:30px;height:30px;border:none;border-radius:7px;background:#dcfce7;color:#16a34a;cursor:pointer;font-size:.88rem;display:inline-flex;align-items:center;justify-content:center;margin-left:2px" onclick="openMaintenanceDoneModal(${r.id},'${r.car_plate}','${r.maintenance_type}')">✅</button>
        <button title="تعديل" style="width:30px;height:30px;border:none;border-radius:7px;background:#eff6ff;color:#2563eb;cursor:pointer;font-size:.88rem;display:inline-flex;align-items:center;justify-content:center;margin-left:2px" onclick="openEditMaintenanceModal(${r.id})">✏️</button>
        <button title="حذف" style="width:30px;height:30px;border:none;border-radius:7px;background:#fef2f2;color:#dc2626;cursor:pointer;font-size:.88rem;display:inline-flex;align-items:center;justify-content:center" onclick="deleteMaintenanceRecord(${r.id})">🗑️</button>
        `:'—'}
      </td>
    </tr>`;
  }

  function buildGroup(title, list, color) {
    if(!list.length) return '';
    return `<div class="card" style="border:1.5px solid ${color};margin-bottom:1rem">
      <div class="card-header" style="background:${list[0]?ALERT_COLORS[list[0].alert_status]?.bg:''}">
        <div class="card-title" style="color:${color}">${title} (${list.length})</div>
      </div>
      <div class="table-wrap">
        <table><thead><tr>
          <th>اللوحة</th><th>الموديل</th><th>السائق</th><th>الفرع</th>
          <th>نوع الصيانة</th><th>الفاصل الزمني</th>
          <th>آخر صيانة (كم)</th><th>العداد الحالي</th><th>المتبقي</th>
          <th>الموعد القادم</th><th>الحالة</th><th>إجراء</th>
        </tr></thead><tbody>
        ${list.map(buildRow).join('')}
        </tbody></table>
      </div>
    </div>`;
  }

  // بناء قوائم الفلاتر من البيانات الفعلية
  const allTypes   = [...new Set(records.map(r=>r.maintenance_type).filter(Boolean))].sort();
  const allBranches = [...new Set(records.map(r=>r.car_branch).filter(Boolean))].sort();
  const typeOpts   = allTypes.map(t=>`<option value="${t}">${t}</option>`).join('');
  const branchOpts = allBranches.map(b=>`<option value="${b}">${b}</option>`).join('');

  // حفظ السجلات كلها للفلترة المحلية
  window._maintRecords = records;

  function applyMaintenanceFilter() {
    const q      = (document.getElementById('maintSearch')?.value||'').trim().toLowerCase();
    const fType  = document.getElementById('maintTypeFilter')?.value||'';
    const fBranch= document.getElementById('maintBranchFilter')?.value||'';
    const fStatus= document.getElementById('maintStatusFilter')?.value||'';

    const all = window._maintRecords || [];
    const filtered = all.filter(r =>
      (!q      || r.car_plate.toLowerCase().includes(q) || r.car_model.toLowerCase().includes(q) || (r.car_branch||'').toLowerCase().includes(q)) &&
      (!fType  || r.maintenance_type === fType) &&
      (!fBranch|| r.car_branch === fBranch) &&
      (!fStatus|| r.alert_status === fStatus)
    );

    const fOverdue  = filtered.filter(r=>r.alert_status==='overdue');
    const fWarning  = filtered.filter(r=>r.alert_status==='warning');
    const fOk       = filtered.filter(r=>r.alert_status==='ok');

    const groups = document.getElementById('maintGroups');
    if(groups) groups.innerHTML =
      buildGroup('🔴 صيانة متأخرة', fOverdue, '#ef4444') +
      buildGroup('🟠 تقترب مواعيد الصيانة', fWarning, '#f97316') +
      buildGroup('✅ صيانة سليمة', fOk, '#10b981') +
      (filtered.length===0 ? '<div class="empty-state"><div class="empty-icon">🔍</div><p>لا توجد نتائج مطابقة</p></div>' : '');

    // تحديث الكاونتر
    const el = document.getElementById('maintFilterCount');
    if(el) el.textContent = filtered.length < all.length ? `(${filtered.length} من ${all.length})` : '';
  }
  window._applyMaintenanceFilter = applyMaintenanceFilter;

  c.innerHTML = `
    <div class="stats-row" style="margin-bottom:1rem">
      <div class="stat-card"><div class="stat-icon" style="color:#ef4444">🔴</div><div class="stat-value" style="color:#ef4444">${overdue.length}</div><div class="stat-label">متأخرة</div></div>
      <div class="stat-card"><div class="stat-icon" style="color:#f97316">🟠</div><div class="stat-value" style="color:#f97316">${warning.length}</div><div class="stat-label">قريبة</div></div>
      <div class="stat-card"><div class="stat-icon" style="color:#10b981">✅</div><div class="stat-value" style="color:#10b981">${ok.length}</div><div class="stat-label">سليمة</div></div>
      <div class="stat-card"><div class="stat-icon">🔧</div><div class="stat-value">${records.length}</div><div class="stat-label">إجمالي السجلات</div></div>
      <div class="stat-card"><div class="stat-icon" style="color:#f97316">🛻</div><div class="stat-value" style="color:#f97316">${cars.filter(c=>c.status==='maintenance').length}</div><div class="stat-label">سيارات في الصيانة</div></div>
    </div>

    <!-- شريط الفلاتر -->
    <div class="card" style="margin-bottom:1rem;border-radius:12px">
      <div class="card-header" style="border-bottom:none;padding:.75rem 1rem">
        <div style="display:flex;gap:.6rem;flex-wrap:wrap;align-items:center;width:100%">
          <input id="maintSearch" type="text" placeholder="🔍 لوحة أو موديل أو فرع..."
            oninput="window._applyMaintenanceFilter()"
            style="padding:.45rem .8rem;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:.85rem;min-width:200px;flex:1">
          <select id="maintTypeFilter" onchange="window._applyMaintenanceFilter()"
            style="padding:.45rem .7rem;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:.85rem;min-width:140px">
            <option value="">كل الأنواع 🔧</option>
            ${typeOpts}
          </select>
          <select id="maintBranchFilter" onchange="window._applyMaintenanceFilter()"
            style="padding:.45rem .7rem;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:.85rem;min-width:160px">
            <option value="">كل الفروع 🏢</option>
            ${branchOpts}
          </select>
          <select id="maintStatusFilter" onchange="window._applyMaintenanceFilter()"
            style="padding:.45rem .7rem;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:.85rem;min-width:130px">
            <option value="">كل الحالات</option>
            <option value="overdue">🔴 متأخرة</option>
            <option value="warning">🟠 قريبة</option>
            <option value="ok">✅ سليمة</option>
          </select>
          <button class="btn btn-ghost btn-sm" onclick="
            document.getElementById('maintSearch').value='';
            document.getElementById('maintTypeFilter').value='';
            document.getElementById('maintBranchFilter').value='';
            document.getElementById('maintStatusFilter').value='';
            window._applyMaintenanceFilter()
          ">✕ مسح</button>
          <span id="maintFilterCount" style="color:var(--muted);font-size:.8rem"></span>
          <div style="flex:1"></div>
          ${!isReporter()?`
          <div style="display:flex;gap:.5rem">
            ${isSuperuser() ? `<button class="btn btn-outline btn-sm" onclick="openMaintenanceImportModal()">📥 استيراد CSV</button>` : ''}
            <button class="btn btn-primary btn-sm" onclick="openAddMaintenanceModal()">➕ إضافة جدول صيانة</button>
          </div>`:''}
        </div>
      </div>
    </div>

    <div id="maintGroups">
      ${buildGroup('🔴 صيانة متأخرة', overdue, '#ef4444')}
      ${buildGroup('🟠 تقترب مواعيد الصيانة', warning, '#f97316')}
      ${buildGroup('✅ صيانة سليمة', ok, '#10b981')}
      ${records.length===0?'<div class="empty-state"><div class="empty-icon">🔧</div><p>لا توجد جداول صيانة بعد — أضف أول جدول</p></div>':''}
    </div>
  `;
}

async function openAddMaintenanceModal() {
  // جيب العربيات لو مش محملة
  if(!window._carsCache || !window._carsCache.length) {
    window._carsCache = await loadCars();
  }
  const carsOpts = (window._carsCache||[]).map(c=>`<option value="${c.id}">${c.plate} — ${c.model}${c.car_name?' ('+c.car_name+')':''}</option>`).join('');
  const typeOpts = MAINTENANCE_TYPES_FE.map(t=>`<option value="${t}">${t}</option>`).join('');
  openModal(`
    <div class="modal-header"><div class="modal-title">➕ إضافة جدول صيانة دورية</div><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="two-col">
      <div class="form-group"><label>المركبة <span class="req">*</span></label><select id="mMaintCar"><option value="">— اختر —</option>${carsOpts}</select></div>
      <div class="form-group"><label>نوع الصيانة <span class="req">*</span></label><select id="mMaintType"><option value="">— اختر —</option>${typeOpts}</select></div>
    </div>
    <div class="two-col">
      <div class="form-group"><label>كل كام كم</label><input type="number" id="mMaintKmInt" placeholder="مثال: 5000" min="0" step="100"></div>
      <div class="form-group"><label>أو كل كام يوم</label><input type="number" id="mMaintDayInt" placeholder="مثال: 50" min="0" value="50"></div>
    </div>
    <div class="two-col">
      <div class="form-group"><label>آخر قراءة عداد عند الصيانة (كم)</label><input type="number" id="mMaintLastKm" placeholder="مثال: 45000" min="0"></div>
      <div class="form-group"><label>تاريخ آخر صيانة</label><input type="date" id="mMaintLastDate"></div>
    </div>
    <div class="two-col">
      <div class="form-group"><label>إنذار قبل (كم)</label><input type="number" id="mMaintAlertKm" value="500" min="0"></div>
      <div class="form-group"><label>إنذار قبل (يوم)</label><input type="number" id="mMaintAlertDay" value="7" min="0"></div>
    </div>
    <div class="form-group"><label>ملاحظات</label><textarea id="mMaintNotes" rows="2" style="width:100%;resize:vertical;padding:.55rem;border:1.5px solid var(--border);border-radius:10px;font-family:inherit;font-size:.88rem"></textarea></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">إلغاء</button>
      <button class="btn btn-primary" id="mMaintSave">💾 حفظ</button>
    </div>`);

  document.getElementById('mMaintSave').onclick = async () => {
    const car_id = parseInt(document.getElementById('mMaintCar').value);
    const maintenance_type = document.getElementById('mMaintType').value;
    const interval_km  = parseFloat(document.getElementById('mMaintKmInt').value)||null;
    const interval_days= parseInt(document.getElementById('mMaintDayInt').value)||null;
    if(!car_id) return showNotification('اختر المركبة','error');
    if(!maintenance_type) return showNotification('اختر نوع الصيانة','error');
    if(!interval_km && !interval_days) return showNotification('حدد الفاصل الزمني (كم أو يوم)','error');
    const body = {
      car_id, maintenance_type, interval_km, interval_days,
      last_done_km:    parseFloat(document.getElementById('mMaintLastKm').value)||null,
      last_done_date:  document.getElementById('mMaintLastDate').value||null,
      alert_km_before: parseFloat(document.getElementById('mMaintAlertKm').value)||500,
      alert_days_before:parseInt(document.getElementById('mMaintAlertDay').value)||7,
      notes:           document.getElementById('mMaintNotes').value.trim(),
    };
    const btn = document.getElementById('mMaintSave');
    btn.disabled=true; btn.textContent='جاري...';
    try {
      await apiCall('/maintenance/schedule','POST',body);
      showNotification('✅ تم إضافة جدول الصيانة','success');
      closeModal(); await renderMaintenanceSection();
    } catch(e) { showNotification(e.message,'error'); btn.disabled=false; btn.textContent='💾 حفظ'; }
  };
}

async function openMaintenanceDoneModal(id, plate, type) {
  openModal(`
    <div class="modal-header"><div class="modal-title">✅ تسجيل إتمام الصيانة</div><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div style="background:#f0fdf4;border:1px solid #6ee7b7;border-radius:10px;padding:.8rem;margin-bottom:1rem;font-size:.88rem">
      <strong>${plate}</strong> — ${type}
    </div>
    <div class="two-col">
      <div class="form-group"><label>قراءة العداد الآن (كم) <span class="req">*</span></label><input type="number" id="doneKm" placeholder="مثال: 50000" min="0"></div>
      <div class="form-group"><label>تاريخ الصيانة <span class="req">*</span></label><input type="date" id="doneDate" value="${new Date().toISOString().split('T')[0]}"></div>
    </div>
    <div class="form-group"><label>ملاحظات</label><textarea id="doneNotes" rows="2" style="width:100%;resize:vertical;padding:.55rem;border:1.5px solid var(--border);border-radius:10px;font-family:inherit;font-size:.88rem"></textarea></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">إلغاء</button>
      <button class="btn btn-primary" id="doneSave">✅ تأكيد الصيانة</button>
    </div>`);

  document.getElementById('doneSave').onclick = async () => {
    const last_done_km   = parseFloat(document.getElementById('doneKm').value)||null;
    const last_done_date = document.getElementById('doneDate').value||null;
    const notes          = document.getElementById('doneNotes').value.trim();
    if(!last_done_km) return showNotification('أدخل قراءة العداد','error');
    if(!last_done_date) return showNotification('أدخل تاريخ الصيانة','error');
    const btn = document.getElementById('doneSave');
    btn.disabled=true; btn.textContent='جاري...';
    try {
      await apiCall(`/maintenance/schedule/${id}`,'PUT',{last_done_km, last_done_date, notes});
      showNotification('✅ تم تسجيل الصيانة','success');
      closeModal(); await renderMaintenanceSection();
    } catch(e) { showNotification(e.message,'error'); btn.disabled=false; btn.textContent='✅ تأكيد'; }
  };
}


async function openEditMaintenanceModal(id) {
  // جيب بيانات السجل من السيرفر
  let rec;
  try {
    const all = await apiCall('/maintenance/schedule');
    rec = all.find(r => r.id === id);
    if(!rec) return showNotification('لم يتم العثور على السجل', 'error');
  } catch(e) { return showNotification(e.message, 'error'); }

  if(!window._carsCache || !window._carsCache.length)
    window._carsCache = await loadCars();

  const carsOpts = (window._carsCache||[]).map(c =>
    `<option value="${c.id}" ${c.id===rec.car_id?'selected':''}>${c.plate} — ${c.model}${c.car_name?' ('+c.car_name+')':''}</option>`
  ).join('');
  const typeOpts = MAINTENANCE_TYPES_FE.map(t =>
    `<option value="${t}" ${t===rec.maintenance_type?'selected':''}>${t}</option>`
  ).join('');

  openModal(`
    <div class="modal-header">
      <div class="modal-title">✏️ تعديل جدول الصيانة</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="two-col">
      <div class="form-group"><label>المركبة <span class="req">*</span></label>
        <select id="eMaintCar"><option value="">— اختر —</option>${carsOpts}</select></div>
      <div class="form-group"><label>نوع الصيانة <span class="req">*</span></label>
        <select id="eMaintType"><option value="">— اختر —</option>${typeOpts}</select></div>
    </div>
    <div class="two-col">
      <div class="form-group"><label>كل كام كم</label>
        <input type="number" id="eMaintKmInt" value="${rec.interval_km||''}" placeholder="مثال: 5000" min="0" step="100"></div>
      <div class="form-group"><label>أو كل كام يوم</label>
        <input type="number" id="eMaintDayInt" value="${rec.interval_days||50}" placeholder="مثال: 50" min="0"></div>
    </div>
    <div class="two-col">
      <div class="form-group"><label>آخر قراءة عداد (كم)</label>
        <input type="number" id="eMaintLastKm" value="${rec.last_done_km||''}" placeholder="مثال: 45000" min="0"></div>
      <div class="form-group"><label>تاريخ آخر صيانة</label>
        <input type="date" id="eMaintLastDate" value="${rec.last_done_date||''}"></div>
    </div>
    <div class="two-col">
      <div class="form-group"><label>إنذار قبل (كم)</label>
        <input type="number" id="eMaintAlertKm" value="${rec.alert_km_before||500}" min="0"></div>
      <div class="form-group"><label>إنذار قبل (يوم)</label>
        <input type="number" id="eMaintAlertDay" value="${rec.alert_days_before||7}" min="0"></div>
    </div>
    <div class="form-group"><label>ملاحظات</label>
      <textarea id="eMaintNotes" rows="2" style="width:100%;resize:vertical;padding:.55rem;border:1.5px solid var(--border);border-radius:10px;font-family:inherit;font-size:.88rem">${rec.notes||''}</textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">إلغاء</button>
      <button class="btn btn-primary" id="eMaintSave">💾 حفظ التعديل</button>
    </div>`);

  document.getElementById('eMaintSave').onclick = async () => {
    const car_id           = parseInt(document.getElementById('eMaintCar').value);
    const maintenance_type = document.getElementById('eMaintType').value;
    const interval_km      = parseFloat(document.getElementById('eMaintKmInt').value)  || null;
    const interval_days    = parseInt(document.getElementById('eMaintDayInt').value)   || null;
    const last_done_km     = parseFloat(document.getElementById('eMaintLastKm').value) || null;
    const last_done_date   = document.getElementById('eMaintLastDate').value           || null;
    if(!car_id)           return showNotification('اختر المركبة', 'error');
    if(!maintenance_type) return showNotification('اختر نوع الصيانة', 'error');
    if(!interval_km && !interval_days) return showNotification('حدد الفاصل الزمني (كم أو يوم على الأقل)', 'error');

    // نبعت فقط الحقول اللي اتغيرت + car_id دايماً
    const body = {
      car_id, maintenance_type, interval_km, interval_days,
      last_done_km, last_done_date,
      alert_km_before:   parseFloat(document.getElementById('eMaintAlertKm').value)  || 500,
      alert_days_before: parseInt(document.getElementById('eMaintAlertDay').value)   || 7,
      notes:             document.getElementById('eMaintNotes').value.trim(),
    };

// MAINTENANCE CSV IMPORT — استيراد الصيانة من CSV
// ═══════════════════════════════════════════════════════════════
// أعمدة الـ CSV — مطابقة للفورم بالضبط
const MAINT_CSV_COLS = [
  "المركبة (رقم اللوحة)",
  "نوع الصيانة",
  "كل كام كم",
  "أو كل كام يوم",
  "آخر قراءة عداد عند الصيانة (كم)",
  "تاريخ آخر صيانة",
  "إنذار قبل (كم)",
  "إنذار قبل (يوم)",
  "ملاحظات"
];
const MAINT_TYPES_VALID = [
  "تغيير زيت","فلتر زيت","فلتر هواء","فلتر وقود","فلتر مكيف",
  "إطارات","بطارية","فرامل أمامية","فرامل خلفية","سير توزيع",
  "ترمس","ماء تبريد","سائل فرامل","فحص دوري عام","أخرى"
];

function downloadMaintenanceTemplate() {
  // صف الأعمدة + صف فارغ جاهز للكتابة (مع القيم الافتراضية)
  const rows = [
    MAINT_CSV_COLS,
    ["", "", "", "", "", "", "500", "7", ""],
  ];
  const csv = rows.map(r =>
    r.map(v => '"' + String(v).replace(/"/g, '""') + '"').join(',')
  ).join('\r\n');
  const blob = new Blob(['\uFEFF' + csv], {type: 'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'maintenance_schedule_template.csv';
  a.click();
  URL.revokeObjectURL(a.href);
}

function parseMaintenanceCSV(text) {
  const lines = text.replace(/\r/g,'').split('\n').filter(l => l.trim() && !l.trim().startsWith('#'));
  if(!lines.length) return [];
  const sep = lines[0].includes(';') ? ';' : ',';
  const parseRow = line => {
    const cells = []; let cur = '', inQ = false;
    for(let i = 0; i < line.length; i++){
      if(line[i] === '"'){ if(inQ && line[i+1] === '"'){cur+='"';i++;}else inQ=!inQ; }
      else if(line[i] === sep && !inQ){ cells.push(cur.trim()); cur=''; }
      else cur += line[i];
    }
    cells.push(cur.trim());
    return cells;
  };
  const headers = parseRow(lines[0]);
  return lines.slice(1).map((line) => {
    const vals = parseRow(line);
    const obj = {};
    headers.forEach((h, i) => { obj[h] = vals[i] || ''; });
    return obj;
  });
}

function validateMaintenanceRows(rows, carsMap) {
  // خريطة لربط اسم العمود في الفورمات الجديد بالـ key الداخلي
  const g = (row, ...keys) => {
    for(const k of keys){ const v=(row[k]||'').trim(); if(v) return v; }
    return '';
  };
  return rows.map((row, idx) => {
    const errors = [];
    const plate  = g(row, 'المركبة (رقم اللوحة)', 'رقم اللوحة', 'plate');
    const type   = g(row, 'نوع الصيانة', 'maintenance_type');
    const intKm  = g(row, 'كل كام كم', 'interval_km');
    const intDy  = g(row, 'أو كل كام يوم', 'كل كام يوم', 'interval_days');
    const lastKm = g(row, 'آخر قراءة عداد عند الصيانة (كم)', 'آخر قراءة عداد', 'last_done_km');
    const lastDt = g(row, 'تاريخ آخر صيانة', 'last_done_date');
    const alKm   = g(row, 'إنذار قبل (كم)', 'إنذار قبل كم', 'alert_km_before') || '500';
    const alDy   = g(row, 'إنذار قبل (يوم)', 'إنذار قبل يوم', 'alert_days_before') || '7';
    const notes  = g(row, 'ملاحظات', 'notes');

    if(!plate) errors.push('رقم اللوحة مطلوب');
    else if(!carsMap[plate]) errors.push(`لا توجد مركبة بلوحة "${plate}"`);
    if(!type) errors.push('نوع الصيانة مطلوب');
    else if(!MAINT_TYPES_VALID.includes(type)) errors.push(`نوع غير صالح: "${type}"`);
    if(!intKm && !intDy) errors.push('يجب تحديد كل كام كم أو كل كام يوم');
    if(intKm && isNaN(parseFloat(intKm))) errors.push('كل كام كم يجب أن يكون رقم');
    if(intDy && isNaN(parseInt(intDy)))   errors.push('كل كام يوم يجب أن يكون رقم');
    if(lastDt && !/^\d{4}-\d{2}-\d{2}$/.test(lastDt)) errors.push('تاريخ آخر صيانة يجب YYYY-MM-DD');

    return {
      row_num: idx + 2,
      plate, type,
      interval_km:      parseFloat(intKm) || null,
      interval_days:    parseInt(intDy)   || null,
      last_done_km:     parseFloat(lastKm)|| null,
      last_done_date:   lastDt || null,
      alert_km_before:  parseFloat(alKm)  || 500,
      alert_days_before:parseInt(alDy)    || 7,
      notes,
      car_id: carsMap[plate] || null,
      valid:  errors.length === 0,
      errors
    };
  }).filter(r => r.plate || r.type);
}

async function doMaintenancePreview(carsMap) {
  const fileInput = document.getElementById('maintCsvFile');
  if(!fileInput || !fileInput.files[0]) return showNotification('اختر ملف CSV أولاً','error');
  const file = fileInput.files[0];
  const btn = document.getElementById('maintPreviewBtn');
  btn.disabled=true; btn.textContent='⏳ جاري التحليل...';

  try {
    const text = await file.text();
    const rows = parseMaintenanceCSV(text);
    if(!rows.length) { showNotification('الملف فارغ أو لا توجد بيانات','error'); return; }
    const validated = validateMaintenanceRows(rows, carsMap);
    window._maintImportData = { validated, file };
    renderMaintenancePreviewTable(validated);
  } catch(e) {
    showNotification(e.message,'error');
  } finally {
    btn.disabled=false; btn.textContent='🔍 معاينة البيانات';
  }
}

  area.innerHTML = `

      <table>
        <thead><tr>
          <th>#</th><th>رقم اللوحة</th><th>نوع الصيانة</th>
          <th>كل كام كم</th><th>كل كام يوم</th>

              <td>${r.last_done_km!=null?r.last_done_km.toLocaleString('ar-EG')+' كم':'—'}</td>

async function doMaintenanceImportConfirm() {
  if(!window._maintImportData) return;
  const { validated } = window._maintImportData;
  const skipErrors = document.getElementById('maintSkipErrors')?.checked||false;
  const toInsert = skipErrors ? validated.filter(r=>r.valid) : validated;

  if(!skipErrors && toInsert.some(r=>!r.valid)) {
    showNotification('يوجد أخطاء — فعّل "تجاهل الأخطاء" للمتابعة','error');
    return;
  }
  const validOnly = toInsert.filter(r=>r.valid);
  if(!validOnly.length) { showNotification('لا توجد صفوف صحيحة للإضافة','error'); return; }

  const btn = document.getElementById('maintConfirmBtn');
  btn.disabled=true; btn.textContent='⏳ جاري الإضافة...';

  let inserted=0, skipped=0, errors=[];
  for(const r of validOnly) {
    try {
      await apiCall('/maintenance/schedule','POST',{
        car_id:           r.car_id,
        maintenance_type: r.type,
        interval_km:      r.interval_km,
        interval_days:    r.interval_days,
        last_done_km:     r.last_done_km,
        last_done_date:   r.last_done_date,
        alert_km_before:  r.alert_km_before,
        alert_days_before:r.alert_days_before,
        notes:            r.notes
      });
      inserted++;
    } catch(e) {
      skipped++;
      errors.push(`صف ${r.row_num} (${r.plate}): ${e.message}`);
    }
  }

  const area = document.getElementById('maintImportPreview');
  area.innerHTML = `
    <div class="card" style="border-top:3px solid ${inserted>0?'#10b981':'#ef4444'}">
      <div class="card-header" style="border-bottom:none">
        <div class="card-title" style="color:${inserted>0?'#10b981':'#ef4444'}">
          ${inserted>0?'✅ تم الاستيراد بنجاح':'❌ فشل الاستيراد'}
        </div>
      </div>
      <div style="padding:1.25rem;display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;text-align:center">
        <div style="padding:1rem;background:var(--surface-2);border-radius:12px">
          <div style="font-size:2rem;font-weight:800;color:#10b981">${inserted}</div>
          <div style="color:var(--muted);font-size:.85rem">تم إضافته</div>
        </div>
        <div style="padding:1rem;background:var(--surface-2);border-radius:12px">
          <div style="font-size:2rem;font-weight:800;color:#f97316">${skipped}</div>
          <div style="color:var(--muted);font-size:.85rem">تم تجاهله</div>
        </div>
        <div style="padding:1rem;background:var(--surface-2);border-radius:12px">
          <div style="font-size:2rem;font-weight:800;color:var(--primary)">${inserted+skipped}</div>
          <div style="color:var(--muted);font-size:.85rem">إجمالي الصفوف</div>
        </div>
      </div>
      ${errors.length?`<div style="padding:.75rem 1.25rem;background:#fef2f2;border-top:1px solid var(--border);font-size:.8rem;color:#b91c1c">
        <strong>أخطاء:</strong><br>${errors.slice(0,5).join('<br>')}${errors.length>5?`<br>... و${errors.length-5} أخطاء أخرى`:''}
      </div>`:''}
      <div style="padding:.75rem 1.25rem;display:flex;gap:.75rem">
        <button class="btn btn-primary btn-sm" onclick="closeModal();renderMaintenanceSection()">عرض جداول الصيانة</button>
      </div>
    </div>`;
  window._maintImportData = null;
}
