      <div class="card-header">
        <div class="card-title">📋 تفاصيل السائقين</div>
        <input type="text" id="kpiSearch" placeholder="ابحث باسم السائق..."
          oninput="filterKpiTable(this.value)"
          style="padding:.4rem .8rem;border:1.5px solid var(--border);border-radius:8px;font-size:.85rem;width:200px">
      </div>
      <div class="table-wrap">
        <table id="kpiTable">
          <thead>
            <tr>
              <th style="width:36px">#</th>
              <th>السائق</th>
              <th>الفرع</th>
              <th style="text-align:center">النقاط الكلية</th>
              <th style="text-align:center">الرحلات</th>
              <th style="text-align:center">الكيلومترات</th>
              <th style="text-align:center">وقود ل/100كم</th>
              <th style="text-align:center">زيوت ل/1000كم</th>
              <th style="text-align:center">طوارئ</th>
              <th style="text-align:center">التصنيف</th>
              <th style="text-align:center">تفاصيل</th>
            </tr>
          </thead>
          <tbody id="kpiTableBody">
            <tr><td colspan="11" style="text-align:center;padding:2rem;color:var(--muted)">اختر الفترة ثم اضغط «عرض»</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  `;

  // تحميل الفروع للـ dropdown
  try {
    const drvs = await apiCall('/drivers');
    const branches = [...new Set((drvs||[]).map(d=>d.branch).filter(Boolean))].sort();
    window._kpiBranches = branches;
    _kpiRenderBranchList();
    document.addEventListener('click', function _kpiBrOut(e){
      const wrap=document.getElementById('kpiBranchWrap');
      if(wrap&&!wrap.contains(e.target)){
        document.getElementById('kpiBranchDd')?.classList.remove('cs-open');
        document.getElementById('kpiBranchTrigger')?.classList.remove('cs-open');
      }
    });
  } catch(e){}

  // تعيين تواريخ افتراضية للشهر الحالي
  const now2=new Date(), y=now2.getFullYear(), m=String(now2.getMonth()+1).padStart(2,'0');
  const lastDay=new Date(y,now2.getMonth()+1,0).getDate();
  document.getElementById('kpiDateFrom').value=`${y}-${m}-01`;
  document.getElementById('kpiDateTo').value=`${y}-${m}-${String(lastDay).padStart(2,'0')}`;

  await loadKpiData();
}

function _kpiRenderBranchList() {
  const list=document.getElementById('kpiBranchList'); if(!list) return;
  const branches=window._kpiBranches||[];
  list.innerHTML='';
  const allDiv=document.createElement('div');
  allDiv.className='cs-option cs-selected';
  allDiv.textContent='كل الفروع';
  allDiv.addEventListener('click',()=>kpiSelectBranch('','كل الفروع'));
  list.appendChild(allDiv);
  branches.forEach(b=>{
    const d=document.createElement('div');
    d.className='cs-option';
    d.textContent=b;
    d.addEventListener('click',()=>kpiSelectBranch(b,b));
    list.appendChild(d);
  });
}

function toggleKpiBranchDd(){
  const dd=document.getElementById('kpiBranchDd'),tr=document.getElementById('kpiBranchTrigger');
  if(!dd||!tr) return;
  const open=dd.classList.contains('cs-open');
  dd.classList.toggle('cs-open',!open); tr.classList.toggle('cs-open',!open);
}

function kpiSelectBranch(val,label){
  document.getElementById('kpiBranchVal').value=val;
  const lbl=document.getElementById('kpiBranchLabel');
  if(lbl){lbl.textContent=label||'كل الفروع';lbl.classList.toggle('cs-placeholder',!val);}
  document.getElementById('kpiBranchDd')?.classList.remove('cs-open');
  document.getElementById('kpiBranchTrigger')?.classList.remove('cs-open');
}

let _kpiData = [];

async function loadKpiData() {
  const month  = document.getElementById('kpiMonth')?.value || '';
  const branch = document.getElementById('kpiBranchVal')?.value?.trim() || '';
  const dateFrom = document.getElementById('kpiDateFrom')?.value || '';
  const dateTo   = document.getElementById('kpiDateTo')?.value || '';
  const tbody  = document.getElementById('kpiTableBody');
  const summary = document.getElementById('kpiSummary');

  if (tbody) tbody.innerHTML = `<tr><td colspan="11" style="text-align:center;padding:2rem">⏳ جاري التحميل...</td></tr>`;

  try {
    let url = `/reports/driver-kpi?month=${month}`;
    if (branch) url += `&branch=${encodeURIComponent(branch)}`;
    if (dateFrom) url += `&date_from=${dateFrom}`;
    if (dateTo) url += `&date_to=${dateTo}`;

    const data = await apiCall(url);
    _kpiData = data.drivers || [];

    // ── ملخص KPI Cards ──
    const active    = _kpiData.length;
    const avgScore  = active ? Math.round(_kpiData.reduce((s,d)=>s+d.total_score,0)/active) : 0;
    const totalTrips= _kpiData.reduce((s,d)=>s+(d.trips||0),0);
    const totalEmg  = _kpiData.reduce((s,d)=>s+(d.emergencies||0),0);
    const excellent = _kpiData.filter(d=>d.grade==='ممتاز').length;

    if (summary) summary.innerHTML = [
      {label:'إجمالي السائقين', value:active,                             icon:'👥', iconBg:'#e0e7ff', color:'#4338ca'},
      {label:'إجمالي الرحلات',  value:totalTrips.toLocaleString('ar-EG'), icon:'🚗', iconBg:'#d1fae5', color:'#059669'},
      {label:'إجمالي الطوارئ',  value:totalEmg,                           icon:'🚨', iconBg:'#fee2e2', color:'#dc2626'},
      {label:'تصنيف ممتاز',      value:excellent+' سائق',                  icon:'🏆', iconBg:'#fef9c3', color:'#ca8a04'},
    ].map(s=>`
      <div class="kpi-stat-card">
        <div class="kpi-stat-icon" style="background:${s.iconBg}">${s.icon}</div>
        <div style="min-width:0">
          <div class="kpi-stat-val" style="color:${s.color}">${s.value}</div>
          <div class="kpi-stat-lbl">${s.label}</div>
        </div>
      </div>`).join('');

    renderKpiTable(_kpiData);
    _renderKpiCharts(_kpiData);

  } catch(e) {
    if (tbody) tbody.innerHTML = `<tr><td colspan="11" style="text-align:center;color:#ef4444;padding:2rem">❌ ${e.message}</td></tr>`;
  }
}

function _renderKpiCharts(rows) {
  if(!rows || !rows.length) return;

  // ── 1. أفضل 10 بار شارت ──
  const top10El = document.getElementById('kpiTop10Chart');
  if(top10El) {
    const top10 = rows.slice(0,10);
    const maxScore = top10[0]?.total_score||100;
    const COLORS = ['#1a9968','#22c55e','#4ade80','#6ee7b7','#34d399','#10b981','#059669','#047857','#065f46','#064e3b'];
    top10El.innerHTML = top10.map((d,i)=>{
      const pct = Math.round((d.total_score/maxScore)*100);
      const col = COLORS[i]||'#22c55e';
      const shortName = d.driver_name.split(' ').slice(0,2).join(' ');
      return `<div class="kpi-bar-row">
        <div class="kpi-bar-name" title="${d.driver_name}">${shortName}</div>
        <div class="kpi-bar-track">
          <div class="kpi-bar-fill" style="width:${pct}%;background:${col}">${d.total_score}</div>
        </div>
      </div>`;
    }).join('');
  }

  // ── 2. Donut توزيع التصنيف ──
  const donutEl = document.getElementById('kpiDonutChart');
  if(donutEl) {
    const grades = [
      {label:'ممتاز',       color:'#22c55e', min:85},
      {label:'جيد جداً',    color:'#3b82f6', min:70},
      {label:'جيد',         color:'#f59e0b', min:50},
      {label:'ضعيف',        color:'#ef4444', min:0},
    ];
    const counts = grades.map(g=>{
      if(g.label==='ممتاز') return {...g, count: rows.filter(d=>d.total_score>=85).length};
      if(g.label==='جيد جداً') return {...g, count: rows.filter(d=>d.total_score>=70&&d.total_score<85).length};
      if(g.label==='جيد') return {...g, count: rows.filter(d=>d.total_score>=50&&d.total_score<70).length};
      return {...g, count: rows.filter(d=>d.total_score<50).length};
    }).filter(g=>g.count>0);
    const total=rows.length;
    // SVG donut
    let svg=`<svg viewBox="0 0 120 120" width="130" height="130">`;
    let offset=0;
    const cx=60,cy=60,r=45,stroke=22;
    const circ=2*Math.PI*r;
    counts.forEach(g=>{
      const pct=g.count/total;
      const dash=pct*circ;
      const angle=offset*circ;
      svg+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${g.color}" stroke-width="${stroke}"
        stroke-dasharray="${dash} ${circ-dash}"
        stroke-dashoffset="${circ/4-angle}"
        style="transition:stroke-dasharray .5s"/>`;
      offset+=pct;
    });
    svg+=`<text x="${cx}" y="${cy-4}" text-anchor="middle" font-size="14" font-weight="900" fill="#1e293b">${total}</text>`;
    svg+=`<text x="${cx}" y="${cy+12}" text-anchor="middle" font-size="7" fill="#64748b">إجمالي السائقين</text>`;
    svg+=`</svg>`;
    const legend=counts.map(g=>`<div class="kpi-legend-item"><div class="kpi-legend-dot" style="background:${g.color}"></div><span>${g.label} — ${Math.round(g.count/total*100)}%</span></div>`).join('');
    donutEl.innerHTML=`<div class="kpi-donut-wrap">${svg}<div>${legend}</div></div>`;
  }

  // ── 3. مقارنة الفروع ──
  const branchEl = document.getElementById('kpiBranchChart');
  if(branchEl) {
    const branchMap={};
    rows.forEach(d=>{const b=d.branch||'غير محدد';if(!branchMap[b])branchMap[b]={sum:0,count:0};branchMap[b].sum+=d.total_score;branchMap[b].count++;});
    const branchData=Object.entries(branchMap).map(([b,v])=>({branch:b,avg:Math.round(v.sum/v.count)})).sort((a,b)=>b.avg-a.avg).slice(0,6);
    const maxAvg=branchData[0]?.avg||100;
    const branchColors=['#06b6d4','#22c55e','#8b5cf6','#f59e0b','#3b82f6','#10b981'];
    branchEl.innerHTML=branchData.map((b,i)=>`<div class="kpi-bar-row">
      <div class="kpi-bar-name" title="${b.branch}">${b.branch}</div>
      <div class="kpi-bar-track">
        <div class="kpi-bar-fill" style="width:${Math.round(b.avg/maxAvg*100)}%;background:${branchColors[i]||'#22c55e'}">${b.avg}%</div>
      </div>
    </div>`).join('');
  }

  // ── 4. Trend line — بيانات حقيقية من الـ API ──
  // نرسم placeholder فوراً، ثم نجيب البيانات الحقيقية async
  const trendCanvas=document.getElementById('kpiTrendCanvas');
  if(trendCanvas) {
    const ctx=trendCanvas.getContext('2d');
    const W=trendCanvas.width, H=trendCanvas.height;
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle='#94a3b8';ctx.font='12px Cairo,sans-serif';ctx.textAlign='center';
    ctx.fillText('⏳ جاري تحميل بيانات الاتجاه...', W/2, H/2);
  }
  // نشغّل الـ fetch بدون await
  _loadAndDrawTrend();
}

// ── دالة مستقلة لجلب ورسم بيانات الـ trend الحقيقية ──
async function _loadAndDrawTrend() {
  const trendCanvas = document.getElementById('kpiTrendCanvas');
  if (!trendCanvas) return;
  const ctx = trendCanvas.getContext('2d');
  const W = trendCanvas.width, H = trendCanvas.height;

  try {
    const branch = document.getElementById('kpiBranchVal')?.value?.trim() || '';
    const branchParam = branch ? `&branch=${encodeURIComponent(branch)}` : '';

    // آخر 6 شهور من الشهر الحالي للخلف
    const now = new Date();
    const monthsToFetch = [];
    for (let i = 5; i >= 0; i--) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      const ym = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      const label = d.toLocaleDateString('ar-EG', {month:'short', year:'2-digit'});
      monthsToFetch.push({ ym, label });
    }

    // fetch موازي لكل الشهور
    const results = await Promise.all(
      monthsToFetch.map(async m => {
        try {
          const data = await apiCall(`/reports/driver-kpi?month=${m.ym}${branchParam}`);
          const drivers = data.drivers || [];
          if (!drivers.length) return { ...m, avg: null };
          const avg = Math.round(drivers.reduce((s, d) => s + d.total_score, 0) / drivers.length);
          return { ...m, avg };
        } catch { return { ...m, avg: null }; }
      })
    );

    // فلتر الشهور اللي فيها بيانات فعلية
    const validPoints = results.filter(r => r.avg !== null);

    ctx.clearRect(0, 0, W, H);

    if (validPoints.length === 0) {
      ctx.fillStyle = '#94a3b8'; ctx.font = '11px Cairo,sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('لا توجد بيانات بعد', W/2, H/2);
      return;
    }

    if (validPoints.length === 1) {
      const x = W/2, y = H/2 - 10;
      ctx.beginPath(); ctx.arc(x, y, 6, 0, Math.PI*2);
      ctx.fillStyle='#22c55e'; ctx.fill();
      ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.stroke();
      ctx.fillStyle='#1e293b'; ctx.font='bold 10px Cairo,sans-serif'; ctx.textAlign='center';
      ctx.fillText(validPoints[0].avg+'%', x, y-12);
      ctx.fillStyle='#94a3b8'; ctx.font='9px Cairo,sans-serif';
      ctx.fillText(validPoints[0].label, x, H-5);
      return;
    }

    const vals = validPoints.map(p => p.avg);
    const PAD = {t:24,r:20,b:30,l:44};
    const minV = Math.min(...vals) - 5;
    const maxV = Math.max(...vals) + 5;
    const toX = i => PAD.l + (W-PAD.l-PAD.r)*i/(validPoints.length-1);
    const toY = v => H-PAD.b - (H-PAD.t-PAD.b)*(v-minV)/(maxV-minV);

    // grid + Y labels
    ctx.strokeStyle='#f1f5f9'; ctx.lineWidth=1;
    for (let i=0; i<=4; i++) {
      const y = PAD.t + (H-PAD.t-PAD.b)*i/4;
      ctx.beginPath(); ctx.moveTo(PAD.l,y); ctx.lineTo(W-PAD.r,y); ctx.stroke();
      const yVal = Math.round(maxV - (maxV-minV)*i/4);
      ctx.fillStyle='#cbd5e1'; ctx.font='8px Cairo,sans-serif'; ctx.textAlign='right';
      ctx.fillText(yVal+'%', PAD.l-4, y+3);
    }

    // gradient fill تحت الخط
    const grad = ctx.createLinearGradient(0, PAD.t, 0, H-PAD.b);
    grad.addColorStop(0, 'rgba(34,197,94,0.18)');
    grad.addColorStop(1, 'rgba(34,197,94,0)');
    ctx.beginPath();
    ctx.moveTo(toX(0), toY(vals[0]));
    vals.forEach((v,i) => { if(i>0) ctx.lineTo(toX(i),toY(v)); });
    ctx.lineTo(toX(vals.length-1), H-PAD.b);
    ctx.lineTo(toX(0), H-PAD.b);
    ctx.closePath();
    ctx.fillStyle = grad; ctx.fill();

    // الخط الرئيسي
    ctx.beginPath(); ctx.strokeStyle='#22c55e'; ctx.lineWidth=2.5;
    vals.forEach((v,i) => i===0 ? ctx.moveTo(toX(i),toY(v)) : ctx.lineTo(toX(i),toY(v)));
    ctx.stroke();

    // النقاط والتسميات
    validPoints.forEach((p,i) => {
      const x=toX(i), y=toY(p.avg);
      ctx.beginPath(); ctx.arc(x,y,5,0,Math.PI*2);
      ctx.fillStyle='#22c55e'; ctx.fill();
      ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.stroke();
      ctx.fillStyle='#1e293b'; ctx.font='bold 9px Cairo,sans-serif'; ctx.textAlign='center';
      ctx.fillText(p.avg+'%', x, y-9);
      ctx.fillStyle='#94a3b8'; ctx.font='8px Cairo,sans-serif';
      ctx.fillText(p.label, x, H-4);
    });

  } catch(e) {
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle='#ef4444'; ctx.font='10px Cairo,sans-serif'; ctx.textAlign='center';
    ctx.fillText('خطأ في تحميل البيانات', W/2, H/2);
  }
}

function renderKpiTable(rows) {
  const tbody = document.getElementById('kpiTableBody');
  if (!tbody) return;
  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="11" style="text-align:center;padding:2rem;color:var(--muted)">لا توجد بيانات</td></tr>`;
    return;
  }

  const avgKm = _kpiData.length ? (_kpiData.reduce((s,d)=>s+(d.avg_km_peers||0),0)/_kpiData.length) : 0;

    // ── KPI Pagination ──
  const _kpiPg    = getPage('kpi');
  const _kpiPaged = paginateData(rows, _kpiPg, 15);
  tbody.innerHTML = _kpiPaged.map(d => {
    const barColor = d.total_score>=85?'#10b981':d.total_score>=70?'#3b82f6':d.total_score>=50?'#f97316':'#ef4444';
    // SVG mini circle
    const _R=20,_S=4,_C=2*Math.PI*_R,_D=(d.total_score/100)*_C;
    const scoreBar = `
      <div style="display:flex;align-items:center;gap:.6rem">
        <svg viewBox="0 0 50 50" width="42" height="42" style="flex-shrink:0">
          <circle cx="25" cy="25" r="${_R}" fill="none" stroke="${barColor}22" stroke-width="${_S}"/>
          <circle cx="25" cy="25" r="${_R}" fill="none" stroke="${barColor}" stroke-width="${_S}"
            stroke-linecap="round"
            stroke-dasharray="${_D.toFixed(1)} ${(_C-_D).toFixed(1)}"
            stroke-dashoffset="${(_C/4).toFixed(1)}"/>
          <text x="25" y="29" text-anchor="middle" font-size="11" font-weight="900"
                fill="${barColor}" font-family="Cairo,sans-serif">${d.total_score}</text>
        </svg>
        <div>
          <div style="font-weight:900;color:${barColor};font-size:.9rem">${d.total_score}%</div>
          <div style="font-size:.68rem;color:var(--muted)">${d.grade}</div>
        </div>
      </div>`;

    const grade = `<span style="background:${d.grade_color}20;color:${d.grade_color};font-size:.75rem;padding:.2rem .7rem;border-radius:20px;font-weight:700">${d.grade}</span>`;
    const rankEmoji = d.rank===1?'🥇':d.rank===2?'🥈':d.rank===3?'🥉':`<span style="font-weight:700">#${d.rank}</span>`;

    // الرحلات (10%)
    const tripsCell = `<div style="text-align:center">
      <div style="font-weight:700">${d.trips}</div>
      <div style="font-size:.72rem;color:${d.trips_score>=85?'#10b981':d.trips_score>=50?'#f97316':'#ef4444'}">${d.trips_score??0}%</div>
    </div>`;

    // الكيلومترات (40%) - مع المقارنة بالمتوسط
    const kmRef = d.avg_km_peers || 0;
    const kmVsAvg = kmRef>0 ? (d.km>=kmRef*1.1?'↑':d.km<kmRef*0.9?'↓':'=') : '';
    const kmCell = `<div style="text-align:center">
      <div style="font-weight:700">${d.km.toLocaleString('ar-EG')} كم <span style="color:${kmVsAvg==='↑'?'#10b981':kmVsAvg==='↓'?'#ef4444':'#94a3b8'}">${kmVsAvg}</span></div>
      <div style="font-size:.72rem;color:${d.km_score>=85?'#10b981':d.km_score>=50?'#f97316':'#ef4444'}">${d.km_score??0}%</div>
    </div>`;

    // وقود (40%)
    const fuelCell = d.consumption!=null
      ? `<div style="text-align:center">
          <div style="font-weight:700;color:${d.consumption<=25?'#10b981':d.consumption<=30?'#3b82f6':d.consumption<=35?'#f97316':'#ef4444'}">${d.consumption}</div>
          <div style="font-size:.72rem;color:${(d.fuel_score??0)>=85?'#10b981':(d.fuel_score??0)>=55?'#f97316':'#ef4444'}">${d.fuel_score??'—'}%</div>
         </div>`
      : `<span style="color:var(--muted);font-size:.8rem">—</span>`;

    // زيوت (5%)
    const oilCell = d.oil_per_1000!=null
      ? `<div style="text-align:center">
          <div style="font-weight:700;color:${d.oil_per_1000<=0.5?'#10b981':d.oil_per_1000<=1?'#3b82f6':d.oil_per_1000<=2?'#f97316':'#ef4444'}">${d.oil_per_1000}</div>
          <div style="font-size:.72rem;color:${(d.oil_score??0)>=85?'#10b981':(d.oil_score??0)>=55?'#f97316':'#ef4444'}">${d.oil_score??'—'}%</div>
         </div>`
      : `<span style="color:var(--muted);font-size:.8rem">—</span>`;

    // طوارئ (5%)
    const emgCell = `<div style="text-align:center">
      <div style="font-weight:700;color:${d.emergencies===0?'#10b981':'#ef4444'}">${d.emergencies} 🚨</div>
      <div style="font-size:.72rem;color:${d.emg_score===100?'#10b981':d.emg_score>=60?'#f97316':'#ef4444'}">${d.emg_score}%</div>
    </div>`;

    return `<tr>
      <td style="text-align:center;font-size:1.1rem">${rankEmoji}</td>
      <td><strong>${d.driver_name}</strong></td>
      <td style="font-size:.8rem;color:var(--muted)">${d.branch||'—'}</td>
      <td>${scoreBar}</td>
      <td>${tripsCell}</td>
      <td>${kmCell}</td>
      <td>${fuelCell}</td>
      <td>${oilCell}</td>
      <td>${emgCell}</td>
      <td style="text-align:center">${grade}</td>
      <td style="text-align:center">
        <button class="btn btn-ghost btn-sm" onclick="showKpiDetail(${d.driver_id})" title="تفاصيل">📋</button>
      </td>
    </tr>`;
  }).join('');
}

function filterKpiTable(q) {
  const filtered = q.trim()
    ? _kpiData.filter(d => d.driver_name.includes(q.trim()))
    : _kpiData;
  renderKpiTable(filtered);
}

function showKpiDetail(driverId) {
  const d = _kpiData.find(x => x.driver_id === driverId);
  if (!d) return;

  const meter = (label, score, detail) => {
    // لو score=null — اعرض الصف بـ "بيانات غير كافية" بدل ما تخفيه
    if (score === null || score === undefined) {
      return `
      <div style="margin-bottom:1rem">
        <div style="display:flex;justify-content:space-between;margin-bottom:.3rem">
          <span style="font-weight:700;font-size:.88rem">${label}</span>
          <span style="color:#94a3b8;font-size:.82rem">بيانات غير كافية</span>
        </div>
        <div style="background:var(--border);border-radius:6px;height:10px;overflow:hidden">
          <div style="width:0%;height:100%;background:#e2e8f0;border-radius:6px"></div>
        </div>
        ${detail ? `<div style="font-size:.78rem;color:var(--muted);margin-top:.2rem">${detail}</div>` : ''}
      </div>`;
    }
    const color = score>=85?'#10b981':score>=70?'#3b82f6':score>=50?'#f97316':'#ef4444';
    return `
      <div style="margin-bottom:1rem">
        <div style="display:flex;justify-content:space-between;margin-bottom:.3rem">
          <span style="font-weight:700;font-size:.88rem">${label}</span>
          <span style="color:${color};font-weight:800">${score}%</span>
        </div>
        <div style="background:var(--border);border-radius:6px;height:10px;overflow:hidden">
          <div style="width:${score}%;height:100%;background:${color};border-radius:6px;transition:width .5s"></div>
        </div>
        ${detail ? `<div style="font-size:.78rem;color:var(--muted);margin-top:.2rem">${detail}</div>` : ''}
      </div>`;
  };

  // عرض الوقود الحقيقي (كل التفويلات) والمعدل المحسوب (بدون آخر تفويلة)
  const fuelDisplay = d.fuel_liters > 0
    ? d.fuel_liters + ' لتر' + (d.consumption ? ' | معدل: ' + d.consumption + ' ل/100كم' : ' (تفويلة واحدة — مش كافي لحساب المعدل)')
    : null;
  const fuelLabel  = '⛽ استهلاك الوقود — 40%' + (d.consumption ? ' (' + d.consumption + ' ل/100كم)' : '');

  openModal(`
    <div class="modal-header">
      <div class="modal-title">🏆 تفاصيل KPI — ${d.driver_name}</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div style="padding:.5rem 0">

      <!-- النقاط الكلية — SVG Circle Score -->
      <div style="display:flex;align-items:center;gap:1.5rem;padding:1.2rem 1.5rem;background:var(--surface-2);border-radius:16px;margin-bottom:1.5rem">
        ${ (() => {
          const R = 52, STROKE = 10;
          const circ = 2 * Math.PI * R;
          const dash  = (d.total_score / 100) * circ;
          const color = d.grade_color;
          return `<svg viewBox="0 0 130 130" width="120" height="120" style="flex-shrink:0">
            <!-- الحلقة الخلفية -->
            <circle cx="65" cy="65" r="${R}" fill="none" stroke="${color}22" stroke-width="${STROKE}"/>
            <!-- الحلقة المتقدمة -->
            <circle cx="65" cy="65" r="${R}" fill="none" stroke="${color}" stroke-width="${STROKE}"
              stroke-linecap="round"
              stroke-dasharray="${dash.toFixed(1)} ${(circ - dash).toFixed(1)}"
              stroke-dashoffset="${(circ / 4).toFixed(1)}"
              style="transition:stroke-dasharray .6s ease"/>
            <!-- النص -->
            <text x="65" y="60" text-anchor="middle" font-size="22" font-weight="900"
                  fill="${color}" font-family="Cairo,sans-serif">${d.total_score}</text>
            <text x="65" y="76" text-anchor="middle" font-size="10" fill="${color}"
                  font-family="Cairo,sans-serif">نقطة</text>
          </svg>`;
        })() }
        <div style="flex:1">
          <div style="font-size:1.4rem;font-weight:900;color:${d.grade_color}">${d.grade}</div>
          <div style="font-size:.85rem;color:var(--muted);margin-top:.3rem">${d.month}</div>
          <div style="font-size:.85rem;color:var(--muted);margin-top:.2rem">
            الترتيب: ${d.rank===1?'🥇':d.rank===2?'🥈':d.rank===3?'🥉':'<strong>#'+d.rank+'</strong>'}
          </div>
          <!-- sub-scores سريع -->
          <div style="display:flex;gap:.4rem;flex-wrap:wrap;margin-top:.6rem">
            ${ [
              {lbl:'رحلات',  v:d.trips_score,          w:'10%'},
              {lbl:'كم',     v:d.km_score,              w:'40%'},
              {lbl:'وقود',   v:d.fuel_score,            w:'40%'},
              {lbl:'زيوت',   v:d.oil_score,             w:'5%'},
              {lbl:'طوارئ',  v:d.emg_score,             w:'5%'},
            ].map(s => {
              const c = s.v==null?'#94a3b8':s.v>=85?'#10b981':s.v>=70?'#3b82f6':s.v>=50?'#f97316':'#ef4444';
              const val = s.v!=null ? s.v+'%' : '—';
              return `<div style="background:${c}18;border:1px solid ${c}44;border-radius:8px;padding:.2rem .5rem;font-size:.7rem;text-align:center">
                <div style="color:var(--muted);font-size:.6rem">${s.lbl} <span style="opacity:.7">(${s.w})</span></div>
                <div style="font-weight:800;color:${c}">${val}</div>
              </div>`;
            }).join('') }
          </div>
        </div>
      </div>

      <!-- المؤشرات بالأوزان الجديدة -->
      <div style="margin-bottom:1.5rem">
        ${meter('🗺️ عدد الرحلات — 10% ('+d.trips+' رحلة)', d.trips_score??null, 'كلما زادت الرحلات زادت النقاط')}
        ${meter('📍 الكيلومترات — 40% ('+d.km.toLocaleString('ar-EG')+' كم)', d.km_score, 'المتوسط: '+(d.avg_km_peers||0).toLocaleString('ar-EG')+' كم')}
        ${meter(fuelLabel, d.fuel_score??null, fuelDisplay)}
        ${meter('🛢️ استهلاك الزيوت — 5%'+(d.oil_per_1000?' ('+d.oil_per_1000+' ل/1000كم)':''), d.oil_score??null, d.oil_liters>0?d.oil_liters+' لتر زيت':null)}
        ${meter('🚨 الحوادث والطوارئ — 5% ('+d.emergencies+' حادثة)', d.emg_score, 'كلما قل عدد الحوادث زادت النقاط')}
      </div>

      <!-- إحصائيات إضافية -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem">
        ${[
          ['🗺️ الرحلات', d.trips+' رحلة'],
          ['⛽ الوقود', d.fuel_liters > 0 ? d.fuel_liters + ' لتر' : '—'],
          ['🔧 الورشة', d.maint_count+' سجل'],
          ['💰 تكلفة الورشة', d.maint_cost>0?d.maint_cost.toLocaleString('ar-EG')+' ج':'—'],
        ].map(([lbl,val])=>`
          <div style="background:var(--surface-2);border-radius:10px;padding:.75rem;text-align:center">
            <div style="font-size:.72rem;color:var(--muted)">${lbl}</div>
            <div style="font-weight:700;margin-top:.2rem">${val}</div>
          </div>`).join('')}
      </div>
    </div>
  `);
}

function exportKpiCSV() {
  if (!_kpiData.length) return showNotification('لا توجد بيانات للتصدير', 'error');
  const headers = ['الترتيب','السائق','الفرع','النقاط الكلية','التصنيف',
    'الرحلات','نقاط الرحلات(10%)','الكيلومترات','متوسط الكم','نقاط الكم(40%)',
    'وقود(ل)','استهلاك ل/100كم','نقاط الوقود(40%)',
    'زيوت(ل)','استهلاك ل/1000كم','نقاط الزيوت(5%)',
    'طوارئ','نقاط الطوارئ(5%)'];
  const rows = _kpiData.map(d=>[
    d.rank, d.driver_name, d.branch, d.total_score+'%', d.grade,
    d.trips, (d.trips_score??0)+'%',
    d.km, d.avg_km_peers||0, (d.km_score??0)+'%',
    d.fuel_liters, d.consumption??'', d.fuel_score!=null?d.fuel_score+'%':'—',
    d.oil_liters||0, d.oil_per_1000??'', d.oil_score!=null?d.oil_score+'%':'—',
    d.emergencies, d.emg_score+'%'
  ]);
  const csv = '\uFEFF' + [headers,...rows].map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\r\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  a.download = `kpi_${document.getElementById('kpiMonth')?.value||'report'}.csv`;
  a.click();
  URL.revokeObjectURL(a.href);
  showNotification('✅ تم تصدير التقرير', 'success');
}

              <thead><tr><th>#</th><th>الكود</th><th>اسم المعدة</th><th>النوع</th><th>الفرع</th><th>الحالة</th><th>تكرار</th></tr></thead>

async function loadEquipmentData() {
  try {
    const data = await apiCall('/equipment');
    _eqData = data.equipment || [];
    const s = data.summary || {};

    const summaryEl = document.getElementById('eqSummary');
    if(summaryEl) summaryEl.innerHTML = [
      {label:'إجمالي المعدات', value: s.total||0, icon:'⚙️', color:'var(--primary)'},
      {label:'عاملة',          value: s.active||0, icon:'✅', color:'#10b981'},
      {label:'عاطلة',          value: s.inactive||0, icon:'🔴', color:'#ef4444'},
      {label:'صيانة',          value: s.maintenance||0, icon:'🔧', color:'#f97316'},
      {label:'تحريك تربة',     value: (s.by_type||{})['معدات تحريك تربة']||0, icon:'', color:'#3b82f6'},
      {label:'رفع',            value: (s.by_type||{})['معدات رفع']||0, icon:'🏗️', color:'#8b5cf6'},
    ].map(s=>`
      <div class="card" style="text-align:center;padding:.85rem">
        <div style="font-size:1.4rem">${s.icon}</div>
        <div style="font-size:.7rem;color:var(--muted);margin:.25rem 0">${s.label}</div>
        <div style="font-weight:800;color:${s.color}">${s.value}</div>
      </div>`).join('');

    filterEquipment();
  } catch(e) {
    const tb = document.getElementById('eqTableBody');
    if(tb) tb.innerHTML = `<tr><td colspan="9" style="color:#ef4444;text-align:center;padding:1.5rem">❌ ${e.message}</td></tr>`;
  }
}

function filterEquipment() {
  const q  = (document.getElementById('eqSearch')?.value||'').trim().toLowerCase();
  const t  = document.getElementById('eqTypeFilter')?.value||'';
  const s  = document.getElementById('eqStatusFilter')?.value||'';
  const br = (document.getElementById('eqBranchFilter')?.value||'').trim().toLowerCase();
  const pr = (document.getElementById('eqProjectFilter')?.value||'').trim().toLowerCase();
  const filtered = _eqData.filter(e =>
    (!q  || e.equipment_name.toLowerCase().includes(q) || (e.car_code||'').toLowerCase().includes(q) || (e.brand||'').toLowerCase().includes(q)) &&
    (!t  || e.equipment_type === t) &&
    (!s  || e.status === s) &&
    (!br || (e.branch||'').toLowerCase().includes(br)) &&
    (!pr || (e.project||'').toLowerCase().includes(pr))
  );
  setPage('equipment', 1);
  renderEquipmentTable(filtered);
}

function renderEquipmentTable(rows) {
  const tbody = document.getElementById('eqTableBody');
  if(!tbody) return;
  const pgEl = document.getElementById('eqPagination');
  if(pgEl) pgEl.innerHTML = '';
  if(!rows.length) {
    tbody.innerHTML = `<tr><td colspan="10" style="text-align:center;padding:2rem;color:var(--muted)">لا توجد معدات</td></tr>`;
    return;
  }
  const statusMap = {active:{label:'عاملة',color:'#10b981'}, inactive:{label:'عاطلة',color:'#ef4444'}, maintenance:{label:'صيانة',color:'#f97316'}};
  const ownMap = {'مملوكة':{bg:'#dcfce7',color:'#15803d',icon:'🏗️'},'مؤجرة':{bg:'#fef3c7',color:'#d97706',icon:'🔑'}};
  tbody.innerHTML = rows.map((e,i) => {
    const st = statusMap[e.status] || {label:e.status, color:'#94a3b8'};
    const typeColor = e.equipment_type==='معدات تحريك تربة'?'#3b82f6':e.equipment_type==='معدات رفع'?'#8b5cf6':e.equipment_type==='معدات ثابتة'?'#f59e0b':'#6b7280';
    const own = e.ownership_type || 'مملوكة';
    const ownStyle = ownMap[own] || {bg:'#f1f5f9',color:'#64748b',icon:'⚙️'};
    return `<tr>
      <td style="text-align:center;color:var(--muted)">${i+1}</td>
      <td><code style="background:var(--surface-2);padding:.15rem .4rem;border-radius:4px;font-size:.82rem">${e.car_code}</code></td>
      <td><strong>${e.equipment_name}</strong>${e.chassis?`<br><small style="color:var(--muted)">شاسيه: ${e.chassis}</small>`:''}</td>
      <td style="font-size:.85rem">${[e.brand,e.model].filter(Boolean).join(' / ')||'—'}</td>
      <td><span style="background:${typeColor}20;color:${typeColor};font-size:.72rem;padding:.2rem .55rem;border-radius:20px;font-weight:700;white-space:nowrap">${e.equipment_type}</span></td>
      <td style="text-align:center"><span style="background:${ownStyle.bg};color:${ownStyle.color};font-size:.72rem;padding:.2rem .55rem;border-radius:20px;font-weight:700;white-space:nowrap">${ownStyle.icon} ${own}</span></td>
      <td style="font-size:.85rem">${e.branch||'—'}</td>
      <td style="text-align:center;color:var(--muted)">${e.year||'—'}</td>
      <td style="text-align:center"><span style="background:${st.color}20;color:${st.color};font-size:.75rem;padding:.2rem .6rem;border-radius:20px;font-weight:700">${st.label}</span></td>
      <td style="text-align:center">
        <button class="btn btn-ghost btn-sm" onclick="showEquipmentForm(${e.id})" title="تعديل">✏️</button>
        <button class="btn btn-ghost btn-sm" onclick="deleteEquipment(${e.id},'${e.equipment_name}')" title="حذف" style="color:#ef4444">🗑️</button>
      </td>
    </tr>`;
  }).join('');
}

function showEquipmentForm(id=null) {
  _eqEditId = id;
  if(!id) {
    // إضافة جديدة → بوب اب الاختيار أولاً
    document.getElementById('eqFormModal').style.display = 'none';
    document.getElementById('eqOwnershipPickModal').style.display = 'flex';
    return;
  }
  // تعديل موجود → افتح الفورم مباشرة
  const e = _eqData.find(x => x.id === id);
  if(e) _openEqFormWithOwnership(e.ownership_type || 'مملوكة', e);
}

function _openEqFormWithOwnership(ownershipType, existingData=null, preserveFields=false) {
  // أغلق بوب اب الاختيار
  document.getElementById('eqOwnershipPickModal').style.display = 'none';

  const isRented  = ownershipType === 'مؤجرة';
  const badge     = document.getElementById('eqFormOwnerBadge');
  const title     = document.getElementById('eqFormTitle');
  const hiddenOwn = document.getElementById('eqOwnership');
  const toggleBtn = document.getElementById('eqToggleOwnershipBtn');

  // تحديث الـ badge والعنوان
  badge.textContent = isRented ? '🔑 مؤجرة' : '🏗️ مملوكة';
  badge.style.background = isRented ? '#fef3c7' : '#dcfce7';
  badge.style.color = isRented ? '#d97706' : '#15803d';
  title.textContent = _eqEditId
    ? (isRented ? '✏️ تعديل معدة مؤجرة' : '✏️ تعديل معدة مملوكة')
    : (isRented ? '➕ إضافة معدة مؤجرة' : '➕ إضافة معدة مملوكة');
  hiddenOwn.value = ownershipType;

  // زرار تحويل الملكية يظهر فقط في حالة التعديل (مش الإضافة الجديدة)
  if(toggleBtn) {
    toggleBtn.style.display = _eqEditId ? '' : 'none';
    toggleBtn.textContent = isRented ? '🔄 تحويل إلى مملوكة' : '🔄 تحويل إلى مؤجرة';
  }

  // إظهار/إخفاء الحقول حسب النوع
  document.querySelectorAll('.owned-only').forEach(el => el.style.display = isRented ? 'none' : '');
  document.querySelectorAll('.rented-only').forEach(el => el.style.display = isRented ? '' : 'none');

  // عند التحويل اليدوي وقت التعديل: سيب القيم المُدخلة فعلاً زي ما هي، غير الملكية فقط
  if(preserveFields) return;

  // مسح الحقول (وضع الإضافة الجديدة، أو فتح فورم التعديل لأول مرة)
  ['eqCode','eqName','eqBrand','eqModel','eqYear','eqChassis',
   'eqBranch','eqSector','eqProject','eqLicense','eqNotes',
   'eqRentalSource','eqMonthlyRate','eqRentalStart','eqRentalEnd']
    .forEach(id => { const el = document.getElementById(id); if(el) el.value = ''; });
  document.getElementById('eqType').value = 'معدات تحريك تربة';
  document.getElementById('eqStatus').value = 'active';

  // تعبئة البيانات الموجودة (تعديل)
  if(existingData) {
    const e = existingData;
    const s = (id, v) => { const el = document.getElementById(id); if(el) el.value = v||''; };
    s('eqCode',         e.car_code);
    s('eqName',         e.equipment_name);
    s('eqBrand',        e.brand);
    s('eqModel',        e.model);
    s('eqYear',         e.year);
    s('eqChassis',      e.chassis);
    s('eqBranch',       e.branch);
    s('eqSector',       e.sector);
    s('eqProject',      e.project);
    s('eqLicense',      e.license_expiry);
    s('eqNotes',        e.notes);
    s('eqRentalSource', e.rental_source);
    s('eqMonthlyRate',  e.monthly_rate);
    s('eqRentalStart',  e.rental_start);
    s('eqRentalEnd',    e.rental_end);
    document.getElementById('eqType').value   = e.equipment_type || 'معدات تحريك تربة';
    document.getElementById('eqStatus').value = e.status || 'active';
  }

  document.getElementById('eqFormModal').style.display = 'flex';
}

function toggleEqOwnership() {
  // تبديل نوع الملكية أثناء التعديل بدون مسح البيانات اللي المستخدم كاتبها
  const current = document.getElementById('eqOwnership').value || 'مملوكة';
  const next = current === 'مؤجرة' ? 'مملوكة' : 'مؤجرة';
  _openEqFormWithOwnership(next, null, true);
}

async function closeEquipmentForm() {
  document.getElementById('eqFormModal').style.display = 'none';
  document.getElementById('eqOwnershipPickModal').style.display = 'none';
  _eqEditId = null;
}

async function saveEquipment() {
  const ownershipType = document.getElementById('eqOwnership').value || 'مملوكة';
  const isRented = ownershipType === 'مؤجرة';
  const body = {
    car_code:       document.getElementById('eqCode').value.trim(),
    equipment_name: document.getElementById('eqName').value.trim(),
    brand:          !isRented ? (document.getElementById('eqBrand').value.trim()) : '',
    model:          !isRented ? (document.getElementById('eqModel').value.trim()) : '',
    year:           !isRented ? (document.getElementById('eqYear').value.trim()) : '',
    chassis:        !isRented ? (document.getElementById('eqChassis').value.trim()) : '',
    equipment_type: document.getElementById('eqType').value,
    ownership_type: ownershipType,
    status:         document.getElementById('eqStatus').value,
    branch:         document.getElementById('eqBranch').value.trim(),
    sector:         document.getElementById('eqSector').value.trim(),
    project:        document.getElementById('eqProject').value.trim(),
    license_expiry: document.getElementById('eqLicense').value,
    notes:          document.getElementById('eqNotes').value.trim(),
    rental_source:  isRented ? (document.getElementById('eqRentalSource')?.value.trim()||'') : '',
    monthly_rate:   isRented ? (parseFloat(document.getElementById('eqMonthlyRate')?.value)||0) : 0,
    rental_start:   isRented ? (document.getElementById('eqRentalStart')?.value||'') : '',
    rental_end:     isRented ? (document.getElementById('eqRentalEnd')?.value||'') : '',
  };
  if(!body.car_code) return showNotification('الكود مطلوب','error');
  if(!body.equipment_name) return showNotification('اسم المعدة مطلوب','error');
  if(isRented && !body.rental_source) return showNotification('جهة الإيجار مطلوبة للمعدة المؤجرة','error');
  const btn = document.getElementById('eqSaveBtn');
  btn.disabled = true; btn.textContent = '⏳ جاري...';
  try {
    if(_eqEditId) {
      await apiCall(`/equipment/${_eqEditId}`, 'PUT', body);
      showNotification('✅ تم التعديل بنجاح','success');
    } else {
      await apiCall('/equipment', 'POST', body);
      showNotification('✅ تم إضافة المعدة بنجاح','success');
    }
    closeEquipmentForm();
    await loadEquipmentData();
  } catch(e) {
    showNotification(e.message||'خطأ في الحفظ','error');
  } finally {
    btn.disabled = false; btn.textContent = '💾 حفظ';
  }
}

async function deleteEquipment(id, name) {
  if(!confirm(`حذف "${name}"؟`)) return;
  try {
    await apiCall(`/equipment/${id}`, 'DELETE');
    showNotification('✅ تم الحذف','success');
    await loadEquipmentData();
  } catch(e) {
    showNotification(e.message,'error');
  }
}

function showEquipmentImport() {
  document.getElementById('eqImportModal').style.display = 'flex';
  document.getElementById('eqImportPreview').style.display = 'none';
  document.getElementById('eqImportFile').value = '';
}
function closeEquipmentImport() {
  document.getElementById('eqImportModal').style.display = 'none';
}

async function previewEquipmentImport() {
  const file = document.getElementById('eqImportFile').files[0];
  if(!file) return showNotification('اختر ملفاً أولاً','error');
  const fd = new FormData();
  fd.append('file', file);
  try {
    const data = await fetch('/equipment/import/preview', {
      method:'POST', headers:{'Authorization':'Bearer '+localStorage.getItem('access_token')}, body:fd
    }).then(r=>r.json());
    if(data.detail) throw new Error(typeof data.detail==='string'?data.detail:JSON.stringify(data.detail));

    const s = data.summary||{};
    document.getElementById('eqImportSummary').innerHTML = `
      <div style="display:flex;gap:.75rem;flex-wrap:wrap">
        ${[['الإجمالي',s.total,'#3b82f6'],['صالح',s.valid,'#10b981'],['أخطاء',s.invalid,'#ef4444'],['تكرار',s.duplicates,'#f97316']]
          .map(([l,v,c])=>`<span style="background:${c}15;color:${c};padding:.25rem .75rem;border-radius:20px;font-weight:700;font-size:.83rem">${l}: ${v}</span>`).join('')}
      </div>`;

    const statusMap = {active:'عاملة',inactive:'عاطلة',maintenance:'صيانة'};
    document.getElementById('eqImportRows').innerHTML = (data.rows||[]).map(r=>`
      <tr style="background:${!r.valid?'#fef2f2':r.duplicate?'#fffbeb':''}">
        <td>${r.row_index}</td>
        <td>${r.car_code||'—'}</td>
        <td>${r.equipment_name||'—'}</td>
        <td style="font-size:.78rem">${r.equipment_type||''}</td>
        <td style="font-size:.78rem">${r.branch||''}</td>
        <td style="color:${r.valid?'#10b981':'#ef4444'};font-size:.78rem">${r.valid?'✅':r.errors?.join(', ')}</td>
        <td style="text-align:center">${r.duplicate?'⚠️ موجود':''}</td>
      </tr>`).join('');

    document.getElementById('eqImportPreview').style.display = 'block';
    document.getElementById('eqImportConfirmBtn').disabled = s.valid === 0;
  } catch(e) {
    showNotification(e.message,'error');
  }
}

async function confirmEquipmentImport() {
  const file = document.getElementById('eqImportFile').files[0];
  if(!file) return;
  const updateExisting = document.getElementById('eqUpdateExisting').checked;
  const skipErrors     = document.getElementById('eqSkipErrors').checked;
  const fd = new FormData();
  fd.append('file', file);
  try {
    const res = await fetch(`/equipment/import/confirm?skip_errors=${skipErrors}&update_existing=${updateExisting}`, {
      method:'POST', headers:{'Authorization':'Bearer '+localStorage.getItem('access_token')}, body:fd
    }).then(r=>r.json());
    if(res.detail) throw new Error(typeof res.detail==='string'?res.detail:JSON.stringify(res.detail));
    showNotification(`✅ تم استيراد ${res.inserted||0} معدة، تحديث ${res.updated||0}، تخطي ${res.skipped||0}`,'success');
    closeEquipmentImport();
    await loadEquipmentData();
  } catch(e) {
    showNotification(e.message,'error');
  }
}

function exportEquipmentCSV() {
  if(!_eqData.length) return showNotification('لا توجد بيانات','error');
  const headers = ['الكود','اسم المعدة','الماركة','الموديل','السنة','الشاسيه','النوع','الفرع','القطاع','المشروع','الحالة','ملاحظات'];
  const rows = _eqData.map(e=>[
    e.car_code, e.equipment_name, e.brand, e.model, e.year, e.chassis,
    e.equipment_type, e.branch, e.sector, e.project, e.status, e.notes
  ]);
  const csv = '\uFEFF' + [headers,...rows].map(r=>r.map(v=>'"'+String(v||'').replace(/"/g,'\"')+'"').join(',')).join('\r\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  a.download = 'equipment_export.csv';
  a.click();
  URL.revokeObjectURL(a.href);
}

async function loadRentalData() {
  const monthSel = document.getElementById('rentalMonth');
  const selectedMonth = monthSel?.value || '';
  const branch = document.getElementById('rentalBranch')?.value?.trim() || '';
  const source = document.getElementById('rentalSource')?.value?.trim() || '';
  const tbody   = document.getElementById('rentalTableBody');
  const summary = document.getElementById('rentalSummary');

  if(tbody) tbody.innerHTML = `<tr><td colspan="14" style="text-align:center;padding:2rem">⏳ جاري التحميل...</td></tr>`;
  try {
    // جيب كل البيانات بدون فلتر شهر من السيرفر
    let url = `/rental-equipment`;
    const params = [];
    if(branch) params.push(`branch=${encodeURIComponent(branch)}`);
    if(source) params.push(`source=${encodeURIComponent(source)}`);
    if(params.length) url += '?' + params.join('&');
    const data = await apiCall(url);
    const all = data.records || [];

    // بناء قائمة الشهور المتاحة فعلياً في الداتا
    const monthsSet = new Set(all.map(r => (r.month||'').trim()).filter(Boolean));
    const sortedMonths = [...monthsSet].sort().reverse();
    if(monthSel) {
      const prevVal = monthSel.value;
      monthSel.innerHTML = '<option value="">كل الشهور</option>' +
        sortedMonths.map(m => `<option value="${m}" ${m===prevVal?'selected':''}>${m}</option>`).join('');
      // لو ما كانش في شهر محدد وفيه شهور، اختار الأحدث تلقائياً
      if(!prevVal && sortedMonths.length) monthSel.value = sortedMonths[0];
    }

    // فلترة محلية بالشهر المختار
    const currentMonth = monthSel?.value || '';
    _rentalData = currentMonth
      ? all.filter(r => (r.month||'').trim() === currentMonth)
      : all;

    const fmt = v => parseFloat(v||0).toLocaleString('ar-EG');
    const totalCost = _rentalData.reduce((s,r)=>s+parseFloat(r.monthly_rate||0),0);
    const totalFuel = _rentalData.reduce((s,r)=>s+parseFloat(r.fuel_liters||0),0);
    const totalDays = _rentalData.reduce((s,r)=>s+parseFloat(r.work_days||0),0);
    if(summary) summary.innerHTML = [
      {label:'إجمالي المعدات',    value: _rentalData.length,     icon:'🔑', color:'var(--primary)'},
      {label:'إجمالي القيمة',     value: fmt(totalCost)+' ج',    icon:'💰', color:'#ef4444'},
      {label:'إجمالي السولار',    value: fmt(totalFuel)+' ل',    icon:'⛽', color:'#f97316'},
      {label:'إجمالي أيام العمل', value: fmt(totalDays),          icon:'📅', color:'#3b82f6'},
    ].map(s=>`
      <div class="card" style="text-align:center;padding:1rem">
        <div style="font-size:1.4rem">${s.icon}</div>
        <div style="font-size:.7rem;color:var(--muted);margin:.25rem 0">${s.label}</div>
        <div style="font-weight:800;color:${s.color}">${s.value}</div>
      </div>`).join('');

    if(!_rentalData.length && all.length) {
      if(tbody) tbody.innerHTML = `<tr><td colspan="14" style="text-align:center;color:#f97316;padding:2rem">⚠️ لا توجد بيانات للشهر المحدد — جرّب شهراً آخر</td></tr>`;
    } else {
      renderRentalTable(_rentalData);
    }
  } catch(e) {
    if(tbody) tbody.innerHTML = `<tr><td colspan="14" style="text-align:center;color:#ef4444;padding:2rem">❌ ${e.message}</td></tr>`;
  }
}

// تطبيع الشهر من أشكال مختلفة إلى YYYY-MM
function _normalizeMonth(m) {
  if(!m) return '';
  m = m.trim();
  // Already YYYY-MM
  if(/^\d{4}-\d{2}$/.test(m)) return m;
  // MM/YYYY or MM-YYYY
  const mmyyyy = m.match(/^(\d{1,2})[\/\-](\d{4})$/);
  if(mmyyyy) return `${mmyyyy[2]}-${mmyyyy[1].padStart(2,'0')}`;
  // YYYY/MM
  const yyyymm = m.match(/^(\d{4})[\/\-](\d{1,2})$/);
  if(yyyymm) return `${yyyymm[1]}-${yyyymm[2].padStart(2,'0')}`;
  // Arabic month names → number
  const arMonths = {'يناير':'01','فبراير':'02','مارس':'03','أبريل':'04','مايو':'05','يونيو':'06','يوليو':'07','أغسطس':'08','سبتمبر':'09','أكتوبر':'10','نوفمبر':'11','ديسمبر':'12'};
  for(const [name, num] of Object.entries(arMonths)) {
    const ar = m.match(new RegExp(name + '[\\s/\\-]*(\\d{4})'));
    if(ar) return `${ar[1]}-${num}`;
    const ar2 = m.match(new RegExp('(\\d{4})[\\s/\\-]*' + name));
    if(ar2) return `${ar2[1]}-${num}`;
  }
  return m.slice(0,7);
}

function renderRentalTable(rows) {
  const tbody = document.getElementById('rentalTableBody');
  if(!tbody) return;
  if(!rows.length) {
    tbody.innerHTML = `<tr><td colspan="14" style="text-align:center;padding:2rem;color:var(--muted)">لا توجد بيانات — استورد ملف CSV أو أضف سجل</td></tr>`;
return;
  }
  tbody.innerHTML = rows.map((r,i) => {
    const util = parseFloat(r.utilization_pct||0);
    const utilColor = util>=70?'#10b981':util>=40?'#f97316':'#ef4444';
    const utilCell  = r.utilization_pct ? `<span style="color:${utilColor};font-weight:700">${r.utilization_pct}%</span>` : '—';
    const monthly   = parseFloat(r.monthly_rate||0);
    const monthlyFmt = monthly>0 ? monthly.toLocaleString('ar-EG')+' ج' : '—';
    const isIdle = (r.hours_diff||'').toString().toLowerCase().includes('عاطل');
    return `<tr${isIdle?' style="background:#fef2f2"':''}>
      <td style="text-align:center;color:var(--muted)">${i+1}</td>
      <td style="font-size:.83rem;font-weight:600">${r.branch||'—'}</td>
      <td><strong>${r.equipment_name}</strong></td>
      <td style="font-size:.78rem;color:var(--muted)">${r.code||'—'}</td>
      <td style="font-size:.82rem">${r.rental_source||'—'}</td>
      <td style="text-align:center;font-weight:700">${r.work_days||'—'}</td>
      <td style="text-align:center;font-weight:700;color:#ef4444">${monthlyFmt}</td>
      <td style="text-align:center">${r.fuel_liters||'—'}</td>
      <td style="text-align:center;font-size:.8rem;color:var(--muted)">${r.hours_start||'—'}</td>
      <td style="text-align:center;font-size:.8rem;color:var(--muted)">${r.hours_end||'—'}</td>
      <td style="text-align:center;font-weight:700${isIdle?';color:#ef4444':''}">${r.hours_diff||'—'}</td>
      <td style="text-align:center">${utilCell}</td>
      <td style="font-size:.78rem;color:var(--muted)">${r.project||'—'}</td>
      <td style="text-align:center">
        <button class="btn btn-ghost btn-sm" onclick="showRentalForm(${r.id})" title="تعديل">✏️</button>
        <button class="btn btn-ghost btn-sm" onclick="deleteRentalRecord(${r.id})" style="color:#ef4444" title="حذف">🗑️</button>
      </td>
    </tr>`;
  }).join('');
}

function filterRentalTable(q) {
  const filtered = q.trim()
    ? _rentalData.filter(r => r.equipment_name.includes(q) || (r.branch||'').includes(q) || (r.code||'').includes(q))
    : _rentalData;
  renderRentalTable(filtered);
}

async function saveRentalRecord() {
  const body = {
    branch: document.getElementById('rnBranch').value.trim(),
    equipment_name: document.getElementById('rnName').value.trim(),
    code: document.getElementById('rnCode').value.trim(),
    rental_source: document.getElementById('rnSource').value.trim(),
    work_days: document.getElementById('rnDays').value,
    daily_rate: document.getElementById('rnDaily').value,
    monthly_rate: document.getElementById('rnMonthly').value,
    fuel_liters: document.getElementById('rnFuel').value,
    hours_start: document.getElementById('rnHoursStart').value,
    hours_end: document.getElementById('rnHoursEnd').value,
    hours_diff: document.getElementById('rnDiff').value,
    utilization_pct: document.getElementById('rnUtil').value,
    project: document.getElementById('rnProject').value,
    month: document.getElementById('rnMonth').value,
    sector: document.getElementById('rnSector').value,
    notes: document.getElementById('rnNotes').value,
    consumption_rate: '',
  };
  if(!body.branch) return showNotification('الفرع مطلوب','error');
  if(body.fuel_liters && parseFloat(body.fuel_liters) > 400) return showNotification('الحد الأقصى لكمية الوقود للمعدات هو 400 لتر','error');
  if(!body.equipment_name) return showNotification('اسم المعدة مطلوب','error');
  try {
    if(_rentalEditId) {
      await apiCall(`/rental-equipment/${_rentalEditId}`,'PUT',body);
      showNotification('✅ تم التعديل','success');
    } else {
      await apiCall('/rental-equipment','POST',body);
      showNotification('✅ تم الإضافة','success');
    }
    closeRentalForm();
    await loadRentalData();
  } catch(e) { showNotification(e.message||'خطأ','error'); }
}
async function deleteRentalRecord(id) {
  if(!confirm('حذف هذا السجل؟')) return;
  try {

    showNotification('✅ تم الحذف','success');
    await loadRentalData();
  } catch(e) { showNotification(e.message,'error'); }
}

  if(!file) return showNotification('اختر ملفاً','error');
  const fd = new FormData(); fd.append('file', file);
  try {
    const data = await fetch('/rental-equipment/import/preview',{
      method:'POST', headers:{'Authorization':'Bearer '+localStorage.getItem('access_token')}, body:fd
    }).then(r=>r.json());
    if(data.detail) throw new Error(typeof data.detail==='string'?data.detail:JSON.stringify(data.detail));
    const s = data.summary||{};
    document.getElementById('rentalImportSummary').innerHTML = `
      <div style="display:flex;gap:.75rem;flex-wrap:wrap">
        ${[['الإجمالي',s.total,'#3b82f6'],['صالح',s.valid,'#10b981'],['أخطاء',s.invalid,'#ef4444']]
          .map(([l,v,c])=>`<span style="background:${c}15;color:${c};padding:.25rem .75rem;border-radius:20px;font-weight:700;font-size:.83rem">${l}: ${v}</span>`).join('')}
      </div>`;
    document.getElementById('rentalImportRows').innerHTML = (data.rows||[]).map(r=>`
      <tr style="background:${!r.valid?'#fef2f2':''}">
        <td>${r.row_index}</td>
        <td>${r.branch||'—'}</td>
        <td>${r.equipment_name||'—'}</td>
        <td style="font-size:.78rem">${r.code||''}</td>
        <td style="text-align:center">${r.work_days||''}</td>
        <td style="text-align:center">${r.monthly_rate||''}</td>
        <td style="color:${r.valid?'#10b981':'#ef4444'};font-size:.78rem">${r.valid?'✅':r.errors?.join(', ')}</td>
      </tr>`).join('');
    document.getElementById('rentalImportPreview').style.display = 'block';
    document.getElementById('rentalImportConfirmBtn').disabled = s.valid===0;
  } catch(e) { showNotification(e.message,'error'); }
}
async function confirmRentalImport() {
  const file = document.getElementById('rentalImportFile').files[0];
  if(!file) return;
  const replaceMonth = document.getElementById('rentalReplaceMonth').checked;
  const skipErrors   = document.getElementById('rentalSkipErrors').checked;
  const fd = new FormData(); fd.append('file', file);
  try {
    const res = await fetch(`/rental-equipment/import/confirm?skip_errors=${skipErrors}&replace_month=${replaceMonth}`,{
      method:'POST', headers:{'Authorization':'Bearer '+localStorage.getItem('access_token')}, body:fd
    }).then(r=>r.json());
    if(res.detail) throw new Error(typeof res.detail==='string'?res.detail:JSON.stringify(res.detail));
    showNotification(`✅ تم استيراد ${res.inserted} سجل، تخطي ${res.skipped}`,'success');
    closeRentalImport();
    await loadRentalData();
  } catch(e) { showNotification(e.message,'error'); }
}

async function exportRentalCSV() {
  if(!_rentalData.length) return showNotification('لا توجد بيانات','error');
  // تصدير بفورمات الشيت العربي
  const month = document.getElementById('rentalMonth')?.value || '';
  const branch = document.getElementById('rentalBranch')?.value || '';
  let url = `/rental-equipment/export/excel-format`;
  const params = [];
  if(month) params.push(`month=${encodeURIComponent(month)}`);
  if(branch) params.push(`branch=${encodeURIComponent(branch)}`);
  if(params.length) url += '?' + params.join('&');
  const res = await fetch(url, {headers:{'Authorization':'Bearer '+(localStorage.getItem('access_token')||'')}});
  if(!res.ok){showNotification('❌ خطأ في التصدير','error');return;}
  const blob = await res.blob();
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `rental_${month||'all'}.csv`;
  a.click(); URL.revokeObjectURL(a.href);
  showNotification('✅ تم التصدير بالفورمات العربي','success');
}

// نفس فكرة البطاقة التشغيلية للمركبات، بس الداتا من equipment + operator_shifts
// + 3 مقاييس إضافية: ساعات التشغيل الفعلية، عدد الورديات، نسبة الاستخدام اليومية

async function renderEquipmentOpCard() {
  const c = document.getElementById('pageContent');
  c.innerHTML = `<div class="empty-state"><div class="empty-icon">⏳</div><p>جاري التحميل...</p></div>`;

  let equipmentList = [];
  try { const r = await apiCall('/equipment'); equipmentList = r.equipment || []; } catch(e) {}

  const today = new Date().toISOString().slice(0,10);
  const monthStart = today.slice(0,8)+'01';

  // ── جلب ورديات كل المعدات في الفترة الحالية (للداشبورد) + كل الورديات (لفهرسة البحث بالمشغلين) ──
  let monthShiftsResp = {shifts:[]}, allShiftsResp = {shifts:[]};
  try { monthShiftsResp = await apiCall(`/shifts?date_from=${monthStart}&date_to=${today}&limit=10000`); } catch(e) {}
  try { allShiftsResp = await apiCall(`/shifts?limit=10000`); } catch(e) {}
  const monthShifts = monthShiftsResp.shifts || [];
  const allShiftsForSearch = allShiftsResp.shifts || [];

  const calcUsagePct = (hours) => ((hours || 0) / 8) * 100; // بدون سقف، ممكن تتجاوز 100%

  const totalHoursAll = monthShifts.reduce((s,r)=> s + (r.working_hours||0), 0);
  const workingNow = new Set(monthShifts.filter(r=>r.status==='active').map(r=>r.equipment_id)).size;
  const avgUsageAll = monthShifts.length ? (monthShifts.reduce((s,r)=> s + calcUsagePct(r.working_hours), 0) / monthShifts.length) : 0;

  const dashboardCards = `
    <div class="eqop-summary-grid no-print">
      <div class="eqop-summary-card"><div class="ic">🏗️</div><div class="lbl">إجمالي المعدات</div><div class="val">${equipmentList.length}</div></div>
      <div class="eqop-summary-card"><div class="ic">🟢</div><div class="lbl">المعدات العاملة الآن</div><div class="val">${workingNow}</div></div>
      <div class="eqop-summary-card"><div class="ic">⏱️</div><div class="lbl">إجمالي ساعات التشغيل (الشهر)</div><div class="val">${totalHoursAll.toFixed(1)}</div></div>
      <div class="eqop-summary-card"><div class="ic">📊</div><div class="lbl">متوسط نسبة الاستخدام</div><div class="val">${avgUsageAll.toFixed(1)}%</div></div>
    </div>`;

  // ── فهرس بحث: لكل معدة، اسمها + كودها + كل المشغلين اللي شغّلوها (الاسم + الرقم الثابت) ──
  const operatorsByEq = {};
  allShiftsForSearch.forEach(s => {
    if (!s.equipment_id) return;
    (operatorsByEq[s.equipment_id] = operatorsByEq[s.equipment_id] || new Set())
      .add([s.operator_name||'', s.operator_fixed||''].filter(Boolean).join(' — '));
  });
  window._eqOpSearchIndex = equipmentList.map(eq => {
    const ops = Array.from(operatorsByEq[eq.car_code] || []);
    const label = `${eq.equipment_name}${eq.car_code?' — '+eq.car_code:''}${eq.equipment_type?' ('+eq.equipment_type+')':''}`;
    const searchText = [eq.equipment_name, eq.car_code, eq.equipment_type, ...ops].filter(Boolean).join(' ').toLowerCase();
    return {car_code: eq.car_code, label, ops, searchText};
  });

  c.innerHTML = `
    <style>
      @media print {
        .sidebar, .topbar, .sidebar-overlay, #sidebarOverlay, .no-print { display:none!important }
        body, html { background:#fff!important }
        #appShell { display:block!important }
        .main-content { margin:0!important; padding:0!important }
        .page-content { padding:0!important }
        .card { box-shadow:none!important; border:none!important; margin:0!important; padding:0!important }
        .eqop-print-header { display:block!important; text-align:center;margin-bottom:1rem;padding-bottom:.5rem;border-bottom:2px solid #0f2027 }
        @page { size:A4 landscape; margin:10mm 12mm }
        [style*="overflow-x:auto"]{ overflow:visible!important; }
      }
      .eqop-print-header { display:none }
      .eqop-summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.75rem;margin-bottom:1.1rem}
      @media(max-width:900px){.eqop-summary-grid{grid-template-columns:repeat(2,1fr)}}
      .eqop-summary-card{background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:1rem;text-align:center}
      .eqop-summary-card .ic{font-size:1.4rem}
      .eqop-summary-card .lbl{font-size:.72rem;color:#64748b;font-weight:600;margin:.3rem 0}
      .eqop-summary-card .val{font-size:1.25rem;font-weight:900;color:#0f172a}
      .eqop-table{width:100%;border-collapse:collapse;font-size:.85rem}
      .eqop-table th{background:#0f2027;color:#fff;padding:.55rem .8rem;text-align:center;font-weight:700;white-space:nowrap}
      .eqop-table td{padding:.5rem .8rem;border-bottom:1px solid #e2e8f0;text-align:center}
      .eqop-table tr:nth-child(even) td{background:#f8fafc}
      .eqop-usage-bar-wrap{background:#e2e8f0;border-radius:20px;height:8px;width:80px;margin:0 auto;overflow:hidden}
      .eqop-usage-bar{height:100%;border-radius:20px;background:linear-gradient(90deg,#3b82f6,#06b6d4)}
      .eqop-search-wrap{position:relative}
      .eqop-search-results{
        position:fixed;background:#fff;border:1.5px solid var(--border);
        border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.18);max-height:260px;overflow-y:auto;z-index:9999;display:none;
      }
      .eqop-search-results.show{display:block}
      .eqop-search-item{padding:.55rem .8rem;cursor:pointer;border-bottom:1px solid var(--border);font-size:.82rem}
      .eqop-search-item:last-child{border-bottom:none}
      .eqop-search-item:hover{background:var(--surface-2)}
      .eqop-search-item .eq-ops{font-size:.7rem;color:#64748b;margin-top:.15rem}
    </style>

    <div class="page-header no-print"><div class="page-title">📋 بطاقة تشغيل المعدات</div></div>

    ${dashboardCards}

    <div class="card no-print">
      <div class="card-header"><div class="card-title">🔍 بطاقة تفصيلية لمعدة واحدة</div></div>
      <div style="padding:1rem 1.2rem 1.4rem">
        <div class="filter-grid" style="display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:.8rem;align-items:end">
          <div class="form-group eqop-search-wrap" style="margin:0">
            <label style="font-size:.8rem;font-weight:700;color:#475569;margin-bottom:.3rem;display:block">المعدة <span class="req">*</span></label>
            <input type="text" id="eqOpSearch" placeholder="ابحث بالمعدة، رقمها، اسم المشغل أو رقمه الثابت..."
              autocomplete="off" oninput="filterEqOpSearch()" onfocus="filterEqOpSearch()"
              style="width:100%;padding:.55rem .7rem;border:1.5px solid var(--border);border-radius:9px;font-family:inherit">
            <input type="hidden" id="eqOpEquipment">
            <div id="eqOpSearchResults" class="eqop-search-results"></div>
          </div>
          <div class="form-group" style="margin:0">
            <label style="font-size:.8rem;font-weight:700;color:#475569;margin-bottom:.3rem;display:block">من تاريخ</label>
            <input type="date" id="eqOpFrom" value="${monthStart}" style="width:100%;padding:.55rem .7rem;border:1.5px solid var(--border);border-radius:9px;font-family:inherit">
          </div>
          <div class="form-group" style="margin:0">
            <label style="font-size:.8rem;font-weight:700;color:#475569;margin-bottom:.3rem;display:block">إلى تاريخ</label>
            <input type="date" id="eqOpTo" value="${today}" style="width:100%;padding:.55rem .7rem;border:1.5px solid var(--border);border-radius:9px;font-family:inherit">
          </div>
          <button class="btn btn-primary" onclick="generateEquipmentOpCard()">📊 إنشاء البطاقة</button>
        </div>
      </div>
    </div>

    <div id="eqOpResult"></div>
  `;

  document.addEventListener('click', (e) => {
    const wrap = document.querySelector('.eqop-search-wrap');
    const results = document.getElementById('eqOpSearchResults');
    if (wrap && results && !wrap.contains(e.target)) results.classList.remove('show');
  });
}

function positionEqOpSearchResults() {
  const input = document.getElementById('eqOpSearch');
  const resultsEl = document.getElementById('eqOpSearchResults');
  if (!input || !resultsEl) return;
  const r = input.getBoundingClientRect();
  resultsEl.style.top = (r.bottom + 4) + 'px';
  resultsEl.style.left = r.left + 'px';
  resultsEl.style.width = r.width + 'px';
}

function filterEqOpSearch() {
  const q = (document.getElementById('eqOpSearch')?.value || '').trim().toLowerCase();
  const resultsEl = document.getElementById('eqOpSearchResults');
  if (!resultsEl) return;
  const index = window._eqOpSearchIndex || [];
  const matches = (q ? index.filter(i => i.searchText.includes(q)) : index).slice(0, 30);
  resultsEl.innerHTML = matches.length ? matches.map(m => `
    <div class="eqop-search-item" onclick='selectEqOpSearchResult(${JSON.stringify(m.car_code)}, ${JSON.stringify(m.label)})'>
      <div>${m.label}</div>
      ${m.ops.length ? `<div class="eq-ops">👷 ${m.ops.join(' • ')}</div>` : ''}
    </div>`).join('') : `<div class="eqop-search-item" style="color:var(--muted);cursor:default">لا توجد نتائج</div>`;
  positionEqOpSearchResults();
  resultsEl.classList.add('show');
  window._eqOpSearchRepositionHandler = window._eqOpSearchRepositionHandler || (() => positionEqOpSearchResults());
  window.removeEventListener('scroll', window._eqOpSearchRepositionHandler, true);
  window.removeEventListener('resize', window._eqOpSearchRepositionHandler);
  window.addEventListener('scroll', window._eqOpSearchRepositionHandler, true);
  window.addEventListener('resize', window._eqOpSearchRepositionHandler);
}

function selectEqOpSearchResult(carCode, label) {
  document.getElementById('eqOpEquipment').value = carCode;
  document.getElementById('eqOpSearch').value = label;
  document.getElementById('eqOpSearchResults').classList.remove('show');
  if (window._eqOpSearchRepositionHandler) {
    window.removeEventListener('scroll', window._eqOpSearchRepositionHandler, true);
    window.removeEventListener('resize', window._eqOpSearchRepositionHandler);
  }
}

async function generateEquipmentOpCard() {
  const eqCode = document.getElementById('eqOpEquipment')?.value;
  const from   = document.getElementById('eqOpFrom')?.value;
  const to     = document.getElementById('eqOpTo')?.value;
  const resEl  = document.getElementById('eqOpResult');

  if (!eqCode) return showNotification('اختر المعدة أولاً', 'error');
  resEl.innerHTML = `<div class="empty-state"><div class="empty-icon">⏳</div><p>جاري تجهيز البطاقة...</p></div>`;

  // ── جلب بيانات المعدة والورديات والورشة بالتوازي ──
  let equipmentList = [], shiftsResp = {shifts:[]}, allWs = [];
  try { const r = await apiCall('/equipment'); equipmentList = r.equipment || []; } catch(e) {}
  try { shiftsResp = await apiCall(`/shifts?equipment_id=${encodeURIComponent(eqCode)}&date_from=${from}&date_to=${to}&limit=10000`); } catch(e) {}
  try { allWs = await apiCall(`/workshops`); } catch(e) {}

  const eq = equipmentList.find(e => e.car_code === eqCode);
  const shifts = (shiftsResp.shifts || []).slice().sort((a,b)=> new Date(a.start_time) - new Date(b.start_time));

  // ── فلتر سجلات الورشة للمعدة في الفترة ──
  // سجلات الورشة للمعدة: is_operator=1 + operator_id من المشغلين اللي ليهم ورديات على هذه المعدة
  const eqOperatorIds = new Set(shifts.map(s => s.operator_id).filter(Boolean));
  const wsAll = (Array.isArray(allWs) ? allWs : []).filter(w => {
    if (!w.created_at) return false;
    const wDate = w.created_at.slice(0,10);
    if (from && wDate < from) return false;
    if (to   && wDate > to)   return false;
    // سجل مرتبط بمشغل من ورديات هذه المعدة
    return w.is_operator == 1 && eqOperatorIds.has(w.operator_id);
  });

  // ── تقسيم سجلات الورشة حسب النوع ──
  const FUEL_TYPES_SET = new Set(['fuel_solar','fuel_92','fuel_95','fuel_80','fuel_cng']);
  const OIL_TYPES_SET  = new Set(['oil','oil_motor','oil_gear','oil_brake','oil_hydro','oil_grease',
                                   'filter','filter_oil','filter_solar','filter_petrol','filter_air',
                                   'filter_separator','filter_ac','filter_dryer','filter_breather','filter_hydraulic']);
  const wsFuel  = wsAll.filter(w => FUEL_TYPES_SET.has(w.type));
  const wsOils  = wsAll.filter(w => OIL_TYPES_SET.has(w.type));
  const wsTires = wsAll.filter(w => w.type === 'tire');
  const wsBatt  = wsAll.filter(w => w.type === 'battery');
  const wsMaint = wsAll.filter(w => w.type === 'other' || (!FUEL_TYPES_SET.has(w.type) && !OIL_TYPES_SET.has(w.type) && w.type !== 'tire' && w.type !== 'battery'));

  // ── إجماليات ──
  const totalHours  = shifts.reduce((s,r) => s + (r.working_hours||0), 0);
  const shiftsCount = shifts.length;
  const usagePct    = shifts.length ? (shifts.reduce((s,r) => s + ((r.working_hours||0) / 8) * 100, 0) / shifts.length) : 0;
  const totalFuelLt = wsFuel.reduce((s,r) => s + (parseFloat(r.quantity)||0), 0);
  const totalFuelCost = wsFuel.reduce((s,r) => s + (parseFloat(r.price)||0), 0);

  const eqInfoLine = eq
    ? `${eq.equipment_name}${eq.car_code?' — '+eq.car_code:''}${eq.equipment_type?' | '+eq.equipment_type:''}${eq.brand?' | '+eq.brand:''}${eq.branch?' | الفرع: '+eq.branch:''}`
    : eqCode;

  function fmtN(n) { return (n||0).toLocaleString('ar-EG'); }
  function fmtDt(s) { return s ? new Date(s).toLocaleDateString('ar-EG') : '—'; }
  function fmtTm(s) { return s ? new Date(s).toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'}) : '—'; }

  // ── بطاقة الملخص (أعلى الصفحة) ──
  const summaryCards = `
    <div class="eqop-summary-grid" style="grid-template-columns:repeat(6,1fr)">
      <div class="eqop-summary-card"><div class="ic">⏱️</div><div class="lbl">ساعات التشغيل</div><div class="val">${totalHours.toFixed(1)}</div></div>
      <div class="eqop-summary-card"><div class="ic">📋</div><div class="lbl">عدد الورديات</div><div class="val">${shiftsCount}</div></div>
      <div class="eqop-summary-card"><div class="ic">📊</div><div class="lbl">نسبة الاستخدام</div><div class="val" style="color:${usagePct>100?'#dc2626':'#0f172a'}">${usagePct.toFixed(1)}%</div></div>
      <div class="eqop-summary-card"><div class="ic">⛽</div><div class="lbl">إجمالي الوقود</div><div class="val">${totalFuelLt.toLocaleString('ar-EG')} لتر</div></div>
      <div class="eqop-summary-card"><div class="ic">💰</div><div class="lbl">تكلفة الوقود</div><div class="val" style="color:#ea580c">${totalFuelCost.toLocaleString('ar-EG')} ج</div></div>
      <div class="eqop-summary-card"><div class="ic">👷</div><div class="lbl">عدد المشغلين</div><div class="val">${eqOperatorIds.size}</div></div>
    </div>`;

  // ── أولاً: بيان مسحوبات الوقود ──
  const fuelByType = {};
  wsFuel.forEach(w => {
    if(!fuelByType[w.type]) fuelByType[w.type] = [];
    fuelByType[w.type].push(w);
  });
  const FUEL_LABEL_MAP = {fuel_solar:'السولار',fuel_92:'بنزين 92',fuel_95:'بنزين 95',fuel_80:'بنزين 80',fuel_cng:'غاز طبيعي'};
  let fuelHtml = '';
  Object.entries(fuelByType).forEach(([type, rows]) => {
    let totQty=0, totCost=0;
    const tRows = rows.map((r,i) => {
      totQty  += parseFloat(r.quantity)||0;
      totCost += parseFloat(r.price)||0;
      return `<tr>
        <td style="text-align:center;color:#94a3b8;font-size:.78rem">${i+1}</td>
        <td style="text-align:center">${(r.created_at||'').slice(0,10)||'—'}</td>
        <td style="text-align:center;font-weight:700;color:#ea580c">${fmtN(r.quantity)} لتر</td>

        const opt = document.createElement('option');
        opt.value = op.id; opt.textContent = op.name;
        sel.appendChild(opt);
      });

}

async function loadEquipmentTrips() {
  const tbody = document.getElementById('etTableBody');
  if (!tbody) return;
  tbody.innerHTML = '<tr><td colspan="12" style="text-align:center;padding:2rem">جاري التحميل...</td></tr>';

  const opId    = document.getElementById('etOpFilter')?.value || '';
  const search  = document.getElementById('etEqSearch')?.value?.trim() || '';

  try {
    let allShifts = [];

    if (opId) {
      // جلب ورديات مشغل محدد
      const data = await apiCall(`/operators/${opId}/shifts?limit=200`);
      allShifts = (data.shifts || []).map(s => ({...s, operator_name: ''}));
    } else {
      // جلب كل المشغلين ثم ورديات كل منهم
      const opsData = await apiCall('/operators');
      const ops = opsData.operators || [];
      for (const op of ops.slice(0, 20)) { // حد 20 مشغل
        try {
          const d = await apiCall(`/operators/${op.id}/shifts?limit=100`);
          const shifts = (d.shifts || []).map(s => ({...s, operator_name: op.name}));
          allShifts = allShifts.concat(shifts);
        } catch(e) {}
      }
      allShifts.sort((a,b) => (b.start_time||'').localeCompare(a.start_time||''));
    }

    // تصفية بالبحث
    if (search) {
      allShifts = allShifts.filter(s =>
        (s.equipment_name||'').includes(search) || (s.equipment_id||'').includes(search)
      );
    }

    // ملخص
    const total   = allShifts.length;
    const active  = allShifts.filter(s => s.status === 'active').length;
    const ended   = allShifts.filter(s => s.status === 'ended').length;
    const totalFuel = allShifts.reduce((s,r) => s + (parseFloat(r.fuel_liters)||0), 0);
    const totalHrs  = allShifts.reduce((s,r) => {
      const diff = (r.end_hours||0) - (r.start_hours||0);
      return s + (diff > 0 ? diff : 0);
    }, 0);

    const sumEl = document.getElementById('etSummary');
    if (sumEl) {
      sumEl.innerHTML = `
        <div class="card" style="padding:1rem;text-align:center">
          <div style="font-size:1.4rem;font-weight:800;color:#1e3a5f">${total}</div>
          <div style="font-size:.8rem;color:#64748b">إجمالي السجلات</div>
        </div>
        <div class="card" style="padding:1rem;text-align:center">
          <div style="font-size:1.4rem;font-weight:800;color:#10b981">${active}</div>
          <div style="font-size:.8rem;color:#64748b">جارية</div>
        </div>
        <div class="card" style="padding:1rem;text-align:center">
          <div style="font-size:1.4rem;font-weight:800;color:#64748b">${ended}</div>
          <div style="font-size:.8rem;color:#64748b">منتهية</div>
        </div>
        <div class="card" style="padding:1rem;text-align:center">
          <div style="font-size:1.4rem;font-weight:800;color:#f97316">${totalFuel.toFixed(1)}</div>
          <div style="font-size:.8rem;color:#64748b">إجمالي السولار (ل)</div>
        </div>
        <div class="card" style="padding:1rem;text-align:center">
          <div style="font-size:1.4rem;font-weight:800;color:#3b82f6">${totalHrs.toFixed(1)}</div>
          <div style="font-size:.8rem;color:#64748b">إجمالي الساعات</div>
        </div>
      `;
    }

    if (!allShifts.length) {
      tbody.innerHTML = '<tr><td colspan="12" style="text-align:center;padding:2rem;color:var(--muted)">لا توجد سجلات</td></tr>';
      return;
    }

    tbody.innerHTML = allShifts.map((s, i) => {
      const startT = (s.start_time||'').slice(0,16).replace('T',' ');
      const endT   = s.end_time ? s.end_time.slice(0,16).replace('T',' ') : '—';
      const hrsDiff = (s.end_hours > s.start_hours) ? (s.end_hours - s.start_hours).toFixed(1) : '—';
      const statusBadge = s.status === 'active'
        ? '<span class="badge badge-green">جارية</span>'
        : '<span class="badge" style="background:#f1f5f9;color:#64748b">منتهية</span>';
      const shiftLabel = s.shift_type === 'night' ? '🌙 ليلية' : s.shift_type === 'extended' ? '⏱️ ممتدة' : '☀️ نهارية';
      return `<tr>
        <td style="color:var(--muted)">${i+1}</td>
        <td><strong>${s.operator_name || '—'}</strong></td>
        <td>
          <div style="font-size:.85rem">${s.equipment_name||'—'}</div>
          ${s.equipment_id ? `<div style="font-size:.72rem;color:#94a3b8;font-family:monospace">${s.equipment_id}</div>` : ''}
        </td>
        <td>${shiftLabel}</td>
        <td style="font-size:.82rem">${startT}</td>
        <td style="font-size:.82rem">${endT}</td>
        <td style="text-align:center">${s.start_hours||0}</td>
        <td style="text-align:center">${s.end_hours||0}</td>
        <td style="text-align:center;font-weight:600;color:#1e3a5f">${hrsDiff}</td>
        <td style="text-align:center">${s.fuel_liters||0}</td>
        <td style="font-size:.8rem">${s.project||'—'}</td>
        <td>${statusBadge}</td>
      </tr>`;
    }).join('');
  } catch(e) {
    tbody.innerHTML = `<tr><td colspan="12" style="text-align:center;color:#ef4444;padding:2rem">❌ ${e.message}</td></tr>`;
  }
}

    if(tbody) tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;color:#ef4444;padding:3rem">❌ ${e.message}</td></tr>`;
  }
}

async function deleteOperator(id){
  if(!confirm('حذف هذا المشغل؟')) return;
  const res = await apiCall(`/operators/${id}`,'DELETE');
  if(res){ showNotification('✅ تم الحذف','success'); await loadOperators(); }
}

async function openOpForm(id=null){
  _opEditId = id;
  // مسح الحقول أولاً
  ['opName','opFixed','opPhone','opNatId','opBranchF','opSector',
   'opLicType','opUsername','opPassword'].forEach(fid=>{
    const el=document.getElementById(fid); if(el) el.value='';
  });
  document.getElementById('opFormTitle').textContent = id ? '✏️ تعديل مشغل' : '➕ إضافة مشغل';

  let op = null;
  if(id) {
    try {
      const data = await apiCall('/operators?status=');
      op = (data.operators||[]).find(o=>o.id===id);
    } catch(e){}
  }

  if(op) {
    document.getElementById('opName').value    = op.name||'';
    document.getElementById('opFixed').value   = op.fixed_number||'';
    document.getElementById('opPhone').value   = op.phone||'';
    document.getElementById('opNatId').value   = op.national_id||'';
